            <select value={stratSort} onChange={(e) => setStratSort(e.target.value)}
              style={{ flex: 1, minWidth: 0, height: 42, background: T.tile, border: "none", borderRadius: 14, color: T.ink, fontSize: 12.5, fontWeight: 800, padding: "0 12px", outline: "none", appearance: "none", WebkitAppearance: "none", textAlignLast: "center", cursor: "pointer" }}>
              {[["fecha", "Orden: Fecha"], ["ticker", "Orden: Ticker"], ["profit", "Orden: Profit"]].map(([id, label]) => (
                <option key={id} value={id}>{label}</option>
              ))}
            </select>
            <button onClick={() => setFilterOpen(true)} style={{
              flex: 1, minWidth: 0, height: 42, border: "none", cursor: "pointer", borderRadius: 14, fontSize: 12.5, fontWeight: 800,
              background: (stratWin !== "Todas" || stratTkr !== "Todos") ? T.dark : T.tile, color: (stratWin !== "Todas" || stratTkr !== "Todos") ? "#fff" : T.ink,
            }}>Filtrar{(stratWin !== "Todas" ? 1 : 0) + (stratTkr !== "Todos" ? 1 : 0) > 0 ? " (" + ((stratWin !== "Todas" ? 1 : 0) + (stratTkr !== "Todos" ? 1 : 0)) + ")" : ""}</button>
          </div>

          {/* chips de filtros activos: solo aparecen cuando hay algo filtrado, con el nº de resultados */}
          {(stratWin !== "Todas" || stratTkr !== "Todos") && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 14, marginTop: -6, flexWrap: "wrap" }}>
              {stratTkr !== "Todos" && (
                <button onClick={() => setStratTkr("Todos")} style={{ border: "none", cursor: "pointer", borderRadius: 10, padding: "8px 12px", fontSize: 11.5, fontWeight: 800, background: T.tilePurple, color: T.purple }}>{stratTkr} ✕</button>
              )}
              {stratWin !== "Todas" && (
                <button onClick={() => setStratWin("Todas")} style={{ border: "none", cursor: "pointer", borderRadius: 10, padding: "8px 12px", fontSize: 11.5, fontWeight: 800, background: stratWin === "Ganadoras" ? T.tileGreen : T.tileRed, color: stratWin === "Ganadoras" ? T.green : T.red }}>{stratWin} ✕</button>
              )}
              <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 700, color: T.sub }}>{stratItems.length} {stratItems.length === 1 ? "resultado" : "resultados"}</span>
            </div>
          )}

          {filterOpen && (
            <div onClick={() => setFilterOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 70 }}>
              <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: "26px 26px 0 0", padding: "18px 18px calc(22px + env(safe-area-inset-bottom))", width: "100%", maxWidth: 560, boxSizing: "border-box", boxShadow: "0 -20px 60px rgba(0,0,0,0.35)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: T.ink }}>Filtrar · {stratCat}</div>
                  <button onClick={() => setFilterOpen(false)} style={{ background: T.tile, border: "none", borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 800, color: T.sub, cursor: "pointer" }}>✕</button>
                </div>

                <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 7 }}>Resultado</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {[["Todas", "Todas", T.ink], ["Ganadoras", "Ganadoras", T.green], ["Perdedoras", "Perdedoras", T.red]].map(([id, label, col]) => (
                    <button key={id} onClick={() => setStratWin(id)} style={{
                      flex: 1, cursor: "pointer", borderRadius: 14, padding: "13px 0", fontSize: 12.5, fontWeight: 800,
                      border: stratWin === id ? `2px solid ${col}` : `1.5px solid ${T.line}`,
                      background: stratWin === id ? T.tile : T.card, color: stratWin === id ? col : T.sub,
                    }}>{label}</button>
                  ))}
                </div>

                <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 7 }}>Ticker</div>
                {/* v1.11: un solo control — desplegable nativo (en iOS sale la rueda que rola los tickers) */}
                <select value={stratTkr} onChange={(e) => setStratTkr(e.target.value)}
                  style={{ width: "100%", boxSizing: "border-box", height: 48, background: stratTkr !== "Todos" ? T.dark : T.tile, border: stratTkr !== "Todos" ? "none" : `1.5px solid ${T.line}`, borderRadius: 14, color: stratTkr !== "Todos" ? "#fff" : T.ink, fontSize: 14, fontWeight: 800, padding: "0 14px", outline: "none", appearance: "none", WebkitAppearance: "none", marginBottom: 18 }}>
                  <option value="Todos">Todos los tickers</option>
                  {stratTkrs.map((t) => <option key={t} value={t}>{t}</option>)}
                </select>

                {stratStatus === "Cerradas" && (<>
                  {/* v1.69 (Victor): intervalo de fechas para las cerradas — filtra por fecha de CIERRE */}
                  <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 7 }}>Fecha de cierre</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 18 }}>
                    {[["Desde", stratFrom, setStratFrom], ["Hasta", stratTo, setStratTo]].map(([lbl, val, setV]) => (
                      <label key={lbl} style={{ display: "block" }}>
                        <span style={{ display: "block", fontSize: 9.5, fontWeight: 700, color: T.sub, marginBottom: 3 }}>{lbl}</span>
                        {/* v1.71 FIX encuadre (Victor): sin appearance:none iOS pinta el date input con su
                            cromo nativo (alto y centrado propios) y se salía del marco; mismo patrón que el
                            dateInputStyle de Rendimiento + flex para centrar el valor en los 44px */}
                        <input type="date" value={val} onChange={(e) => setV(e.target.value)}
                          style={{ width: "100%", boxSizing: "border-box", height: 44, background: val ? T.dark : T.tile, border: val ? "none" : `1.5px solid ${T.line}`, borderRadius: 13, color: val ? "#fff" : T.ink, fontSize: 13.5, fontWeight: 800, padding: "0 10px", outline: "none", WebkitAppearance: "none", appearance: "none", display: "flex", alignItems: "center", justifyContent: "flex-start", colorScheme: DARK || val ? "dark" : "light" }} />
                      </label>
                    ))}
                  </div>
                </>)}
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { setStratWin("Todas"); setStratTkr("Todos"); setStratFrom(""); setStratTo(""); }} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 13, padding: "13px 0", fontSize: 13, fontWeight: 800, color: T.sub, cursor: "pointer" }}>Limpiar</button>
                  <button onClick={() => setFilterOpen(false)} style={{ flex: 2, background: T.dark, border: "none", borderRadius: 13, padding: "13px 0", fontSize: 13, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Ver {stratItems.length} {stratItems.length === 1 ? "resultado" : "resultados"}</button>
                </div>
              </div>
            </div>
          )}

          {stratStatus === "Cerradas" && stratItems.length > 0 && (() => {
            /* resumen agregado de la estrategia (v5.13): sobre las cerradas de la categoría activa —
               nº operaciones, ganadoras/perdedoras, win rate, profit total y media por operación. */
            const results = stratItems.map(closedResultOf);
            const nAll = results.length;
            /* v5.15: una posición ejercida/asignada cuenta como PERDEDORA aunque te quedaras la prima —
               la asignación es el desenlace adverso. El profit total y la media sí usan el resultado real. */
            const wins = stratItems.filter(isWinner).length;
            const losses = stratItems.filter(isLoser).length;
            const total = results.reduce((a, b) => a + b, 0);
            const avg = nAll ? total / nAll : 0;
            const winRate = nAll ? wins / nAll : NaN;
            return (
              <div style={{ background: T.dark, borderRadius: 18, padding: "14px 16px", marginBottom: 14, color: "#fff", boxShadow: T.shadow }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 12.5, fontWeight: 800 }}>📊 {stratCat} · cerradas</div>
                    <div style={{ fontSize: 10.5, color: "#B9C2CC", fontWeight: 600, marginTop: 2 }}>{nAll} {nAll === 1 ? "operación" : "operaciones"}{stratWin === "Todas" ? " · win rate " + (isFinite(winRate) ? (winRate * 100).toFixed(0) + "%" : "—") : " · filtro: " + stratWin.toLowerCase()}{stratTkr !== "Todos" ? " · " + stratTkr : ""}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: total >= 0 ? T.green : T.red, letterSpacing: -0.5 }}>{signMoney(total)}</div>
                    <div style={{ fontSize: 10.5, color: "#B9C2CC", fontWeight: 600 }}>Profit total</div>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: stratWin === "Todas" ? "1fr 1fr 1fr 1fr" : "1fr 1fr", gap: 8 }}>
                  {/* v1.08: con filtro Ganadoras/Perdedoras, los tiles de win rate y G/P no aportan
                     (saldría 100%/0% por definición) — se muestran solo Operaciones y Media/op */}
                  {(stratWin === "Todas"
                    ? [["Ganadoras", String(wins), T.green], ["Perdedoras", String(losses), T.red], ["Win rate", isFinite(winRate) ? (winRate * 100).toFixed(0) + "%" : "—", "#fff"], ["Media/op", signMoney(avg), avg >= 0 ? T.green : T.red]]
                    : [["Operaciones", String(nAll), "#fff"], ["Media/op", signMoney(avg), avg >= 0 ? T.green : T.red]]
                  ).map(([lbl, val, col]) => (
                    <div key={lbl} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "9px 6px", textAlign: "center" }}>
                      <div style={{ fontSize: 15, fontWeight: 800, color: col, letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>{val}</div>
                      <div style={{ fontSize: 9.5, color: "#B9C2CC", marginTop: 2, fontWeight: 600 }}>{lbl}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {stratStatus === "Cerradas" && stratWin === "Todas" && stratItems.length >= 3 && (() => {
            /* v3.35: RIESGO DEL PROCESO — genérico para CUALQUIER estrategia (usa closedResultOf, igual que
               el resumen de arriba). Responde a lo que el win rate esconde: (1) cuánto pesa la PEOR operación
               sobre el P&L acumulado — el aviso que en Earnings solo saltó al exportar; (2) si el ratio
               ganadora media / perdedora media supera el MÍNIMO que exige tu propio win rate, (1-wr)/wr.
               Con wr=79%, el mínimo es 0,27: por debajo, la estrategia pierde aunque acierte 4 de 5. */
            const res = stratItems.map(closedResultOf);
            const nAll = res.length;
            const total = res.reduce((a, b) => a + b, 0);
            /* v3.38 FIX (caso Short Puts): antes las ganadoras/perdedoras se tomaban del resumen de arriba,
               que cuenta una ASIGNADA como perdedora aunque su closedResultOf sea la prima (POSITIVA) — la
               pérdida real se materializa en la posición de acciones, no aquí. Resultado: la "perdedora
               media" enseñaba primas cobradas con signo negativo, el ratio no significaba nada y la peor
               operación salía +$0. Este bloque razona SOLO con dinero registrado: ganadora = resultado > 0,
               perdedora = resultado < 0. Las asignaciones se avisan aparte. */
            const winsArr = res.filter((r) => r > 0);
            const lossArr = res.filter((r) => r < 0);
            const nEval = winsArr.length + lossArr.length;                  /* los ceros no puntúan */
            const nAssigned = stratItems.filter((pp) => pp.exercised).length;
            const wr = nEval ? winsArr.length / nEval : NaN;
            const avgW = winsArr.length ? winsArr.reduce((a, b) => a + b, 0) / winsArr.length : 0;
            const avgL = lossArr.length ? Math.abs(lossArr.reduce((a, b) => a + b, 0) / lossArr.length) : 0;
            const ratio = avgL > 0 ? avgW / avgL : NaN;                 /* lo que ganas por cada 1 que pierdes */
            const req = isFinite(wr) && wr < 1 && wr > 0 ? (1 - wr) / wr : NaN; /* mínimo para no perder dinero */
            const worst = lossArr.length ? Math.min.apply(null, lossArr) : NaN;
            /* v3.36 FIX: la peor operación se compara con el BRUTO de las ganadoras, no con el neto.
               Con el neto cerca de cero (p.ej. −850) el porcentaje se dispara o se vuelve absurdo y
               sugería un blowup donde en realidad hay un desequilibrio repartido en todas las pérdidas. */
            const grossW = winsArr.reduce((a, b) => a + b, 0);
            const grossL = Math.abs(lossArr.reduce((a, b) => a + b, 0));
            const worstPctW = isFinite(worst) && grossW > 0 ? (Math.abs(worst) / grossW) * 100 : NaN;
            const worstPctL = isFinite(worst) && grossL > 0 ? (Math.abs(worst) / grossL) * 100 : NaN;
            const ok = isFinite(ratio) && isFinite(req) && ratio > req;
            const worstCol = !isFinite(worstPctW) ? T.sub : worstPctW >= 100 ? T.red : worstPctW >= 50 ? T.orange : T.ink;
            const dotCol = lossArr.length === 0 ? T.sub : ok ? T.green : T.red;
            const avisoAsig = nAssigned > 0
              ? nAssigned + (nAssigned === 1 ? " asignación registrada" : " asignaciones registradas") + ": aquí solo se ve la prima cobrada. El resultado real de la acción vive en su propia posición, así que este análisis se queda corto en esta estrategia."
              : "";
            return (
              <details style={{ background: T.card, borderRadius: 18, marginBottom: 14, boxShadow: T.shadow, border: "1px solid " + T.line, overflow: "hidden" }}>
                {/* v3.36: plegable con <details> (sin hooks, seguro dentro del IIFE). Cerrado enseña el
                    veredicto en una línea; abierto, el desglose completo. */}
                <summary style={{ listStyle: "none", cursor: "pointer", padding: "13px 16px", display: "flex", alignItems: "center", gap: 9 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 5, background: dotCol, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 800, color: T.ink }}>⚖️ Riesgo del proceso</div>
                    <div style={{ fontSize: 10, color: T.sub, fontWeight: 600, marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {isFinite(ratio) && isFinite(req)
                        ? "Ratio G/P " + ratio.toFixed(2) + " · mínimo " + req.toFixed(2) + " · " + nAll + " cerradas"
                        : lossArr.length === 0
                          ? "Sin pérdidas en dinero · " + nAll + " cerradas"
                          : nAll + " cerradas"}
                    </div>
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 800, color: T.sub }}>▾</span>
                </summary>
                <div style={{ padding: "0 16px 14px" }}>
                  {lossArr.length === 0 ? (
                    /* v3.38: sin ninguna operación cerrada en negativo no hay ratio que calcular. Es el caso
                       de las ventas de put: la prima siempre entra, y cuando la cosa sale mal la pérdida se
                       muda a la posición de acciones asignada. Decirlo en vez de inventar números. */
                    <div style={{ background: T.tileAmber, borderRadius: 13, padding: "11px 12px", fontSize: 10.5, fontWeight: 700, color: T.orange, lineHeight: 1.4 }}>
                      Ninguna de las {nAll} cerradas está registrada en negativo, así que no hay ratio ganadora/perdedora que calcular.
                      {nAssigned > 0 ? " " + avisoAsig : ""}
                    </div>
                  ) : (<>
                  <div style={{ background: T.tile, borderRadius: 13, padding: "10px 12px", marginBottom: 9 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub }}>Peor operación</span>
                      <span style={{ fontSize: 17, fontWeight: 800, color: T.red, letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>{signMoney(worst)}</span>
                    </div>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: worstCol, marginTop: 3, lineHeight: 1.35 }}>
                      {isFinite(worstPctW)
                        ? "= " + worstPctW.toFixed(0) + "% de todo lo ganado" + (isFinite(worstPctL) ? " · " + worstPctL.toFixed(0) + "% de tus pérdidas" : "")
                        : "sin ganadoras registradas todavía"}
                    </div>
                    {isFinite(worstPctL) && lossArr.length > 0 && (() => {
                      /* v3.37 FIX: el binario 50% daba textos contradictorios (peor operación = 42% de las
                         pérdidas con 6 perdedoras se llamaba "repartida"). Ahora se compara con la parte que
                         LE TOCARÍA si el daño estuviera repartido: 1/nPerdedoras. */
                      const nL = lossArr.length;
                      const fair = 100 / nL;
                      const veces = worstPctL / fair;
                      const txt = nL === 1
                        ? "Solo hay una perdedora registrada: todo el daño es esa operación."
                        : veces >= 2
                          ? "Pérdida concentrada: la peor operación pesa " + veces.toFixed(1) + "× lo que le tocaría siendo 1 de " + nL + " perdedoras."
                          : veces >= 1.3
                            ? "Algo concentrada: la peor pesa " + veces.toFixed(1) + "× su parte entre " + nL + " perdedoras."
                            : "Pérdida repartida entre las " + nL + " perdedoras: ninguna destaca sobre las demás.";
                      return <div style={{ fontSize: 10, fontWeight: 600, color: veces >= 2 ? T.orange : T.sub, marginTop: 3, lineHeight: 1.35 }}>{txt}</div>;
                    })()}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                    {[["Ganadora media", signMoney(avgW), T.green],
                      ["Perdedora media", avgL > 0 ? "-$" + money(avgL) : "—", T.red],
                      ["Ratio G/P", isFinite(ratio) ? ratio.toFixed(2) : "—", ok ? T.green : T.red],
                      ["Mínimo exigido", isFinite(req) ? req.toFixed(2) : "—", T.sub]].map(([lbl, val, col]) => (
                      <div key={lbl} style={{ background: T.tile, borderRadius: 12, padding: "9px 6px", textAlign: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 800, color: col, letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>{val}</div>
                        <div style={{ fontSize: 9, color: T.sub, marginTop: 2, fontWeight: 600, lineHeight: 1.15 }}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                  {isFinite(ratio) && isFinite(req) && (
                    <div style={{ marginTop: 9, background: ok ? T.tileGreen : T.tileRed, borderRadius: 12, padding: "9px 11px", fontSize: 10.5, fontWeight: 700, color: ok ? T.green : T.red, lineHeight: 1.35 }}>
                      {/* v3.36 FIX: el texto se adapta al win rate — "aciertas mucho" solo tenía sentido con wr alto */}
                      {ok
                        ? "Con un win rate del " + (wr * 100).toFixed(0) + "%, tus ganadoras cubren a las perdedoras (" + ratio.toFixed(2) + " > " + req.toFixed(2) + ")."
                        : "Con un win rate del " + (wr * 100).toFixed(0) + "% necesitas un ratio ≥ " + req.toFixed(2) + " y tienes " + ratio.toFixed(2) + ". "
                          + (wr >= 0.7
                              ? "Aciertas mucho y aun así pierdes dinero: es un problema de tamaño, no de selección."
                              : wr >= 0.5
                                ? "Ganas algo más de la mitad de las veces, pero cada pérdida se lleva más de lo que aporta una ganancia."
                                : "Aciertas menos de la mitad de las veces, así que las ganadoras tendrían que ser bastante mayores que las perdedoras.")}
                    </div>
                  )}
                  {nAssigned > 0 && (
                    <div style={{ marginTop: 9, background: T.tileAmber, borderRadius: 12, padding: "9px 11px", fontSize: 10, fontWeight: 700, color: T.orange, lineHeight: 1.4 }}>{avisoAsig}</div>
                  )}
                  </>)}
                  <div style={{ marginTop: 8, fontSize: 9.5, color: T.sub, fontWeight: 600, lineHeight: 1.35 }}>
                    Ganadora = cerrada en positivo, perdedora = cerrada en negativo (dinero registrado; el win rate de la tarjeta de arriba cuenta además las asignadas como perdedoras). Con pocas operaciones, un ratio cercano al mínimo no es concluyente.
                  </div>
                </div>
              </details>
            );
          })()}

          {stratStatus === "Cerradas" && stratItems.length > 0 && (
            /* v1.14: exporta las cerradas visibles (con filtros aplicados) para pegarlas en un chat y evaluarlas */
            <button onClick={exportStrat} style={{ width: "100%", marginTop: -6, marginBottom: 14, background: exportMsg ? T.tileGreen : T.tilePurple, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 13, fontWeight: 800, color: exportMsg ? T.green : T.purple, cursor: "pointer" }}>
              {exportMsg || ("📤 Exportar " + stratItems.length + (stratItems.length === 1 ? " operación" : " operaciones") + " para análisis")}
            </button>
          )}

          {stratCat === "DC/DD" && (() => {
            /* auditoría DC/DD (v5.08): "en qué falla y en qué no". Sobre las CERRADAS (resultado MTM),
               compara ganadoras vs perdedoras en las variables de la ficha: ratio shorts/longs, IV spread,
               DTE corto y % con evento dentro del vencimiento corto. Las medias solo cuentan operaciones
               con ese dato registrado — el histórico antiguo sin ficha no contamina. */
            const closed = positions.filter((x) => categoryOf(x) === "DC/DD" && x.closed && (stratTkr === "Todos" || (x.tkr || "").toUpperCase().trim() === stratTkr)); /* v1.13: respeta el filtro de ticker */
            if (closed.length < 2) return null;
            const resOf = (x) => mtmSumOf(x);
            const wins = closed.filter((x) => resOf(x) > 0), losses = closed.filter((x) => resOf(x) <= 0);
            const total = closed.reduce((s, x) => s + resOf(x), 0);
            const avg = (arr, fn) => { const v = arr.map(fn).filter(isFinite); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : NaN; };
            const grp = (arr) => ({
              ratio: avg(arr, (x) => dcddRatio(dcddOf(x))),
              ivSp: avg(arr, (x) => dcddIvSpread(dcddOf(x))),
              dteS: avg(arr, (x) => daysBetween(x.entryDate, x.expiry)),
              ev: (() => { const w = arr.filter((x) => dcddOf(x).eventIn === "SI" || dcddOf(x).eventIn === "NO"); return w.length ? arr.filter((x) => dcddOf(x).eventIn === "SI").length / w.length : NaN; })(),
            });
            const W = grp(wins), L = grp(losses);
            const fmt = (v, dec, plus) => (isFinite(v) ? (plus && v >= 0 ? "+" : "") + v.toFixed(dec) : "—");
            const rows = [
              ["Ratio S/L medio", fmt(W.ratio, 2), fmt(L.ratio, 2)],
              ["IV spread medio", fmt(W.ivSp, 1, true), fmt(L.ivSp, 1, true)],
              ["DTE corto medio", isFinite(W.dteS) ? W.dteS.toFixed(0) + "d" : "—", isFinite(L.dteS) ? L.dteS.toFixed(0) + "d" : "—"],
              ["% con evento", isFinite(W.ev) ? (W.ev * 100).toFixed(0) + "%" : "—", isFinite(L.ev) ? (L.ev * 100).toFixed(0) + "%" : "—"],
            ];
            return (

          {(stratCat === "Short Puts" || stratCat === "Covered Calls") && (() => {
            /* auditoría SP/CC (v1.09): "en qué falla y en qué no", calcada a la de DC/DD. Sobre las
               CERRADAS de la categoría, compara ganadoras vs perdedoras (mismo criterio que el resumen:
               ejercida = perdedora) en las condiciones DE ENTRADA: delta de apertura, DTE de apertura
               (vencimiento ORIGINAL, pre-rolls), IVR de apertura y DIT real.
               Las medias solo cuentan operaciones con ese dato registrado — el histórico sin ficha no
               contamina. Diferencias grandes entre columnas = esa variable discrimina; iguales = no. */
            /* v1.13: la auditoría respeta el filtro de TICKER (delta/DTE/IVR/DIT de UN subyacente).
               El filtro Ganadoras/Perdedoras NO se aplica: la auditoría compara precisamente ambos
               grupos entre sí — aplicarlo vaciaría una columna y perdería el sentido. */
            const closedA = positions.filter((x) => categoryOf(x) === stratCat && x.closed && (stratTkr === "Todos" || (x.tkr || "").toUpperCase().trim() === stratTkr));
            if (closedA.length < 2) return null;
            const winsA = closedA.filter(isWinner);
            const lossesA = closedA.filter(isLoser);
            const totalA = closedA.reduce((s, x) => s + closedResultOf(x), 0);
            const avgOf = (arr, fn) => { const v = arr.map(fn).filter(isFinite); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : NaN; };
            /* delta guardada como 0.30 o como 30 según la época — se normaliza a fracción */
            const normDelta = (x) => { const d = Math.abs(n(x.delta)); return d ? (d > 1 ? d / 100 : d) : NaN; };
            const grpA = (arr) => ({
              delta: avgOf(arr, normDelta),
              dte: avgOf(arr, (x) => daysBetween(x.entryDate, openingExpiry(x))),
              ivr: avgOf(arr, (x) => (n(x.ivr) ? n(x.ivr) : NaN)),
              dit: avgOf(arr, (x) => daysBetween(x.entryDate, x.closeDate)),
              earnPct: arr.length ? (arr.filter((x) => x.earnIn).length / arr.length) * 100 : NaN,
            });
            const WA = grpA(winsA), LA = grpA(lossesA);
            const rowsA = [
              ["Delta apertura media", isFinite(WA.delta) ? WA.delta.toFixed(2) : "—", isFinite(LA.delta) ? LA.delta.toFixed(2) : "—"],
              ["DTE apertura medio", isFinite(WA.dte) ? WA.dte.toFixed(0) + "d" : "—", isFinite(LA.dte) ? LA.dte.toFixed(0) + "d" : "—"],
              ["IVR apertura medio", isFinite(WA.ivr) ? WA.ivr.toFixed(0) : "—", isFinite(LA.ivr) ? LA.ivr.toFixed(0) : "—"],
              ["DIT medio", isFinite(WA.dit) ? WA.dit.toFixed(0) + "d" : "—", isFinite(LA.dit) ? LA.dit.toFixed(0) + "d" : "—"],
              ["% con earnings dentro", isFinite(WA.earnPct) ? WA.earnPct.toFixed(0) + "%" : "—", isFinite(LA.earnPct) ? LA.earnPct.toFixed(0) + "%" : "—"],

                    <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 500, marginTop: 1 }}>{closedA.length} operaciones · medias solo con dato registrado</div>
                  </div>

                  <span style={{ fontSize: 10, fontWeight: 800, color: T.red, textAlign: "right", textTransform: "uppercase", letterSpacing: 0.4 }}>Perdedoras</span>
                  {rowsA.map(([lbl, w, l]) => (
                    <React.Fragment key={lbl}>
                      <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, padding: "5px 0" }}>{lbl}</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, textAlign: "right", padding: "5px 0", fontVariantNumeric: "tabular-nums" }}>{w}</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, textAlign: "right", padding: "5px 0", fontVariantNumeric: "tabular-nums" }}>{l}</span>
                    </React.Fragment>
                  ))}

          {stratCat === "Short Puts" && (() => {
            /* v3.39: SUBMENÚ "Asignadas" — solo en Short Puts, porque solo ahí la asignación desplaza el
               resultado a otra posición. La app ya crea la acción con assignedFrom = id de la put y coste
               base = BEP, así que la cadena se reconstruye sin pedir nada al usuario.
               · VIVAS: la acción sigue abierta → valoración a hoy (BEP vs last), NUNCA entra en estadísticas.
               · CERRADAS: acción vendida → resultado real de la cadena = prima de la put + realizado de la acción.
               Respeta el filtro de ticker de la pestaña; ignora el de estado (una asignación es, por
               definición, una put cerrada con una acción que puede seguir viva). */
            const asigs = positions
              .filter((p) => p.exercised && p.closed && natOf(p) === "CRED" && p.right === "P" && !isPMCC(p))
              .filter((p) => stratTkr === "Todos" || (p.tkr || "").toUpperCase().trim() === stratTkr)
              .map((p) => {
                /* v3.40 FIX: si la acción no se encuentra por assignedFrom (asignaciones anteriores a la
                   v5.15, acciones fusionadas o creadas a mano), antes caía en st=null y la fila acababa en
                   "cerradas del todo" sin valoración — justo al revés de la realidad. Ahora: 1º enlace
                   explícito, 2º acción ABIERTA del mismo ticker y broker, 3º del mismo ticker; y si no hay
                   ninguna, va a su propio grupo "sin acción vinculada", nunca a cerradas. */
                const tk = (p.tkr || "").toUpperCase().trim();
                const accs = positions.filter((x) => natOf(x) === "ACC" && (x.tkr || "").toUpperCase().trim() === tk);
                const st = positions.find((x) => x.assignedFrom === p.id)
                  || accs.find((x) => !x.closed && x.broker === p.broker)
                  || accs.find((x) => !x.closed)
                  || null;
                const linkOk = st ? (st.assignedFrom === p.id) : false;
                const prima = primaSumOf(p);
                const bep = st ? n(effBep(st)) : NaN;
                const shares = st ? n(st.qty) : NaN;
                const last = st ? n(st.last) : NaN;
                const viva = !!st && !st.closed;
                const accion = !st ? NaN : st.closed ? mtmSumOf(st) : (isFinite(last) && last > 0 && isFinite(bep) ? (last - bep) * shares : NaN);
                return { p, st, linkOk, prima, bep, shares, last, viva, accion, total: isFinite(accion) ? prima + accion : NaN };
              })
              .sort((a, b) => (b.p.closeDate || "").localeCompare(a.p.closeDate || ""));
            if (asigs.length === 0) return null;
            const vivas = asigs.filter((a) => a.st && !a.st.closed);
            const cerr = asigs.filter((a) => a.st && a.st.closed);
            const huerf = asigs.filter((a) => !a.st);
            const sumOf = (arr) => arr.reduce((s, a) => s + (isFinite(a.total) ? a.total : 0), 0);
            const sinPrecio = vivas.filter((a) => !isFinite(a.accion)).length;
            const Row = ({ a }) => (
              <div key={a.p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, padding: "8px 0", borderTop: "1px solid " + T.line }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 800, color: T.ink }}>{a.p.tkr} <span style={{ fontSize: 10, fontWeight: 700, color: T.sub }}>${money2(n(a.p.strike))} · {a.p.closeDate || "—"}</span></div>
                  <div style={{ fontSize: 10, color: T.sub, fontWeight: 600, marginTop: 2 }}>
                    Prima {signMoney(a.prima)}{isFinite(a.bep) ? " · BEP $" + money2(a.bep) : ""}{a.viva && isFinite(a.last) && a.last > 0 ? " · hoy $" + money2(a.last) : ""}{isFinite(a.shares) ? " · " + a.shares + " acc." : ""}
                  </div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 800, color: !isFinite(a.total) ? T.sub : a.total >= 0 ? T.green : T.red, fontVariantNumeric: "tabular-nums" }}>{isFinite(a.total) ? signMoney(a.total) : "sin precio"}</div>
                  <div style={{ fontSize: 9, color: T.sub, fontWeight: 700 }}>{a.viva ? "valoración" : "realizado"}</div>
                </div>
              </div>
            );
            return (
              <details style={{ background: T.card, borderRadius: 18, marginBottom: 14, boxShadow: T.shadow, border: "1px solid " + T.line, overflow: "hidden" }}>
                <summary style={{ listStyle: "none", cursor: "pointer", padding: "13px 16px", display: "flex", alignItems: "center", gap: 9 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 5, background: T.gold, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 800, color: T.ink }}>🔗 Asignadas ({asigs.length})</div>
                    <div style={{ fontSize: 10, color: T.sub, fontWeight: 600, marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {vivas.length} vivas · {cerr.length} cerradas{huerf.length > 0 ? " · " + huerf.length + " sin enlace" : ""}
                    </div>
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 800, color: T.sub }}>▾</span>
                </summary>
                <div style={{ padding: "0 16px 14px" }}>
                  <div style={{ fontSize: 10, color: T.sub, fontWeight: 600, lineHeight: 1.4, marginBottom: 9 }}>
                    La put asignada no acaba en la put: sigue en las acciones. Aquí se ve la cadena entera (prima + acción). Las vivas son valoración a día de hoy, no resultado, y por eso no entran en ninguna estadística.
                  </div>
                  {vivas.length > 0 && (<>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 4 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Vivas ({vivas.length})</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: sumOf(vivas) >= 0 ? T.green : T.red }}>{signMoney(sumOf(vivas))}</span>
                    </div>
                    {vivas.map((a) => <Row key={a.p.id} a={a} />)}
                    {sinPrecio > 0 && <div style={{ fontSize: 9.5, color: T.sub, fontWeight: 600, marginTop: 5 }}>{sinPrecio} sin precio actual: mete el último en la posición de acciones (o espera al feed de cotizaciones).</div>}
                  </>)}
                  {cerr.length > 0 && (<>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 12 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Cerradas del todo ({cerr.length})</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: sumOf(cerr) >= 0 ? T.green : T.red }}>{signMoney(sumOf(cerr))}</span>
                    </div>
                    {cerr.map((a) => <Row key={a.p.id} a={a} />)}
                  </>)}
                  {huerf.length > 0 && (<>
                    {/* v3.40: sin acción vinculada NO se puede decir si la cadena está viva o cerrada.
                        Grupo propio en vez de colarlas entre las cerradas. */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 12 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.orange, textTransform: "uppercase", letterSpacing: 0.4 }}>Sin acción vinculada ({huerf.length})</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: T.sub }}>prima {signMoney(huerf.reduce((s, a) => s + a.prima, 0))}</span>
                    </div>
                    {huerf.map((a) => <Row key={a.p.id} a={a} />)}
                    <div style={{ fontSize: 9.5, color: T.sub, fontWeight: 600, marginTop: 5, lineHeight: 1.35 }}>No encuentro la posición de acciones de estas asignaciones (ni por enlace ni por ticker), así que no puedo cerrar la cadena. Solo se ve la prima.</div>
                  </>)}
                </div>
              </details>
            );
          })()}

          {stratItems.length === 0 && (
            <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>No hay posiciones {stratStatus.toLowerCase()} en "{stratCat}".</div>
          )}

          {stratItems.map((p) => {
            const blk = BLOCKS.find((b) => b.id === p.block);
            const isOpt = isOptionNat(p);
            const primaSum = primaSumOf(p);
            /* Long Call y credit spreads (Iron Condor, Broken Wings) no registran su pata de apertura en
               Primas (por diseño: no reflejan nada hasta el cierre). Una vez cerradas, "primaSum" solo
               contendría el cash de esa única pata de cierre (venta o recompra), sin netear contra el coste/
               crédito de apertura — daría un profit engañoso. Para esos casos, una vez cerrada, se usa el
               resultado realizado (MTM), que sí neta correctamente contra la apertura original. */
            /* noOpenBooked: estrategias cuyo débito de apertura NO se registró en Primas y cuyo cierre NO
               materializa el neto completo (Long Call, credit spreads) → cerradas usan el realizado MTM.
               El PMCC NO está aquí: su cierre combinado (venta long − coste long − recompra short) hace que
               la suma de Primas (crédito apertura + rolls + cierre) sea exactamente el profit total. */
            const noOpenBooked = isLongCallPos(p) || isCreditSpread(p);
            const primaBasis = noOpenBooked && p.closed ? mtmSumOf(p) : primaSum;
            /* credit spread ABIERTO: no hay nada registrado (por diseño), pero sí se puede mostrar el
               crédito pendiente (prima × qty − comisión) y su ROI potencial sobre el riesgo introducido.
               Al cerrar, pasa a medirse el realizado: P&L (neto prima − recompra) / riesgo. */
            const csPending = isCreditSpread(p) && !p.closed;
            const csCredit = isCreditSpread(p) ? vDisplayPrima(p) * n(p.qty) - n(p.comision) : NaN;
            const romNumer = csPending ? csCredit : primaBasis;
            const result = isOpt ? primaBasis : mtmSumOf(p);
            /* riesgo de la estrategia para el histórico: en opciones cortas siempre BEP × acciones (contratos ×100),
               aunque en cartera compute 0 por estar cubierta — aquí interesa el capital que respaldó la operación.
               v5.15: el BEP de referencia es el ORIGINAL de apertura (strike original − prima de apertura), no el
               vigente tras los rolls. Así la rentabilidad de un put rolado se mide contra el capital que
               comprometiste al abrir, no contra el strike al que lo hayas movido. */
            const origBep = n(openingStrike(p)) - n(openingPrimaPerShare(p));
            const riesgo = isOpt && natOf(p) === "CRED" ? (isPMCC(p) ? riesgoTotalOf(p) : Math.abs(origBep * n(p.qty))) : capDesplegado(p);
            const rom = isOpt && riesgo ? romNumer / riesgo : NaN;
            const dte = isOpt ? daysBetween(p.entryDate, p.expiry) : NaN;
            const dit = daysBetween(p.entryDate, p.closed ? p.closeDate : todayIso);
            /* anualizado del ROI (prima/riesgo): mientras está abierta se proyecta sobre el periodo total
               previsto de la operación — de la apertura original al vencimiento vigente (el mismo dte de
               arriba, que ya incorpora los rolls: si se rolo, el vencimiento es el nuevo pero la apertura
               sigue siendo la primera). Al cerrarse, se usa el DIT real (apertura → cierre). Los credit
               spreads (Iron Condor, Broken Wings) no rolan y no reflejan prima hasta el cierre: cerrados se
               anualizan con el DIT real; ABIERTOS se proyecta el ROI potencial sobre el DTE (v5.00 — antes
               usaban DIT y el día de apertura, con DIT=0, el anualizado salía "—"). */
            const annPeriod = p.closed ? dit : dte;
            const romAnn = isFinite(rom) && isFinite(annPeriod) && annPeriod > 0 ? rom * (365 / annPeriod) : NaN;
            /* ROI de acciones: P&L / capital invertido (BEP × qty). Cerradas usan el P&L realizado; abiertas,
               el unrealised. Anualizado con el DIT real (rentabilidad × 365/DIT), mismo criterio en ambos casos.
               En abiertas el DIT es apertura→hoy, así que el anualizado extrapola el periodo mantenido hasta ahora. */
            const stockBasis = Math.abs(n(effBep(p)) * n(p.qty));
            const stockPnl = !isOpt ? (p.closed ? result : effPnl(p)) : NaN;
            const stockRoi = !isOpt && stockBasis ? stockPnl / stockBasis : NaN;
            const stockAnnRoi = isFinite(stockRoi) && isFinite(dit) && dit > 0 ? stockRoi * (365 / dit) : NaN;
            const fmtPct2 = (v) => (isFinite(v) ? (v >= 0 ? "+" : "") + (v * 100).toFixed(2) + "%" : "\u2014");
            const contratos = n(p.qty) / 100;
            const qtyLabel = isOpt ? (Number.isInteger(contratos) ? contratos + " contr." : n(p.qty) + " opc") : n(p.qty) + " acc";
            /* v1.88: acción (ACC) con último precio del último 🔄 Precios — para pintar "último × acc" a la
               izquierda y el unrealised (effPnl abierto) a la derecha; sin precio no se pinta ni se inventa. */
            const isStock = natOf(p) === "ACC";
            const hasLast = p.last !== "" && p.last != null;
            const unrl = isStock && hasLast ? effPnl(p) : NaN;
            const chain = p.rollChain || [];
            const open = expanded.has("strat-" + p.id);
            return (
              <div key={p.id} onClick={() => toggleExpand("strat-" + p.id)} style={{ borderTop: `1px solid ${T.line}`, padding: "10px 0", cursor: "pointer" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>{p.tkr || "—"}</span>
                      {p.tipo && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>{tipoChipLabel(p)}</span>}
                      {isOpt && optionDetail(p) && <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{optionDetail(p)}</span>}
                      {blk && <span style={{ fontSize: 9.5, fontWeight: 800, color: blk.color, background: blk.bg, borderRadius: 6, padding: "2px 5px" }}>{blk.name.replace("Bloque ", "B")}</span>}
                      {chain.length > 0 && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.purple, background: T.tile, borderRadius: 6, padding: "2px 5px", display: "inline-flex", alignItems: "center", gap: 3 }}><ActIcon name="roll" size={10} />×{chain.length}</span>}
                      {p.exercised && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 6, padding: "2px 5px" }}>Asignada</span>}
                    </div>
                    <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 600, marginTop: 3, fontVariantNumeric: "tabular-nums" }}>{isStock && hasLast ? n(p.last).toFixed(2) + " · " : ""}× {qtyLabel} · {ibkrDate(p.entryDate)}{p.closed ? " → " + ibkrDate(p.closeDate) : " · abierta"}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    {/* v1.88: en acciones ABIERTAS con precio, la cifra de la derecha es el unrealised (effPnl)
                       en lugar del realizado (que sale 0 hasta que vendes); cerradas y opciones, como siempre. */}
                    {(() => { const shown = isStock && !p.closed && isFinite(unrl) ? unrl : result; return (
                      <div style={{ fontSize: 14.5, fontWeight: 800, color: shown >= 0 ? T.green : T.red, fontVariantNumeric: "tabular-nums" }}>{signMoney(shown)}</div>
                    ); })()}
                    <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 }}>
                      {isOpt && !!onEditChain && <button type="button" onClick={(ev) => { ev.stopPropagation(); onEditChain(p.id); }} style={{ background: "transparent", border: "none", fontSize: 11, fontWeight: 700, color: T.purple, cursor: "pointer", padding: 0 }}>Editar</button>}
                      {p.closed && !!reopenPos && <button type="button" onClick={(ev) => { ev.stopPropagation(); reopenPos(p.id); }} style={{ background: "transparent", border: "none", fontSize: 11, fontWeight: 700, color: T.purple, cursor: "pointer", padding: 0 }}>Reabrir</button>}
                    </div>
                  </div>

                        {isDCDD(p) && (() => {

/* ---------- v1.96: Herramienta SCREENER (validación Market Data vs moomoo) ---------- */
/* Victor: "menú distinto para el screener, un tiempo comparando entre los datos que subo de moomoo y el
   screener que va a sacarlos de Market Data. Listado por día de las que pasen el filtro, toda la semana,
   con las tarjetas debajo y el generador de spreads como en la de earnings. Automatizar al máximo pero
   validar primero." Pipeline credit-safe de v1.94 extendido a la SEMANA: 1 llamada Finnhub trae el
   calendario de 7 días; gate market cap gratis (<$5B fuera); supervivientes (tope 45) → Market Data en
   caché (~2 créditos c/u). VALIDACIÓN: si el ticker está en el histórico de moomoo, cada tarjeta enseña
   el EM de Market Data JUNTO al ± pendiente de moomoo con su diferencia — el dato que decide si fiarse. */
/* ---------- v3.62: stats extra + mini-gráficos del detalle del screener (tarjeta F10 del agente) ----------
   Todo se DERIVA de los events que ya viajan en el screener.json — cero llamadas, cero tokens. La fila
   pre/post-5d solo aparece si el agente añade pre5/post5 (%) a cada evento del JSON. */
function erExtraStats(h) {
  try {
    const evs = (erEvents(h) || []).filter((e) => e && Number(e.em) > 0 && e.open != null && isFinite(Number(e.open)));
    const N = (a) => a.filter((x) => Number.isFinite(x));
    const opensA = N(evs.map((e) => Math.abs(Number(e.open))));
    const sorted = opensA.slice().sort((a, b) => a - b);
    const medOpen = sorted.length ? (sorted.length % 2 ? sorted[(sorted.length - 1) / 2] : (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2) : NaN;
    const nOpenUp = evs.filter((e) => Number(e.open) > 0).length;
    /* peor move = el open O close de mayor magnitud, con su periodo (la cola real, mire donde mire) */
    let worstV = NaN, worstPer = null;
    for (const e of evs) for (const k of ["open", "close"]) { const v = Number(e[k]); if (Number.isFinite(v) && (!Number.isFinite(worstV) || Math.abs(v) > Math.abs(worstV))) { worstV = v; worstPer = e.periodo || null; } }
    const pre5A = N(evs.map((e) => Number(e.pre5))), post5A = N(evs.map((e) => Number(e.post5)));
    const hasPP = pre5A.length > 0 || post5A.length > 0;
    const avg = (a) => a.length ? a.reduce((x, y) => x + y, 0) / a.length : NaN;
    const lastP5 = evs.filter((e) => Number.isFinite(Number(e.post5))).slice(-4);
    return { evs, medOpen, nOpenUp, worstV, worstPer, hasPP, pre5: avg(pre5A), post5: avg(post5A), post5Red: lastP5.filter((e) => Number(e.post5) < 0).length, post5N: lastP5.length };
  } catch (e) { return { evs: [], medOpen: NaN, nOpenUp: 0, worstV: NaN, worstPer: null, hasPP: false, pre5: NaN, post5: NaN, post5Red: 0, post5N: 0 }; }
}
function ErMiniChart({ evs, field, nextEm, title }) {
  /* barras verde/rojo del % por earnings con la banda ±EM detrás (azul claro), y una última columna con
     la banda del EM PRÓXIMO. SVG por viewBox: se estira al ancho de la tarjeta sin media queries. */
  const rows = evs.slice(-12);
  const hasNext = Number.isFinite(nextEm) && nextEm > 0;
  const cols = rows.length + (hasNext ? 1 : 0);
  if (!cols) return null;
  const W = 340, H = 96, padT = 12, padB = 14, cw = W / cols, bw = Math.min(16, cw * 0.55);
  const maxAbs = Math.max(1, ...rows.map((e) => Math.abs(Number(e[field]) || 0)), ...rows.map((e) => Number(e.em) || 0), hasNext ? nextEm : 0) * 1.12;
  const y = (v) => padT + (H - padT - padB) * (1 - (v + maxAbs) / (2 * maxAbs));
  const y0 = y(0);
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, letterSpacing: 0.2, marginBottom: 2 }}>{title}</div>
      <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", display: "block" }}>
        <line x1="0" y1={y0} x2={W} y2={y0} stroke={T.line} strokeWidth="1" />
        {rows.map((e, i) => {
          const cx = cw * i + cw / 2, v = Number(e[field]), em = Number(e.em);
          const per = String(e.periodo || "").replace(/\s+/g, "").slice(0, 5);
          return (
            <g key={i}>
              {Number.isFinite(em) && em > 0 ? <rect x={cx - bw * 0.28} y={y(em)} width={bw * 0.56} height={Math.max(1, y(-em) - y(em))} rx="2" fill="#93a8d8" opacity="0.45" /> : null}
              {Number.isFinite(v) ? <rect x={cx - bw / 2} y={Math.min(y0, y(v))} width={bw} height={Math.max(1.5, Math.abs(y(v) - y0))} rx="2.5" fill={v >= 0 ? T.green : T.red} opacity="0.92" /> : null}
              {Number.isFinite(v) ? <text x={cx} y={(v >= 0 ? Math.min(y0, y(v)) - 2.5 : Math.max(y0, y(v)) + 8)} textAnchor="middle" fontSize="7.5" fontWeight="800" fill={T.ink}>{(v > 0 ? "+" : "") + v.toFixed(0) + "%"}</text> : null}
              <text x={cx} y={H - 3} textAnchor="middle" fontSize="7" fontWeight="700" fill={T.sub}>{per}</text>
            </g>
          );
        })}
        {hasNext ? (() => { const cx = cw * rows.length + cw / 2; return (
          <g>
            <rect x={cx - bw * 0.28} y={y(nextEm)} width={bw * 0.56} height={Math.max(1, y(-nextEm) - y(nextEm))} rx="2" fill="#5b7fd4" opacity="0.6" />
            <text x={cx} y={y(nextEm) - 2.5} textAnchor="middle" fontSize="7.5" fontWeight="800" fill="#3d5db0">±{nextEm.toFixed(1)}</text>
            <text x={cx} y={H - 3} textAnchor="middle" fontSize="7" fontWeight="800" fill="#3d5db0">próx.</text>
          </g>
        ); })() : null}
      </svg>
    </div>
  );
}

function ScreenerToolContent({ apiKey, onOpenEarnings }) {
  /* v3.10 (Victor: "al pulsar una tarjeta que aparezcan más datos — pre/post, IV crush, EM, Ø EM,
     Ø actual, POP open/high/low/close — y un botón de añadir a Earnings"): las tarjetas del screener

     reconstrucción del screener), su análisis vía erStats: IV crush, Ø EM, Ø actual (|move| medio),
     EM del próximo y POP por serie (open/close/high/low). El botón "Añadir a Earnings" hace el salto
     de siempre (onOpenEarnings → carga el histórico del ticker en la calculadora).
     v3.00: el Screener lee el screener.json del servidor (VPS → GitHub) en vez de barrer con APIs
     desde el navegador; filtros en vivo (cap, liquidez por volumen de opciones, día, sesión). */
  const KEY_SCRURL = "bloques_screener_url_v1";
  const DEFAULT_URL = "https://raw.githubusercontent.com/GaloFly/bloques-data/main/screener.json";
  const [url, setUrl] = useState(() => { try { return localStorage.getItem(KEY_SCRURL) || DEFAULT_URL; } catch (e) { return DEFAULT_URL; } });
  const [editUrl, setEditUrl] = useState(false);
  const [data, setData] = useState(() => { try { const j = JSON.parse(localStorage.getItem(KEY_SCREEN) || "null"); return j && Array.isArray(j.items) ? j : null; } catch (e) { return null; } });
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [open, setOpen] = useState(null); /* ticker con el detalle desplegado */
  const [minCap, setMinCap] = useState(() => { try { const v = parseFloat(localStorage.getItem(KEY_SCRMINCAP) || ""); return Number.isFinite(v) && v > 0 ? v : 10; } catch (e) { return 10; } });
  const [minVol, setMinVol] = useState(() => { try { const v = parseFloat(localStorage.getItem(KEY_SCRMINOI) || ""); return Number.isFinite(v) && v >= 0 ? v : 5000; } catch (e) { return 5000; } });
  const [minPop, setMinPop] = useState(() => { try { const v = parseFloat(localStorage.getItem(KEY_SCRMINPOP) || ""); return Number.isFinite(v) && v >= 0 ? v : 0; } catch (e) { return 0; } }); /* v3.24: POP (open) mínima del filtro, fracción 0–1 */
  const [dayF, setDayF] = useState("all");
  const [sesF, setSesF] = useState("all");

  const lock = useRef(false);
  const load = async () => {
    if (lock.current) return;
    lock.current = true; setBusy(true); setMsg("");
    try {
      const u = url + (url.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
      const r = await fetch(u, { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status + (r.status === 404 ? " (¿el screener.json aún no está en el repo?)" : ""));
      const j = await r.json();
      if (!j || !Array.isArray(j.items)) throw new Error("el JSON no tiene lista de tickers");
      setData(j);
      try { localStorage.setItem(KEY_SCREEN, JSON.stringify(j)); } catch (e) {}
      /* v3.33 (Victor: "en Earnings hay muchas tarjetas, solo quiero las seleccionadas manualmente"):
         la v3.20 volcaba el histórico de TODOS los tickers del screener (164) a KEY_ERHIST en cada carga,
         y de ahí salían decenas de tarjetas que él no había pedido. Ya NO se vuelca nada aquí: el detalle
         del Screener lee los events del propio JSON (srvHist, en memoria) y solo "Añadir a Earnings"
         guarda el ticker en el histórico local. Así las tarjetas de Earnings son exactamente las elegidas. */
    } catch (e) { setMsg("No se pudo cargar: " + (e && e.message ? e.message : String(e))); }
    setBusy(false); lock.current = false;
  };

  const DOW = ["dom", "lun", "mar", "mié", "jue", "vie", "sáb"];
  const MON = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  const fmtDay = (iso) => { const d = new Date(iso + "T12:00:00"); if (isNaN(d.getTime())) return iso; return DOW[d.getDay()] + " " + d.getDate() + " " + MON[d.getMonth()]; };
  const fmtCap = (b) => { const n = Number(b); if (!Number.isFinite(n)) return "—"; return n >= 1000 ? (n / 1000).toFixed(2) + "T" : n.toFixed(0) + "B"; };
  const fmtVol = (v) => { const n = Number(v) || 0; if (n >= 1000000) return (n / 1000000).toFixed(1) + "M"; if (n >= 1000) return Math.round(n / 1000) + "k"; return String(n); };
  const liqOf = (v) => { const n = Number(v) || 0; if (n >= 10000) return { c: T.green, bg: T.tileGreen, t: "líquido" }; if (n >= 2000) return { c: T.gold, bg: T.tileAmber, t: "justo" }; return { c: T.red, bg: T.tileRed, t: "flojo" }; };
  const pct1 = (x) => Number.isFinite(x) ? x.toFixed(1) + "%" : "—";
  const popPct = (p) => Number.isFinite(p) ? Math.round(p * 100) + "%" : "—";
  const popCol = (p) => !Number.isFinite(p) ? T.sub : p >= 0.75 ? T.green : p >= 0.5 ? T.gold : T.red;
  const popBg = (p) => !Number.isFinite(p) ? T.tile : p >= 0.75 ? T.tileGreen : p >= 0.5 ? T.tileAmber : T.tileRed; /* v3.26: fondo del mini-tile POP en la tarjeta */

  /* stats del histórico del ticker. v3.33: PRIMERO los events que vienen en el propio screener.json
     (srvHist, en memoria — ya no se guardan en local), y si no, el histórico local (tabla moomoo subida
     o ticker ya añadido a Earnings). Así el detalle sigue enseñando POP/EM/IV crush de todos sin crear
     una tarjeta por ticker. */
  const statsOf = (tkr) => {
    try {
      const h = srvHist[tkr] || loadErHist()[tkr];
      if (!h) return null;
      const ev = erEvents(h);
      const s = erStats(ev);
      return s && s.M > 0 ? s : null;
    } catch (e) { return null; }
  };

  const chip = (active) => ({ border: "none", borderRadius: 999, padding: "6px 11px", fontSize: 11.5, fontWeight: 800, background: active ? T.dark : T.tile, color: active ? "#fff" : T.sub });
  const miniTile = (bg) => ({ background: bg || T.tile, borderRadius: 9, padding: "5px 6px", textAlign: "center", width: 50, flex: "none" });
  const miniLbl = { fontSize: 8.5, fontWeight: 700, color: T.sub, letterSpacing: 0.2, lineHeight: 1.1 };
  const miniVal = { fontSize: 13, fontWeight: 800, lineHeight: 1.15, fontVariantNumeric: "tabular-nums" };
  const detTile = (bg) => ({ background: bg || T.tile, borderRadius: 10, padding: "7px 6px", textAlign: "center", minWidth: 0 });
  const detLbl = { fontSize: 9, fontWeight: 700, color: T.sub, letterSpacing: 0.2, lineHeight: 1.2, whiteSpace: "normal" };
  const detVal = { fontSize: 15, fontWeight: 800, lineHeight: 1.2, fontVariantNumeric: "tabular-nums" };

  const items = (data && Array.isArray(data.items)) ? data.items : [];
  const days = Array.from(new Set(items.map((it) => it.date).filter(Boolean))).sort();
  /* v3.33: histórico del SERVIDOR en memoria (ticker → {events}), derivado del screener.json recién
     cargado. Sustituye al volcado a KEY_ERHIST que hacía la v3.20: alimenta el filtro POP, el mini-tile
     de la cabecera y el detalle, sin ensuciar las tarjetas de Earnings. */
  const srvHist = (() => {
    const m = {};
    for (const it of items) if (it && it.ticker && Array.isArray(it.events) && it.events.length) m[it.ticker] = { events: it.events, src: "server" };
    return m;
  })();
  /* v3.24: POP (open) por ticker — servidor primero, histórico local si el ticker ya está en Earnings */
  const erHistAll = (() => { try { return loadErHist(); } catch (e) { return {}; } })();
  const popOf = (tkr) => { try { const h = srvHist[tkr] || erHistAll[tkr]; if (!h) return NaN; const s = erStats(erEvents(h)); return s && s.M > 0 && Number.isFinite(s.popOpen) ? s.popOpen : NaN; } catch (e) { return NaN; } };
  const filtered = items.filter((it) => {
    if (!(Number(it.marketCapB) >= minCap)) return false;
    if (!(minVol <= 0 || (Number(it.optVolume) || 0) >= minVol)) return false;
    if (!(dayF === "all" || it.date === dayF)) return false;
    if (!(sesF === "all" || it.session === sesF)) return false;
    if (minPop > 0) { const p = popOf(it.ticker); if (!(Number.isFinite(p) && p >= minPop)) return false; }
    return true;
  });
  /* v3.34: añadir a Earnings TODOS los que pasan el filtro, de una vez. Doble toque (como el 🗑️ del
     Comparador) porque puede crear muchas tarjetas de golpe. Solo se guardan los que traen events del
     servidor; los que no, se informan en vez de crear una tarjeta vacía. */
  const [confirmAddAll, setConfirmAddAll] = useState(false);
  const [addAllMsg, setAddAllMsg] = useState("");
  const addableCount = filtered.filter((it) => it && it.ticker && Array.isArray(it.events) && it.events.length).length;
  const addAllFiltered = () => {
    if (!confirmAddAll) { setConfirmAddAll(true); setAddAllMsg(""); setTimeout(() => setConfirmAddAll(false), 3000); return; }
    setConfirmAddAll(false);
    try {
      const hist = loadErHist();
      let added = 0, updated = 0, skipped = 0;
      for (const it of filtered) {
        if (!(it && it.ticker)) continue;
        if (!(Array.isArray(it.events) && it.events.length)) { skipped++; continue; }
        const had = !!hist[it.ticker];
        const merged = { ...(hist[it.ticker] || {}), events: it.events, updated: Date.now(), src: "server" };
        if (merged.mdEvents) delete merged.mdEvents;
        hist[it.ticker] = merged;
        had ? updated++ : added++;
      }
      saveErHist(hist);
      setAddAllMsg("✅ " + added + " añadido" + (added === 1 ? "" : "s") + " a Earnings" + (updated ? " · " + updated + " ya estaba" + (updated === 1 ? "" : "n") + " (actualizado" + (updated === 1 ? "" : "s") + ")" : "") + (skipped ? " · " + skipped + " sin histórico del servidor, no se añaden" : ""));
    } catch (e) { setAddAllMsg("No se pudo guardar: " + ((e && e.message) || String(e))); }
  };
  const groups = {};
  filtered.forEach((it) => { (groups[it.date] = groups[it.date] || []).push(it); });
  const groupDays = Object.keys(groups).sort();

  let fresh = null;
  if (data && data.generatedAt) {
    const g = new Date(data.generatedAt);
    if (!isNaN(g.getTime())) {
      const hrs = (Date.now() - g.getTime()) / 3600000;
      fresh = { txt: g.toLocaleString([], { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }), stale: hrs > 30 };
    }
  }

  return (
    <div style={{ padding: "0 2px 24px" }}>
      {/* cabecera: actualizar + sello de frescura */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
        <button type="button" onClick={load} disabled={busy}
          style={{ border: "none", borderRadius: 12, padding: "9px 16px", fontSize: 13, fontWeight: 800, background: T.dark, color: "#fff", opacity: busy ? 0.6 : 1 }}>
          {busy ? "Cargando…" : (data ? "Actualizar" : "Cargar semana")}
        </button>
        {fresh ? (
          <span style={{ fontSize: 11.5, fontWeight: 700, padding: "5px 10px", borderRadius: 999, background: fresh.stale ? T.tileAmber : T.tileGreen, color: fresh.stale ? T.gold : T.green }}>
            {fresh.stale ? "⚠ " : "● "}Datos: {fresh.txt}
          </span>
        ) : <span style={{ fontSize: 11.5, color: T.sub }}>sin datos cargados aún</span>}
      </div>
      {msg ? <div style={{ fontSize: 12, color: T.red, marginBottom: 8, fontWeight: 600 }}>{msg}</div> : null}

      {/* filtros en vivo */}
      {items.length ? (
        <div style={{ background: T.card, borderRadius: 14, padding: 12, marginBottom: 12, boxShadow: T.shadow }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: T.sub, display: "flex", alignItems: "center", gap: 5 }}>Cap ≥
              <span style={{ display: "inline-flex", alignItems: "center", background: T.tile, borderRadius: 8 }}>
                <input type="number" inputMode="decimal" min={0} step={1} value={minCap || ""} placeholder="0"
                  onChange={(e) => { const v = parseFloat(e.target.value); const n = Number.isFinite(v) && v > 0 ? v : 0; setMinCap(n); try { localStorage.setItem(KEY_SCRMINCAP, String(n)); } catch (er) {} }}
                  style={{ width: 42, border: "none", background: "transparent", padding: "5px 1px 5px 8px", fontSize: 12, fontWeight: 800, color: T.ink, outline: "none", textAlign: "right", MozAppearance: "textfield" }} />
                <span style={{ fontSize: 12, fontWeight: 800, color: T.sub, padding: "0 8px 0 1px" }}>B</span>
              </span>
            </label>
            <label style={{ fontSize: 11, fontWeight: 700, color: T.sub, display: "flex", alignItems: "center", gap: 5 }}>Liquidez
              <select value={String(minVol)} onChange={(e) => { const v = parseFloat(e.target.value); setMinVol(v); try { localStorage.setItem(KEY_SCRMINOI, String(v)); } catch (er) {} }}
                style={{ border: "none", borderRadius: 8, padding: "5px 8px", fontSize: 12, fontWeight: 800, background: T.tile, color: T.ink }}>
                <option value={0}>todas</option>
                <option value={1000}>≥1k opc</option>
                <option value={5000}>≥5k opc</option>
                <option value={10000}>≥10k opc</option>
              </select>
            </label>
            <label style={{ fontSize: 11, fontWeight: 700, color: T.sub, display: "flex", alignItems: "center", gap: 5 }}>Sesión
              <select value={sesF} onChange={(e) => setSesF(e.target.value)}
                style={{ border: "none", borderRadius: 8, padding: "5px 8px", fontSize: 12, fontWeight: 800, background: T.tile, color: T.ink }}>
                <option value="all">todas</option>
                <option value="BMO">antes (BMO)</option>
                <option value="AMC">después (AMC)</option>
              </select>
            </label>
            <label style={{ fontSize: 11, fontWeight: 700, color: T.sub, display: "flex", alignItems: "center", gap: 5 }}>POP ≥
              <span style={{ display: "inline-flex", alignItems: "center", background: T.tile, borderRadius: 8 }}>
                <input type="number" inputMode="numeric" min={0} max={100} step={5} value={minPop > 0 ? Math.round(minPop * 100) : ""} placeholder="0"
                  onChange={(e) => { const v = parseFloat(e.target.value); const frac = Number.isFinite(v) && v > 0 ? Math.min(v, 100) / 100 : 0; setMinPop(frac); try { localStorage.setItem(KEY_SCRMINPOP, String(frac)); } catch (er) {} }}
                  style={{ width: 36, border: "none", background: "transparent", padding: "5px 1px 5px 8px", fontSize: 12, fontWeight: 800, color: T.ink, outline: "none", textAlign: "right", MozAppearance: "textfield" }} />
                <span style={{ fontSize: 12, fontWeight: 800, color: T.sub, padding: "0 8px 0 1px" }}>%</span>
              </span>
            </label>
          </div>
          {days.length > 1 ? (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10 }}>
              <button type="button" onClick={() => setDayF("all")} style={chip(dayF === "all")}>Toda la semana</button>
              {days.map((d) => <button key={d} type="button" onClick={() => setDayF(d)} style={chip(dayF === d)}>{fmtDay(d)}</button>)}
            </div>
          ) : null}
          <div style={{ fontSize: 11, color: T.sub, marginTop: 8, fontWeight: 600 }}>{filtered.length} de {items.length} tickers pasan los filtros{minPop > 0 ? " · POP open ≥ " + Math.round(minPop * 100) + "% (los tickers sin histórico no puntúan)" : ""}{(() => { const caps = items.map((it) => Number(it.marketCapB)).filter((v) => Number.isFinite(v)); return caps.length ? " · el barrido trae desde $" + Math.round(Math.min(...caps)) + "B" : ""; })()}</div>
          {/* v3.34 (Victor): añadir de golpe TODOS los resultados que pasan el filtro. Es una acción
             explícita suya —no un volcado automático como el que se quitó en v3.33—, así que respeta la
             regla de "solo lo que yo elija". Solo entran los que traen histórico del servidor. */}
          {filtered.length > 0 && (
            <>
              <button type="button" onClick={addAllFiltered}
                style={{ marginTop: 10, width: "100%", border: "none", borderRadius: 12, padding: "11px 14px", fontSize: 13, fontWeight: 800, cursor: "pointer", background: confirmAddAll ? T.gold : T.tilePurple, color: confirmAddAll ? "#fff" : T.purple }}>
                {confirmAddAll ? "¿Añadir " + addableCount + " tarjeta" + (addableCount === 1 ? "" : "s") + "? Toca otra vez" : "+ Añadir los " + filtered.length + " a Earnings"}
              </button>
              {addAllMsg && <div style={{ fontSize: 11, fontWeight: 700, color: T.sub, marginTop: 6, lineHeight: 1.45 }}>{addAllMsg}</div>}
            </>
          )}
        </div>
      ) : null}

      {/* tarjetas agrupadas por día — tocar despliega el detalle */}
      {groupDays.map((d) => (
        <div key={d} style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: T.ink, margin: "2px 2px 8px", textTransform: "capitalize" }}>{fmtDay(d)} <span style={{ color: T.sub, fontWeight: 600 }}>· {groups[d].length}</span></div>
          <div style={{ display: "grid", gap: 8 }}>
            {groups[d].slice().sort((a, b) => (Number(b.marketCapB) || 0) - (Number(a.marketCapB) || 0)).map((it) => {
              const lq = liqOf(it.optVolume);
              const pOpen = popOf(it.ticker); /* v3.26: POP open visible en la cabecera, no solo al desplegar */
              const isOpen = open === it.ticker;
              const s = isOpen ? statsOf(it.ticker) : null;
              const xs = s ? erExtraStats((srvHist[it.ticker] || erHistAll[it.ticker])) : null; /* v3.62 */
              return (
                <div key={it.ticker} style={{ borderRadius: 14, background: T.card, boxShadow: T.shadow, overflow: "hidden", border: isOpen ? "1.5px solid " + T.line : "1.5px solid transparent" }}>
                  {/* cabecera tocable */}
                  <div onClick={() => setOpen(isOpen ? null : it.ticker)}
                    style={{ padding: "11px 12px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                    <div style={{ minWidth: 0, flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
                      <span style={{ fontSize: 17, fontWeight: 800, color: T.ink, letterSpacing: -0.3 }}>{it.ticker}</span>
                      <div style={{ fontSize: 12, fontWeight: 600, color: T.sub, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.name || ""}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 1 }}>
                        <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 0.3, color: it.session === "BMO" ? T.gold : it.session === "AMC" ? T.green : T.sub, minWidth: 30, flex: "none" }}>{it.session === "BMO" ? "BMO" : it.session === "AMC" ? "AMC" : "—"}</span>
                        <span style={{ fontSize: 10, fontWeight: 700, color: lq.c, display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 6, height: 6, borderRadius: 3, background: lq.c, display: "inline-block" }} />{lq.t}</span>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6, flexShrink: 0, alignItems: "center" }}>
                      <div style={miniTile(popBg(pOpen))}>
                        <div style={{ ...miniVal, color: popCol(pOpen) }}>{popPct(pOpen)}</div>
                        <div style={miniLbl}>POP</div>
                      </div>
                      <div style={miniTile()}>
                        <div style={{ ...miniVal, color: T.ink }}>{fmtCap(it.marketCapB)}</div>
                        <div style={miniLbl}>cap</div>
                      </div>
                      <div style={miniTile()}>
                        <div style={{ ...miniVal, color: T.ink }}>{Number.isFinite(Number(it.iv)) ? Number(it.iv).toFixed(0) : "—"}</div>
                        <div style={miniLbl}>IV</div>
                      </div>
                      <div style={miniTile(lq.bg)}>
                        <div style={{ ...miniVal, color: lq.c }}>{fmtVol(it.optVolume)}</div>
                        <div style={miniLbl}>opc/día</div>
                      </div>
                      <span style={{ fontSize: 15, color: T.sub, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .15s" }}>⌄</span>
                    </div>
                  </div>

                  {/* detalle desplegado */}
                  {isOpen ? (
                    <div style={{ padding: "2px 12px 12px", borderTop: "1px solid " + T.line }}>
                      {/* cuándo entrar */}
                      <div style={{ fontSize: 11.5, fontWeight: 700, color: T.ink, margin: "10px 0 4px" }}>
                        {it.session === "BMO" ? "Reporta ANTES de abrir (BMO)" : it.session === "AMC" ? "Reporta TRAS el cierre (AMC)" : "Sesión no confirmada"}
                      </div>
                      <div style={{ fontSize: 11, color: T.sub, marginBottom: 10 }}>
                        {it.session === "BMO" ? "El trade se abre la TARDE ANTERIOR (dit=1)." : it.session === "AMC" ? "El trade se abre ESE MISMO día por la tarde." : "Confírmala antes de entrar."}
                        {it.price ? " · Spot ref " + it.price : ""}
                      </div>

                      {/* histórico del ticker si existe */}
                      {s ? (
                        <div>
                          {/* v3.62 (Victor, con la tarjeta F10 del agente): el fondo del tile POP SIGUE AL
                              NÚMERO (verde ≥75 / ámbar ≥50 / rojo <50), no verde fijo; y cada POP enseña su
                              cuenta X/N. Todo lo nuevo se deriva de los events que YA vienen en el JSON —
                              cero llamadas, cero tokens. */}
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 6 }}>
                            {[["POP open", s.popOpen, s.M - s.xOpen], ["POP close", s.M ? 1 - s.xClose / s.M : NaN, s.M - s.xClose], ["POP high", s.M ? 1 - s.xHigh / s.M : NaN, s.M - s.xHigh], ["POP low", s.M ? 1 - s.xLow / s.M : NaN, s.M - s.xLow]].map(([lb, p, k]) => (
                              <div key={lb} style={detTile(popBg(p))}><div style={{ ...detVal, color: popCol(p) }}>{popPct(p)}</div><div style={detLbl}>{lb}{s.M ? " · " + k + "/" + s.M : ""}</div></div>
                            ))}
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                            <div style={detTile()}><div style={{ ...detVal, color: T.ink }}>{Number.isFinite(s.nextEm) ? "±" + s.nextEm.toFixed(1) + "%" : "—"}</div><div style={detLbl}>EM próximo</div></div>
                            <div style={detTile()}><div style={{ ...detVal, color: T.ink }}>{pct1(s.emAvg)}</div><div style={detLbl}>Ø EM</div></div>
                            <div style={detTile()}><div style={{ ...detVal, color: T.ink }}>{pct1(s.absOpen)}</div><div style={detLbl}>Ø actual{Number.isFinite(xs.medOpen) ? " · med " + xs.medOpen.toFixed(1) : ""}</div></div>
                            <div style={detTile()}><div style={{ ...detVal, color: T.ink }}>{pct1(s.ivCrush)}</div><div style={detLbl}>Ø IV crush</div></div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginTop: 6 }}>
                            <div style={detTile()}><div style={{ ...detVal, color: popCol(s.M ? s.nUp / s.M : NaN) }}>{popPct(s.M ? s.nUp / s.M : NaN)}</div><div style={detLbl}>cierra por encima · {s.nUp}/{s.M}</div></div>

/* v1.21: Herramienta Earnings — flujo completo de decisión pre-trade:
   1) Spot vía Finnhub (misma key que Portfolio) + expected move % → strikes cortos ±EM y generador de alas.
   2) Histórico expected vs actual en 4 escenarios (open/close/high/low): X de M veces que el movimiento
      superó el EM. El veredicto usa OPEN (salida al abrir); los otros calibran el plan B (aguantar/asignación).
   3) Sesgo direccional (veces que cerró en verde) → recomendación de estrategia:
      alcista consistente → short put / bull put spread · bajista → bear call · dentro del EM → iron condor ·
      rompe el EM a menudo → skip o comprar la estructura.
   4) Crédito + riesgo objetivo → contratos sugeridos, win rate mínimo, EV y GO/CAUTION/NO-GO. */
/* ---------- v1.35: carrusel con snap ----------
   Tarjetas deslizables a lo iOS: scroll horizontal nativo con scroll-snap (momentum del sistema,
   nada de reimplementar el drag) + dots que siguen la posición. Se usa para las ideas guardadas y
   el histórico de tablas. No choca con el swipe entre bloques: ese gesto ya ignora los toques que
   empiezan dentro de un contenedor con scroll horizontal (hasHScrollAncestor), y en Herramientas
   ni siquiera aplica. Con una sola tarjeta no hay scroll ni dots. */
function SnapCarousel({ children, bleed = 18, keys, activeKey, onActiveKey }) {
  /* v1.37: dos carruseles se sincronizan por CLAVE (el ticker): al deslizar uno, el padre recibe
     onActiveKey y le pasa activeKey al otro, que hace scroll suave hasta su tarjeta de ese ticker.
     progRef evita el bucle: mientras el scroll es programático, onScroll no re-emite onActiveKey. */
  const [idx, setIdx] = useState(0);
  const scRef = useRef(null);
  const progRef = useRef(false);
  const kids = React.Children.toArray(children);
  const cardW = (el) => (el.firstChild ? el.firstChild.offsetWidth + 10 : 1);
  const onScroll = () => {
    const el = scRef.current;
    if (!el || !el.firstChild) return;
    const i = Math.max(0, Math.min(kids.length - 1, Math.round(el.scrollLeft / cardW(el))));
    if (i !== idx) {
      setIdx(i);
      if (!progRef.current && onActiveKey && keys && keys[i] != null) onActiveKey(keys[i]);
    }
  };
  useEffect(() => {
    if (!keys || activeKey == null) return;
    const i = keys.indexOf(activeKey);
    const el = scRef.current;
    if (i < 0 || i === idx || !el || !el.firstChild) return;
    progRef.current = true;
    el.scrollTo({ left: i * cardW(el), behavior: "smooth" });
    const t = setTimeout(() => { progRef.current = false; }, 550);
    return () => clearTimeout(t);
  }, [activeKey, kids.length]);
  if (!kids.length) return null;
  return (
    <div style={{ minWidth: 0, maxWidth: "100%" }}>{/* v1.36: como hijo de un grid, sin minWidth:0 el track
      crecía al max-content (todas las tarjetas en fila) y la página entera se salía del móvil */}
      <div ref={scRef} onScroll={onScroll} className="no-scrollbar"
        style={{ display: "flex", gap: 10, overflowX: kids.length > 1 ? "auto" : "hidden", scrollSnapType: "x mandatory",
          margin: "0 -" + bleed + "px", padding: "0 " + bleed + "px", scrollPaddingLeft: bleed }}>
        {kids.map((k, i) => (
          <div key={i} style={{ flex: "0 0 auto", width: kids.length > 1 ? "86%" : "100%", minWidth: 0, scrollSnapAlign: "start", display: "flex" }}>{k}</div>
        ))}
      </div>
      {kids.length > 1 && (
        <div style={{ display: "flex", justifyContent: "center", gap: 5, marginTop: 9 }}>
          {kids.map((_, i) => (
            <div key={i} style={{ width: i === idx ? 16 : 6, height: 6, borderRadius: 3, background: i === idx ? T.ink : T.line, transition: "all 0.25s" }} />
          ))}
        </div>
      )}
    </div>
  );
}
function EarningsToolContent({ apiKey, geminiKey, onOpenPosition }) {

  const [hist, setHist] = useState(loadErHist);

  const [ideaArm, setIdeaArm] = useState(null); // id de idea armada para borrar (dos toques)
  const [ideaMsg, setIdeaMsg] = useState("");
  /* v1.37: sincronía entre carruseles — deslizar el de ideas mueve el del histórico al mismo ticker
