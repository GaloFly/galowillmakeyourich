                    <input ref={wizPhotoRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const file = e.target.files && e.target.files[0]; e.target.value = ""; if (file) onWizPhoto(file); }} />
                    {wizOcrMsg && <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, background: T.card, borderRadius: 10, padding: "8px 10px", lineHeight: 1.4 }}>{wizOcrMsg}</div>}
                  </div>
                )}
                {(wizStrat === "Covered Call" || wizStrat === "Collar") ? (() => {
                  /* covered call y collar: el subyacente se elige de las acciones abiertas de B1 — fija ticker
                     y broker, y deja el enlace (coveredBy) para el banner en B1 y el riesgo 0 del overlay */
                  const b1Stocks = positions.filter((x) => x.block === 1 && natOf(x) === "ACC" && !x.closed);
                  if (b1Stocks.length === 0) return (
                    <div style={{ display: "grid", gap: 8 }}>
                      <div style={{ background: T.tileAmber, borderRadius: 12, padding: "9px 12px", fontSize: 12, fontWeight: 700, color: T.gold }}>⚠️ No hay acciones abiertas en B1 que cubrir. Añade primero la acción, o escribe el ticker a mano.</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <label style={{ display: "block", minWidth: 0 }}>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>Broker</div>
                    <Pill options={brokers} value={wizForm.broker} onChange={wizF("broker")} size="sm" />
                  </label>
                        <WizInput label="Ticker" value={wizForm.tkr} onChange={wizF("tkr")} upper />
                      </div>
                    </div>
                  );
                  const optLabel = (s) => s.tkr + " · " + money(n(s.qty)) + " acc · BEP $" + money2(effBep(s)) + " · " + s.broker;
                  const opts = ["Elige la acción de B1…", ...b1Stocks.map(optLabel)];
                  const sel = b1Stocks.find((s) => s.id === wizForm.coveredStockId);
                  return (
                    <WizSelect label="Acción cubierta (Bloque 1)" value={sel ? optLabel(sel) : opts[0]}
                      onChange={(lbl) => { const st = b1Stocks.find((s) => optLabel(s) === lbl); if (st) setWizForm((f) => ({ ...f, coveredStockId: st.id, tkr: st.tkr, broker: st.broker })); }}
                      options={opts} />
                  );
                })() : (DCDD_STRATS.has(wizStrat) && wizSub > 1) ? null : (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <label style={{ display: "block", minWidth: 0 }}>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>Broker</div>
                    <Pill options={brokers} value={wizForm.broker} onChange={wizF("broker")} size="sm" />
                  </label>
                  {/* v2.15: el cash lleva ticker fijo CASH, no editable (Victor) */}
                  {wizNat === "CASH" ? (
                    <label style={{ display: "block", minWidth: 0 }}>
                      <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>Ticker</div>
                      <div style={{ boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 11, color: T.sub, fontSize: 14, fontWeight: 800, padding: "0 12px", display: "flex", alignItems: "center", letterSpacing: 0.5 }}>CASH</div>
                    </label>
                  ) : (
                    <WizInput label="Ticker" value={wizForm.tkr} onChange={wizF("tkr")} upper />
                  )}
                </div>
                )}
                {/* v3.42: aviso de earnings dentro del vencimiento — informa, nunca bloquea (§5 del playbook) */}
                {wizNat !== "CASH" && wizNat !== "ACC" && <EarningsHint tkr={wizForm.tkr} expiry={wizForm.expiry} />}
                {(wizNat === "CRED") && !CREDIT_SPREAD_STRATS.has(wizStrat) && (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Strike" value={wizForm.strike} onChange={wizF("strike")} inputMode="decimal" />
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                      <WizInput label="Prima $/acc" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" signed />
                    </div>
                    {/* covered call: cubierta por acciones — ni consume margen propio ni computa riesgo plausible */}
                    {wizStrat === "Covered Call" ? (
                      <div style={{ display: "grid", gridTemplateColumns: "0.6fr 1fr 1.4fr", gap: 10 }}>
                        <WizInput label="IVR" value={wizForm.ivr} onChange={wizF("ivr")} inputMode="numeric" />
                        <WizInput label="Comisión" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                        <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                      </div>
                    ) : (
                      <>
                        <div style={{ display: "grid", gridTemplateColumns: "0.55fr 0.8fr 1.4fr", gap: 10 }}>
                          <WizInput label="IVR" value={wizForm.ivr} onChange={wizF("ivr")} inputMode="numeric" />
                          <WizInput label="Comisión" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                          <WizInput label="Margen requerido $" value={wizForm.margen} onChange={wizF("margen")} inputMode="decimal" />
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <WizInput label="Riesgo plausible %" value={wizForm.plausible} onChange={wizF("plausible")} inputMode="numeric" />
                          <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                        </div>
                      </>
                    )}
                    {(() => {
                      /* resumen en vivo: BEP siempre Strike − Prima (criterio wheel del framework, también en short call:
                         la prima rebaja el coste efectivo), crédito/débito total y riesgo plausible = BEP × qty × factor% */
                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const pr = parseFloat(String(wizForm.prima || "").replace(",", "."));
                      const s = parseFloat(String(wizForm.strike || "").replace(",", "."));
                      const plausPct = parseFloat(String(wizForm.plausible || "").replace(",", "."));
                      const isCall = (wizStrat || "").toLowerCase().includes("call");
                      const isCovered = isCall; /* toda call corta es covered */
                      const tot = isFinite(cts) && isFinite(pr) ? cts * pr * 100 : null;
                      const bep = isFinite(s) && isFinite(pr) ? s - pr : null;
                      const riesgo = isCovered ? 0 : (bep !== null && isFinite(cts) ? bep * cts * 100 : null);
                      const plaus = riesgo !== null && isFinite(plausPct) ? riesgo * plausPct / 100 : (isCovered ? 0 : null);
                      if (tot === null && bep === null) return null;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          {bep !== null && (
                            <div style={{ background: T.tile, borderRadius: 12, padding: "8px 12px" }}>
                              <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.3 }}>BEP = Strike − Prima</div>
                              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${bep.toFixed(2)}</div>
                            </div>
                          )}
                          {plaus !== null && (
                            <div style={{ background: T.tileGreen, borderRadius: 12, padding: "8px 12px" }}>
                              <div style={{ fontSize: 9.5, fontWeight: 700, color: T.green, textTransform: "uppercase", letterSpacing: 0.3 }}>Riesgo plausible{isCovered ? " (cubierta)" : ""}</div>
                              <div style={{ fontSize: 16, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums" }}>${plaus.toLocaleString("en-US", { maximumFractionDigits: 0 })}</div>
                            </div>
                          )}
                          {tot !== null && (
                            <div style={{ gridColumn: "span 2", fontSize: 12, fontWeight: 700, color: T.sub, padding: "0 2px" }}>
                              {tot >= 0 ? "Crédito" : "Débito"} total: <span style={{ color: tot >= 0 ? T.green : T.red, fontWeight: 800 }}>{(tot >= 0 ? "+$" : "-$") + Math.abs(tot).toFixed(2)}</span>
                              {riesgo !== null && !isCovered && <span> · Riesgo total: <span style={{ color: T.ink, fontWeight: 800 }}>${riesgo.toLocaleString("en-US", { maximumFractionDigits: 0 })}</span></span>}
                              {isCovered && <span> · Cubierta por acciones: no suma riesgo al bloque</span>}
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </>
                )}
                {(wizNat === "ACC" || wizNat === "CASH") && (
                  <>
                    {wizNat === "ACC" && (() => {
                      /* v5.22: si el ticker ya existe como acciones abiertas, ofrece añadir un lote en vez de duplicar */
                      const key = (wizForm.tkr || "").trim().toUpperCase();
                      if (!key) return null;
                      const matches = positions.filter((x) => natOf(x) === "ACC" && !x.closed && (x.tkr || "").trim().toUpperCase() === key);
                      if (!matches.length) return null;
                      const m = matches.find((x) => x.broker === wizForm.broker) || matches[0];
                      const b = BLOCKS.find((bb) => bb.id === m.block);
                      return (
                        <div style={{ background: T.tileAmber, borderRadius: 12, padding: "10px 12px", marginBottom: 2 }}>
                          <div style={{ fontSize: 12, fontWeight: 800, color: T.gold, marginBottom: 3 }}>Ya tienes {key} en acciones</div>
                          <div style={{ fontSize: 11.5, color: T.ink, fontWeight: 600, lineHeight: 1.45, marginBottom: 8 }}>{m.broker}{b ? " · " + b.name.replace("Bloque ", "B") : ""} · {n(m.qty)} acc · BEP ${money2(effBep(m))}. Añade un lote a esa posición en vez de crear una duplicada.</div>
                          <button onClick={() => { setWizOpen(false); setEditLotsId(m.id); }} style={{ background: T.dark, border: "none", borderRadius: 10, padding: "9px 14px", fontSize: 12.5, fontWeight: 800, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", gap: 7 }}><ActIcon name="lots" size={14} />Añadir lote a {key}</button>
                        </div>
                      );
                    })()}
                    {/* v2.14: el cash es solo un importe — no tiene acciones ni BEP (Victor: "al meter cash en
                        B0 que solo se pueda poner importe, no acciones") */}
                    {wizNat === "CASH" ? (
                      <WizInput label="Importe (USD)" value={wizForm.mktValue || ""} onChange={wizF("mktValue")} placeholder="$" inputMode="decimal" />
                    ) : (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <WizInput label="Cantidad (acciones)" value={wizForm.qty} onChange={wizF("qty")} inputMode="numeric" />
                        <WizInput label="BEP (coste medio)" value={wizForm.bep} onChange={wizF("bep")} inputMode="decimal" />
                      </div>
                    )}
                    {(wizNat === "ACC" || wizBlock !== 0) && (
                      <div style={{ display: "grid", gridTemplateColumns: wizNat === "ACC" && wizBlock !== 0 ? "1fr 1fr" : "1fr", gap: 10 }}>
                        {wizNat === "ACC" && <WizInput label="Margen Requerido %" value={wizForm.margenPct} onChange={wizF("margenPct")} inputMode="decimal" />}
                        {wizBlock !== 0 && <WizInput label="Riesgo plausible %" value={wizForm.plausible} onChange={wizF("plausible")} inputMode="numeric" />}
                      </div>
                    )}
                    {wizNat === "ACC" && <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />}
                    <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                  </>
                )}
                {wizNat === "COLLAR" && (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                    </div>
                    {/* collar sin riesgo → el plausible de la acción de B1 pasa a 0 (sigue contando en sizing);
                       con riesgo → se introduce el BEP protegido y esa es la nueva base del plausible de la acción */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: T.tile, borderRadius: 12, padding: "9px 12px" }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: T.ink }}>¿El collar deja riesgo?</span>
                      <Pill options={["No", "Sí"]} value={wizForm.collarRisk === "SI" ? "Sí" : "No"} onChange={(v) => setWizForm((f) => ({ ...f, collarRisk: v === "Sí" ? "SI" : "NO" }))} size="sm" />
                    </div>
                    {wizForm.collarRisk === "SI" && (
                      <WizInput label="Nuevo BEP para el plausible de la acción" value={wizForm.collarBep} onChange={wizF("collarBep")} placeholder="$" inputMode="decimal" />
                    )}
                    {/* precio de apertura $/acc del collar: negativo si pagas débito, positivo si cobras prima
                       neta. Se guarda como precio de entrada — al cerrar, Movimientos·MTM calcula el realizado
                       como (precio de cierre − apertura) × cantidad − fee */}
                    <div style={{ display: "grid", gridTemplateColumns: "1.3fr 0.7fr", gap: 10 }}>
                      <WizInput label="Precio apertura $/acc · + prima cobrada − pagada" value={wizForm.prima} onChange={wizF("prima")} placeholder="$" inputMode="decimal" signed />
                      <WizInput label="Comisión" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                    </div>
                    <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                  </>
                )}
                {wizNat === "DEF" && wizStrat === "Long Call" && (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Strike" value={wizForm.strike} onChange={wizF("strike")} inputMode="decimal" />
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                      <WizInput label="Prima pagada $/acc" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />
                    </div>
                    {(() => {
                      /* Long Call: BEP = Strike + Prima pagada. Riesgo = 100% de la prima pagada (prima × contratos × 100),
                         que es a la vez el riesgo total y el plausible — no hay factor ni coste manual. */
                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const pr = Math.abs(parseFloat(String(wizForm.prima || "").replace(",", ".")));
                      const s = parseFloat(String(wizForm.strike || "").replace(",", "."));
                      const bep = isFinite(s) && isFinite(pr) ? s + pr : null;
                      const cost = isFinite(pr) && isFinite(cts) ? pr * cts * 100 : null;
                      if (bep === null && cost === null) return null;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          {bep !== null && (

                      <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />

                {DCDD_STRATS.has(wizStrat) && (() => {

                  const debitTotal = isFinite(cts) && (shTot || lgTot) ? netDebit * cts * 100 : NaN;

                  return (

                            <WizInput label="Vto longs (largo)" value={f.dcExpiryLong} onChange={wizF("dcExpiryLong")} type="date" />

                              <Tile label="DTE longs" value={isFinite(dteL) ? dteL + "d" : "—"} />
                              <Tile label="Día entrada" value={weekdayOf(f.entryDate) || "—"} />
                            </div>

                          <WizSection>▸ Strikes {wizStrat === "DD" ? "de referencia" : ""}</WizSection>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

                            <WizInput label={wizStrat === "DD" ? "Strike call (ref.)" : "Strike call"} value={f.dcCallStrike} onChange={wizF("dcCallStrike")} placeholder="7690" inputMode="decimal" />
                          </div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, padding: "0 2px" }}>{wizStrat === "DD"
                            ? "En un Double Diagonal cada lado tiene DOS strikes distintos (short y long). Estos se copian como punto de partida a las 4 patas del siguiente paso, donde pones el strike real de cada una."
                            : "En DC ambas patas de cada lado comparten strike; se copian a las 4 patas en el siguiente paso (editable si es diagonal)."}</div>
                        </>
                      )}
                      {wizSub === 2 && (
                        <>
                          <WizSection>▸ Las 4 patas · strike · prima · fee</WizSection>
                          {DC_LEGS.map((leg) => {
                            const [kStrike, kP, kF] = legKeys[leg.key];
                            return (
                              <div key={leg.key} style={{ background: T.tile, borderRadius: 12, padding: "10px 11px" }}>
                                <div style={{ fontSize: 11, fontWeight: 800, color: leg.color === "red" ? T.red : T.green, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 7 }}>{leg.dir === "short" ? "▾ " : "▴ "}{leg.label}</div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                                  <WizInput label="Strike" value={f[kStrike]} onChange={wizF(kStrike)} inputMode="decimal" />
                                  <WizInput label="Prima $/acc" value={f[kP]} onChange={wizF(kP)} inputMode="decimal" />
                                  <WizInput label="Fee $" value={f[kF]} onChange={wizF(kF)} inputMode="decimal" />
                                </div>

                          )}
                          <WizSection>▸ Catalizadores</WizSection>
                          {/* v1.81 (Victor: "que se anote automáticamente si el trade entra dentro de uno de
                             esos eventos"): con el vto corto relleno, el calendario macro embebido (BLS/Fed) se
                             consulta en vivo — y al GUARDAR, si detecta eventos y no has marcado nada a mano,
                             la ficha queda anotada sola (SI + lista). El strip te enseña ANTES lo que anotará. */}
                          {f.expiry && (() => {
                            const evs = macroBetween((f.entryDate || new Date().toISOString().slice(0, 10)), f.expiry);
                            return evs.length ? (
                              <div style={{ background: T.tileAmber, borderRadius: 12, padding: "9px 11px", fontSize: 11.5, fontWeight: 700, color: T.gold, lineHeight: 1.4 }}>
                                Macro dentro del vto corto: {evs.map(macroShort).join(" · ")} — se anotará en la ficha.
                              </div>
                            ) : (
                              <div style={{ background: T.tile, borderRadius: 12, padding: "9px 11px", fontSize: 11.5, fontWeight: 600, color: T.sub }}>
                                Sin CPI · PPI · NFP · FOMC dentro del vto corto (calendario oficial 2026).
                              </div>
                            );
                          })()}
                          <label style={{ display: "block" }}>
                            <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>¿Evento antes del vto corto?</div>
                            <Pill options={["NO", "SI"]} value={f.dcEventIn || "NO"} onChange={wizF("dcEventIn")} size="sm" />

                              <WizInput label="Detalle (opcional)" value={f.dcEventTxt} onChange={wizF("dcEventTxt")} placeholder="Ej. NFP viernes" />
                            </div>
                          )}
                        </>
                      )}
                    </>

                {CREDIT_SPREAD_STRATS.has(wizStrat) && (

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

                    </div>
                    {(wizStrat === "Iron Condor" || wizStrat === "Earnings") ? (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

                        <WizInput label="Call spread (ej. 760/765)" value={wizForm.callSpread} onChange={wizF("callSpread")} placeholder="760/765" />

                    ) : null}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {!isSpreadTipo(wizStrat) && <WizInput label="Open price $/acc · crédito cobrado" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />}
                      <WizInput label="Riesgo máximo $" value={wizForm.margen} onChange={wizF("margen")} inputMode="decimal" />
                    </div>
                    {/* crédito o débito simple (Iron Fly / Spread — v5.13): sin strikes de ala; VIX opcional para trackear vol al abrir */}
                    {isSpreadTipo(wizStrat) && (
                      <label style={{ display: "block" }}>
                        <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>¿Put o Call spread?</div>
                        <Pill options={["Put", "Call"]} value={wizForm.right === "C" ? "Call" : "Put"} onChange={(v) => wizF("right")(v === "Call" ? "C" : "P")} size="sm" />
                      </label>
                    )}
                    {isSpreadTipo(wizStrat) && (
                      <>
                        {/* verticales con ciclo por pata — strike, prima y nota POR PATA; crédito o débito se calcula solo */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <WizInput label="Strike corta (vendida)" value={wizForm.sK} onChange={wizF("sK")} inputMode="decimal" />
                          <WizInput label="Strike larga (comprada)" value={wizForm.lK} onChange={wizF("lK")} inputMode="decimal" />
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <WizInput label="Prima corta cobrada $/acc" value={wizForm.sP} onChange={wizF("sP")} inputMode="decimal" />
                          <WizInput label="Prima larga pagada $/acc" value={wizForm.lP} onChange={wizF("lP")} inputMode="decimal" />

                          <WizInput label="Nota corta (opc.)" value={wizForm.sNote} onChange={wizF("sNote")} placeholder="Ej. delta 0.25" />
                          <WizInput label="Nota larga (opc.)" value={wizForm.lNote} onChange={wizF("lNote")} placeholder="Ej. protección" />

                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));

                      const rk = parseFloat(String(wizForm.margen || "").replace(",", "."));

                      const roi = credit !== null && rk ? credit / rk : null;
                      if (credit === null) return null;
                      const isDebit = isSpreadTipo(wizStrat) && credit < 0;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                      <WizInput label="Prima pagada $/acc" value={wizForm.lgPrima} onChange={wizF("lgPrima")} inputMode="decimal" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Delta long (ej. 0.80)" value={wizForm.lgDelta} onChange={wizF("lgDelta")} inputMode="decimal" />
                      <WizInput label="Comisión de entrada" value={wizForm.lgComision} onChange={wizF("lgComision")} placeholder="$" inputMode="decimal" />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.red, textTransform: "uppercase", letterSpacing: 0.5 }}>▸ Short leg · call vendida</span>
                      <div style={{ flex: 1, height: 1, background: T.line }} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Strike" value={wizForm.strike} onChange={wizF("strike")} inputMode="decimal" />
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Prima cobrada" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />
                      <WizInput label="IVR" value={wizForm.ivr} onChange={wizF("ivr")} inputMode="numeric" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Delta short (ej. 0.30)" value={wizForm.delta} onChange={wizF("delta")} inputMode="decimal" />
                      <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                    </div>
                    {(() => {
                      /* PMCC: BEP = prima long pagada − prima short cobrada (débito neto por acción).
                         Riesgo = ese débito neto × contratos × 100 (mín. 0). Los rolls de la short bajarán el BEP. */
                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const lp = Math.abs(parseFloat(String(wizForm.lgPrima || "").replace(",", ".")));
                      const sp = Math.abs(parseFloat(String(wizForm.prima || "").replace(",", ".")));
                      const net = (isFinite(lp) ? lp : NaN) - (isFinite(sp) ? sp : 0);
                      if (!isFinite(lp)) return null;
                      const risk = isFinite(cts) ? Math.max(0, net) * cts * 100 : null;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          <div style={{ background: T.tile, borderRadius: 12, padding: "8px 12px" }}>
                            <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.3 }}>BEP = prima long − short</div>
                            <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${net.toFixed(2)}</div>
                          </div>
                          {risk !== null && (
                            <div style={{ background: T.tileGreen, borderRadius: 12, padding: "8px 12px" }}>
                              <div style={{ fontSize: 9.5, fontWeight: 700, color: T.green, textTransform: "uppercase", letterSpacing: 0.3 }}>Riesgo = BEP × qty</div>
                              <div style={{ fontSize: 16, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums" }}>${risk.toLocaleString("en-US", { maximumFractionDigits: 0 })}</div>
                            </div>
                          )}
                          <div style={{ gridColumn: "span 2", fontSize: 11.5, fontWeight: 700, color: T.sub, padding: "0 2px" }}>
                            La short se rola como cualquier short call; cada crédito nuevo baja el BEP y el riesgo.
                          </div>
                        </div>
                      );
                    })()}
                    <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                  </>
                )}
                {DCDD_STRATS.has(wizStrat) && wizSub < 3 ? (
                  <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                    {wizSub > 1 && (
                      <button onClick={() => setWizSub(wizSub - 1)} style={{ background: T.tile, border: "none", borderRadius: 14, padding: "15px 18px", fontSize: 15, fontWeight: 800, color: T.ink, cursor: "pointer", flexShrink: 0 }}>‹ Atrás</button>
                    )}
                    <button onClick={() => {
                      if (wizSub === 1) setWizForm((f) => ({ ...f,
                        spK: f.spK || f.dcPutStrike || "", lpK: f.lpK || f.dcPutStrike || "",
                        scK: f.scK || f.dcCallStrike || "", lcK: f.lcK || f.dcCallStrike || "" }));
                      setWizSub(wizSub + 1);
                    }} style={{ flex: 1, background: T.dark, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Continuar · {wizSub === 1 ? "Primas y strikes" : "Volatilidad"} ›</button>
                  </div>
                ) : (
                <>
                <WizInput label="Nota de entrada (opcional)" value={wizForm.entryNote} onChange={wizF("entryNote")} placeholder="Ej. tesis, catalizador, plan de salida…" />
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  {DCDD_STRATS.has(wizStrat) && wizSub === 3 && (
                    <button onClick={() => setWizSub(2)} style={{ background: T.tile, border: "none", borderRadius: 14, padding: "15px 18px", fontSize: 15, fontWeight: 800, color: T.ink, cursor: "pointer", flexShrink: 0 }}>‹ Atrás</button>
                  )}
                  <button onClick={wizSave} disabled={!(wizForm.tkr || "").trim()} style={{ flex: 1, background: (wizForm.tkr || "").trim() ? T.green : T.tile, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 15, fontWeight: 800, color: (wizForm.tkr || "").trim() ? "#fff" : T.sub, cursor: "pointer" }}>Añadir a Bloque {wizBlock}</button>
                </div>
                </>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>{/* fin del contenedor de scroll */}

    {/* NAV INFERIOR — fuera del contenedor de scroll: fijo al viewport, no se mueve con el rebote.
       Oculto mientras el asistente está abierto para no tapar sus últimas opciones. */}
    {view === "bloques" && !wizOpen && (
      <button onClick={openWizard} aria-label="Nueva posición" style={{ position: "fixed", right: "max(16px, calc(50% - 270px))", bottom: 100, zIndex: 41, width: 52, height: 52, border: "0.5px solid rgba(255,255,255,0.08)", cursor: "pointer", borderRadius: 26, background: "rgba(28,26,32,0.62)", backdropFilter: "blur(22px) saturate(160%)", WebkitBackdropFilter: "blur(22px) saturate(160%)", boxShadow: "0 12px 34px rgba(0,0,0,0.35)", color: "#fff", fontSize: 26, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>+</button>
    )}
    {!wizOpen && (() => {
      const NAV = [["bloques", "portfolio", "Portfolio"], ["movimientos", "movimientos", "Movimientos"], ["vencimientos", "vencimientos", "Vencimientos"], ["comparador", "comparador", "Herramientas"], ["ajustes", "ajustes", "Ajustes"]];
      const NAV_BLUE = "#4C9AF5";
      const activeIdx = Math.max(0, NAV.findIndex(([id]) => id === view));
      /* deslizar el dedo por la barra: el pill sigue el dedo (navHover) y al soltar selecciona esa pestaña.
         El índice se calcula por la posición X del dedo dentro de la zona de pestañas (descontando el padding). */
      const idxFromX = (clientX) => {
        const el = navBarRef.current; if (!el) return null;
        const r = el.getBoundingClientRect();
        const innerLeft = r.left + 8, innerW = r.width - 16;
        return Math.max(0, Math.min(NAV.length - 1, Math.floor(((clientX - innerLeft) / innerW) * NAV.length)));
      };
      const shownIdx = navHover != null ? navHover : activeIdx;
      return (
      <div style={{ position: "fixed", left: 12, right: 12, bottom: 24, display: "flex", justifyContent: "center", zIndex: 40, pointerEvents: "none" }}>
        <div ref={navBarRef}
          onTouchStart={(e) => setNavHover(idxFromX(e.touches[0].clientX))}
          onTouchMove={(e) => setNavHover(idxFromX(e.touches[0].clientX))}
          onTouchEnd={() => { if (navHover != null) selectView(NAV[navHover][0]); setNavHover(null); }}
          onTouchCancel={() => setNavHover(null)}
          style={{ position: "relative", display: "flex", width: "100%", maxWidth: 540, background: "rgba(24,24,30,0.68)", backdropFilter: "blur(22px) saturate(160%)", WebkitBackdropFilter: "blur(22px) saturate(160%)", borderRadius: 26, padding: "7px 8px", boxShadow: "0 12px 34px rgba(0,0,0,0.35)", border: "0.5px solid rgba(255,255,255,0.08)", pointerEvents: "auto", touchAction: "none" }}>
          {/* pill deslizante: se mueve bajo el dedo (o a la pestaña activa) con transición suave */}
          <div style={{ position: "absolute", top: 6, bottom: 6, left: `calc(8px + ${shownIdx} * (100% - 16px) / ${NAV.length})`, width: `calc((100% - 16px) / ${NAV.length})`, background: navHover != null ? "rgba(76,154,245,0.32)" : "rgba(76,154,245,0.20)", border: `1px solid rgba(76,154,245,${navHover != null ? 0.6 : 0.35})`, borderRadius: 19, transition: "left 0.19s cubic-bezier(0.22,1,0.36,1), background 0.15s", pointerEvents: "none" }} />
          {NAV.map(([id, icon, label], i) => {
            const on = shownIdx === i;
            return (
              <button key={id} onClick={() => selectView(id)} style={{
                position: "relative", zIndex: 1, flex: 1, minWidth: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, border: "none", cursor: "pointer",
                background: "transparent", borderRadius: 19, padding: "7px 0 6px",
                color: on ? NAV_BLUE : "rgba(255,255,255,0.92)", transition: "color 0.15s",
              }}>
                <span style={{ position: "relative", display: "inline-flex" }}>
                  <NavIcon name={icon} />
                  {/* v3.46: punto rojo si hay opciones vencidas y aún abiertas — refuerzo pasivo del banner */}
                  {icon === "vencimientos" && positions.some((pp) => !pp.closed && pp.expiry && pp.expiry < new Date().toISOString().slice(0, 10)) && (
                    <span style={{ position: "absolute", top: -2, right: -5, width: 7, height: 7, borderRadius: 4, background: "#E5484D", border: "1.5px solid rgba(24,24,30,0.9)" }} />
                  )}
                </span>
                <span style={{ fontSize: 9.5, fontWeight: on ? 800 : 600, letterSpacing: 0.1, whiteSpace: "nowrap", color: on ? NAV_BLUE : "rgba(255,255,255,0.92)" }}>{label}</span>
              </button>
            );
          })}
        </div>
      </div>
      );
    })()}
    </>
  );
}

/* ---------- v1.74: PANTALLA DE RESCATE ----------
   Si cualquier render revienta (como el crash de Ajustes de la v1.72), la app NO se queda en blanco ni
   en bucle: este boundary atrapa el error y pinta una pantalla mínima que no depende de nada del árbol
   roto, con dos salidas: "Abrir en Portfolio" (borra KEY_VIEW — la pestaña recordada que re-lanzaba el
   crash al arrancar — y recarga) y "Descargar copia de emergencia" (vuelca BACKUP_KEYS de
   localStorage + IndexedDB, el autoritativo, a un JSON restaurable desde Ajustes → Backup). */
class RescueBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null, saved: "" }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err) { try { console.error("Bloques rescue:", err); } catch (e) {} }
  render() {
    if (!this.state.err) return this.props.children;
    const goPortfolio = () => { try { localStorage.removeItem(KEY_VIEW); } catch (e) {} location.reload(); };
    const dump = async () => {
      try {
        const data = {};
        for (const k of BACKUP_KEYS) {
          let v = null;
          try { v = await idbGet(k); } catch (e) {}
          if (v == null) { try { v = localStorage.getItem(k); } catch (e) {} }
          if (v != null) data[k] = v;
        }
        const payload = JSON.stringify({ v: "rescue-raw", appVersion: APP_VERSION, ts: Date.now(), keys: data }, null, 1);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([payload], { type: "application/json" }));
        a.download = "bloques-rescate-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(a); a.click(); a.remove();
        this.setState({ saved: "Copia descargada — tus datos están a salvo en ese archivo." });
      } catch (e) { this.setState({ saved: "No se pudo descargar: " + (e && e.message ? e.message : "error") }); }
    };
    const bt = { border: "none", cursor: "pointer", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 800, width: "100%" };
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "system-ui, -apple-system, sans-serif", background: "#F1EDE6" }}>
        <div style={{ maxWidth: 420, width: "100%", background: "#fff", borderRadius: 24, padding: 22, boxShadow: "0 8px 30px rgba(0,0,0,0.12)" }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#111827" }}>La app ha tropezado al pintar esta pantalla</div>
          <div style={{ fontSize: 13, fontWeight: 500, color: "#6B7280", marginTop: 8, lineHeight: 1.5 }}>
            Tus datos están intactos — viven en el almacenamiento del navegador y un fallo de pintado no los toca. Vuelve a Portfolio y, si quieres cinturón y tirantes, baja antes una copia.
          </div>
          <div style={{ display: "grid", gap: 10, marginTop: 18 }}>
            <button onClick={goPortfolio} style={{ ...bt, background: "#111827", color: "#fff" }}>Abrir en Portfolio</button>
            <button onClick={dump} style={{ ...bt, background: "#EEE9E0", color: "#111827" }}>Descargar copia de emergencia</button>
          </div>
          {this.state.saved && <div style={{ fontSize: 12, fontWeight: 700, color: "#15803D", marginTop: 12 }}>{this.state.saved}</div>}
          <div style={{ fontSize: 10.5, fontWeight: 600, color: "#9CA3AF", marginTop: 14 }}>Error: {String(this.state.err && this.state.err.message ? this.state.err.message : this.state.err).slice(0, 160)}</div>
        </div>
      </div>
    );
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<RescueBoundary><App /></RescueBoundary>);
</script>
<script>
/* ---------- auto-actualización: hosting estático (GitHub Pages/Netlify/Vercel) y apps guardadas en pantalla de
   inicio pueden servir una copia cacheada y no recargar solos tras un deploy. Este script, en cada apertura,
   pide de red (sin caché) el propio index.html, compara su APP_VERSION con la que está corriendo, y si hay una
   más nueva en el servidor, fuerza una recarga con un parámetro que rompe cualquier caché. ---------- */
(function () {
  function checkForUpdate() {
    try {
      fetch(location.pathname + "?_cachebust=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var m = html.match(/const APP_VERSION = "([^"]+)"/);
          if (m && window.APP_VERSION && m[1] !== window.APP_VERSION) {
            var url = new URL(location.href);
            url.searchParams.set("v", m[1]);
            url.searchParams.set("_", Date.now());
            location.replace(url.toString());
          }
        })
        .catch(function () {});
    } catch (e) {}
  }
  if (document.readyState === "complete") checkForUpdate();
  else window.addEventListener("load", checkForUpdate);
})();
</script>
