}

/* v1.21: Herramienta Earnings — flujo completo de decisión pre-trade:
   1) Spot vía Finnhub (misma key que Portfolio) + expected move % → strikes cortos ±EM y generador de alas.
   2) Histórico expected vs actual en 4 escenarios (open/close/high/low): X de M veces que el movimiento
      superó el EM. El veredicto usa OPEN (salida al abrir); los otros calibran el plan B (aguantar/asignación).
   3) Sesgo direccional (veces que cerró en verde) → recomendación de estrategia:
      alcista consistente → short put / bull put spread · bajista → bear call · dentro del EM → iron condor ·
      rompe el EM a menudo → skip o comprar la estructura.
   4) Crédito + riesgo objetivo → contratos sugeridos, win rate mínimo, EV y GO/CAUTION/NO-GO. */
function EarningsToolContent({ apiKey, geminiKey, onOpenPosition }) {
  const [ocrBusy, setOcrBusy] = useState(false);
  const [ocrMsg, setOcrMsg] = useState("");
  const ocrLockRef = useRef(false);
  const [st, setSt] = useState(() => {
    const base = { tkr: "", spot: "", em: "", wing: "5", put: "", call: "", credit: "", obj: String(getRiesgoObj()), nHist: "", xOpen: "", xClose: "", xHigh: "", xLow: "", nUp: "", cr25: "", cr5: "", cr10: "" };
    try { const raw = localStorage.getItem(KEY_EARNCALC); if (raw) return { ...base, ...JSON.parse(raw), obj: String(getRiesgoObj()) }; } catch (e) {}
    return base;
  });
  const [spotMsg, setSpotMsg] = useState("");
  const [spotBusy, setSpotBusy] = useState(false);
  const set = (k) => (v) => setSt((s) => {
    const nx = { ...s, [k]: v };
    try { localStorage.setItem(KEY_EARNCALC, JSON.stringify(nx)); } catch (e) {}
    if (k === "obj") { const num = parseFloat(String(v).replace(",", ".")); if (isFinite(num) && num > 0) saveRiesgoObj(num); }
    return nx;
  });
  const setMany = (obj) => setSt((s) => { const nx = { ...s, ...obj }; try { localStorage.setItem(KEY_EARNCALC, JSON.stringify(nx)); } catch (e) {} return nx; });
  const pf = (v) => { const x = parseFloat(String(v || "").replace(",", ".")); return isFinite(x) ? x : NaN; };

  /* v1.22: sube 1-4 capturas de "Expected vs Actual Move" (una por serie del desplegable).
     Gemini clasifica cada una leyendo la leyenda, así que el orden de subida da igual.
     M lo fija la primera lectura válida; U (dirección) sale de la serie CLOSE, que es la real. */
  const runChartOcr = async (files) => {
    const list = Array.from(files || []).slice(0, 4);
    if (!list.length) return;
    if (ocrLockRef.current) return;
    if (!geminiKey) { setOcrMsg("Sin key de Gemini — actívala en Ajustes → Lector de capturas."); return; }
    ocrLockRef.current = true; setOcrBusy(true); setOcrMsg("");
    const patch = {}; const notes = []; let mSeen = null; let tkrSeen = "";
    for (const f of list) {
      let data = null, lastErr = null;
      for (const model of GEMINI_MODELS) {
        try { data = await extractEarningsChartFromImage(f, geminiKey, model); break; }
        catch (err) { lastErr = err; if (err.status !== 429) break; }
      }
      if (!data) { notes.push("✕ " + (lastErr && lastErr.message ? lastErr.message : "no pude leerla")); continue; }
      const t = tallyEarningsChart(data);
      if (!t.key || !t.M) { notes.push("✕ una captura sin serie o sin barras legibles"); continue; }
      patch[t.key] = String(t.X);
      if (mSeen == null) mSeen = t.M;
      if (t.ticker && !tkrSeen) tkrSeen = t.ticker;
      if (t.key === "xClose") patch.nUp = String(t.U);
      notes.push(t.serie + ": " + t.X + "/" + t.M + " fuera del EM");
    }
    if (mSeen != null) patch.nHist = String(mSeen);
    if (tkrSeen && !String(st.tkr || "").trim()) patch.tkr = tkrSeen;
    if (Object.keys(patch).length) setMany(patch);
    setOcrBusy(false); ocrLockRef.current = false;
    setOcrMsg(notes.join(" · ") + (Object.keys(patch).length ? ". Revisa los números antes de fiarte." : ""));
    setTimeout(() => setOcrMsg(""), 20000);
  };

  const getSpot = async () => {
    const sym = String(st.tkr || "").trim().toUpperCase();
    if (!sym) { setSpotMsg("Escribe un ticker primero."); return; }
    if (!apiKey) { setSpotMsg("Sin key de Finnhub — actívala en Ajustes → Precios."); return; }
    setSpotBusy(true); setSpotMsg("");
    const q = await fetchQuote(sym, apiKey);
    setSpotBusy(false);
    if (q.price) { setMany({ tkr: sym, spot: String(q.price) }); setSpotMsg(""); }
    else setSpotMsg("No pude leer el precio: " + (q.error || "error desconocido"));
  };

  /* redondeo al incremento de strike típico según precio */
  const strikeStep = (px) => (px >= 200 ? 5 : px >= 100 ? 2.5 : px >= 25 ? 1 : 0.5);
  const roundStrike = (x, px) => { const s = strikeStep(px); return Math.round(x / s) * s; };
  const spot = pf(st.spot), em = pf(st.em);
  const emOk = isFinite(spot) && spot > 0 && isFinite(em) && em > 0;
  const shortPut = emOk ? roundStrike(spot * (1 - em / 100), spot) : NaN;
  const shortCall = emOk ? roundStrike(spot * (1 + em / 100), spot) : NaN;
  const wing = pf(st.wing);
  const fmtK = (x) => (Math.round(x * 100) / 100).toLocaleString("en-US", { maximumFractionDigits: 2 });
  const genSpreads = () => {
    if (!emOk || !isFinite(wing) || wing <= 0) return;
    setMany({ put: fmtK(shortPut) + "/" + fmtK(shortPut - wing), call: fmtK(shortCall) + "/" + fmtK(shortCall + wing) });
  };

  const r = condorRisk(st.put, st.call, st.credit);
  const obj = pf(st.obj);
  const creditPC = r && r.credit != null ? r.credit * 100 : NaN;
  const sug = r && r.maxLossPC > 0 && isFinite(obj) && obj > 0 ? Math.floor(obj / r.maxLossPC) : null;
  const beWr = r && r.maxLossPC > 0 && isFinite(creditPC) ? r.maxLossPC / (r.maxLossPC + creditPC) : NaN;

  const M = pf(st.nHist);
  const scen = [["xOpen", "Open"], ["xClose", "Close"], ["xHigh", "High"], ["xLow", "Low"]].map(([k, lbl]) => {
    const X = pf(st[k]);
    const pop = isFinite(M) && M > 0 && isFinite(X) && X >= 0 && X <= M ? 1 - X / M : NaN;
    return { k, lbl, X, pop };
  });
  const popOpen = scen[0].pop;
  const ev = r && isFinite(popOpen) && isFinite(creditPC) ? popOpen * creditPC - (1 - popOpen) * r.maxLossPC : NaN;
  const evTot = isFinite(ev) && sug ? ev * sug : NaN;
  const edge = isFinite(popOpen) && isFinite(beWr) ? popOpen - beWr : NaN;

  /* recomendación de estrategia según el sesgo direccional y la permanencia dentro del EM */
  const U = pf(st.nUp);
  const dirUp = isFinite(M) && M > 0 && isFinite(U) && U >= 0 && U <= M ? U / M : NaN;
  let reco = null;
  if (isFinite(dirUp) && dirUp >= 0.7) reco = { t: "Short Put · Bull Put Spread", txt: "Sube tras earnings el " + (dirUp * 100).toFixed(0) + "% de las veces — sesgo alcista consistente. Vende la put (20-30Δ) o el bull put spread (25-50Δ) y deja el lado call en paz.", col: T.green, bg: T.tileGreen };
  else if (isFinite(dirUp) && dirUp <= 0.3) reco = { t: "Bear Call Spread", txt: "Solo cierra en verde el " + (dirUp * 100).toFixed(0) + "% de las veces — sesgo bajista consistente. Vende el bear call spread (25-50Δ).", col: T.red, bg: T.tileRed };
  else if (isFinite(popOpen) && popOpen >= 0.7) reco = { t: "Iron Condor", txt: "Sin dirección clara pero se queda dentro del expected move el " + (popOpen * 100).toFixed(0) + "% de las veces (open). Cóndor con strikes en el EM y crédito ≥ ⅓ del ancho.", col: T.green, bg: T.tileGreen };
  else if (isFinite(popOpen) && popOpen < 0.5) reco = { t: "Skip · o comprar la estructura", txt: "Rompe el expected move más de la mitad de las veces — vender prima aquí es la apisonadora. Pasa, o dale la vuelta: compra el IC/Fly con las alas dentro de tu EM.", col: T.gold, bg: T.tileAmber };
  else if (isFinite(dirUp) || isFinite(popOpen)) reco = { t: "Sin edge claro", txt: "Ni sesgo direccional consistente ni permanencia fiable dentro del EM. No te sientas obligado a tradear — a la siguiente.", col: T.sub, bg: T.tile };

  /* v1.23: Plan B. Solo se plantea si el trade ABRE en pérdida (el gap se pasó de tus strikes).
     La pregunta es si el día suele corregir ese gap o si lo profundiza:
       · POP close > POP open  → el precio vuelve dentro del EM durante la sesión → aguantar tiene histórico a favor.
       · POP close ≤ POP open  → los gaps se extienden → cerrar en el open, sin dudar.
     High/Low miden la excursión adversa: si son mucho peores que el open, el intradía te puede sacar
     mucho más lejos antes de cualquier recuperación — aguantar duele aunque acabe corrigiendo. */
  const popClose = scen[1].pop, popHigh = scen[2].pop, popLow = scen[3].pop;
  const revert = isFinite(popClose) && isFinite(popOpen) ? popClose - popOpen : NaN;
  const worstIntra = [popHigh, popLow].filter((x) => isFinite(x));
  const excursion = worstIntra.length && isFinite(popOpen) ? Math.min(...worstIntra) - popOpen : NaN;
  let plan = null;
  if (isFinite(revert)) {
    const deep = isFinite(excursion) && excursion <= -0.15;
    if (revert >= 0.05 && !deep) plan = { t: "AGUANTA", col: T.green, bg: T.tileGreen, txt: "El precio vuelve dentro del expected move más veces al cierre (" + (popClose * 100).toFixed(0) + "%) que al abrir (" + (popOpen * 100).toFixed(0) + "%): los gaps de este ticker tienden a corregirse durante la sesión. Si abre en pérdida, dale tiempo antes de asumirla." };
    else if (revert >= 0.05 && deep) plan = { t: "AGUANTA CON DOLOR", col: T.gold, bg: T.tileAmber, txt: "Acaba corrigiendo al cierre, pero el intradía se va mucho más en contra primero (" + (Math.min(...worstIntra) * 100).toFixed(0) + "% frente a " + (popOpen * 100).toFixed(0) + "% al abrir). Aguantar funciona de media, pero verás números feos por el camino — solo si el tamaño te deja dormir." };
    else plan = { t: "CIERRA", col: T.red, bg: T.tileRed, txt: "Al cierre no está mejor que al abrir (" + (popClose * 100).toFixed(0) + "% vs " + (popOpen * 100).toFixed(0) + "%): cuando este ticker se sale del expected move, el movimiento se extiende en vez de corregirse. Si abre en pérdida, cierra y a la siguiente." };
  }

  const verdict = !r || !isFinite(ev) ? null : ev > 0 && r.ratio != null && r.ratio >= 0.25 && edge >= 0.05 ? { t: "GO", col: T.green, bg: T.tileGreen, txt: "EV positiva con colchón — entra dentro de tu marco" } : ev > 0 ? { t: "CAUTION", col: T.gold, bg: T.tileAmber, txt: "EV positiva pero fina — poco margen si el histórico no se repite" } : { t: "NO-GO", col: T.red, bg: T.tileRed, txt: "EV negativa — con tu histórico esta estructura pierde dinero a la larga" };
  const money0 = (v) => "$" + Math.abs(v).toLocaleString("en-US", { maximumFractionDigits: 0 });

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 18, marginBottom: 16, boxShadow: T.shadow }}>
      <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, letterSpacing: -0.3, display: "flex", alignItems: "center", gap: 8 }}><ActIcon name="calc" size={18} />Análisis de earnings</div>
      <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 2, marginBottom: 14 }}>Estrategia · estructura · probabilidad · sizing — todo antes de abrir</div>
      <div style={{ display: "grid", gap: 10 }}>
        <WizSection>▸ Subyacente y expected move</WizSection>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, alignItems: "end" }}>
          <WizInput label="Ticker" value={st.tkr} onChange={set("tkr")} upper placeholder="NVDA" />
          <button type="button" onClick={getSpot} disabled={spotBusy}
            style={{ border: "none", cursor: "pointer", borderRadius: 12, height: 47, fontSize: 13.5, fontWeight: 800, background: T.dark, color: "#fff", opacity: spotBusy ? 0.6 : 1 }}>
            {spotBusy ? "Leyendo…" : "Obtener spot"}
          </button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Spot $" value={st.spot} onChange={set("spot")} inputMode="decimal" placeholder="210.96" />
          <WizInput label="Expected move %" value={st.em} onChange={set("em")} inputMode="decimal" placeholder="5.39" />
        </div>
        {spotMsg && <div style={{ background: T.tileAmber, borderRadius: 12, padding: "8px 12px", fontSize: 11.5, fontWeight: 700, color: T.gold }}>{spotMsg}</div>}
        {emOk && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Tile label={"Short put · spot − " + em.toLocaleString("en-US", { maximumFractionDigits: 2 }) + "%"} value={fmtK(shortPut)} />
            <Tile label={"Short call · spot + " + em.toLocaleString("en-US", { maximumFractionDigits: 2 }) + "%"} value={fmtK(shortCall)} />
          </div>
        )}
        {emOk && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, alignItems: "end" }}>
            <label style={{ display: "block" }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>Ancho del ala</div>
              <Pill options={["2.5", "5", "10"]} value={st.wing} onChange={set("wing")} size="sm" />
            </label>
            <button type="button" onClick={genSpreads}
              style={{ border: "none", cursor: "pointer", borderRadius: 12, height: 40, fontSize: 13, fontWeight: 800, background: T.tile, color: T.ink }}>
              Generar spreads
            </button>
          </div>
        )}
        <WizSection>▸ Estructura</WizSection>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Put spread" value={st.put} onChange={set("put")} placeholder="195/190" />
          <WizInput label="Call spread" value={st.call} onChange={set("call")} placeholder="225/230" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Crédito neto $/acc" value={st.credit} onChange={set("credit")} inputMode="decimal" placeholder="1.50" />
          <WizInput label="Riesgo objetivo $ / op" value={st.obj} onChange={set("obj")} inputMode="decimal" placeholder="500" />
        </div>
        <WizSection>▸ Histórico expected vs actual</WizSection>
        <label style={{ display: "block", cursor: ocrBusy ? "default" : "pointer" }}>
          <div style={{ background: ocrBusy ? T.tile : T.tilePurple, borderRadius: 14, padding: "12px 14px", textAlign: "center", fontSize: 13.5, fontWeight: 800, color: ocrBusy ? T.sub : T.purple }}>
            {ocrBusy ? "Leyendo capturas…" : <span style={{ display: "inline-flex", alignItems: "center", gap: 7 }}><ActIcon name="camera" size={15} />Leer capturas de Expected vs Actual</span>}
          </div>
          <input type="file" accept="image/*" multiple disabled={ocrBusy} style={{ display: "none" }}
            onChange={(e) => { runChartOcr(e.target.files); e.target.value = ""; }} />
        </label>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, lineHeight: 1.45, padding: "0 2px" }}>
          Sube hasta 4 capturas — una por cada serie del desplegable <b>Actual Move from</b> (Open · Close · High · Low). El lector identifica cada serie por su leyenda, así que el orden da igual. Rellena M, las X de cada escenario y U (cierres en verde, desde la serie Close).
        </div>
        {ocrMsg && <div style={{ background: T.tile, borderRadius: 12, padding: "9px 12px", fontSize: 11.5, fontWeight: 700, color: T.sub, lineHeight: 1.4 }}>{ocrMsg}</div>}
        <WizInput label="Earnings analizados (M)" value={st.nHist} onChange={set("nHist")} inputMode="numeric" placeholder="16" span={2} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Fuera del EM · Open" value={st.xOpen} onChange={set("xOpen")} inputMode="numeric" placeholder="2" />
          <WizInput label="Fuera del EM · Close" value={st.xClose} onChange={set("xClose")} inputMode="numeric" placeholder="3" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Fuera del EM · High" value={st.xHigh} onChange={set("xHigh")} inputMode="numeric" placeholder="4" />
          <WizInput label="Fuera del EM · Low" value={st.xLow} onChange={set("xLow")} inputMode="numeric" placeholder="3" />
        </div>
        <WizInput label="Cerró en verde (U)" value={st.nUp} onChange={set("nUp")} inputMode="numeric" placeholder="11" />
        {scen.some((s) => isFinite(s.pop)) && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
            {scen.map((s) => (
              <Tile key={s.k} label={"POP " + s.lbl + (s.k === "xOpen" ? " · tu salida" : "")} value={isFinite(s.pop) ? (s.pop * 100).toFixed(0) + "%" : "—"}
                tone={!isFinite(s.pop) ? "muted" : s.k === "xOpen" ? (s.pop >= 0.7 ? "green" : s.pop >= 0.5 ? "amber" : "red") : "default"} />
            ))}
          </div>
        )}
        {scen.some((s) => isFinite(s.pop)) && (
          <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, lineHeight: 1.45, padding: "0 2px" }}>
            El veredicto usa <b>Open</b> (sales al abrir). Todas las series se miden contra el cierre previo a resultados: <b>High</b> y <b>Low</b> son los extremos del recorrido del día — lo mejor y lo peor que habrías visto en pantalla. Junto con <b>Close</b> te dicen si el plan B de aguantar una pérdida o tomar asignación tiene histórico a favor, o si toca cortar sin dudar.
          </div>
        )}
        {reco && (
          <div style={{ background: reco.bg, borderRadius: 15, padding: "12px 14px" }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: reco.col }}>Estrategia sugerida: {reco.t}</div>
            <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 4, lineHeight: 1.45 }}>{reco.txt}</div>
          </div>
        )}
        {r && r.maxLossPC > 0 && (
          <>
            <WizSection>▸ Sizing y esperanza</WizSection>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <Tile label={"Pérdida máx / contrato · ala " + r.width.toLocaleString("en-US", { maximumFractionDigits: 2 })} value={money0(r.maxLossPC)} />
              <Tile label={"Contratos sugeridos · objetivo $" + (isFinite(obj) ? obj.toLocaleString("en-US", { maximumFractionDigits: 0 }) : "—")} value={sug == null ? "—" : sug > 0 ? String(sug) : "0 — no pasa"} tone={sug == null ? "muted" : sug > 0 ? "green" : "red"} />
            </div>
            {isFinite(beWr) && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <Tile label="Win rate mínimo (break-even)" value={(beWr * 100).toFixed(0) + "%"} tone="muted" />
                <Tile label="Colchón (POP open − mínimo)" value={isFinite(edge) ? ((edge >= 0 ? "+" : "") + (edge * 100).toFixed(0) + " pts") : "—"} tone={isFinite(edge) ? (edge >= 0.05 ? "green" : edge >= 0 ? "amber" : "red") : "default"} />
              </div>
            )}
            {r.ratio != null && (
              <div style={{ background: r.ratio >= 1 / 3 ? T.tileGreen : r.ratio >= 0.25 ? T.tileAmber : T.tileRed, borderRadius: 12, padding: "8px 12px", fontSize: 11.5, fontWeight: 700, color: r.ratio >= 1 / 3 ? T.green : r.ratio >= 0.25 ? T.gold : T.red, lineHeight: 1.4 }}>

function ComparadorContent({ apiKey, nlv, margin, el, brokerLabel, trades, setTrades, basis, setBasis, onOpenPosition }) {

  const [spotBusyId, setSpotBusyId] = useState(null);

    if (!apiKey) { setSpotMsg((m) => ({ ...m, [tr.id]: "Sin key de Finnhub — actívala en Ajustes → Precios." })); return; }
    setSpotBusyId(tr.id); setSpotMsg((m) => ({ ...m, [tr.id]: "" }));
    const q = await fetchQuote(sym, apiKey);
    setSpotBusyId(null);
    if (q.price) setTrades((ts) => ts.map((t) => (t.id === tr.id ? { ...t, underlying: String(q.price) } : t)));
    else setSpotMsg((m) => ({ ...m, [tr.id]: "No pude leer el precio: " + (q.error || "error") }));
  };
  const [ocrBusy, setOcrBusy] = useState(false);
  /* algunos iOS disparan el evento "change" del <input type=file> DOS veces para la misma selección
     (sobre todo saliendo de la cámara/galería) — sin esto, "una foto" podía convertirse en 2 llamadas
     a Gemini de golpe. setOcrBusy(true) es async (no se ve hasta el siguiente render), así que un ref
     síncrono es la única forma fiable de bloquear el segundo disparo en el mismo tick. */
  const ocrLockRef = useRef(false);
  const [ocrMsg, setOcrMsg] = useState("");
  const base = { elNlv: nlv ? el / nlv : NaN, elMrgn: margin ? el / margin : NaN };
  const baseEmpty = !nlv && !margin;

  const computed = useMemo(() => trades.map((tr) => {
    const strike = n(tr.strike), creditPS = n(tr.credit), tMargin = n(tr.margin);
    const notional = strike > 0 ? (strike - creditPS) * 100 : 0;   // (Strike − Credit) × 100
    const premium = creditPS * 100;                                // Credit × 100
    const bep = strike > 0 ? strike - creditPS : NaN;               // break-even = Strike − Credit (por acción)
    const underlyingN = n(tr.underlying);
    /* margen de seguridad del BEP: % que necesitaría CAER el subyacente para tocar el BEP (por eso negativo = a salvo,
       igual que decir "-20% hasta breakeven"). Positivo = el subyacente ya está por debajo del BEP (ya en pérdida).
       Asume el modelo suelo-por-debajo (short put), que es el que usa todo el Comparador (Strike − Credit);
       en un short call leería al revés. */
    const bepMargin = (underlyingN > 0 && isFinite(bep)) ? (bep - underlyingN) / underlyingN : NaN;
    const newEL = el - tMargin;
    const newMargin = margin + tMargin;
    const elNlv = nlv ? newEL / nlv : NaN;
    const elMrgn = newMargin ? newEL / newMargin : NaN;
    const posSize = nlv ? notional / nlv : NaN;
    const roi = notional ? premium / notional : NaN;               // ROI = Premium / Notional
    const rom = tMargin ? premium / tMargin : NaN;                  // Return on margin = Premium / Margin
    const ann = n(tr.dte) ? 365 / n(tr.dte) : 0;
    const annRoi = roi * ann;
    /* eficiencia vs Delta: cuánto Annualized ROI (%) consigues por cada punto de Delta expuesto —
       a igual ROI, menos Delta (menos "acción sintética" comprometida) es mejor; por eso se divide, no se multiplica. */
    const deltaAbs = Math.abs(n(tr.delta));
    const deltaEff = deltaAbs ? (annRoi * 100) / deltaAbs : NaN;
    let status = "GO";
    if (elNlv < RULES.elNlv.amber || elMrgn < RULES.elMrgn.amber) status = "NO-GO";
    else if (elNlv < RULES.elNlv.green || elMrgn < RULES.elMrgn.green) status = "CAUTION";
    return { ...tr, notional, premium, bep, bepMargin, elNlv, elMrgn, dElNlv: elNlv - base.elNlv, dElMrgn: elMrgn - base.elMrgn, posSize, roi, rom, annRoi, annRom: rom * ann, deltaAbs, deltaEff, status };
  }), [trades, nlv, margin, el]);

  const rankVal = (c) => (basis === "roi" ? c.roi : basis === "annRoi" ? c.annRoi : basis === "rom" ? c.rom : basis === "impact" ? c.elNlv : basis === "delta" ? c.deltaEff : c.annRom);
  const okOrder = { GO: 0, CAUTION: 1, "NO-GO": 2 };
  const ranked = useMemo(() => [...computed].sort((a, b) => {

    annRoi: { lead: "Mejor Annualized ROI", label: "Annualized ROI", val: (c) => pct(c.annRoi, 1) },
    rom: { lead: "Mejor return on margin", label: "Return on margin", val: (c) => pct(c.rom, 2) },

    else rationale = `${lead}, pero deja EL/MRGN en ${pct(winner.elMrgn)} (bajo objetivo 100%). Vigila el colchón.`;
  }

  const setTr = (id, k) => (v) => setTrades((ts) => ts.map((t) => (t.id === id ? { ...t, [k]: v } : t)));
  const toggleEdit = (id) => setEditSet((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
  const addTrade = () => { const id = newId(); setTrades((ts) => [{ id, tkr: "", dte: "30", strike: "", credit: "", margin: "", right: "P", expiry: "", underlying: "", delta: "", pop: "" }, ...ts]); setEditSet((s) => new Set(s).add(id)); };
  const delTrade = (id) => setTrades((ts) => ts.filter((t) => t.id !== id));
  /* limpiar todas las operaciones grabadas del Comparador (no toca posiciones ni movimientos). Doble toque:
     el primer toque arma la confirmación 3 s, el segundo vacía. */
  const [confirmClear, setConfirmClear] = useState(false);

    setTrades([]); setEditSet(new Set()); setConfirmClear(false);

  const errToStr = (err) => {
    if (!err) return "error desconocido";
    if (err.message) return err.message;

  };
  const summarizeTrade = (p, prefix) => {
    const parts = [];
    if (p.tkr) parts.push(p.tkr + (p.right || ""));
    if (p.strike) parts.push("strike $" + p.strike);
    if (p.dte) parts.push(p.dte + " DTE");

  /* lee UNA captura y devuelve { trade, message } sin tocar el estado de UI — así el llamador

  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  const readOneScreenshot = async (file, gkey, onWaiting) => {

    let geminiErr = "";

    for (let round = 0; round < 2; round++) {

  const runOcr = async (files) => {

    if (!list.length) return;
    if (ocrLockRef.current) { console.warn("[Comparador] runOcr ya en curso, ignoro disparo duplicado"); return; }
    ocrLockRef.current = true;

       las lanzamos en paralelo con un límite de 3 a la vez (evita disparar 429 de golpe si hay muchas). */
    const CONCURRENCY = Math.min(3, list.length);

        })}

          <div style={{ background: T.card, borderRadius: 24, padding: 30, textAlign: "center", boxShadow: T.shadow }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: T.sub }}>Añade una operación con "+ Operación" para compararla contra tu cuenta ({brokerLabel}).</div>
          </div>
        )}
      </div>
    </>
  );
}

/* ============================================================ */
function App() {
  /* modo oscuro: por defecto CLARO siempre, sin importar el ajuste del sistema — el icono ☀️/🌙 de arriba
     lo cambia a mano y se recuerda para la próxima vez (localStorage). No sigue al iPhone.
     applyTheme() se llama de forma síncrona en cada render — así T/BLOCKS/HEX/TABS/PALETTE
     están siempre al día para ese render, sea cual sea el motivo del cambio. */
  const [darkOverride, setDarkOverride] = useState(() => {
    try { return localStorage.getItem(KEY_DARK_OVERRIDE) === "dark"; } catch (e) { return false; }
  });
  const isDark = darkOverride;
  applyTheme(isDark);
  useEffect(() => {
    try {
      const tc = document.getElementById("theme-color-meta"); if (tc) tc.setAttribute("content", isDark ? "#0A0A0A" : "#EEE9E0");
      const cs = document.getElementById("color-scheme-meta"); if (cs) cs.setAttribute("content", isDark ? "dark" : "light");
    } catch (e) {}
  }, [isDark]);
  const toggleDark = () => {
    const next = !isDark;
    setDarkOverride(next);
    try { localStorage.setItem(KEY_DARK_OVERRIDE, next ? "dark" : "light"); } catch (e) {}
  };
  const [accounts, setAccounts] = useState(SEED_ACC);
  const [positions, setPositions] = useState(SEED_POS);
  /* v5.31: ref siempre-actual con las posiciones. runRefresh es async (tarda segundos bajando precios) y antes
     capturaba `positions` por cierre; si arrancaba con una versión previa a la fusión de carga, al terminar
     escribía esa versión pequeña ENCIMA de las posiciones ya fusionadas → borraba movimientos/estrategias.
     Con la ref (y setPositions funcional) siempre parte del estado más reciente. */
  const positionsRef = useRef(positions);
  positionsRef.current = positions;
  const [broker, setBroker] = useState("Todos");
  const [accOpen, setAccOpen] = useState(false); // estado de cuenta plegado por defecto (ahorra espacio)
  const navBarRef = useRef(null);
  const [navHover, setNavHover] = useState(null); // índice de pestaña bajo el dedo al deslizar por el menú inferior
  const [activeTab, setActiveTab] = useState(0);
  const [chartScope, setChartScope] = useState("Bloque");
  const [selectedSlice, setSelectedSlice] = useState(null);
  const [editSet, setEditSet] = useState(() => new Set());
  const [confirmClear, setConfirmClear] = useState(false);
  const [info, setInfo] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [refreshMsg, setRefreshMsg] = useState(""); /* v5.10: solo errores — el éxito se señala con el punto verde de la píldora */
  const [refreshOk, setRefreshOk] = useState(false); /* píldora "● Actualizado" unos segundos tras el refresco */
  const [pullDist, setPullDist] = useState(0);
  const pullTrackingRef = useRef(false);
  const pullStartYRef = useRef(0);
  const rootRef = useRef(null);
  const [apiKey, setApiKey] = useState("");
  const [keyModalOpen, setKeyModalOpen] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const [geminiKey, setGeminiKey] = useState("");
  const [geminiModalOpen, setGeminiModalOpen] = useState(false);
  const [geminiInput, setGeminiInput] = useState("");
  const [refreshChoiceOpen, setRefreshChoiceOpen] = useState(false);
  const [pendingAutoRefresh, setPendingAutoRefresh] = useState(false); /* arranque: descarga directa de precios si hay key (v5.05) */
  const [updChecking, setUpdChecking] = useState(false);
  const [updCheckMsg, setUpdCheckMsg] = useState("");
  const [snapshots, setSnapshots] = useState([]);
  const [flows, setFlows] = useState([]);
  const [autoBackups, setAutoBackups] = useState([]);
  const [updateNotice, setUpdateNotice] = useState(null);
  const [confirmAutoBk, setConfirmAutoBk] = useState(null);
  const [manualBackups, setManualBackups] = useState([]); // copias JSON guardadas por el usuario (restaurables)
  const [confirmManualBk, setConfirmManualBk] = useState(null);
  const [brokers, setBrokers] = useState(SEED_BROKERS);
  const [brokerModalOpen, setBrokerModalOpen] = useState(false);
  const [newBrokerName, setNewBrokerName] = useState("");
  const [removeTarget, setRemoveTarget] = useState({});
  const [view, setView] = useState(() => { try { const v = localStorage.getItem(KEY_VIEW); return v === "comparador" || v === "movimientos" || v === "vencimientos" || v === "ajustes" ? v : "bloques"; } catch (e) { return "bloques"; } });
  const selectView = (v) => { setView(v); try { localStorage.setItem(KEY_VIEW, v); } catch (e) {} };
  const [trades, setTrades] = useState([]);
  const [basis, setBasis] = useState(() => { try { const v = localStorage.getItem(KEY_BASIS); return BASIS_KEYS.includes(v) ? v : "annRom"; } catch (e) { return "annRom"; } });
  const [confirmClearTr, setConfirmClearTr] = useState(false);
  const clearTrades = () => {
    if (!confirmClearTr) { setConfirmClearTr(true); setTimeout(() => setConfirmClearTr(false), 3000); return; }
    setTrades([]); setConfirmClearTr(false);
  };
  const [showPnl, setShowPnl] = useState(() => { try { return localStorage.getItem("bloques_show_pnl") === "1"; } catch (e) { return false; } });
  const togglePnl = () => setShowPnl((v) => { const nv = !v; try { localStorage.setItem("bloques_show_pnl", nv ? "1" : "0"); } catch (e) {} return nv; });

  const withNat = (arr) => arr.map((p) => ({
    factor: p.factor != null ? p.factor : "1",
    margen: p.margen != null ? p.margen : "",
    margenPct: p.margenPct != null ? p.margenPct : "100",
    margenModo: p.margenModo != null ? p.margenModo : "PCT",
    mktModo: p.mktModo != null ? p.mktModo : "AUTO",
    pnlModo: p.pnlModo != null ? p.pnlModo : "AUTO",
    prima: p.prima != null ? p.prima : "",
    ...p,
    /* migración de nombre: "Short Call" (nombre antiguo) pasa a llamarse "Covered Call" en todos los
       registros ya guardados, para que el título se vea correcto en toda la app sin perder el vínculo */
    tipo: (p.tipo || "").trim().toLowerCase() === "short call" ? "Covered Call" : p.tipo,
    /* migración P&L: las opciones cortas creadas con el antiguo default (Manual, 0) pasan a Auto para
       que muestren el P&L simulado Spot − BEP; un P&L manual distinto de 0 se respeta. PMCC se deja Manual. */
    pnlModo: !isPMCC(p) && (p.nat === "CRED" || inferNat(p) === "CRED") && p.pnlModo === "MANUAL" && (!p.pnl || n(p.pnl) === 0) ? "AUTO" : p.pnlModo,
    /* toda call corta es covered call por definición del framework: covered=true siempre (riesgo 0 en su bloque).
       El PMCC es la excepción: su short call NO cubre acciones (cubre la long call), así que covered=false. */
    covered: !isPMCC(p) && (p.nat === "CRED" || inferNat(p) === "CRED") && p.right === "C" ? true : p.covered,
    nat: p.nat || inferNat(p),
  }));
  useEffect(() => {
    /* versión de proyecto: si el HTML es una versión nueva, copia automática de los datos actuales antes de tocarlos.
       v5.18: la captura y el almacén de copias son IDB-aware. Antes leía/escribía SOLO localStorage; si localStorage
       se llenaba (cuota), saveKV se lo tragaba y las posiciones quedaban solo en IndexedDB → la copia salía sin
       movimientos/estrategias/MTM (todo eso se deriva de las posiciones). Ahora cada clave se lee de localStorage o,
       si falta, de IndexedDB, y la lista de copias se guarda en IndexedDB (autoritativo) + localStorage (best-effort). */
    const stored = (() => { try { return localStorage.getItem(KEY_APPVER); } catch (e) { return null; } })();
    /* v5.29: pide almacenamiento PERSISTENTE. En un PWA de iOS/Safari, IndexedDB y localStorage pueden ser
       DESALOJADOS por el sistema (por inactividad o presión de almacenamiento) — esa es una causa de que "la
       actualización borre" movimientos/estrategias, que se derivan de las posiciones. persist() evita el desalojo. */
    try { if (typeof navigator !== "undefined" && navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {}); } catch (e) {}
    let haveAcc = false, havePos = false, lsPos = null;
    try { const f = localStorage.getItem(KEY_FLOWS); if (f) { const arr = JSON.parse(f); if (Array.isArray(arr)) setFlows(arr); } } catch (e) {}
    try { const a = localStorage.getItem(KEY_ACC); if (a) { setAccounts(JSON.parse(a)); haveAcc = true; } } catch (e) {}
    try { const p = localStorage.getItem(KEY_POS); if (p) { const arr = JSON.parse(p); if (Array.isArray(arr)) { lsPos = arr; setPositions(withNat(arr)); havePos = true; } } } catch (e) {}
    try { const k = localStorage.getItem(KEY_FINNHUB); if (k) setApiKey(k); } catch (e) {}
    /* al abrir la app (v5.05): si hay API key guardada, los precios se descargan DIRECTAMENTE, sin pasar
       por la hoja de "Actualizar precios / Cambiar key" — esa hoja solo aparece si se pulsa el botón.
       Sin key no se molesta (primer uso). Se marca un flag en vez de llamar a runRefresh aquí porque en
       este efecto las posiciones aún no están en el estado (se acaban de leer de localStorage): el flag
       dispara la descarga en el siguiente render, ya con las posiciones cargadas. */
    try { if (localStorage.getItem(KEY_FINNHUB)) setPendingAutoRefresh(true); } catch (e) {}
    try { const gk = localStorage.getItem(KEY_GEMINI); if (gk) setGeminiKey(gk); } catch (e) {}
    try { const s = localStorage.getItem(KEY_SNAP); if (s) setSnapshots(JSON.parse(s)); } catch (e) {}
    try { const bk = localStorage.getItem(KEY_BROKERS); if (bk) { const arr = JSON.parse(bk); if (Array.isArray(arr) && arr.length) setBrokers(arr); } } catch (e) {}
    let haveTr = false;
    try { const tr = localStorage.getItem(KEY_TRADES); if (tr) { const arr = JSON.parse(tr); if (Array.isArray(arr)) { setTrades(arr); haveTr = true; } } } catch (e) {}
    if (!haveTr) { try { const trOld = localStorage.getItem(KEY_TR_OLD); if (trOld) { const arr = JSON.parse(trOld); if (Array.isArray(arr) && arr.length) { setTrades(arr); haveTr = true; } } } catch (e) {} }
    (async () => {
      /* IDB es la fuente autoritativa de los datos grandes. saveKV SIEMPRE escribe IDB; localStorage es
         best-effort y, si se llena (cuota de iOS), se queda congelado en un snapshot viejo. v5.21: por eso, si
         IDB tiene datos, MANDAN sobre el localStorage provisional que se pintó arriba — así una actualización
         (que recarga la app) no revierte a un localStorage antiguo ni lo vuelve a grabar encima de IDB, que es
         justo lo que borraba movimientos/estrategias/MTM. */
      try { const a = await idbGet(KEY_ACC); if (a != null) { setAccounts(JSON.parse(a)); haveAcc = true; } } catch (e) {}
      try {
        const p = await idbGet(KEY_POS);
        let idbPos = null;
        if (p != null) { const arr = JSON.parse(p); if (Array.isArray(arr)) idbPos = arr; }
        /* UNIÓN POR ID (v5.29): la posición sobrevive si existe en CUALQUIERA de las dos fuentes. IDB manda en

           evita que una fuente recortada borre movimientos/estrategias al recargar tras una actualización. */
        let finalPos = null;
        if (idbPos && lsPos) {
          finalPos = mergePositionsById(idbPos, lsPos);
        } else {
          finalPos = idbPos || lsPos;
        }
        if (finalPos) { setPositions(withNat(finalPos)); havePos = true; }
      } catch (e) {}
      try { const tr = await idbGet(KEY_TRADES); if (tr != null) { const arr = JSON.parse(tr); if (Array.isArray(arr)) { setTrades(arr); haveTr = true; } } } catch (e) {}
      try { const s = await idbGet(KEY_SNAP); if (s != null) { const arr = JSON.parse(s); if (Array.isArray(arr)) setSnapshots(arr); } } catch (e) {}
      try { const fl = await idbGet(KEY_FLOWS); if (fl != null) { const arr = JSON.parse(fl); if (Array.isArray(arr)) setFlows(arr); } } catch (e) {}
      try { const br = await idbGet(KEY_BROKERS); if (br != null) { const arr = JSON.parse(br); if (Array.isArray(arr) && arr.length) setBrokers(arr); } } catch (e) {}

        try {
          const aOld = localStorage.getItem(KEY_ACC_OLD);

        if (mbRaw) { const arr = JSON.parse(mbRaw); if (Array.isArray(arr)) setManualBackups(arr); }
      } catch (e) {}

  /* comprobación manual de versión: pide el propio index.html a la red sin caché y compara — botón porque el chequeo

      .then((r) => r.text())

        if (m && m[1] !== APP_VERSION) {

  const runRefresh = async (key) => {

  const nlv = mktvl + Math.min(manualCash, 0);

      /* cierre PARCIAL de acciones (v5.26): vende qtyPart acciones por FIFO, registra cada parcela en soldLots
         (→ Movimientos/MTM) y deja el resto abierto. Si se venden todas, la posición queda cerrada. */
      if (partial && tgt && natOf(tgt) === "ACC") {
        const total = n(tgt.qty);
        const Q = Math.min(n(qtyPart) || total, total);
        if (Q <= 0) return ps;
        const baseLots = hasLots(tgt) ? tgt.lots : [{ id: "l" + Math.random().toString(36).slice(2, 6), date: tgt.entryDate || "", qty: String(total), price: String(n(effBep(tgt))) }];
        const { outLots, sales } = fifoSell(baseLots, Q, price, closeDate, comision);
        const merged = [...sales, ...(Array.isArray(tgt.soldLots) ? tgt.soldLots : [])];
        const remainingQty = outLots.reduce((s, l) => s + n(l.qty), 0);
        const applied = applyLots(tgt, outLots);
        const updated = remainingQty <= 0
          ? { ...applied, qty: "0", soldLots: merged, closed: true, closeDate, closePrice: "", closeComision: "", closeNote: note || "" }
          : { ...applied, soldLots: merged, closed: false };
        return ps.map((p) => (p.id === id ? updated : p));
      }
      let next = ps.map((p) => (p.id === id ? { ...p, closed: true, closeDate: date, closePrice: price, closeComision: comision, closeNote: note || "", closeLongPrice: longPrice != null ? longPrice : "", closeLongComision: longComision != null ? longComision : "", exercised: !!exercised } : p));
      /* asignación de short put → nueva acción en B1 al BEP vigente */

        const shares = n(tgt.qty);

          const costBasis = effBep(tgt); // strike − prima acumulada, a la fecha de asignación
          const id2 = newId();
          next = [...next, {
            id: id2, block: 1, broker: tgt.broker, tkr: tgt.tkr, tipo: "Long Stock", nat: "ACC",
            strike: "", right: "P", expiry: "", qty: String(shares), bep: String(costBasis), prima: "",
            comision: "", ivr: "", last: "", mktValue: "", riesgo: "", factor: "1", margen: "",
            margenPct: "100", margenModo: "PCT", mktModo: "AUTO", pnlModo: "AUTO", pnl: "",
            entryDate: closeDate, rollChain: [], closed: false, closeDate: "", closePrice: "",
            closeComision: "", closeNote: "", assignedFrom: id,
            entryNote: "Asignada desde put " + (tgt.tkr || "") + " · coste base = BEP $" + money2(costBasis),
          }];
        }
      }
      /* v1.31: covered call EJERCIDA (called away) → las acciones se van AL STRIKE de la call, no a mercado.
         Antes había que acordarse de cerrarlas a mano; si se olvidaba, la acción seguía viva en cartera con
         P&L fantasma y la rueda mentía. Usa la acción enlazada (onStock); sin enlace, busca una ÚNICA acción
         abierta del mismo ticker y broker — si hay varias no adivina, y salta el aviso correspondiente. */
      if (exercised && tgt && natOf(tgt) === "CRED" && tgt.right === "C" && !isPMCC(tgt)) {
        const shares = n(tgt.qty);
        const strike = n(tgt.strike);
        let stock = tgt.onStock ? next.find((s2) => s2.id === tgt.onStock && !s2.closed) : null;
        if (!stock) {
          const cands = next.filter((s2) => natOf(s2) === "ACC" && !s2.closed
            && (s2.tkr || "").toUpperCase().trim() === (tgt.tkr || "").toUpperCase().trim()
            && (!tgt.broker || !s2.broker || s2.broker === tgt.broker));
          if (cands.length === 1) stock = cands[0];
        }

    });

  const reopenPos = (id) => setPositions((ps) => ps.map((p) => (p.id === id ? { ...p, closed: false } : p)));
  /* v1.29: enlazar a mano una put asignada con su posición de acciones (para las asignaciones
     antiguas o importadas, anteriores al automatismo de closePos). stockId vacío = desenlazar.
     Solo puede haber UNA acción enlazada por opción: al enlazar una nueva se limpia la anterior. */
  /* v1.32: ASIGNAR DESDE EL HISTÓRICO. Hasta ahora la acción de B1 solo nacía al cerrar la put marcándola
     como asignada (closePos). Para las históricas —cerradas antes de existir el automatismo, o importadas—
     no había forma de crearla: el selector "Enlazar acción" solo sirve si la acción YA existe en la app.
     Esto hace lo mismo que closePos pero a posteriori: crea la Long Stock en B1 con coste base = BEP vigente
     (strike − prima acumulada, rolls incluidos), la enlaza (assignedFrom) y marca la put como asignada.
     Si la put no estaba marcada como asignada, además pone el precio de recompra a 0 — en una asignación no
     recompras nada, te quedas la prima entera y te llevas las acciones. */
  const assignFromPut = (putId) => setPositions((ps) => {
    const tgt = ps.find((p) => p.id === putId);
    if (!tgt || natOf(tgt) !== "CRED" || tgt.right !== "P" || isPMCC(tgt)) return ps;
    const shares = n(tgt.qty);
    if (shares <= 0) return ps;
    const fecha = tgt.closeDate || tgt.expiry || new Date().toISOString().slice(0, 10);
    const marcada = ps.map((p) => (p.id === putId
      ? { ...p, closed: true, closeDate: fecha, closePrice: "0", exercised: true }
      : p));
    /* v1.33: si YA existe una acción de ese ticker en cartera (normalmente sí: la asignación real
       ocurrió en el broker y la posición está importada), NO se crea otra — se ENLAZA. Crear una
       segunda duplicaba las acciones, inflaba riesgo/MKT VL y ensuciaba el P&L. Solo se crea si no
       hay ninguna. El enlace vive en la PUT (assignedTo), así varias puts pueden apuntar a la misma
       posición de acciones (dos puts de 100 que acabaron en un único paquete de 200, por ejemplo). */
    const key = (tgt.tkr || "").toUpperCase().trim();
    const yaEnlazada = marcada.find((s2) => s2.id === tgt.assignedTo) || marcada.find((s2) => s2.assignedFrom === putId);
    if (yaEnlazada) return marcada;
    const existente = marcada.find((s2) => natOf(s2) === "ACC" && !s2.closed
      && (s2.tkr || "").toUpperCase().trim() === key
      && (!tgt.broker || !s2.broker || s2.broker === tgt.broker));
    if (existente) return marcada.map((p) => (p.id === putId ? { ...p, assignedTo: existente.id } : p));
    const id2 = newId();
    return [...marcada.map((p) => (p.id === putId ? { ...p, assignedTo: id2 } : p)), {
      id: id2, block: 1, broker: tgt.broker, tkr: tgt.tkr, tipo: "Long Stock", nat: "ACC",
      strike: "", right: "P", expiry: "", qty: String(shares), bep: String(effBep(tgt)), prima: "",
      comision: "", ivr: "", last: "", mktValue: "", riesgo: "", factor: "1", margen: "",
      margenPct: "100", margenModo: "PCT", mktModo: "AUTO", pnlModo: "AUTO", pnl: "",
      entryDate: fecha, rollChain: [], closed: false, closeDate: "", closePrice: "",
      closeComision: "", closeNote: "", assignedFrom: putId,
      entryNote: "Asignada desde put " + (tgt.tkr || "") + " · coste base = BEP $" + money2(effBep(tgt)),
    }];
  });
  /* v1.33: borrar una acción duplicada creada por el botón «Asignar» de v1.32 cuando la posición real
     ya existía en cartera. Reengancha la put a la acción buena antes de borrar la duplicada. */
  const dropDuplicateStock = (stockId) => setPositions((ps) => {
    const dup = ps.find((p) => p.id === stockId);
    if (!dup || natOf(dup) !== "ACC") return ps;
    const key = (dup.tkr || "").toUpperCase().trim();
    const buena = ps.find((s2) => s2.id !== stockId && natOf(s2) === "ACC" && !s2.closed
      && (s2.tkr || "").toUpperCase().trim() === key && !s2.assignedFrom);
    return ps.filter((p) => p.id !== stockId).map((p) => {
      const apunta = p.assignedTo === stockId || (!!dup.assignedFrom && p.id === dup.assignedFrom);
      if (!apunta) return p;
      if (buena) return { ...p, assignedTo: buena.id };
      const { assignedTo, ...rest } = p;
      return rest;
    });
  });
  /* v1.31: reparar una covered call ya marcada como ejercida cuya acción sigue abierta (histórico anterior
     al automatismo). Vende las acciones al strike de la call, con su fecha de cierre. */
  const fixCalledAway = (ccId) => setPositions((ps) => {
    const cc = ps.find((p) => p.id === ccId);
    if (!cc) return ps;
    const linked = cc.onStock ? ps.find((s2) => s2.id === cc.onStock && !s2.closed) : null;
    const cands = ps.filter((s2) => natOf(s2) === "ACC" && !s2.closed && (s2.tkr || "").toUpperCase().trim() === (cc.tkr || "").toUpperCase().trim());
    const target = linked || (cands.length === 1 ? cands[0] : null);
    if (!target || n(cc.strike) <= 0) return ps;
    return sellSharesFrom(ps, target.id, n(cc.qty), n(cc.strike), cc.closeDate || new Date().toISOString().slice(0, 10));
  });
  /* v1.30: enlazar una covered call con la acción sobre la que está escrita (onStock). A diferencia de
     la put asignada, la prima de la CC NO entra en el coste base de la acción, así que aquí sí SE SUMA.
     stockId vacío = desenlazar. */
  const linkCoveredCall = (ccId, stockId) => setPositions((ps) => ps.map((p) => {
    if (p.id !== ccId) return p;
    if (!stockId) { const { onStock, ...rest } = p; return rest; }
    return { ...p, onStock: stockId };
  }));
  const linkAssigned = (optId, stockId) => setPositions((ps) => ps.map((p) => {
    if (p.id !== optId) return p;
    if (!stockId) { const { assignedTo, ...rest } = p; return rest; }
    return { ...p, assignedTo: stockId };
  }));
  const clearAll = () => {
    if (!confirmClear) { setConfirmClear(true); setTimeout(() => setConfirmClear(false), 3000); return; }
    setPositions([]); setEditSet(new Set()); setConfirmClear(false);
    setAccounts((a) => { const next = {}; Object.keys(a).forEach((b) => { next[b] = emptyAcc(); }); return next; });
  };


  const selectTab = (id) => {
    if (id === activeTab) { setEditSet(new Set()); return; } // re-tap del bloque activo → cierra todas las ediciones abiertas
    setActiveTab(id); setSelectedSlice(null);
    if (id === "exposicion" && chartScope === "Bloque") setChartScope("NLV");
  };
  const setScopeAndReset = (s) => { setChartScope(s); setSelectedSlice(null); };

  /* ---------- swipe lateral entre pestañas de bloques (animado) ----------
     El contenido sigue el dedo en horizontal; al soltar pasado el umbral, sale deslizando hacia un lado
     y la pestaña nueva entra desde el contrario. Si no llega al umbral, vuelve a su sitio con muelle.
     Reglas para no molestar:
     - solo engancha con un gesto claramente horizontal; el scroll vertical y el pull-to-refresh siguen igual
     - se ignora si el toque empezó dentro de un elemento con scroll horizontal propio (fila de tabs,
       tabla de rolls…), para que esos sigan scrolleando normal
     - si el arrastre va hacia un extremo sin pestaña siguiente/anterior, se amortigua (efecto tope)
     - los paneles que cortan la propagación táctil (edición, hojas de roll/cierre) no lo disparan */
  const swipeRef = useRef({ x: 0, y: 0, active: false, engaged: false, dir: 0 });
  const [slideX, setSlideX] = useState(0);      // desplazamiento actual del contenido (px)
  const [slideAnim, setSlideAnim] = useState(false); // true → con transición CSS
  const slideTimerRef = useRef(null);
  const tabsRowRef = useRef(null);
  const swipeElRef = useRef(null); // nodo del panel deslizable: aquí se enganchan los listeners nativos no-pasivos
  /* al cambiar de bloque (tap o swipe), la fila de tabs se desplaza para centrar la pestaña activa —
     la barra "sigue" al deslizamiento entre bloques. El scroll se calcula a mano y se aplica SOLO sobre
     la fila (nada de scrollIntoView, que desplazaba también la página entera). Como el usuario puede
     mover la fila con el dedo de forma independiente, esto solo actúa en el momento del cambio de pestaña. */
  useEffect(() => {
    const row = tabsRowRef.current;
    if (!row) return;
    const btn = row.querySelector(`[data-tabid="${String(activeTab)}"]`);
    if (!btn) return;
    const target = Math.max(0, Math.min(btn.offsetLeft - (row.clientWidth - btn.offsetWidth) / 2, row.scrollWidth - row.clientWidth));
    try { row.scrollTo({ left: target, behavior: "smooth" }); } catch (_) { row.scrollLeft = target; }
  }, [activeTab]);
  const tabIds = TABS.map((t) => t.id);
  const nextTabId = (dir) => {
    const idx = tabIds.indexOf(activeTab);
    if (idx < 0) return null;
    const next = idx + dir;
    return next >= 0 && next < tabIds.length ? tabIds[next] : null;
  };
  const hasHScrollAncestor = (el, stopAt) => {
    let node = el;
    while (node && node !== stopAt && node.nodeType === 1) {
      try {
        const st = window.getComputedStyle(node);
        if ((st.overflowX === "auto" || st.overflowX === "scroll") && node.scrollWidth > node.clientWidth + 2) return true;
      } catch (_) {}

       la raíz), así que hay que ceder explícitamente. Pero solo hacia la izquierda (única dirección de
       eliminar): hacia la derecha el swipe de pestañas sigue funcionando aunque empiece sobre una fila.
       EXCEPCIÓN: si la fila está ABIERTA (botón Eliminar visible), se cede en AMBAS direcciones — el
       deslizamiento a la derecha ahí significa "cancelar el eliminar", no "cambiar de bloque". */
    if (e.target && e.target.closest && e.target.closest('[data-swipeopen]')) { swipeRef.current.active = false; return; }

       página podía desplazarse por su cuenta a la vez que el panel se movía por transform, dando la
       sensación de que "todo" se movía en vez de solo el contenido del bloque */
    try { e.preventDefault(); } catch (_) {}

  const isBlockTab = typeof activeTab === "number";

  /* agrega posiciones del mismo ticker (una posición en acción + opción cuenta como UNA sola porción) */
  const aggregateByTicker = (pool, getValue) => {
    const map = {};
    pool.forEach((p) => {

      if (!map[p.tkr]) map[p.tkr] = 0;
      map[p.tkr] += v;

    if (chartScope === "Bloque") { denom = blockTotals[activeTab] || 0; denomLabel = "del " + (blk ? blk.name : ""); }
    else if (chartScope === "MKT VL") { denom = mktvlInv; denomLabel = "MKT VL (invertido)"; }
    else if (chartScope === "NLV") { denom = nlv; denomLabel = "NLV"; }
    else { denom = margin; denomLabel = "del margen usado"; getValue = effMargen; }
    const agg = aggregateByTicker(pool, getValue);
    const poolTotal = agg.reduce((s, x) => s + x.value, 0);
    const slices = agg.map((x, i) => ({ ...x, color: PALETTE[i % PALETTE.length], pctAbs: denom ? x.value / denom : NaN }));
    return { slices, total: poolTotal, denomPct: denom ? poolTotal / denom : NaN, denomLabel };

  const scopeOptions = isBlockTab ? ["Bloque", "MKT VL", "NLV", "Margen"] : ["MKT VL", "NLV", "Margen"];

  const exposureRows = useMemo(() => {
    const map = {};
    active.forEach((p) => {
      if (!p.tkr) return;
      if (!map[p.tkr]) map[p.tkr] = { tkr: p.tkr, riesgo: 0, plausible: 0, margen: 0, pnl: 0, pnlBasis: 0, last: 0, byBlock: {}, items: [] };
      map[p.tkr].riesgo += capDesplegado(p);
      map[p.tkr].plausible += plausibleOf(p);
      map[p.tkr].margen += effMargen(p);
      map[p.tkr].pnl += effPnl(p);
      map[p.tkr].pnlBasis += Math.abs(effBep(p) * n(p.qty)) || Math.abs(n(p.mktValue)) || capDesplegado(p);
      if (n(p.last) > 0 && (natOf(p) === "ACC" || !map[p.tkr].last)) map[p.tkr].last = n(p.last);
      map[p.tkr].byBlock[p.block] = (map[p.tkr].byBlock[p.block] || 0) + capDesplegado(p);

    });
    return Object.values(map).filter((r) => r.riesgo > 0).sort((a, b) => b.riesgo - a.riesgo).map((r) => {
      /* filas de detalle: agrupa por bloque + (acciones: solo bloque) / (opción: bloque+right+strike+expiry) —
         así "2 put" con el mismo strike/vencimiento en el mismo bloque se funden en una fila con BEP ponderado */
      const groups = {};
      r.items.forEach((p) => {
        const isOpt = isOptionNat(p);
        const key = p.block + "|" + (isOpt ? (p.right || "") + "|" + (p.strike || "") + "|" + (p.expiry || "") : "ACC");
        if (!groups[key]) groups[key] = { block: p.block, isOpt, right: p.right, strike: p.strike, expiry: p.expiry, qty: 0, bepW: 0, riesgo: 0 };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          block: g.block,
          isOpt: g.isOpt,
          qtyNum: g.isOpt ? (Number.isInteger(contratos) ? contratos : g.qty) : g.qty,
          qtyUnit: g.isOpt ? (Number.isInteger(contratos) ? "contr." : "opc") : "acc",
          desc: g.isOpt ? optionDetail({ strike: g.strike, expiry: g.expiry, right: g.right }) : "",
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo,
        };
      }).sort((a, b) => a.block - b.block || (a.isOpt === b.isOpt ? 0 : a.isOpt ? 1 : -1));
      return {
        ...r,
        pctMktvl: mktvlInv ? r.riesgo / mktvlInv : NaN,
        pctNlv: nlv ? r.riesgo / nlv : NaN,
        pctMargen: margin ? r.margen / margin : NaN,
        pnlPct: r.pnlBasis ? r.pnl / r.pnlBasis : NaN,
        blockChips: Object.entries(r.byBlock).map(([bid, val]) => {
          const b = BLOCKS.find((x) => x.id === Number(bid));
          return { id: bid, name: b.name.replace("Bloque ", "B"), color: b.color, bg: b.bg, value: r.riesgo ? val / r.riesgo : NaN };
        }),
        detailRows,
      };
    });
  }, [active, mktvlInv, nlv, margin, isDark]);

  /* mapa id-de-acción → lista de covered call(s) abiertas que la cubren (ordenadas por vencimiento):
     alimenta el banner "COVERED" en la fila de la acción en B1, una línea por call. Usa el enlace
     explícito coveredBy si existe; si no, el heurístico broker+ticker (covered calls antiguas sin enlace). */
  const coveredMap = useMemo(() => {
    const m = {};
    positions.forEach((cc) => {
      if (cc.closed) return;
      const isCC = natOf(cc) === "CRED" && cc.right === "C" && cc.covered;
      const isCollar = natOf(cc) === "COLLAR" && cc.coveredBy; /* collar solo si está vinculado explícitamente */
      if (!isCC && !isCollar) return;
      const cts = n(cc.qty) / 100;
      const ctsStr = cts ? (Number.isInteger(cts) ? cts : cts.toFixed(1)) + (cts === 1 ? " contrato" : " contratos") : "";
      const det = isCC ? strikeStr(cc.strike) + "C" : (n(cc.strike) ? strikeStr(cc.strike) + (cc.right || "") : "");
      const label = [det, cc.expiry ? ibkrDate(cc.expiry) : "", ctsStr].filter(Boolean).join(" · ") || (isCollar ? "activo" : "");
      const k = (cc.tkr || "").trim().toUpperCase();
      const ids = cc.coveredBy
        ? [cc.coveredBy]
        : positions.filter((s) => natOf(s) === "ACC" && !s.closed && s.broker === cc.broker && (s.tkr || "").trim().toUpperCase() === k).map((s) => s.id);
      ids.forEach((id) => { (m[id] = m[id] || []).push({ label, kind: isCollar ? "collar" : "cc", expiry: cc.expiry || "9999-12-31" }); });
    });
    Object.keys(m).forEach((id) => { m[id] = m[id].sort((a, b) => (a.expiry < b.expiry ? -1 : 1)).map((x) => ({ label: x.label, kind: x.kind })); });
    return m;
  }, [positions]);

  /* v1.31: nº de avisos pendientes → chapa roja en el icono de Vencimientos del menú.
     Mismo criterio que AvisosCard, en versión contador (no hace falta el detalle para pintar la chapa). */
  const avisosCount = useMemo(() => {
    const hoy = new Date().toISOString().slice(0, 10);
    const opts = filtered.filter((p) => natOf(p) === "CRED" && !isPMCC(p));
    let k = 0;
    filtered.filter((p) => natOf(p) === "ACC" && !p.closed && p.assignedFrom).forEach((dup) => {
      const key = (dup.tkr || "").toUpperCase().trim();
      if (filtered.some((s2) => s2.id !== dup.id && natOf(s2) === "ACC" && !s2.closed && (s2.tkr || "").toUpperCase().trim() === key && !s2.assignedFrom)) k++;
    });
    opts.forEach((p) => {
      if (!p.closed && p.expiry && p.expiry < hoy) k++;                                   // vencida sin cerrar
      else if (!p.closed && p.right === "C" && n(p.last) && n(p.strike) && n(p.last) > n(p.strike)) k++;  // CC ITM
      else if (p.closed && p.exercised && p.right === "C"
        && filtered.some((s2) => natOf(s2) === "ACC" && !s2.closed && (s2.tkr || "").toUpperCase().trim() === (p.tkr || "").toUpperCase().trim())) k++; // called away sin registrar
      else if (p.closed && p.exercised && p.right === "P" && !filtered.some((s2) => (s2.tkr || "").toUpperCase().trim() === (p.tkr || "").toUpperCase().trim() && n(s2.last))) k++; // asignada sin cotización
    });
    return k;
  }, [filtered]);
  const vencimientosRows = useMemo(() => {
    const map = {};
    active.forEach((p) => {
      if (!isOptionNat(p) || !p.expiry) return;
      if (!map[p.expiry]) map[p.expiry] = { expiry: p.expiry, riesgo: 0, items: [] };
      map[p.expiry].riesgo += capDesplegado(p);
      map[p.expiry].items.push(p);
    });
    const today = new Date(); today.setHours(0, 0, 0, 0);
    return Object.values(map).sort((a, b) => (a.expiry < b.expiry ? -1 : 1)).map((r) => {
      /* dentro de cada fecha, agrupa por subyacente + bloque + strike/right — así "2 put" iguales
         en el mismo bloque se funden en una fila con BEP ponderado, igual que en Exposición */
      const groups = {};
      r.items.forEach((p) => {
        /* credit spreads y DC/DD (v5.10): no tienen un strike único — la etiqueta son sus spreads/strikes,
           que también entran en la clave para no fundir estructuras distintas en la misma fila */
        const cs = isCreditSpread(p);
        const dc = isDCDD(p);
        const spreads = cs ? [p.putSpread, p.callSpread].filter(Boolean).join(" · ") : "";
        const dcStk = dc ? [dcStrikePut(dcddOf(p)) ? "P " + dcStrikePut(dcddOf(p)) : "", dcStrikeCall(dcddOf(p)) ? "C " + dcStrikeCall(dcddOf(p)) : ""].filter(Boolean).join(" · ") : "";
        const key = p.tkr + "|" + p.block + "|" + (p.right || "") + "|" + (p.strike || "") + "|" + (p.tipo || "") + "|" + spreads + "|" + dcStk;
        if (!groups[key]) groups[key] = { tkr: p.tkr, block: p.block, right: p.right, strike: p.strike, tipo: p.tipo, spreads, dcStk, qty: 0, bepW: 0, riesgo: 0, last: "", covered: false };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
        if (!groups[key].last && p.last) groups[key].last = p.last;
        if (p.covered) groups[key].covered = true;
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          tkr: g.tkr, block: g.block, right: g.right, strike: g.strike,
          tipo: g.tipo, spreads: g.spreads, dcStk: g.dcStk,
          qtyNum: Number.isInteger(contratos) ? contratos : g.qty,
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo, last: g.last, covered: g.covered,
        };
      }).sort((a, b) => b.riesgo - a.riesgo);
      const dte = Math.round((new Date(r.expiry + "T00:00:00") - today) / 86400000);
      return { ...r, detailRows, dte };
    });
  }, [active]);

  /* ---------- exportar cartera completa (ignora filtro de broker) para pegar y pedir feedback ---------- */
  const [exportOpen, setExportOpen] = useState(false);
  const [exportText, setExportText] = useState("");
  const [exportCopied, setExportCopied] = useState(false);

  const buildExportText = () => {
    /* v1.15: SOLO abiertas — las cerradas conservan qty/BEP/último y estaban inflando riesgo,
       MKT VL y exposición del export. La foto de cartera es de lo vivo; el histórico cerrado
       se exporta desde Histórico → Cerradas → "Exportar para análisis". */
    const openPos = positions.filter((p) => !p.closed);
    const invAll = openPos.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = openPos.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const mktvlAll = invAll + posCashAll; /* MKT VL total = invertido + posiciones Cash B0 (v5.61) */
    const manualCashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0);
    const cashAll = manualCashAll + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    const nlvAll = mktvlAll + Math.min(manualCashAll, 0);
    const elAll = nlvAll - marginAll;
    const blockTotalsAll = {};
    BLOCKS.forEach((b) => { blockTotalsAll[b.id] = openPos.filter((p) => p.block === b.id).reduce((s, p) => s + capDesplegado(p), 0); });

    const lines = [];
    lines.push(`CARTERA — ${new Date().toLocaleDateString("es-ES")}`);
    lines.push("");
    lines.push("CUENTA (IBKR + DEGIRO)");
    lines.push(`MKT VL: $${money(mktvlAll)}`);
    lines.push(`NLV: $${money(nlvAll)}`);
    lines.push(`Cash: $${money(cashAll)}`);
    lines.push(`Margin: $${money(marginAll)}`);
    lines.push(`Excess Liquidity: $${money(elAll)}`);
    lines.push(`EL/NLV: ${pct(nlvAll ? elAll / nlvAll : NaN)}`);
    lines.push(`EL/Margin: ${pct(marginAll ? elAll / marginAll : NaN)}`);
    lines.push(`Apalancamiento Invertido/NLV: ${nlvAll ? (invAll / nlvAll).toFixed(2) : "—"}x`);
    lines.push("");

    BLOCKS.forEach((b) => {
      const bp = openPos.filter((p) => p.block === b.id);
      const capTotal = bp.reduce((s, p) => s + capDesplegado(p), 0);
      const plausible = bp.reduce((s, p) => s + plausibleOf(p), 0);
      const pnl = bp.reduce((s, p) => s + effPnl(p), 0);
      lines.push(`${b.name} · ${b.tag} (objetivo ${pct(b.tMin, 0)}–${pct(b.tMax, 0)} NLV)`);
      lines.push(`  Riesgo total $${money(capTotal)} (${pct(nlvAll ? capTotal / nlvAll : NaN)} NLV) · Plausible $${money(plausible)} (${pct(nlvAll ? plausible / nlvAll : NaN)}) · P&L ${signMoney(pnl)}`);
      bp.forEach((p) => {
        const det = optionDetail(p);
        const natL = (NATS.find((x) => x.id === natOf(p)) || {}).label || natOf(p);
        lines.push(`  - ${p.tkr} [${p.broker}] ${natL}${p.tipo ? "/" + p.tipo : ""}${det ? " (" + det + ")" : ""} · Riesgo $${money2(capDesplegado(p))} · Plausible $${money2(plausibleOf(p))} · Margen $${money2(effMargen(p))}${isPctMargin(p) ? " (" + (p.margenPct || 0) + "%)" : ""} · BEP $${money2(effBep(p))} · Último ${p.last ? "$" + money2(p.last) : "—"} · P&L ${signMoney(effPnl(p))}${isAutoPnl(p) ? " (auto)" : ""}`);
      });
      lines.push("");
    });

    lines.push("EXPOSICIÓN POR SUBYACENTE (todas las posiciones agregadas por ticker)");
    const expMap = {};
    openPos.forEach((p) => {
      if (!p.tkr) return;
      if (!expMap[p.tkr]) expMap[p.tkr] = { riesgo: 0, margen: 0 };
      expMap[p.tkr].riesgo += capDesplegado(p);
      expMap[p.tkr].margen += effMargen(p);
    });
    Object.entries(expMap).sort((a, b) => b[1].riesgo - a[1].riesgo).forEach(([tkr, v]) => {
      lines.push(`  ${tkr}: $${money(v.riesgo)} riesgo total · MKT VL ${pct(invAll ? v.riesgo / invAll : NaN)} · NLV ${pct(nlvAll ? v.riesgo / nlvAll : NaN)} · Margen ${pct(marginAll ? v.margen / marginAll : NaN)}`);
    });
    lines.push("");

    const totalRiesgoAll = openPos.filter((p) => p.block !== 0).reduce((s, p) => s + capDesplegado(p), 0);
    const totalPnlAll = openPos.reduce((s, p) => s + effPnl(p), 0);
    lines.push(`TOTAL RIESGO (sin B0): $${money(totalRiesgoAll)} · P&L TOTAL: ${signMoney(totalPnlAll)}`);
    return lines.join("\n");
  };
  const openExport = () => { setExportText(buildExportText()); setExportCopied(false); setExportOpen(true); };
  const copyExport = async () => {
    try { await navigator.clipboard.writeText(exportText); setExportCopied(true); }
    catch (e) { try { const el = document.getElementById("export-ta"); if (el) { el.focus(); el.select(); document.execCommand("copy"); setExportCopied(true); } } catch (e2) {} }
    setTimeout(() => setExportCopied(false), 2500);
  };

  /* ---------- snapshots de rendimiento: siempre sobre la cartera completa, no el filtro actual ---------- */
  const buildSnapshot = (posArg) => {
    /* v1.15: SOLO abiertas — mismo arreglo que buildExportText: las cerradas conservan qty/último
       y contaminaban MKT VL, NLV, riesgo y P&L de los snapshots de Rendimiento. */
    const pos = (posArg || positions).filter((p) => !p.closed);
    const invAll = pos.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = pos.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const mktvlAll = invAll + posCashAll; /* v5.61: MKT VL total incluye posiciones Cash B0 */
    const manualCashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0);
    const cashAll = manualCashAll + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    /* NLV: MKT VL total + solo el cash manual negativo (débito de margen). Mismo número que antes. */
    const nlvAll = mktvlAll + Math.min(manualCashAll, 0);
    const elAll = nlvAll - marginAll;
    const blocks = {};
    BLOCKS.forEach((b) => {
      const bp = pos.filter((p) => p.block === b.id);
      blocks[b.id] = { riesgo: bp.reduce((s, p) => s + capDesplegado(p), 0), plausible: bp.reduce((s, p) => s + plausibleOf(p), 0), pnl: bp.reduce((s, p) => s + effPnl(p), 0) };
    });
    const tickers = {};
    pos.forEach((p) => {
      if (!p.tkr) return;
      if (!tickers[p.tkr]) tickers[p.tkr] = { riesgo: 0, pnl: 0 };
      tickers[p.tkr].riesgo += capDesplegado(p);
      tickers[p.tkr].pnl += effPnl(p);
    });
    return {
      date: new Date().toISOString().slice(0, 10),
      mktvl: mktvlAll, cash: cashAll, margin: marginAll, nlv: nlvAll, el: elAll,
      elNlv: nlvAll ? elAll / nlvAll : NaN, elMrgn: marginAll ? elAll / marginAll : NaN,
      leverage: nlvAll ? invAll / nlvAll : NaN,
      totalRiesgo: pos.filter((p) => p.block !== 0).reduce((s, p) => s + capDesplegado(p), 0),
      totalPlausible: pos.filter((p) => p.block !== 0).reduce((s, p) => s + plausibleOf(p), 0),
      totalPnl: pos.reduce((s, p) => s + effPnl(p), 0),
      blocks, tickers,
    };
  };
  const saveSnapshot = () => {
    const snap = buildSnapshot();
    setSnapshots((ss) => [...ss.filter((s) => s.date !== snap.date), snap]);
  };
  const deleteSnapshot = (date) => setSnapshots((ss) => ss.filter((s) => s.date !== date));

  const addBroker = () => {
    const name = newBrokerName.trim().toUpperCase();
    if (!name || brokers.includes(name)) { setNewBrokerName(""); return; }
    setBrokers((bs) => [...bs, name]);
    setAccounts((a) => ({ ...a, [name]: emptyAcc() }));
    setNewBrokerName("");
  };
  const removeBroker = (name) => {
    if (brokers.length <= 1) return;
    const count = positions.filter((p) => p.broker === name).length;
    const dest = removeTarget[name] || brokers.find((b) => b !== name);
    if (count > 0 && dest) setPositions((ps) => ps.map((p) => (p.broker === name ? { ...p, broker: dest } : p)));
    setBrokers((bs) => bs.filter((b) => b !== name));
    setAccounts((a) => { const next = { ...a }; delete next[name]; return next; });
    setRemoveTarget((rt) => { const next = { ...rt }; delete next[name]; return next; });
    if (broker === name) setBroker("Todos");
  };

  /* bloqueo de scroll de fondo (v5.11): mientras haya CUALQUIER hoja o modal abierto, el contenedor de
     scroll de la app se congela — así solo se mueve el panel abierto y no la pantalla de detrás. El editor
     en línea (editSet) NO cuenta: se expande dentro de la lista y necesita que la lista siga scrolleando. */
  const anyOverlayOpen = wizOpen || !!sheetPosId || !!pendingAction || keyModalOpen || geminiModalOpen || brokerModalOpen || exportOpen || backupOpen || refreshChoiceOpen || !!info;

  return (
    <>
    {/* CONTENEDOR DE SCROLL: la app scrollea DENTRO de este div (height fija = viewport), no en el body.
       Así el rebote de iOS al llegar arriba/abajo ocurre dentro del contenedor y NO arrastra el menú
       inferior, que vive fuera de este scroll (fijo al viewport). Es la única forma fiable en iOS de que
       una barra "position:fixed" no bote junto con la página. */}
    <div ref={rootRef} className="no-scrollbar" style={{ height: "100dvh", overflowY: anyOverlayOpen ? "hidden" : "auto", overscrollBehavior: "contain", background: T.bg, fontFamily: T.sans, color: T.ink, padding: "calc(18px + env(safe-area-inset-top)) 14px calc(108px + env(safe-area-inset-bottom))", overflowX: "hidden" }}>{/* sin -webkit-overflow-scrolling:touch: en iOS crea un stacking context que dejaba el nav por encima de los modales; el scroll con inercia ya es nativo desde iOS 13. overflowY:hidden mientras CUALQUIER hoja/modal está abierto (v5.11) = la pantalla de atrás no se mueve al scrollear el que está abierto */}
      <style>{`
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;}
        input[type=date]::-webkit-date-and-time-value{text-align:left;}
        .no-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
        .no-scrollbar::-webkit-scrollbar{display:none;width:0;height:0;}
        button{-webkit-appearance:none;appearance:none;}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        @keyframes pullSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      `}</style>
      {/* indicador global de descarga de precios (v5.07): píldora pequeña fija en la esquina superior
         derecha — antes iba centrada y tapaba el título "Portfolio". Ahora vive en el hueco vacío a la
         derecha del título, más pequeña y translúcida. Visible en cualquier pestaña mientras refreshing —
         cubre la descarga automática del arranque, el pull y el botón. */}
      {(refreshing || refreshOk) && (
        <div style={{ position: "fixed", top: "calc(20px + env(safe-area-inset-top))", right: 14, zIndex: 60, pointerEvents: "none" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(28,26,32,0.55)", backdropFilter: "blur(18px) saturate(160%)", WebkitBackdropFilter: "blur(18px) saturate(160%)", borderRadius: 16, padding: "5px 10px", boxShadow: "0 6px 18px rgba(0,0,0,0.22)", border: "0.5px solid rgba(255,255,255,0.08)" }}>
            {refreshing ? (
              <span style={{ fontSize: 11, display: "inline-block", animation: "pullSpin 0.8s linear infinite" }}>🔄</span>
            ) : (
              <span style={{ width: 8, height: 8, borderRadius: 4, background: "#34C759", display: "inline-block", boxShadow: "0 0 6px rgba(52,199,89,0.7)" }} />
            )}
            <span style={{ fontSize: 10.5, fontWeight: 700, color: "#fff" }}>{refreshing ? "Actualizando…" : "Actualizado"}</span>
          </div>
        </div>
      )}
      {(view === "bloques" || view === "vencimientos") && pullDist > 0 && !refreshing && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: pullDist, overflow: "hidden", marginBottom: 4 }}>
          <span style={{ fontSize: 20, display: "inline-block", animation: pullDist >= PULL_THRESHOLD ? "pullSpin 0.8s linear infinite" : "none", opacity: Math.min(pullDist / PULL_THRESHOLD, 1) }}>🔄</span>
          <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, marginLeft: 8 }}>{pullDist >= PULL_THRESHOLD ? "Suelta para actualizar" : "Tira para actualizar precios"}</span>
        </div>
      )}
      <div style={{ maxWidth: 720, margin: "0 auto" }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, gap: 8 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.8 }}>{view === "bloques" ? "Portfolio" : view === "movimientos" ? "Movimientos" : view === "vencimientos" ? "Vencimientos" : view === "ajustes" ? "Ajustes" : "Herramientas"}</div>
            <div style={{ fontSize: 15, color: T.sub, fontWeight: 500 }}>{view === "bloques" ? "Composición de cartera en tiempo real" : view === "movimientos" ? "Primas y resultado realizado (MTM)" : view === "vencimientos" ? "Opciones por fecha y riesgo de asignación" : view === "ajustes" ? "Brokers, backup, claves y apariencia" : "Comparador de puts y análisis de earnings"}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexWrap: "wrap", justifyContent: "flex-end" }}>
          </div>
        </div>

        {updateNotice && (
          <div style={{ background: T.tileGreen, borderRadius: 14, padding: "10px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 12.5, color: T.ink, fontWeight: 700, lineHeight: 1.45 }}>App actualizada a v{updateNotice.to} (antes {updateNotice.from}). Se guardó una copia automática de tus datos por seguridad{updateNotice.count != null ? " (" + updateNotice.count + " posiciones)" : ""}.</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, lineHeight: 1.45, marginTop: 3 }}>Si tras la actualización algo no cuadra o faltan datos, restaura la copia desde Backup → Copias automáticas.</div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={() => { setUpdateNotice(null); openBackup(); }} style={{ background: T.dark, border: "none", borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Ver copias</button>
              <button onClick={() => setUpdateNotice(null)} style={{ background: "transparent", border: "none", borderRadius: 10, padding: "7px 10px", fontSize: 12, fontWeight: 700, color: T.sub, cursor: "pointer" }}>Todo OK</button>
            </div>
          </div>
        )}
        {refreshMsg && <div style={{ fontSize: 12, color: T.red, fontWeight: 700, marginBottom: 12, background: T.tileRed, borderRadius: 12, padding: "8px 12px", lineHeight: 1.4 }}>{refreshMsg}</div>}

        {/* SELECTOR BROKER — oculto también en Vencimientos: esa vista no muestra nada del estado de cuenta.
           Chips sueltos al estilo del resto del rediseño (como el selector de Distribución y las pestañas de
           bloques): fondo claro, activo en tinta oscura — fuera la barra negra maciza de antes. */}
        {view !== "movimientos" && view !== "ajustes" && view !== "vencimientos" && (
        <div className="no-scrollbar" style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto" }}>
          {(brokers.length > 1 ? ["Todos", ...brokers] : brokers).map((b) => (
            <button key={b} onClick={() => setBroker(b)} style={{
              flex: "1 0 auto", border: "none", cursor: "pointer", borderRadius: 20, padding: "10px 18px", fontSize: 13.5, fontWeight: 700, whiteSpace: "nowrap",
              background: broker === b ? T.dark : T.card, color: broker === b ? "#fff" : T.ink,
              boxShadow: broker === b ? "0 4px 14px rgba(24,22,26,0.25)" : "0 1px 4px rgba(24,22,26,0.06)",
              transition: "background 0.15s, color 0.15s, box-shadow 0.15s",
            }}>{b}</button>
          ))}
        </div>
        )}

        {/* CUENTA — oculto en Vencimientos: esa pestaña prioriza la lista de expiraciones, no el estado de cuenta */}
        {view !== "movimientos" && view !== "ajustes" && view !== "vencimientos" && (
        <div style={{ background: T.card, borderRadius: 24, padding: 16, marginBottom: 16, boxShadow: T.shadow }}>
