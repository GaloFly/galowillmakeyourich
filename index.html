                        <button onClick={() => removeBroker(b)} style={{ flexShrink: 0, background: T.tileRed, border: "none", borderRadius: 11, padding: "9px 13px", fontSize: 13, fontWeight: 800, color: T.red, cursor: "pointer" }}>Quitar</button>
                      ) : (
                        <span style={{ fontSize: 11, color: T.sub, fontWeight: 600 }}>único broker</span>
                      )}
                    </div>
                    {count > 0 && brokers.length > 1 && (
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 9 }}>
                        <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>Mover a</span>
                        <div style={{ flex: 1, position: "relative" }}>
                          <select value={dest} onChange={(e) => setRemoveTarget((rt) => ({ ...rt, [b]: e.target.value }))}
                            style={{ width: "100%", boxSizing: "border-box", background: T.card, border: "none", borderRadius: 10, color: T.ink, fontSize: 13.5, fontWeight: 700, padding: "9px 28px 9px 10px", outline: "none", appearance: "none", WebkitAppearance: "none" }}>
                            {others.map((o) => <option key={o} value={o}>{o}</option>)}
                          </select>
                          <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", color: T.sub, fontSize: 12, pointerEvents: "none" }}>▾</span>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{ fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.4 }}>Añadir broker</div>
            <div style={{ display: "flex", gap: 8 }}>
              <input type="text" value={newBrokerName} onChange={(e) => setNewBrokerName(e.target.value)} placeholder="Ej. TASTYTRADE"
                onKeyDown={(e) => { if (e.key === "Enter") addBroker(); }}
                style={{ flex: 1, minWidth: 0, boxSizing: "border-box", background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 12, padding: "11px 12px", fontSize: 14, fontWeight: 700, color: T.ink, outline: "none", textTransform: "uppercase" }} />
              <button onClick={addBroker} disabled={!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())} style={{ WebkitAppearance: "none", appearance: "none", flexShrink: 0, background: (!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())) ? T.tile : T.green, border: "none", borderRadius: 12, padding: "0 18px", fontSize: 14, fontWeight: 800, color: (!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())) ? T.sub : "#fff", cursor: "pointer" }}>Añadir</button>
            </div>
            {newBrokerName.trim() && brokers.includes(newBrokerName.trim().toUpperCase()) && <div style={{ fontSize: 11.5, color: T.red, fontWeight: 700, marginTop: 6 }}>Ese broker ya existe.</div>}

            <div style={{ textAlign: "center", marginTop: 16 }}>
              <button onClick={() => setBrokerModalOpen(false)} style={{ background: T.dark, border: "none", borderRadius: 14, padding: "12px 28px", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Listo</button>
            </div>
          </div>
        </div>
      )}
      {exportOpen && (
        <div onClick={() => setExportOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, overflowY: "auto" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 24, padding: 22, maxWidth: 460, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "calc(100vh - 36px)", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            <div style={{ fontSize: 21, fontWeight: 800, color: T.ink, marginBottom: 8 }}>Exportar cartera</div>
            <div style={{ fontSize: 14, color: T.sub, lineHeight: 1.5, marginBottom: 14 }}>Copia este texto y pégalo en el chat cuando quieras feedback semanal o mensual. Incluye IBKR + DEGIRO completo, sin importar el filtro actual.</div>
            <textarea id="export-ta" value={exportText} readOnly spellCheck={false} style={{ width: "100%", boxSizing: "border-box", height: 260, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 14, padding: 12, fontSize: 12, fontFamily: "ui-monospace,Menlo,Consolas,monospace", color: T.ink, lineHeight: 1.5, resize: "vertical", outline: "none" }} />
            <div style={{ height: 18, margin: "6px 2px 2px" }}>
              {exportCopied && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Copiado ✓ — pégalo en el chat</span>}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <button onClick={() => setExportOpen(false)} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Cerrar</button>
              <button onClick={copyExport} style={{ flex: 1, background: T.green, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer", boxShadow: "0 4px 12px rgba(27,163,76,0.3)" }}>Copiar</button>
            </div>
          </div>
        </div>
      )}
      {backupOpen && (
        <div onClick={() => setBackupOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, overflowY: "auto" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 24, maxWidth: 460, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "calc(100vh - 36px)", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            <div style={{ position: "sticky", top: 0, background: T.card, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, padding: "18px 20px 10px", borderRadius: "24px 24px 0 0", zIndex: 3 }}>
              <div style={{ fontSize: 21, fontWeight: 800, color: T.ink }}>Backup de datos</div>
              <button onClick={() => setBackupOpen(false)} aria-label="Cerrar" style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
            </div>
            <div style={{ padding: "0 20px 20px" }}>
            {/* v1.17: modal limpio — el camino normal son dos botones (archivo); el copiar/pegar JSON
               queda plegado en "Avanzado". Explicación reducida a una línea bajo los botones. */}
            <input id="backup-file-input" type="file" accept="application/json,.json" onChange={importBackupFile} style={{ display: "none" }} />
            <div style={{ display: "grid", gap: 10 }}>
              <button onClick={downloadBackup} style={{ width: "100%", background: T.dark, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Descargar archivo</button>
              <button onClick={() => { const el = document.getElementById("backup-file-input"); if (el) el.click(); }} style={{ width: "100%", background: T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Importar archivo</button>
            </div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, lineHeight: 1.45, margin: "10px 2px 0" }}>Guarda toda la app: posiciones, brokers, cuentas, snapshots y tus keys. Para cambiar de móvil: descarga aquí, importa en el otro.</div>
            <div style={{ minHeight: 18, margin: "8px 2px 0" }}>
              {copied && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Copiado ✓ — guárdalo en Notas o email</span>}
              {restoreMsg === "ok" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Restaurado ✓</span>}
              {restoreMsg === "err" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>Texto no válido — revisa que sea un backup completo</span>}
              {restoreMsg === "pasted" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Pegado ✓ — pulsa Restaurar para aplicarlo</span>}
              {restoreMsg === "pasteEmpty" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>El portapapeles está vacío</span>}
              {restoreMsg === "pasteErr" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>No se pudo leer el portapapeles — pega manualmente en el cuadro</span>}
              {restoreMsg === "downloaded" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Archivo descargado ✓</span>}
              {restoreMsg === "fileErr" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>No se pudo leer el archivo — usa el modo avanzado (copiar/pegar)</span>}
            </div>
            <button onClick={() => setBackupAdv((v) => !v)} style={{ width: "100%", background: "transparent", border: "none", padding: "8px 0", fontSize: 12, fontWeight: 800, color: T.sub, cursor: "pointer", textAlign: "left" }}>
              {backupAdv ? "▲ Ocultar copiar / pegar JSON" : "▼ Avanzado · copiar / pegar JSON"}
            </button>
            {backupAdv && (
              <>
                <textarea id="backup-ta" value={backupText} onChange={(e) => { setBackupText(e.target.value); setRestoreMsg(""); }} spellCheck={false} style={{ width: "100%", boxSizing: "border-box", height: 170, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 14, padding: 12, fontSize: 12.5, fontFamily: "ui-monospace,Menlo,Consolas,monospace", color: T.ink, lineHeight: 1.5, resize: "vertical", outline: "none" }} />
                <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                  <button onClick={copyBackup} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Copiar</button>
                  <button onClick={pasteBackup} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Pegar</button>
                  <button onClick={restoreBackup} style={{ flex: 1, background: T.green, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: "#fff", cursor: "pointer", boxShadow: "0 4px 12px rgba(27,163,76,0.3)" }}>Restaurar</button>
                </div>
              </>
            )}
            {autoBackups.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Copias automáticas (al detectar una versión nueva)</div>
                <div style={{ display: "grid", gap: 7 }}>
                  {autoBackups.map((bk) => (
                    <div key={bk.ts} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 12, padding: "9px 11px" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>Datos de la v{bk.version}</div>
                        <div style={{ fontSize: 11, color: T.sub, fontWeight: 600 }}>{new Date(bk.ts).toLocaleString("es-ES", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</div>
                      </div>
                      <button onClick={() => restoreAutoBackup(bk)} style={{ flexShrink: 0, background: confirmAutoBk === bk.ts ? T.red : T.card, border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 12, fontWeight: 800, color: confirmAutoBk === bk.ts ? "#fff" : T.ink, cursor: "pointer", boxShadow: T.shadow }}>{confirmAutoBk === bk.ts ? "¿Seguro? Recarga la app" : "Restaurar"}</button>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10.5, color: T.sub, lineHeight: 1.45, marginTop: 7 }}>Restaurar sobrescribe los datos actuales y recarga. Se guardan las 3 últimas.</div>
              </div>
            )}
            {manualBackups.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Copias que has guardado</div>
                <div style={{ display: "grid", gap: 7 }}>
                  {manualBackups.map((bk) => (
                    <div key={bk.ts} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 12, padding: "9px 11px" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{new Date(bk.ts).toLocaleString("es-ES", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</div>
                        <div style={{ fontSize: 11, color: T.sub, fontWeight: 600 }}>Copia JSON guardada · v{bk.appVersion}</div>
                      </div>
                      <button onClick={() => restoreManualBackup(bk)} style={{ flexShrink: 0, background: confirmManualBk === bk.ts ? T.red : T.card, border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 12, fontWeight: 800, color: confirmManualBk === bk.ts ? "#fff" : T.ink, cursor: "pointer", boxShadow: T.shadow }}>{confirmManualBk === bk.ts ? "¿Seguro? Restaurar" : "Restaurar"}</button>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10.5, color: T.sub, lineHeight: 1.45, marginTop: 7 }}>Punto de restauración cada vez que copias o descargas. Se conservan las 3 últimas.</div>
              </div>
            )}
            <div style={{ textAlign: "center", marginTop: 12 }}>
              <button onClick={() => setBackupOpen(false)} style={{ background: "transparent", border: "none", fontSize: 14, fontWeight: 600, color: T.sub, cursor: "pointer" }}>Cerrar</button>
            </div>
            </div>
          </div>
        </div>
      )}

      {/* EDITOR DE APERTURAS / ROLLS / CIERRE */}
      {editChainPos && <RollChainEditor p={editChainPos} onSave={savePositionEdit} onClose={() => setEditChainId(null)} />}

      {/* EDITOR DE LOTES DE ACCIONES/ETF */}
      {editLotsPos && <LotsEditor p={editLotsPos} onSave={savePositionEdit} onClose={() => setEditLotsId(null)} />}

      {/* EDITOR DE DIVIDENDOS */}
      {editDivPos && <DividendsEditor p={editDivPos} onSave={savePositionEdit} onClose={() => setEditDivId(null)} />}

      {/* NAV INFERIOR FLOTANTE */}
      {/* ACTION SHEET DE POSICIÓN */}
      {sheetPos && (() => {
        const p = sheetPos;
        const nat = natOf(p);
        const isOpt = !!(p.strike || p.expiry) && nat !== "ACC" && nat !== "CASH";
        const canRollP = !p.closed && isOpt && nat === "CRED";
        const canCloseP = !p.closed && (nat === "ACC" || nat === "COLLAR" || isOpt);
        const dte = p.expiry ? daysBetween(new Date().toISOString().slice(0, 10), p.expiry) : NaN;
        const contratos = n(p.qty) / 100;
        const blk = BLOCKS.find((b) => b.id === p.block);
        /* v1.25: iconos de línea en cuadrado tintado — misma familia visual que las filas de Ajustes,
           en vez de emojis sueltos. `tint` es el fondo del cuadrado; `color` tiñe icono y título. */
        const ActionBtn = ({ icon, label, sub, color, tint, onClick, danger }) => {
          const c = danger ? T.red : (color || T.ink);
          return (
            <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", background: danger ? T.tileRed : T.tile, border: "none", borderRadius: 14, padding: "13px 14px", cursor: "pointer", textAlign: "left" }}>
              <span style={{ width: 34, height: 34, borderRadius: 10, background: danger ? "rgba(0,0,0,0.06)" : (tint || T.card), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: c }}>
                <ActIcon name={icon} size={18} color={c} />
              </span>
              <span style={{ minWidth: 0 }}>
                <span style={{ display: "block", fontSize: 14.5, fontWeight: 800, color: c }}>{label}</span>
                {sub && <span style={{ display: "block", fontSize: 11, fontWeight: 600, color: T.sub, marginTop: 1 }}>{sub}</span>}
              </span>
            </button>
          );
        };
        return (
          <div onClick={() => setSheetPosId(null)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "86vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 20, fontWeight: 800, color: T.ink }}>{p.tkr || "Sin ticker"}</span>
                    {p.tipo && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 7, padding: "3px 7px" }}>{p.tipo}</span>}
                    {blk && <span style={{ fontSize: 10.5, fontWeight: 800, color: "#fff", background: blk.badge, borderRadius: 7, padding: "3px 7px" }}>B{p.block}</span>}
                    {p.closed && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 7, padding: "3px 7px" }}>Cerrada</span>}
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.sub, marginTop: 4 }}>
                    {p.broker}{isOpt && p.strike ? ` · ${p.strike}${p.right}` : ""}{p.expiry ? ` · vence ${p.expiry}` : ""}{isFinite(dte) && dte >= 0 && !p.closed ? ` (${dte}d)` : ""}
                  </div>
                </div>
                <button onClick={() => setSheetPosId(null)} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>{isOpt ? "Contratos" : "Cantidad"}</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{isOpt ? (Number.isInteger(contratos) ? contratos : contratos.toFixed(1)) : (p.qty || "—")}</div>
                </div>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>BEP</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{isFinite(effBep(p)) && effBep(p) !== 0 ? effBep(p).toFixed(2) : (p.bep || "—")}</div>
                </div>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>{nat === "CRED" ? "Prima acum." : "Riesgo"}</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: nat === "CRED" ? T.green : T.ink, fontVariantNumeric: "tabular-nums" }}>{nat === "CRED" && n(p.prima) ? "+$" + money2(n(p.prima) * n(p.qty)) : "$" + money2(capDesplegado(p))}</div>
                </div>
              </div>
              <div style={{ display: "grid", gap: 8 }}>
                {!p.closed && nat === "ACC" && <ActionBtn icon="lots" label="Lotes" sub="Ver lotes por fecha · editar · vender · añadir" color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("lotes")} />}
                {p.tipo === "Long Stock" && <ActionBtn icon="dividend" label="Dividendos" sub="Registrar cobros · van a Primas y MTM" color={T.green} tint={T.tileGreen} onClick={() => sheetDo("dividendos")} />}
                {!p.closed && <ActionBtn icon="edit" label="Editar" sub="Modificar cualquier campo de la posición" onClick={() => sheetDo("edit")} />}
                {canRollP && <ActionBtn icon="roll" label="Rolar" sub={"Recompra + nueva venta · " + (p.rollChain || []).length + " roll" + ((p.rollChain || []).length === 1 ? "" : "s") + " hasta ahora"} color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("roll")} />}
                {canCloseP && <ActionBtn icon="close" label="Cerrar posición" sub="Registra el cierre con fecha, precio y comisión" onClick={() => sheetDo("close")} />}
                {p.closed && <ActionBtn icon="reopen" label="Reabrir" sub="Deshace el cierre y vuelve a activa" onClick={() => sheetDo("reopen")} />}
                {p.closed && <ActionBtn icon="edit" label="Editar" sub="Modificar campos de la posición cerrada" onClick={() => sheetDo("edit")} />}
                <ActionBtn icon="🗑" danger label={sheetConfirmDel ? "¿Seguro? Se borra del todo" : "Eliminar"} sub={sheetConfirmDel ? "Esta acción no se puede deshacer" : "Borra la posición y su historial de rolls"} onClick={() => { if (!sheetConfirmDel) { setSheetConfirmDel(true); return; } delPos(p.id); setSheetPosId(null); }} />
              </div>
            </div>
          </div>
        );
      })()}

      {/* FAB nueva posición → movido fuera del contenedor de scroll (ver final del componente) */}

      {/* ASISTENTE NUEVA POSICIÓN */}
      {wizOpen && (
        <div onClick={() => setWizOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>{/* v5.10: el asistente pasa de hoja inferior a ventana centrada, con las 4 esquinas redondeadas */}
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "84vh", overflowY: "auto", overscrollBehavior: "contain", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {wizStep > 1 && <button onClick={() => { if (wizStep === 3 && DCDD_STRATS.has(wizStrat) && wizSub > 1) { setWizSub(wizSub - 1); } else { setWizStep(wizStep - 1); setWizSub(1); } }} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 16, color: T.ink, cursor: "pointer" }}>‹</button>}
                <div>
                  <div style={{ fontSize: 17, fontWeight: 800, color: T.ink }}>Nueva posición</div>
                  <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{wizStep === 1 ? "Paso 1 · ¿En qué bloque va?" : wizStep === 2 ? "Paso 2 · Tipo de posición" : DCDD_STRATS.has(wizStrat) ? "Paso 3 · " + (wizSub === 1 ? "Estructura · 1/3" : wizSub === 2 ? "Primas y strikes · 2/3" : "Volatilidad · 3/3") : "Paso 3 · Detalles"}</div>
                </div>
              </div>
              <button onClick={() => setWizOpen(false)} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer" }}>✕</button>
            </div>

                      const isCall = (wizStrat || "").toLowerCase().includes("call");
                      const isCovered = isCall; /* toda call corta es covered */
                      const tot = isFinite(cts) && isFinite(pr) ? cts * pr * 100 : null;
                      const bep = isFinite(s) && isFinite(pr) ? s - pr : null;
                      const riesgo = isCovered ? 0 : (bep !== null && isFinite(cts) ? bep * cts * 100 : null);

                      if (tot === null && bep === null) return null;
                      return (

                              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${bep.toFixed(2)}</div>

                              {riesgo !== null && !isCovered && <span> · Riesgo total: <span style={{ color: T.ink, fontWeight: 800 }}>${riesgo.toLocaleString("en-US", { maximumFractionDigits: 0 })}</span></span>}
                              {isCovered && <span> · Cubierta por acciones: no suma riesgo al bloque</span>}
                            </div>
                          )}

                {(wizNat === "ACC" || wizNat === "CASH") && (

                    </div>
                    {/* collar sin riesgo → el plausible de la acción de B1 pasa a 0 (sigue contando en sizing);
                       con riesgo → se introduce el BEP protegido y esa es la nueva base del plausible de la acción */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: T.tile, borderRadius: 12, padding: "9px 12px" }}>

                    <div style={{ display: "grid", gridTemplateColumns: "1.3fr 0.7fr", gap: 10 }}>
                      <WizInput label="Precio apertura $/acc · + prima cobrada − pagada" value={wizForm.prima} onChange={wizF("prima")} placeholder="$" inputMode="decimal" signed />
                      <WizInput label="Comisión" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />

                {wizNat === "DEF" && wizStrat === "Long Call" && (

                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                      <WizInput label="Prima pagada $/acc" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />
                    </div>

                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const pr = Math.abs(parseFloat(String(wizForm.prima || "").replace(",", ".")));
                      const s = parseFloat(String(wizForm.strike || "").replace(",", "."));
                      const bep = isFinite(s) && isFinite(pr) ? s + pr : null;

                      if (bep === null && cost === null) return null;
                      return (

                          {cost !== null && (

                          {cost !== null && (
                            <div style={{ gridColumn: "span 2", fontSize: 12, fontWeight: 700, color: T.sub, padding: "0 2px" }}>

                            </div>
                          )}
                        </div>
                      );
                    })()}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                      <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                    </div>

                )}
                {wizNat === "DEF" && wizStrat !== "Long Call" && wizStrat !== "PMCC" && wizStrat !== "Diagonal" && !CREDIT_SPREAD_STRATS.has(wizStrat) && !DCDD_STRATS.has(wizStrat) && (
                  <>
                    {/* débito genérico B3 (Calendar, Iron Man — v5.02; DC/DD e Iron Fly tienen flujo propio): solo ticker (arriba),
                       vencimiento, contratos y open price. El riesgo NO se pide: es el débito pagado =
                       open price × contratos × 100 (máx pérdida de una estrategia de débito). */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />

                    </div>
                    <WizInput label="Open price $/acc (débito pagado)" value={wizForm.prima} onChange={wizF("prima")} placeholder="$" inputMode="decimal" />
                    {(() => {
                      const ct = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const op = Math.abs(parseFloat(String(wizForm.prima || "").replace(",", ".")));
                      const rk = isFinite(ct) && isFinite(op) ? op * ct * 100 : NaN;
                      return isFinite(rk) ? (
                        <div style={{ background: T.tile, borderRadius: 12, padding: "9px 12px", fontSize: 12, fontWeight: 700, color: T.sub }}>
                          Riesgo (débito total): <span style={{ color: T.ink, fontWeight: 800 }}>${money2(rk)}</span> — open price × contratos × 100
                        </div>
                      ) : null;
                    })()}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                      <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                    </div>
                  </>
                )}
                {DCDD_STRATS.has(wizStrat) && (() => {
                  /* ---------- flujo DC/DD de 4 patas (v5.09): 3 sub-pantallas ----------
                     1 Estructura: ticker, fecha de entrada, los DOS vencimientos (shorts / longs) y el
                       strike put y el strike call (esqueleto; en un DC ambas patas de cada lado comparten
                       strike → se heredan a las 4 patas en la pantalla 2, editable para diagonales).
                     2 Primas y strikes: las 4 patas (short put, long put, short call, long call), cada una
                       con strike, prima y fee. Débito neto = largas − cortas = open price / riesgo. Ratio
                       shorts/longs (cobras ÷ pagas) automático, verde >40%.
                     3 Volatilidad: VIX, IVR, IV media, IV shorts, IV longs (+ IV spread y catalizadores). */
                  const f = wizForm;
                  const pf = (v) => parseFloat(String(v || "").replace(",", "."));
                  const cts = pf(f.contratos);
                  const legVal = { sp: { p: f.spP, f: f.spF }, lp: { p: f.lpP, f: f.lpF }, sc: { p: f.scP, f: f.scF }, lc: { p: f.lcP, f: f.lcF } };
                  const shTot = (Math.abs(pf(legVal.sp.p)) || 0) + (Math.abs(pf(legVal.sc.p)) || 0);
                  const lgTot = (Math.abs(pf(legVal.lp.p)) || 0) + (Math.abs(pf(legVal.lc.p)) || 0);
                  const netDebit = lgTot - shTot;
                  const debitTotal = isFinite(cts) && (shTot || lgTot) ? netDebit * cts * 100 : NaN;
                  const feesTot = ["spF", "lpF", "scF", "lcF"].reduce((s, k) => s + (Math.abs(pf(f[k])) || 0), 0);
                  const ratio = lgTot ? shTot / lgTot : NaN;
                  const rTone = dcddRatioTone(ratio);
                  const rColor = rTone === "green" ? T.green : rTone === "amber" ? T.gold : rTone === "red" ? T.red : T.ink;
                  const rBg = rTone === "green" ? T.tileGreen : rTone === "amber" ? T.tileAmber : rTone === "red" ? T.tileRed : T.tile;
                  const dteS = daysBetween(f.entryDate, f.expiry), dteL = daysBetween(f.entryDate, f.dcExpiryLong);
                  const ivS = pf(f.dcIvShort), ivL = pf(f.dcIvLong);
                  const ivSp = isFinite(ivS) && isFinite(ivL) ? ivS - ivL : NaN;
                  const legKeys = { sp: ["spK", "spP", "spF"], lp: ["lpK", "lpP", "lpF"], sc: ["scK", "scP", "scF"], lc: ["lcK", "lcP", "lcF"] };
                  return (
                    <>
                      {wizSub === 1 && (
                        <>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                            <WizInput label="Contratos" value={f.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                            <WizInput label="Fecha de entrada" value={f.entryDate} onChange={wizF("entryDate")} type="date" />
                          </div>
                          <WizSection>▸ Los dos vencimientos</WizSection>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                            <WizInput label="Vto shorts (corto)" value={f.expiry} onChange={wizF("expiry")} type="date" />
                            <WizInput label="Vto longs (largo)" value={f.dcExpiryLong} onChange={wizF("dcExpiryLong")} type="date" />
                          </div>
                          {(isFinite(dteS) || isFinite(dteL) || weekdayOf(f.entryDate)) && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                              <Tile label="DTE shorts" value={isFinite(dteS) ? dteS + "d" : "—"} />
                              <Tile label="DTE longs" value={isFinite(dteL) ? dteL + "d" : "—"} />
                              <Tile label="Día entrada" value={weekdayOf(f.entryDate) || "—"} />
                            </div>
                          )}
                          <WizSection>▸ Strikes {wizStrat === "DD" ? "de referencia" : ""}</WizSection>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                            <WizInput label={wizStrat === "DD" ? "Strike put (ref.)" : "Strike put"} value={f.dcPutStrike} onChange={wizF("dcPutStrike")} placeholder="7410" inputMode="decimal" />
                            <WizInput label={wizStrat === "DD" ? "Strike call (ref.)" : "Strike call"} value={f.dcCallStrike} onChange={wizF("dcCallStrike")} placeholder="7690" inputMode="decimal" />
                          </div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, padding: "0 2px" }}>{wizStrat === "DD"
                            ? "En un Double Diagonal cada lado tiene DOS strikes distintos (short y long). Estos se copian como punto de partida a las 4 patas del siguiente paso, donde pones el strike real de cada una."
                            : "En DC ambas patas de cada lado comparten strike; se copian a las 4 patas en el siguiente paso (editable si es diagonal)."}</div>
                        </>
                      )}
                      {wizSub === 2 && (
                        <>
                          <WizSection>▸ Las 4 patas · strike · prima · fee</WizSection>
                          {DC_LEGS.map((leg) => {
                            const [kStrike, kP, kF] = legKeys[leg.key];
                            return (
                              <div key={leg.key} style={{ background: T.tile, borderRadius: 12, padding: "10px 11px" }}>
                                <div style={{ fontSize: 11, fontWeight: 800, color: leg.color === "red" ? T.red : T.green, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 7 }}>{leg.dir === "short" ? "▾ " : "▴ "}{leg.label}</div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                                  <WizInput label="Strike" value={f[kStrike]} onChange={wizF(kStrike)} inputMode="decimal" />
                                  <WizInput label="Prima $/acc" value={f[kP]} onChange={wizF(kP)} inputMode="decimal" />
                                  <WizInput label="Fee $" value={f[kF]} onChange={wizF(kF)} inputMode="decimal" />
                                </div>
                              </div>
                            );
                          })}
                          {(shTot > 0 || lgTot > 0) && (
                            <>
                              {isFinite(ratio) && (
                                <div style={{ background: rBg, borderRadius: 14, padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <div>
                                    <div style={{ fontSize: 10, fontWeight: 800, color: rColor, textTransform: "uppercase", letterSpacing: 0.4 }}>Ratio shorts / longs</div>
                                    <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, marginTop: 2 }}>Cobras ${shTot.toFixed(2)} ÷ pagas ${lgTot.toFixed(2)} · {rTone === "green" ? "verde >40%" : "por debajo de 40%"}</div>
                                  </div>
                                  <div style={{ fontSize: 26, fontWeight: 800, color: rColor, fontVariantNumeric: "tabular-nums" }}>{(ratio * 100).toFixed(0)}%</div>
                                </div>
                              )}
                              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                <Tile label={netDebit < 0 ? "Crédito neto $/acc" : "Débito neto $/acc"} value={(netDebit < 0 ? "−$" : "$") + money2(Math.abs(netDebit))} tone={netDebit < 0 ? "green" : undefined} />
                                <Tile label={"Riesgo · " + (isFinite(cts) ? cts : "—") + " contr."} value={netDebit < 0 ? "manual ↓" : (isFinite(debitTotal) ? "$" + money2(debitTotal) : "—")} tone={netDebit < 0 ? "amber" : undefined} />
                              </div>
                              {netDebit < 0 && (
                                <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, padding: "0 2px" }}>Esta estructura genera CRÉDITO (cobras {"$" + money2(Math.abs(netDebit))}/acc). El riesgo real no es el débito — introdúcelo abajo (máx pérdida / margen que modela IBKR).</div>
                              )}
                              {/* riesgo manual (v5.10): en un DC/DD el riesgo real puede superar el débito pagado, o —en un
                                 DD de crédito— no derivarse del débito en absoluto. Si se rellena, sustituye al débito × qty. */}
                              <WizInput label={netDebit < 0 ? "Riesgo máx $ (obligatorio en crédito)" : "Riesgo máx $ (opcional — si difiere del débito)"} value={f.dcRisk} onChange={wizF("dcRisk")} placeholder={isFinite(debitTotal) && debitTotal > 0 ? money2(debitTotal) : "$"} inputMode="decimal" />
                              {feesTot > 0 && <div style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, padding: "0 2px" }}>Fees totales de las 4 patas: ${feesTot.toFixed(2)}</div>}
                            </>
                          )}
                        </>
                      )}
                      {wizSub === 3 && (
                        <>
                          <WizSection>▸ Volatilidad al abrir</WizSection>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                            <WizInput label="VIX" value={f.dcVix} onChange={wizF("dcVix")} inputMode="decimal" />
                            <WizInput label="IVR" value={f.ivr} onChange={wizF("ivr")} inputMode="decimal" />
                          </div>
                          <WizInput label="IV media (avg)" value={f.dcIvAvg} onChange={wizF("dcIvAvg")} inputMode="decimal" />
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, alignItems: "end" }}>
                            <WizInput label="IV shorts" value={f.dcIvShort} onChange={wizF("dcIvShort")} inputMode="decimal" />
                            <WizInput label="IV longs" value={f.dcIvLong} onChange={wizF("dcIvLong")} inputMode="decimal" />
                          </div>
                          {isFinite(ivSp) && (
                            <Tile label="IV spread (shorts − longs)" value={(ivSp >= 0 ? "+" : "") + ivSp.toFixed(1)} tone={ivSp > 0 ? "green" : "red"} />
                          )}
                          <WizSection>▸ Catalizadores</WizSection>
                          <label style={{ display: "block" }}>
                            <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>¿Evento antes del vto corto?</div>
                            <Pill options={["NO", "SI"]} value={f.dcEventIn || "NO"} onChange={wizF("dcEventIn")} size="sm" />
                          </label>
                          {f.dcEventIn === "SI" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                              <WizSelect label="Evento" value={f.dcEvent || DCDD_EVENTS[0]} onChange={wizF("dcEvent")} options={DCDD_EVENTS} />
                              <WizInput label="Detalle (opcional)" value={f.dcEventTxt} onChange={wizF("dcEventTxt")} placeholder="Ej. NFP viernes" />
                            </div>
                          )}
                        </>
                      )}
                    </>
                  );
                })()}
                {CREDIT_SPREAD_STRATS.has(wizStrat) && (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                    </div>
                    {(wizStrat === "Iron Condor" || wizStrat === "Earnings") ? (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <WizInput label="Put spread (ej. 715/720)" value={wizForm.putSpread} onChange={wizF("putSpread")} placeholder="715/720" />
                        <WizInput label="Call spread (ej. 760/765)" value={wizForm.callSpread} onChange={wizF("callSpread")} placeholder="760/765" />
                      </div>
                    ) : SPREAD_STRIKE_STRATS.has(wizStrat) ? (
                      <WizInput label={"Spread " + (wizStrat === "Call Broken Wing" ? "call" : "put") + " (ej. 760/765)"} value={wizForm.putSpread} onChange={wizF("putSpread")} placeholder="760/765" />
                    ) : null}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Open price $/acc · crédito cobrado" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />
                      <WizInput label="Riesgo máximo $" value={wizForm.margen} onChange={wizF("margen")} inputMode="decimal" />
                    </div>
                    {/* crédito simple (Iron Fly / Credit Spread — v5.13): sin strikes; VIX opcional para trackear vol al abrir */}
                    {wizStrat === "Credit Spread" && (
                      <label style={{ display: "block" }}>
                        <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5 }}>¿Put o Call credit spread?</div>
                        <Pill options={["Put", "Call"]} value={wizForm.right === "C" ? "Call" : "Put"} onChange={(v) => wizF("right")(v === "Call" ? "C" : "P")} size="sm" />
                      </label>
                    )}
                    {CREDIT_SPREAD_STRATS.has(wizStrat) && !SPREAD_STRIKE_STRATS.has(wizStrat) && (
                      <WizInput label="VIX al abrir (opcional)" value={wizForm.vix} onChange={wizF("vix")} inputMode="decimal" placeholder="Ej. 14,2" />
                    )}
                    {(() => {
                      /* Vista previa: crédito total = prima × contratos × 100, y ROI (crédito/riesgo) informativo.
                         El riesgo es manual (puede ser distinto al que saldría de la prima) — spread multi-pata,
                         no hay una fórmula única como en short put/call. No se registra en Movimientos hasta
                         el cierre, igual que una acción: al cerrar se contabiliza como recompra (Primas + MTM). */
                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const pr = parseFloat(String(wizForm.prima || "").replace(",", "."));
                      const rk = parseFloat(String(wizForm.margen || "").replace(",", "."));
                      const credit = isFinite(cts) && isFinite(pr) ? pr * cts * 100 : null;
                      const roi = credit !== null && rk ? credit / rk : null;
                      if (credit === null) return null;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          <div style={{ background: T.tileGreen, borderRadius: 12, padding: "8px 12px" }}>
                            <div style={{ fontSize: 9.5, fontWeight: 700, color: T.green, textTransform: "uppercase", letterSpacing: 0.3 }}>Crédito recibido</div>
                            <div style={{ fontSize: 16, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums" }}>${credit.toLocaleString("en-US", { maximumFractionDigits: 0 })}</div>
                          </div>
                          {roi !== null && (
                            <div style={{ background: T.tile, borderRadius: 12, padding: "8px 12px" }}>
                              <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.3 }}>ROI (crédito/riesgo)</div>
                              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{(roi * 100).toFixed(1)}%</div>
                            </div>
                          )}
                          <div style={{ gridColumn: "span 2", fontSize: 11.5, fontWeight: 700, color: T.sub, padding: "0 2px" }}>
                            No se registra en Movimientos hasta que cierres la posición; al cerrar se contabiliza como recompra en Primas y MTM.
                          </div>
                        </div>
                      );
                    })()}
                    <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                    <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                  </>
                )}
                {wizNat === "DEF" && (wizStrat === "PMCC" || wizStrat === "Diagonal") && (
                  <>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 2, marginBottom: 2 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.green, textTransform: "uppercase", letterSpacing: 0.5 }}>▸ Long leg · call comprada</span>
                      <div style={{ flex: 1, height: 1, background: T.line }} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Strike" value={wizForm.lgStrike} onChange={wizF("lgStrike")} inputMode="decimal" />
                      <WizInput label="Vencimiento" value={wizForm.lgExpiry} onChange={wizF("lgExpiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Contratos" value={wizForm.contratos} onChange={wizF("contratos")} inputMode="numeric" />
                      <WizInput label="Prima pagada $/acc" value={wizForm.lgPrima} onChange={wizF("lgPrima")} inputMode="decimal" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Delta long (ej. 0.80)" value={wizForm.lgDelta} onChange={wizF("lgDelta")} inputMode="decimal" />
                      <WizInput label="Comisión de entrada" value={wizForm.lgComision} onChange={wizF("lgComision")} placeholder="$" inputMode="decimal" />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.red, textTransform: "uppercase", letterSpacing: 0.5 }}>▸ Short leg · call vendida</span>
                      <div style={{ flex: 1, height: 1, background: T.line }} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Strike" value={wizForm.strike} onChange={wizF("strike")} inputMode="decimal" />
                      <WizInput label="Vencimiento" value={wizForm.expiry} onChange={wizF("expiry")} type="date" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Prima cobrada" value={wizForm.prima} onChange={wizF("prima")} inputMode="decimal" />
                      <WizInput label="IVR" value={wizForm.ivr} onChange={wizF("ivr")} inputMode="numeric" />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <WizInput label="Delta short (ej. 0.30)" value={wizForm.delta} onChange={wizF("delta")} inputMode="decimal" />
                      <WizInput label="Comisión de entrada" value={wizForm.comision} onChange={wizF("comision")} placeholder="$" inputMode="decimal" />
                    </div>
                    {(() => {
                      /* PMCC: BEP = prima long pagada − prima short cobrada (débito neto por acción).
                         Riesgo = ese débito neto × contratos × 100 (mín. 0). Los rolls de la short bajarán el BEP. */
                      const cts = parseFloat(String(wizForm.contratos || "").replace(",", "."));
                      const lp = Math.abs(parseFloat(String(wizForm.lgPrima || "").replace(",", ".")));
                      const sp = Math.abs(parseFloat(String(wizForm.prima || "").replace(",", ".")));
                      const net = (isFinite(lp) ? lp : NaN) - (isFinite(sp) ? sp : 0);
                      if (!isFinite(lp)) return null;
                      const risk = isFinite(cts) ? Math.max(0, net) * cts * 100 : null;
                      return (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                          <div style={{ background: T.tile, borderRadius: 12, padding: "8px 12px" }}>
                            <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.3 }}>BEP = prima long − short</div>
                            <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${net.toFixed(2)}</div>
                          </div>
                          {risk !== null && (
                            <div style={{ background: T.tileGreen, borderRadius: 12, padding: "8px 12px" }}>
                              <div style={{ fontSize: 9.5, fontWeight: 700, color: T.green, textTransform: "uppercase", letterSpacing: 0.3 }}>Riesgo = BEP × qty</div>
                              <div style={{ fontSize: 16, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums" }}>${risk.toLocaleString("en-US", { maximumFractionDigits: 0 })}</div>
                            </div>
                          )}
                          <div style={{ gridColumn: "span 2", fontSize: 11.5, fontWeight: 700, color: T.sub, padding: "0 2px" }}>
                            La short se rola como cualquier short call; cada crédito nuevo baja el BEP y el riesgo.
                          </div>
                        </div>
                      );
                    })()}
                    <WizInput label="Fecha de entrada" value={wizForm.entryDate} onChange={wizF("entryDate")} type="date" />
                  </>
                )}
                {DCDD_STRATS.has(wizStrat) && wizSub < 3 ? (
                  <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                    {wizSub > 1 && (
                      <button onClick={() => setWizSub(wizSub - 1)} style={{ background: T.tile, border: "none", borderRadius: 14, padding: "15px 18px", fontSize: 15, fontWeight: 800, color: T.ink, cursor: "pointer", flexShrink: 0 }}>‹ Atrás</button>
                    )}
                    <button onClick={() => {
                      if (wizSub === 1) setWizForm((f) => ({ ...f,
                        spK: f.spK || f.dcPutStrike || "", lpK: f.lpK || f.dcPutStrike || "",
                        scK: f.scK || f.dcCallStrike || "", lcK: f.lcK || f.dcCallStrike || "" }));
                      setWizSub(wizSub + 1);
                    }} style={{ flex: 1, background: T.dark, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Continuar · {wizSub === 1 ? "Primas y strikes" : "Volatilidad"} ›</button>
                  </div>
                ) : (
                <>
                <WizInput label="Nota de entrada (opcional)" value={wizForm.entryNote} onChange={wizF("entryNote")} placeholder="Ej. tesis, catalizador, plan de salida…" />
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  {DCDD_STRATS.has(wizStrat) && wizSub === 3 && (
                    <button onClick={() => setWizSub(2)} style={{ background: T.tile, border: "none", borderRadius: 14, padding: "15px 18px", fontSize: 15, fontWeight: 800, color: T.ink, cursor: "pointer", flexShrink: 0 }}>‹ Atrás</button>
                  )}
                  <button onClick={wizSave} disabled={!(wizForm.tkr || "").trim()} style={{ flex: 1, background: (wizForm.tkr || "").trim() ? T.green : T.tile, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 15, fontWeight: 800, color: (wizForm.tkr || "").trim() ? "#fff" : T.sub, cursor: "pointer" }}>Añadir a Bloque {wizBlock}</button>
                </div>
                </>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>{/* fin del contenedor de scroll */}

    {/* NAV INFERIOR — fuera del contenedor de scroll: fijo al viewport, no se mueve con el rebote.
       Oculto mientras el asistente está abierto para no tapar sus últimas opciones. */}
    {view === "bloques" && !wizOpen && (
      <button onClick={openWizard} aria-label="Nueva posición" style={{ position: "fixed", right: "max(16px, calc(50% - 270px))", bottom: 100, zIndex: 41, width: 52, height: 52, border: "0.5px solid rgba(255,255,255,0.08)", cursor: "pointer", borderRadius: 26, background: "rgba(28,26,32,0.62)", backdropFilter: "blur(22px) saturate(160%)", WebkitBackdropFilter: "blur(22px) saturate(160%)", boxShadow: "0 12px 34px rgba(0,0,0,0.35)", color: "#fff", fontSize: 26, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>+</button>
    )}
    {!wizOpen && (() => {
      const NAV = [["bloques", "portfolio", "Portfolio"], ["movimientos", "movimientos", "Movimientos"], ["vencimientos", "vencimientos", "Vencimientos"], ["comparador", "comparador", "Herramientas"], ["ajustes", "ajustes", "Ajustes"]];
      const NAV_BLUE = "#4C9AF5";
      const activeIdx = Math.max(0, NAV.findIndex(([id]) => id === view));
      /* deslizar el dedo por la barra: el pill sigue el dedo (navHover) y al soltar selecciona esa pestaña.
         El índice se calcula por la posición X del dedo dentro de la zona de pestañas (descontando el padding). */
      const idxFromX = (clientX) => {
        const el = navBarRef.current; if (!el) return null;
        const r = el.getBoundingClientRect();
        const innerLeft = r.left + 8, innerW = r.width - 16;
        return Math.max(0, Math.min(NAV.length - 1, Math.floor(((clientX - innerLeft) / innerW) * NAV.length)));
      };
      const shownIdx = navHover != null ? navHover : activeIdx;
      return (
      <div style={{ position: "fixed", left: 12, right: 12, bottom: 24, display: "flex", justifyContent: "center", zIndex: 40, pointerEvents: "none" }}>
        <div ref={navBarRef}
          onTouchStart={(e) => setNavHover(idxFromX(e.touches[0].clientX))}
          onTouchMove={(e) => setNavHover(idxFromX(e.touches[0].clientX))}
          onTouchEnd={() => { if (navHover != null) selectView(NAV[navHover][0]); setNavHover(null); }}
          onTouchCancel={() => setNavHover(null)}
          style={{ position: "relative", display: "flex", width: "100%", maxWidth: 540, background: "rgba(24,24,30,0.68)", backdropFilter: "blur(22px) saturate(160%)", WebkitBackdropFilter: "blur(22px) saturate(160%)", borderRadius: 26, padding: "7px 8px", boxShadow: "0 12px 34px rgba(0,0,0,0.35)", border: "0.5px solid rgba(255,255,255,0.08)", pointerEvents: "auto", touchAction: "none" }}>
          {/* pill deslizante: se mueve bajo el dedo (o a la pestaña activa) con transición suave */}
          <div style={{ position: "absolute", top: 6, bottom: 6, left: `calc(8px + ${shownIdx} * (100% - 16px) / ${NAV.length})`, width: `calc((100% - 16px) / ${NAV.length})`, background: navHover != null ? "rgba(76,154,245,0.32)" : "rgba(76,154,245,0.20)", border: `1px solid rgba(76,154,245,${navHover != null ? 0.6 : 0.35})`, borderRadius: 19, transition: "left 0.19s cubic-bezier(0.22,1,0.36,1), background 0.15s", pointerEvents: "none" }} />
          {NAV.map(([id, icon, label], i) => {
            const on = shownIdx === i;
            return (
              <button key={id} onClick={() => selectView(id)} style={{
                position: "relative", zIndex: 1, flex: 1, minWidth: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, border: "none", cursor: "pointer",
                background: "transparent", borderRadius: 19, padding: "7px 0 6px",
                color: on ? NAV_BLUE : "rgba(255,255,255,0.92)", transition: "color 0.15s",
              }}>
                <span style={{ position: "relative", display: "inline-flex" }}>
                  <NavIcon name={icon} />
                  {id === "vencimientos" && avisosCount > 0 && (
                    <span style={{ position: "absolute", top: -4, right: -7, minWidth: 15, height: 15, padding: "0 3px", borderRadius: 8, background: T.red, color: "#fff", fontSize: 9, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1, boxShadow: "0 0 0 2px rgba(20,22,26,0.9)" }}>{avisosCount > 9 ? "9+" : avisosCount}</span>
                  )}
                </span>
                <span style={{ fontSize: 9.5, fontWeight: on ? 800 : 600, letterSpacing: 0.1, whiteSpace: "nowrap", color: on ? NAV_BLUE : "rgba(255,255,255,0.92)" }}>{label}</span>
              </button>
            );
          })}
        </div>
      </div>
      );
    })()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
/* ---------- auto-actualización: hosting estático (GitHub Pages/Netlify/Vercel) y apps guardadas en pantalla de
   inicio pueden servir una copia cacheada y no recargar solos tras un deploy. Este script, en cada apertura,
   pide de red (sin caché) el propio index.html, compara su APP_VERSION con la que está corriendo, y si hay una
   más nueva en el servidor, fuerza una recarga con un parámetro que rompe cualquier caché. ---------- */
(function () {
  function checkForUpdate() {
    try {
      fetch(location.pathname + "?_cachebust=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var m = html.match(/const APP_VERSION = "([^"]+)"/);
          if (m && window.APP_VERSION && m[1] !== window.APP_VERSION) {
            var url = new URL(location.href);
            url.searchParams.set("v", m[1]);
            url.searchParams.set("_", Date.now());
            location.replace(url.toString());
          }
        })
        .catch(function () {});
    } catch (e) {}
  }
  if (document.readyState === "complete") checkForUpdate();
  else window.addEventListener("load", checkForUpdate);
})();
</script>
