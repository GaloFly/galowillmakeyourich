            {csStrikes.length ? csStrikes.map((s, i) => <span key={i} style={{ fontSize: 9, fontWeight: 800, color: T.ink, whiteSpace: "nowrap" }}>{s}</span>) : <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink }}>—</span>}
          </span>
        ) : (
          <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, whiteSpace: "nowrap" }}>{strikeStr(strike) + p.right}</span>
        )}
        <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, whiteSpace: "nowrap" }}>{expiry ? shortDate(expiry) : "—"}</span>
        <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{isFinite(legDays) ? legDays + "d" : "—"}</span>
        <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{ivr || "—"}</span>
        {pmcc && <span style={{ fontSize: 11.5, fontWeight: 700, color: delta ? T.ink : T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{delta || "—"}</span>}
        <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{fee ? "$" + money2(fee) : "—"}</span>
        <span style={{ fontSize: 12.5, fontWeight: 800, color: isExp ? T.sub : isBuy ? T.red : T.green, textAlign: "right", whiteSpace: "nowrap" }}>{isExp ? "$0" : (isBuy ? "-$" : "+$") + money2(Math.abs(perShare))}</span>
        {credBep && <span style={{ fontSize: 12, fontWeight: 800, color: bepAfter != null && isFinite(bepAfter) ? T.ink : T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{bepAfter != null && isFinite(bepAfter) ? "$" + money2(bepAfter) : "—"}</span>}
        <span style={{ fontSize: 13, fontWeight: 800, color: isExp ? T.sub : isBuy ? T.red : T.green, textAlign: "right", whiteSpace: "nowrap" }}>{isExp ? "$0" : (isBuy ? "-$" : "+$") + money2(Math.abs(amount))}</span>
        {pmcc && <span style={{ fontSize: 12, fontWeight: 800, color: T.ink, textAlign: "right", whiteSpace: "nowrap" }}>{bepAfter != null && isFinite(bepAfter) ? "$" + money2(bepAfter) : "—"}</span>}
        {!noRet && <span style={{ fontSize: 11, fontWeight: 700, color: isFinite(ret) ? (ret >= 0 ? T.green : T.red) : T.sub, textAlign: "right", whiteSpace: "nowrap" }}>{isFinite(ret) ? (ret * 100).toFixed(2) + "%" : "—"}</span>}
      </div>
    );
  };
  const rows = [];
  /* total neto de la cadena: suma con signo de todas las patas mostradas (ventas +, compras −, fees −).
     En cadenas cerradas es el resultado realizado total; en abiertas, el neto de caja hasta hoy. */
  let chainTot = 0;
  const acc = (isBuy, amount, fee, isExp) => { chainTot += (isExp ? 0 : (isBuy ? -Math.abs(amount) : Math.abs(amount))) - (n(fee) || 0); };
  const openAmt = openingPrima * q;
  const lg = p.long || {};
  /* PMCC: el BEP (débito neto/acc) arranca en la prima de la long y va bajando con cada crédito de la
     short: −crédito inicial, y en cada roll −(newCredit − recompra). Se muestra por línea para ver la
     erosión del coste. */
  let bepRun = pmcc ? n(lg.prima) : NaN;
  /* prima acumulada por acción para el BEP vigente de short put / covered call (credBep). Arranca en la
     prima de apertura y se ajusta en cada roll con (nueva venta − recompra). BEP = strike vigente − primaAcc. */
  let primaAcc = openingPrima;
  if (pmcc) {
    rows.push(<LegRow key="long" date={p.entryDate} actionLabel="COMPRA LONG" strike={lg.strike} expiry={lg.expiry} perShare={n(lg.prima)} amount={n(lg.prima) * q} fee={n(lg.comision)} delta={lg.delta} bepAfter={bepRun} ret={retOf(-n(lg.prima), lg.strike)} isBuy={true} />);
    acc(true, n(lg.prima) * q, lg.comision, false);
    rows.push(<div key="longsep" aria-hidden style={{ borderTop: `1.5px dashed ${T.line}`, margin: "2px 4px 8px" }} />);
  }
  if (pmcc) bepRun -= openingPrima;
  rows.push(<LegRow key="open" date={p.entryDate} action={shortSide ? "VENTA" : "COMPRA"} strike={openingStk} expiry={openingExp} perShare={openingPrima} amount={openAmt} fee={n(p.comision)} ivr={p.ivr} delta={p.delta} bepAfter={credBep ? (n(openingStk) - primaAcc) : pmcc ? bepRun : undefined} ret={retOf(openingPrima, openingStk)} isBuy={!shortSide} />);
  acc(!shortSide, openAmt, p.comision, false);
  if (p.entryNote) rows.push(<div key="entrynote" style={{ fontSize: 11.5, color: T.sub, fontStyle: "italic", margin: "0 0 6px 4px", lineHeight: 1.4 }}>💬 {p.entryNote}</div>);
  chain.forEach((r, idx) => {
    /* v3.46: pata de PMCC cuya corta expiró sin valor — una sola fila EXPIRA en gris, sin recompra fantasma */
    if (r.expiredShort) {
      rows.push(<LegRow key={"e" + idx} date={r.date} actionLabel={"EXPIRA " + rightLabel} strike={r.prevStrike} expiry={r.prevExpiry} perShare={0} amount={0} isExp={true} />);
      if (r.note) rows.push(<div key={"n" + idx} style={{ fontSize: 11.5, color: T.sub, fontStyle: "italic", margin: "0 0 6px 4px", lineHeight: 1.4 }}>💬 {r.note}</div>);
      return;
    }
    /* v3.46: venta de call nueva tras un periodo sin corta — solo la fila de VENTA (no hubo recompra) */
    if (r.soldAfterExpiry) {
      const sellAmt = n(r.newCredit) * q;
      if (pmcc) bepRun -= n(r.newCredit);
      if (credBep) primaAcc += n(r.newCredit);
      rows.push(<LegRow key={"s" + idx} date={r.date} action={"VENTA"} strike={stkAfter(idx)} expiry={expAfter(idx)} perShare={n(r.newCredit)} amount={sellAmt} fee={n(r.comision)} ivr={r.ivr} delta={r.delta} bepAfter={credBep ? (n(stkAfter(idx)) - primaAcc) : pmcc ? bepRun : undefined} ret={retOf(n(r.newCredit), stkAfter(idx))} isBuy={false} />);
      acc(false, sellAmt, r.comision, false);
      if (r.note) rows.push(<div key={"n" + idx} style={{ fontSize: 11.5, color: T.sub, fontStyle: "italic", margin: "0 0 6px 4px", lineHeight: 1.4 }}>💬 {r.note}</div>);
      return;
    }
    const buyAmt = n(r.buybackCost) * q, sellAmt = n(r.newCredit) * q;
    rows.push(<LegRow key={"b" + idx} date={r.date} action={shortSide ? "COMPRA" : "VENTA"} strike={r.prevStrike} expiry={r.prevExpiry} perShare={n(r.buybackCost)} amount={buyAmt} fee={n(r.comision)} isBuy={shortSide} />);
    acc(shortSide, buyAmt, r.comision, false);
    if (pmcc) bepRun -= (n(r.newCredit) - n(r.buybackCost));
    if (credBep) primaAcc += (n(r.newCredit) - n(r.buybackCost));
    rows.push(<LegRow key={"s" + idx} date={r.date} action={shortSide ? "VENTA" : "COMPRA"} strike={stkAfter(idx)} expiry={expAfter(idx)} perShare={n(r.newCredit)} amount={sellAmt} ivr={r.ivr} delta={r.delta} bepAfter={credBep ? (n(stkAfter(idx)) - primaAcc) : pmcc ? bepRun : undefined} ret={retOf(n(r.newCredit), stkAfter(idx))} isBuy={!shortSide} />);
    acc(!shortSide, sellAmt, 0, false);
    if (r.note) rows.push(<div key={"n" + idx} style={{ fontSize: 11.5, color: T.sub, fontStyle: "italic", margin: "0 0 6px 4px", lineHeight: 1.4 }}>💬 {r.note}</div>);
  });
  if (p.closed && !isVertical(p)) { /* v3.52: los verticales muestran su cierre por pata en LegOpsTable */
    const closeAmt = n(p.closePrice) * q;
    const isExp = n(p.closePrice) === 0;
    rows.push(<LegRow key="close" date={p.closeDate} action={isExp ? "EXPIRA" : (shortSide ? "COMPRA" : "VENTA")} strike={p.strike} expiry={p.expiry} perShare={n(p.closePrice)} amount={closeAmt} fee={n(p.closeComision)} isBuy={shortSide && !isExp} isExp={isExp} />);
    acc(shortSide, closeAmt, p.closeComision, isExp);
    if (pmcc && p.closeLongPrice !== "" && p.closeLongPrice != null) {
      rows.push(<div key="closesep" aria-hidden style={{ borderTop: `1.5px dashed ${T.line}`, margin: "2px 4px 8px" }} />);
      rows.push(<LegRow key="closelong" date={p.closeDate} actionLabel="VENTA LONG" strike={lg.strike} expiry={lg.expiry} perShare={n(p.closeLongPrice)} amount={n(p.closeLongPrice) * q} fee={n(p.closeLongComision)} isBuy={false} isExp={n(p.closeLongPrice) === 0} />);
      acc(false, n(p.closeLongPrice) * q, p.closeLongComision, n(p.closeLongPrice) === 0);
    }
    if (p.closeNote) rows.push(<div key="cn" style={{ fontSize: 11.5, color: T.sub, fontStyle: "italic", margin: "0 0 4px 4px", lineHeight: 1.4 }}>💬 {p.closeNote}</div>);
  }
  rows.push(
    <div key="chaintot" style={{ display: "flex", justifyContent: "flex-end", alignItems: "baseline", gap: 10, borderTop: `1.5px solid ${T.line}`, marginTop: 2, padding: "8px 10px 2px" }}>
      <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>{p.closed ? "Total neto de la cadena" : "Neto de la cadena hasta hoy"}</span>
      <span style={{ fontSize: 15, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: chainTot >= 0 ? T.green : T.red }}>{signMoney(chainTot)}</span>
    </div>
  );
  return (
    <div style={{ overflowX: "auto", margin: "0 -12px", padding: "0 12px" }}>
      <div style={{ minWidth: gridMinW }}>{/* columnas + gaps + padding; PMCC lleva dos columnas extra (Δ y BEP); credit spreads quitan %Strike */}
        <div style={{ display: "grid", gridTemplateColumns: gridCols, gap: 6, padding: "0 10px 4px" }}>
          {(pmcc ? ["Fecha", "Operación", "Strike", "Expiry", "Días", "IVR", "Δ", "Fee", "Prima", "Importe", "BEP", retLabel] : credBep ? ["Fecha", "Operación", "Strike", "Expiry", "Días", "IVR", "Fee", "Prima", "BEP", "Importe", retLabel] : noRet ? ["Fecha", "Operación", "Strike", "Expiry", "Días", "IVR", "Fee", "Prima", "Importe"] : ["Fecha", "Operación", "Strike", "Expiry", "Días", "IVR", "Fee", "Prima", "Importe", retLabel]).map((h, i) => (
            <span key={h} style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, textAlign: i >= 4 ? "right" : "left" }}>{h}</span>
          ))}
        </div>
        {rows}
      </div>
    </div>
  );
}

/* ---------- reconstrucción de una posición de crédito a partir de sus patas editadas ----------
   open: {date, strike, expiry, prima, comision, ivr} · rolls: [{date, buyback, credit, strike, expiry, comision, ivr, delta, note}]
   close: {date, price, comision, note, exercised} (solo si p.closed).
   Recalcula prima acumulada = prima apertura + Σ(nueva venta − recompra), strike/expiry vigentes = los del
   último roll (o la apertura si no hay rolls), y regenera rollChain con los prevStrike/prevExpiry/prevPrima
   correctos. Es la inversa exacta de cómo RollChainTable lee la cadena, así que round-trips sin perder nada. */
function rebuildCredChain(p, open, rolls, close) {
  let acc = n(open.prima);
  let prevStrike = open.strike, prevExpiry = open.expiry, prevPrima = acc;
  const chain = [];
  (rolls || []).forEach((r) => {
    chain.push({ date: r.date || "", prevStrike, prevExpiry, prevPrima: String(prevPrima), buybackCost: n(r.buyback), newCredit: n(r.credit), comision: n(r.comision), ivr: r.ivr || "", delta: r.delta || "", note: r.note || "" });
    acc = acc + (n(r.credit) - n(r.buyback));
    prevStrike = r.strike; prevExpiry = r.expiry; prevPrima = acc;
  });
  const next = { ...p, entryDate: open.date, strike: prevStrike, expiry: prevExpiry, prima: String(acc), comision: String(n(open.comision)), ivr: open.ivr != null ? open.ivr : p.ivr, rollChain: chain };
  if (p.closed) {
    next.closeDate = close.date;
    next.closePrice = close.exercised ? "0" : close.price;
    next.closeComision = close.comision;
    next.closeNote = close.note || "";
    next.exercised = !!close.exercised;
  }
  return next;
}

/* ---------- editor de aperturas / rolls / cierre (v5.15) ----------
   Se abre desde el editor de la posición (bloque) y desde Movimientos → Estrategias. Permite corregir la
   apertura, cada roll individual y el cierre de una opción ya registrada. Para short put / covered call
   (crédito de una pata) edita la cadena completa; para el resto (PMCC, spreads, débito) deja la cadena en
   solo-lectura y edita apertura y cierre. */
function RollChainEditor({ p, onSave, onClose }) {
  const editableChain = natOf(p) === "CRED" && !isPMCC(p) && !isCreditSpread(p);
  const chain0 = p.rollChain || [];
  const initOpen = () => ({
    date: p.entryDate || "",
    strike: (chain0.length ? chain0[0].prevStrike : p.strike) || "",
    expiry: (chain0.length ? chain0[0].prevExpiry : p.expiry) || "",
    prima: String(chain0.length ? n(chain0[0].prevPrima) : n(p.prima)),
    comision: p.comision != null ? String(p.comision) : "",
    ivr: p.ivr || "",
  });
  const initRolls = () => chain0.map((r, idx, arr) => ({
    date: r.date || "",
    buyback: r.buybackCost != null ? String(r.buybackCost) : "",
    credit: r.newCredit != null ? String(r.newCredit) : "",
    strike: (idx + 1 < arr.length ? arr[idx + 1].prevStrike : p.strike) || "",
    expiry: (idx + 1 < arr.length ? arr[idx + 1].prevExpiry : p.expiry) || "",
    comision: r.comision != null ? String(r.comision) : "",
    ivr: r.ivr || "", delta: r.delta || "", note: r.note || "",
  }));
  const [open, setOpen] = useState(initOpen);
  const [rolls, setRolls] = useState(initRolls);
  const [cDate, setCDate] = useState(p.closeDate || "");
  const [cPrice, setCPrice] = useState(p.closePrice != null ? String(p.closePrice) : "");
  const [cCom, setCCom] = useState(p.closeComision != null ? String(p.closeComision) : "");
  const [cNote, setCNote] = useState(p.closeNote || "");
  const [cExercised, setCExercised] = useState(!!p.exercised);
  /* v1.07: recategorizar desde el editor — cambia p.tipo (y nat/right coherentes) al guardar.
     Opciones: las estrategias del bloque de la posición, más la actual si no está en la lista. */
  const [tipoV, setTipoV] = useState(p.tipo || "");
  const stratOpts = Array.from(new Set([...(STRATS[p.block] || []), ...(p.tipo ? [p.tipo] : [])]));
  const applyTipo = (obj) => {
    if ((tipoV || "") === (p.tipo || "")) return obj;
    const next = { ...obj, tipo: tipoV };
    const newNat = natFromStrat(tipoV);
    next.nat = newNat;
    if (newNat === "CRED") next.right = tipoV.toLowerCase().includes("call") ? "C" : "P";
    return next;
  };
  const setOpenF = (k) => (v) => setOpen((o) => ({ ...o, [k]: v }));
  const setRollF = (i, k) => (v) => setRolls((rs) => rs.map((r, idx) => (idx === i ? { ...r, [k]: v } : r)));
  const delRoll = (i) => setRolls((rs) => rs.filter((_, idx) => idx !== i));

  /* previsualización: prima acumulada y BEP vigente con lo que hay en el formulario */
  const primaAcc = n(open.prima) + rolls.reduce((s, r) => s + (n(r.credit) - n(r.buyback)), 0);
  const lastStrike = rolls.length ? n(rolls[rolls.length - 1].strike) : n(open.strike);
  const bepNow = lastStrike - primaAcc;
  /* BEP que va quedando tras cada pata: apertura = strike − prima; tras cada roll = nuevo strike − prima acumulada */
  const bepOpen = n(open.strike) - n(open.prima);
  const rollBep = (() => { let acc = n(open.prima); return rolls.map((r) => { acc += (n(r.credit) - n(r.buyback)); return n(r.strike) - acc; }); })();

  const save = () => {
    if (editableChain) {
      onSave(applyTipo(rebuildCredChain(p, open, rolls, { date: cDate, price: cPrice, comision: cCom, note: cNote, exercised: cExercised })));
    } else {
      const next = { ...p, entryDate: open.date };
      if (p.closed) { next.closeDate = cDate; next.closePrice = cExercised ? "0" : cPrice; next.closeComision = cCom; next.closeNote = cNote; next.exercised = !!cExercised; }
      onSave(applyTipo(next));
    }
    onClose();
  };
  const canExercise = natOf(p) === "CRED" && !isPMCC(p);
  const dateStyle = { width: "100%", boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 11, color: T.ink, fontSize: 14, fontWeight: 700, padding: "0 10px", outline: "none" };
  return (
    <div onClick={onClose} onTouchStart={(e) => e.stopPropagation()} onTouchMove={(e) => e.stopPropagation()} onTouchEnd={(e) => e.stopPropagation()}
      style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "88vh", overflowY: "auto", boxSizing: "border-box", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, display: "flex", alignItems: "center", gap: 8 }}><ActIcon name="edit" size={19} />Editar {p.tkr || "posición"}</div>
            <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 2 }}>{p.tipo || "Opción"} · {optionDetail(p) || "—"}{editableChain ? " · corrige apertura, rolls y cierre" : " · apertura y cierre (cadena en solo-lectura)"}</div>
          </div>
          <button onClick={onClose} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
        </div>

        {/* APERTURA */}
        {/* v1.07: recategorización rápida — selector de estrategia arriba del todo */}
        <div style={{ margin: "2px 0 10px" }}>
          <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>Estrategia</span>
          <select value={tipoV} onChange={(e) => setTipoV(e.target.value)}
            style={{ width: "100%", boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${tipoV !== (p.tipo || "") ? T.purple : T.line}`, borderRadius: 11, color: T.ink, fontSize: 14, fontWeight: 700, padding: "0 10px", outline: "none", appearance: "none", WebkitAppearance: "none" }}>
            {stratOpts.map((s) => <option key={s} value={s}>{s}</option>)}
          </select>
          {tipoV !== (p.tipo || "") && <div style={{ fontSize: 10.5, color: T.purple, fontWeight: 700, marginTop: 4 }}>Se recategorizará como "{tipoV}" al guardar{natFromStrat(tipoV) !== natOf(p) ? " — cambia la naturaleza: revisa después los campos de la posición" : ""}.</div>}
        </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, margin: "6px 0 8px" }}>
          <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5 }}>Apertura</span>
          {editableChain && <span style={{ fontSize: 11, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums" }}>BEP tras apertura ${money2(bepOpen)}</span>}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <WizInput label="Fecha de entrada" value={open.date} onChange={setOpenF("date")} type="date" />
          {editableChain && <WizInput label="Strike apertura" value={open.strike} onChange={setOpenF("strike")} placeholder="$" inputMode="decimal" />}
          {editableChain && <WizInput label="Expiry apertura" value={open.expiry} onChange={setOpenF("expiry")} type="date" />}
          {editableChain && <WizInput label="Prima apertura $/acc" value={open.prima} onChange={setOpenF("prima")} placeholder="$" inputMode="decimal" />}
          {editableChain && <WizInput label="Comisión apertura" value={open.comision} onChange={setOpenF("comision")} placeholder="$" inputMode="decimal" />}
          {editableChain && <WizInput label="IVR apertura" value={open.ivr} onChange={setOpenF("ivr")} inputMode="numeric" />}
        </div>

        {/* ROLLS */}
        {editableChain && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "16px 0 8px" }}>
              <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5 }}>Rolls ({rolls.length})</span>
            </div>
            {rolls.length === 0 && <div style={{ fontSize: 12, color: T.sub, fontWeight: 500, padding: "2px 2px 4px" }}>Sin rolls. La posición se abrió y no se ha rolado.</div>}
            {rolls.map((r, i) => (
              <div key={i} style={{ background: T.tile, borderRadius: 14, padding: "12px 12px 10px", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 11.5, fontWeight: 800, color: T.purple, whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 5 }}><ActIcon name="roll" size={13} />Roll {i + 1}</span>
                  <span style={{ fontSize: 11, fontWeight: 800, color: T.green, fontVariantNumeric: "tabular-nums", marginLeft: "auto" }}>BEP ${money2(rollBep[i])}</span>
                  <button onClick={() => delRoll(i)} style={{ background: "transparent", border: "none", fontSize: 11.5, fontWeight: 700, color: T.red, cursor: "pointer", whiteSpace: "nowrap" }}>Eliminar</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <WizInput label="Fecha del roll" value={r.date} onChange={setRollF(i, "date")} type="date" />
                  <WizInput label="Nuevo expiry" value={r.expiry} onChange={setRollF(i, "expiry")} type="date" />
                  <WizInput label="Nuevo strike" value={r.strike} onChange={setRollF(i, "strike")} placeholder="$" inputMode="decimal" />
                  <WizInput label="IVR" value={r.ivr} onChange={setRollF(i, "ivr")} inputMode="numeric" />
                  <WizInput label="Recompra $/acc" value={r.buyback} onChange={setRollF(i, "buyback")} placeholder="$" inputMode="decimal" />
                  <WizInput label="Nueva venta $/acc" value={r.credit} onChange={setRollF(i, "credit")} placeholder="$" inputMode="decimal" />
                  <WizInput label="Comisión" value={r.comision} onChange={setRollF(i, "comision")} placeholder="$" inputMode="decimal" />
                  <WizInput label="Delta nueva short" value={r.delta} onChange={setRollF(i, "delta")} inputMode="decimal" />
                  <div style={{ gridColumn: "span 2" }}><WizInput label="Comentario" value={r.note} onChange={setRollF(i, "note")} /></div>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tileGreen, borderRadius: 12, padding: "9px 12px", marginBottom: 4 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: T.sub }}>Prima acumulada · BEP vigente</span>
              <span style={{ fontSize: 14, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${money2(primaAcc)} · BEP ${money2(bepNow)}</span>
            </div>
          </>
        )}

        {!editableChain && (
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Cadena (solo lectura)</div>
            <div style={{ background: T.tile, borderRadius: 14, padding: "10px 12px" }}><RollChainTable p={p} /></div>
          </div>
        )}

        {/* CIERRE */}
        {p.closed && (
          <>
            <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, margin: "16px 0 8px" }}>Cierre</div>
            {canExercise && (
              <div style={{ marginBottom: 10 }}>
                <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>¿Cómo se cerró?</span>
                <Pill options={["Recompra", "Ejercida / asignada"]} value={cExercised ? "Ejercida / asignada" : "Recompra"} onChange={(v) => setCExercised(v === "Ejercida / asignada")} size="sm" />
                {cExercised && <div style={{ fontSize: 11, color: T.gold, fontWeight: 700, marginTop: 5 }}>Cuenta como pérdida para el win rate. (No recrea la acción en B1: eso solo pasa al asignar desde el cierre.)</div>}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <WizInput label="Fecha de cierre" value={cDate} onChange={setCDate} type="date" />
              {!cExercised && <WizInput label="Precio de cierre $/acc" value={cPrice} onChange={setCPrice} placeholder="$" inputMode="decimal" />}
              <WizInput label="Comisión de cierre" value={cCom} onChange={setCCom} placeholder="$" inputMode="decimal" />
              <div style={{ gridColumn: "span 2" }}><WizInput label="Comentario del cierre" value={cNote} onChange={setCNote} /></div>
            </div>
          </>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
          <button onClick={onClose} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Cancelar</button>
          <button onClick={save} style={{ flex: 2, background: T.green, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Guardar cambios</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- editor de lotes de una posición de acciones/ETF (v5.22) ----------
   Cada lote = {date, qty, price}. El total de acciones y el BEP (media ponderada) se derivan de los lotes.
   Se abre pulsando "Lotes / añadir lote" en una posición de acciones. */
function LotsEditor({ p, onSave, onClose }) {
  const mkLot = (date, qty, price, fee) => ({ id: "l" + Math.random().toString(36).slice(2, 8), date: date || "", qty: qty != null ? String(qty) : "", price: price != null ? String(price) : "", fee: fee != null ? String(fee) : "" });
  const seed = () => (hasLots(p) ? p.lots.map((l) => ({ ...l })) : [mkLot(p.entryDate || "", n(p.qty) || "", n(p.bep) || "")]);
  const [lots, setLots] = useState(seed);
  const [sales, setSales] = useState(() => (Array.isArray(p.soldLots) ? p.soldLots.map((s) => ({ ...s })) : []));
  const [sellIdx, setSellIdx] = useState(null);
  const [sellQty, setSellQty] = useState("");
  const [sellPrice, setSellPrice] = useState("");
  const [sellDate, setSellDate] = useState("");
  const [sellFee, setSellFee] = useState("");
  const [openLot, setOpenLot] = useState(null); // id del lote desplegado para editar (acordeón)
  const setLotF = (i, k) => (v) => setLots((ls) => ls.map((l, idx) => (idx === i ? { ...l, [k]: v } : l)));
  const addLot = () => setLots((ls) => [...ls, mkLot(new Date().toISOString().slice(0, 10), "", "")]);
  const delLot = (i) => setLots((ls) => ls.filter((_, idx) => idx !== i));
  const openSell = (i) => { setSellIdx(i); setOpenLot(lots[i].id || i); setSellQty(String(n(lots[i].qty))); setSellPrice(""); setSellDate(new Date().toISOString().slice(0, 10)); setSellFee(""); };
  const confirmSell = () => {
    const i = sellIdx; if (i == null) return;
    const lot = lots[i]; const lq = n(lot.qty); const q = Math.min(n(sellQty), lq);
    if (q <= 0 || n(sellPrice) === 0) { setSellIdx(null); return; }
    /* v2.14: el coste de la venta es el efectivo por acción (precio + comisión de compra repartida) */
    const sale = { id: "s" + Math.random().toString(36).slice(2, 8), date: sellDate || "", qty: String(q), price: String(n(sellPrice)), cost: String(lotUnit(lot)), fee: String(n(sellFee)) };
    setSales((ss) => [sale, ...ss]);
    setLots((ls) => ls.map((l, idx) => (idx === i ? { ...l, qty: String(n(l.qty) - q), fee: String(lq ? n(l.fee) * (lq - q) / lq : 0) } : l)).filter((l) => n(l.qty) > 0));
    setSellIdx(null);
  };
  const removeSale = (sid) => {
    const s = sales.find((x) => x.id === sid); if (!s) return;
    setLots((ls) => [...ls, mkLot(s.date, n(s.qty), n(s.cost))]);
    setSales((ss) => ss.filter((x) => x.id !== sid));
  };
  const saleRealized = (s) => (n(s.price) - n(s.cost)) * n(s.qty) - n(s.fee);
  const realizedTotal = sales.reduce((a, s) => a + saleRealized(s), 0);
  const totQty = lots.reduce((s, l) => s + n(l.qty), 0);
  const totCost = lots.reduce((s, l) => s + n(l.qty) * lotUnit(l), 0); /* v2.14: coste incluye la comisión de compra */
  const bep = totQty ? totCost / totQty : 0;
  const lastPx = n(p.last);
  const totUnrl = lastPx ? (lastPx - bep) * totQty : NaN;
  const totPct = lastPx && bep ? (lastPx / bep - 1) : NaN;
  const save = () => {
    const cleanSales = sales.filter((s) => n(s.qty) > 0);
    const remainingQty = lots.reduce((a, l) => a + n(l.qty), 0);
    let next = { ...applyLots(p, lots), soldLots: cleanSales };
    if (cleanSales.length && remainingQty <= 0) {
      /* todo vendido → posición cerrada. El P&L realizado se registra vía soldLots (Movimientos/MTM);
         se deja closePrice vacío para no duplicar el cierre. */
      const lastDate = cleanSales.map((s) => s.date).filter(Boolean).sort().slice(-1)[0] || next.entryDate;
      next = { ...next, qty: "0", closed: true, closeDate: lastDate, closePrice: "", closeComision: "" };
    } else if (p.closed && remainingQty > 0) {
      next = { ...next, closed: false };
    }
    onSave(next);
    onClose();
  };
  return (
    <div onClick={onClose} onTouchStart={(e) => e.stopPropagation()} onTouchMove={(e) => e.stopPropagation()} onTouchEnd={(e) => e.stopPropagation()}
      style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "88vh", overflowY: "auto", boxSizing: "border-box", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, display: "flex", alignItems: "center", gap: 8 }}><ActIcon name="lots" size={19} />Lotes de {p.tkr || "acciones"}</div>
            <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 2 }}>Compra por fecha/acciones/precio (el BEP es la media ponderada). Puedes vender un lote entero o en parte: cada venta se registra en Movimientos/MTM.</div>
          </div>
          <button onClick={onClose} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
        </div>

        <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Lotes abiertos</div>
        {lots.length === 0 && <div style={{ fontSize: 12, color: T.sub, fontWeight: 500, padding: "2px 2px 8px" }}>No quedan acciones abiertas — todo vendido. Al guardar, la posición se cierra.</div>}
        {lots.map((l, i) => {
          const lid = l.id || i;
          const isOpen = openLot === lid;
          const px = n(p.last), cost = lotUnit(l), qy = n(l.qty); /* v2.14: BEP del lote incluye su comisión de compra */
          const unrl = px ? (px - cost) * qy : NaN;
          const pct = px && cost ? (px / cost - 1) : NaN;
          const dateLbl = l.date ? new Date(l.date + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "numeric" }) : "sin fecha";
          return (
            <div key={lid} style={{ background: T.tile, borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
              {/* resumen del lote (tipo cadena): fecha · cantidad · BEP · unrealised + % */}
              <div onClick={() => setOpenLot(isOpen ? null : lid)} style={{ padding: "11px 12px", cursor: "pointer" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                  <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, whiteSpace: "nowrap" }}>{dateLbl}</span>
                  <span style={{ fontSize: 12.5, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: isFinite(unrl) ? (unrl >= 0 ? T.green : T.red) : T.sub }}>{isFinite(unrl) ? signMoney(unrl) : "sin precio"}{isFinite(pct) ? " (" + (pct >= 0 ? "+" : "") + (pct * 100).toFixed(1) + "%)" : ""}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, marginTop: 3 }}>
                  <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, fontVariantNumeric: "tabular-nums" }}>{qy} acc · BEP ${money2(cost)}</span>
                  <span style={{ fontSize: 10.5, fontWeight: 700, color: T.purple }}>{isOpen ? "▲ cerrar" : "▼ editar / vender"}</span>
                </div>
              </div>
              {isOpen && (
                <div style={{ padding: "0 12px 12px" }}>
                  <div style={{ marginBottom: 8 }}><WizInput label="Fecha de compra" value={l.date} onChange={setLotF(i, "date")} type="date" /></div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <WizInput label="Nº acciones" value={l.qty} onChange={setLotF(i, "qty")} inputMode="numeric" />
                    <WizInput label="Precio $/acc" value={l.price} onChange={setLotF(i, "price")} placeholder="$" inputMode="decimal" />
                  </div>
                  {/* v2.14: comisión de compra del lote — sube el BEP (se reparte entre las acciones del lote) */}
                  <div style={{ marginTop: 8 }}><WizInput label="Comisión de compra" value={l.fee} onChange={setLotF(i, "fee")} placeholder="$" inputMode="decimal" /></div>
                  <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                    <button onClick={() => (sellIdx === i ? setSellIdx(null) : openSell(i))} style={{ flex: 1, background: T.tileGreen, border: "none", borderRadius: 10, padding: "9px 0", fontSize: 12.5, fontWeight: 800, color: T.green, cursor: "pointer" }}>{sellIdx === i ? "Cancelar venta" : "💵 Vender"}</button>
                    {lots.length > 1 && <button onClick={() => { delLot(i); setOpenLot(null); }} style={{ flexShrink: 0, background: "transparent", border: "none", fontSize: 12, fontWeight: 700, color: T.red, cursor: "pointer", padding: "0 10px" }}>Eliminar lote</button>}
                  </div>
                  {sellIdx === i && (
                    <div style={{ marginTop: 10, background: T.tileGreen, borderRadius: 12, padding: "10px 11px" }}>
                      <div style={{ fontSize: 10.5, fontWeight: 800, color: T.green, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Vender de este lote</div>
                      <div style={{ marginBottom: 8 }}><WizInput label="Fecha venta" value={sellDate} onChange={setSellDate} type="date" /></div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <WizInput label={"Nº acciones (máx " + qy + ")"} value={sellQty} onChange={setSellQty} inputMode="numeric" />
                        <WizInput label="Precio venta $/acc" value={sellPrice} onChange={setSellPrice} placeholder="$" inputMode="decimal" />
                      </div>
                      <div style={{ marginTop: 8 }}><WizInput label="Comisión" value={sellFee} onChange={setSellFee} placeholder="$" inputMode="decimal" /></div>
                      {n(sellQty) > 0 && n(sellPrice) > 0 && (
                        <div style={{ fontSize: 11.5, fontWeight: 700, color: (n(sellPrice) - cost) >= 0 ? T.green : T.red, marginTop: 6 }}>P&L de la venta: {signMoney((n(sellPrice) - cost) * Math.min(n(sellQty), qy) - n(sellFee))}</div>
                      )}
                      <button onClick={confirmSell} style={{ width: "100%", marginTop: 8, background: T.green, border: "none", borderRadius: 10, padding: "10px 0", fontSize: 13, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Registrar venta</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        <button onClick={addLot} style={{ width: "100%", background: T.tilePurple, border: "none", borderRadius: 12, padding: "11px 0", fontSize: 13.5, fontWeight: 800, color: T.purple, cursor: "pointer", marginBottom: 12 }}>➕ Añadir lote</button>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tileGreen, borderRadius: 12, padding: "10px 12px", marginBottom: 4 }}>
          <div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Abierto · BEP medio</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{totQty} acc · BEP ${money2(bep)}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Coste abierto</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>${money2(totCost)}</div>
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: isFinite(totUnrl) ? (totUnrl >= 0 ? T.tileGreen : T.tileRed) : T.tile, borderRadius: 12, padding: "10px 12px", marginBottom: 4 }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Unrealised (abierto)</div>
          <div style={{ fontSize: 16, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: isFinite(totUnrl) ? (totUnrl >= 0 ? T.green : T.red) : T.sub }}>{isFinite(totUnrl) ? signMoney(totUnrl) : "sin precio"}{isFinite(totPct) ? " (" + (totPct >= 0 ? "+" : "") + (totPct * 100).toFixed(1) + "%)" : ""}</div>
        </div>

        {sales.length > 0 && (
          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5 }}>Ventas registradas</span>
              <span style={{ fontSize: 12, fontWeight: 800, color: realizedTotal >= 0 ? T.green : T.red }}>P&L realizado {signMoney(realizedTotal)}</span>
            </div>
            <div style={{ display: "grid", gap: 7 }}>
              {sales.map((s) => (
                <div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 12, padding: "9px 11px", gap: 8 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 800, color: T.ink }}>{n(s.qty)} acc @ ${money2(n(s.price))} <span style={{ fontSize: 10.5, fontWeight: 600, color: T.sub }}>(coste ${money2(n(s.cost))})</span></div>
                    <div style={{ fontSize: 10.5, fontWeight: 600, color: T.sub }}>{s.date || "sin fecha"} · <span style={{ color: saleRealized(s) >= 0 ? T.green : T.red, fontWeight: 800 }}>{signMoney(saleRealized(s))}</span></div>
                  </div>
                  <button onClick={() => removeSale(s.id)} style={{ flexShrink: 0, background: "transparent", border: "none", fontSize: 11, fontWeight: 700, color: T.red, cursor: "pointer" }}>Deshacer</button>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 10.5, color: T.sub, lineHeight: 1.45, marginTop: 6 }}>Cada venta aparece en Movimientos → MTM con su P&L realizado. "Deshacer" devuelve esas acciones a un lote abierto.</div>
          </div>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
          <button onClick={onClose} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Cancelar</button>
          <button onClick={save} style={{ flex: 2, background: T.green, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- editor de dividendos de una posición de acciones/ETF (v5.28, retención v3.63) ----------
   Cada dividendo = {date, amount, ret, fee}. v3.63 (Victor: "algunos brokers retienen impuestos"): campo
   RETENCIÓN — el neto que va a Primas y MTM es importe − retención − comisión. */
function DividendsEditor({ p, onSave, onClose }) {
  const mkDiv = (date, amount, fee) => ({ id: "d" + Math.random().toString(36).slice(2, 8), date: date || "", amount: amount != null ? String(amount) : "", ret: "", fee: fee != null ? String(fee) : "" });
  const [divs, setDivs] = useState(() => (Array.isArray(p.dividends) ? p.dividends.map((d) => ({ ...d })) : [mkDiv(new Date().toISOString().slice(0, 10), "", "")]));
  const setDivF = (i, k) => (v) => setDivs((ds) => ds.map((d, idx) => (idx === i ? { ...d, [k]: v } : d)));
  const addDiv = () => setDivs((ds) => [...ds, mkDiv(new Date().toISOString().slice(0, 10), "", "")]);
  const delDiv = (i) => setDivs((ds) => ds.filter((_, idx) => idx !== i));
  const net = (d) => n(d.amount) - n(d.ret) - n(d.fee);
  const total = divs.reduce((a, d) => a + net(d), 0);
  const save = () => { onSave({ ...p, dividends: divs.filter((d) => n(d.amount) !== 0 || n(d.ret) !== 0 || n(d.fee) !== 0).map((d) => ({ id: d.id, date: d.date || "", amount: String(n(d.amount)), ret: String(n(d.ret)), fee: String(n(d.fee)) })) }); onClose(); };
  return (
    <div onClick={onClose} onTouchStart={(e) => e.stopPropagation()} onTouchMove={(e) => e.stopPropagation()} onTouchEnd={(e) => e.stopPropagation()}
      style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "88vh", overflowY: "auto", boxSizing: "border-box", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, display: "flex", alignItems: "center", gap: 8 }}><ActIcon name="dividend" size={19} />Dividendos de {p.tkr || "acciones"}</div>
            <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 2 }}>Fecha, importe, retención del bróker y comisión. El NETO es lo que se registra en Movimientos → Primas y en MTM.</div>
          </div>
          <button onClick={onClose} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
        </div>

        {divs.map((d, i) => (
          <div key={d.id || i} style={{ background: T.tile, borderRadius: 14, padding: "12px 12px 10px", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 11.5, fontWeight: 800, color: net(d) >= 0 ? T.green : T.red }}>{signMoney(net(d))} neto</span>
              {divs.length > 1 && <button onClick={() => delDiv(i)} style={{ background: "transparent", border: "none", fontSize: 11.5, fontWeight: 700, color: T.red, cursor: "pointer" }}>Eliminar</button>}
            </div>
            <div style={{ marginBottom: 8 }}><WizInput label="Fecha" value={d.date} onChange={setDivF(i, "date")} type="date" /></div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <WizInput label="Importe $" value={d.amount} onChange={setDivF(i, "amount")} placeholder="$" inputMode="decimal" />
              <WizInput label="Retención $" value={d.ret} onChange={setDivF(i, "ret")} placeholder="$" inputMode="decimal" />
              <WizInput label="Comisión $" value={d.fee} onChange={setDivF(i, "fee")} placeholder="$" inputMode="decimal" />
            </div>
          </div>
        ))}

        <button onClick={addDiv} style={{ width: "100%", background: T.tilePurple, border: "none", borderRadius: 12, padding: "11px 0", fontSize: 13.5, fontWeight: 800, color: T.purple, cursor: "pointer", marginBottom: 12 }}>➕ Añadir dividendo</button>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: total >= 0 ? T.tileGreen : T.tileRed, borderRadius: 12, padding: "10px 12px", marginBottom: 4 }}>
          <span style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Total dividendos (neto)</span>
          <span style={{ fontSize: 16, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: total >= 0 ? T.green : T.red }}>{signMoney(total)}</span>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
          <button onClick={onClose} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Cancelar</button>
          <button onClick={save} style={{ flex: 2, background: T.green, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- v2.14: tarjeta-resumen que aparece al CERRAR una posición ----------
   Victor: "al cerrar cualquier posición abierta, que salga la tarjeta resumen de esa posición como en
   Histórico (ROI, ROI anualizado, DIT…), que se pueda cerrar y te quedes en el mismo menú — que NO te
   lleve a Histórico". Mismas fórmulas que la ficha de Histórico, pero autónoma (realizedOf). */
function PosSummaryCard({ p, onClose }) {
  const isOpt = isOptionNat(p);
  const qty = n(p.qty);
  const result = realizedOf(p);
  const dte = isOpt ? daysBetween(p.entryDate, p.expiry) : NaN;
  const dit = daysBetween(p.entryDate, p.closeDate || p.entryDate);
  const fmtPct2 = (v) => (isFinite(v) ? (v >= 0 ? "+" : "") + (v * 100).toFixed(2) + "%" : "\u2014");
  let roi = NaN, annRoi = NaN, riesgo = NaN;
  const bep = effBep(p);
  if (isOpt) {
    const origBep = n(_oStrike(p)) - n(_oPrimaPS(p));
    riesgo = natOf(p) === "CRED" ? (isPMCC(p) ? riesgoTotalOf(p) : Math.abs(origBep * qty)) : capDesplegado(p);
    roi = riesgo ? result / riesgo : NaN;
  } else {
    riesgo = Math.abs(n(bep) * qty);
    roi = riesgo ? result / riesgo : NaN;
  }
  annRoi = isFinite(roi) && isFinite(dit) && dit > 0 ? roi * (365 / dit) : NaN;
  const posColor = result >= 0 ? T.green : T.red;
  const detail = isOpt ? optionDetail(p) : null;
  const Tile = ({ label, value, tone }) => {
    /* v3.32 (Victor: "el ROI se sale del cuadro"): en la rejilla de 4 celdas estrechas, "+151.23%" no
       cabía a 15px. La fuente se reduce según el largo y la celda recorta con elipsis por si acaso. */
    const s = String(value);
    const fs = s.length >= 9 ? 11.5 : s.length >= 7 ? 13 : 15;
    return (
      <div style={{ background: T.tile, borderRadius: 12, padding: "9px 6px", textAlign: "center", minWidth: 0 }}>
        <div style={{ fontSize: fs, fontWeight: 800, color: tone === "green" ? T.green : tone === "red" ? T.red : T.ink, fontVariantNumeric: "tabular-nums", letterSpacing: -0.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{value}</div>
        <div style={{ fontSize: 9.5, fontWeight: 600, color: T.sub, marginTop: 2 }}>{label}</div>
      </div>
    );
  };
  return (
    <div onClick={onClose} onTouchStart={(e) => e.stopPropagation()} onTouchMove={(e) => e.stopPropagation()} onTouchEnd={(e) => e.stopPropagation()}
      style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 75, padding: "calc(14px + env(safe-area-inset-top)) 16px calc(14px + env(safe-area-inset-bottom))" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 24, padding: "18px 18px 16px", width: "100%", maxWidth: 440, maxHeight: "88vh", overflowY: "auto", boxSizing: "border-box", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10, marginBottom: 12 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 10, fontWeight: 800, color: T.green, textTransform: "uppercase", letterSpacing: 0.5 }}>{p.exercised ? "Posición asignada" : "Posición cerrada"}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginTop: 3 }}>
              <span style={{ fontSize: 17, fontWeight: 800, color: T.ink, letterSpacing: -0.3 }}>{p.tkr || "\u2014"}</span>
              {p.tipo && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 6px" }}>{tipoChipLabel(p)}</span>}
              {detail && <span style={{ fontSize: 11, fontWeight: 600, color: T.sub }}>{detail}</span>}
            </div>
            <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, marginTop: 3, fontVariantNumeric: "tabular-nums" }}>{ibkrDate(p.entryDate)}{p.closeDate ? " \u2192 " + ibkrDate(p.closeDate) : ""}</div>
          </div>
          <button onClick={onClose} aria-label="Cerrar" style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, background: T.tile, borderRadius: 16, padding: "13px 14px", marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 24, fontWeight: 800, color: posColor, letterSpacing: -0.5 }}>{signMoney(result)}</div>
            <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 500 }}>P&L realizado</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: isFinite(annRoi) ? (annRoi >= 0 ? T.green : T.red) : T.sub, letterSpacing: -0.5 }}>{fmtPct2(annRoi)}</div>
            <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 500 }}>Annualized ROI</div>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: isOpt ? "1fr 1fr 1fr 1fr" : "1fr 1fr 1fr", gap: 8 }}>
          <Tile label="ROI" value={fmtPct2(roi)} tone={isFinite(roi) ? (roi >= 0 ? "green" : "red") : undefined} />
          <Tile label={isOpt ? "Riesgo" : "Invertido"} value={isFinite(riesgo) && riesgo ? "$" + money(riesgo) : "\u2014"} />
          <Tile label="BEP" value={isFinite(n(bep)) && n(bep) ? "$" + money2(bep) : "\u2014"} />
          {isOpt && <Tile label="DTE" value={isFinite(dte) ? dte + "d" : "\u2014"} />}
          <Tile label="DIT" value={isFinite(dit) ? dit + "d" : "\u2014"} />
        </div>
        {!isOpt && p.closePrice !== "" && p.closePrice != null && (
          <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, textAlign: "center", marginTop: 8 }}>Precio de venta ${money2(n(p.closePrice))}</div>
        )}
        <button onClick={onClose} style={{ width: "100%", marginTop: 14, background: T.dark, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Hecho</button>
      </div>
    </div>
  );
}

function PositionRow({ p, editing, onToggle, onDone, onChange, onDelete, onRoll, onClose, onReopen, onLegOp, pctBloque, pctCartera, showPnl, brokers, hideBroker, pendingAction, clearPending, onRollingChange, coveredLabel, onEditChain, onEditLots }) {
  const detail = optionDetail(p);
  const nat = natOf(p);
  const cap = capDesplegado(p);
  const plausible = plausibleOf(p);
  const opt = isOptionNat(p);
  const contratos = contractsOf(p);
  const cash = isCashNat(p);
  const qtyNum = opt ? (Number.isInteger(contratos) ? contratos : n(p.qty)) : n(p.qty);
  const qtyUnit = opt ? (Number.isInteger(contratos) ? "contr." : "opc") : "acc";
  const pnlVal = effPnl(p);
  const pnlBasis = Math.abs(effBep(p) * n(p.qty)) || Math.abs(n(p.mktValue)) || cap;
  const pnlPct = pnlBasis ? pnlVal / pnlBasis : NaN;
  const rollChain = p.rollChain || [];
  const canRoll = !!onRoll && !p.closed && opt && natOf(p) === "CRED"; // roll de cadena: solo opciones cortas (Short Put/Short Call, nat=Crédito)
  const canClose = !!onClose && !p.closed && (nat === "ACC" || nat === "COLLAR" || opt) && !(isVertical(p) && (p.noShort || p.noLong)); // acciones/collar/cualquier opción; vertical con UNA pata cerrada se remata desde su hoja de pata
  const [rolling, setRolling] = useState(false);
  /* "Avanzado" del editor (valor mercado / margen / P&L): plegado por defecto; abierto de inicio si el
     P&L está en Manual — señal de que la posición no tiene precio autodescargable y ese campo SÍ se usa */
  const [showAdv, setShowAdv] = useState(() => !isAutoPnl(p) || p.mktModo === "MANUAL");
  const [blockAsk, setBlockAsk] = useState(null); // v3.48: bloque destino pendiente de confirmar en el editor
  const [rollDate, setRollDate] = useState("");
  const [rollStrike, setRollStrike] = useState("");
  const [rollExpiry, setRollExpiry] = useState("");
  const [rollBuyback, setRollBuyback] = useState("");
  const [rollCredit, setRollCredit] = useState("");
  const [rollComision, setRollComision] = useState("");
  const [rollIvr, setRollIvr] = useState("");
  const [rollDelta, setRollDelta] = useState(""); // delta de la nueva short vendida en el roll
  const [rollNote, setRollNote] = useState("");
  const [rollOcrBusy, setRollOcrBusy] = useState(false);
  const [rollOcrMsg, setRollOcrMsg] = useState("");
  const rollPhotoRef = useRef(null);
  const onRollPhoto = async (file) => {
    if (!file) return;
    const gkey = (() => { try { return (localStorage.getItem(KEY_GEMINI) || "").trim(); } catch (e) { return ""; } })();
    if (!gkey) { setRollOcrMsg("Añade tu API key de Gemini en Ajustes para leer capturas."); return; }
    setRollOcrBusy(true); setRollOcrMsg("Leyendo captura…");
    try {
      let result = null, lastErr = "";
      for (const model of GEMINI_MODELS) {
        try { result = await extractLegsFromImage(file, gkey, model); break; }
        catch (err) { lastErr = String((err && err.message) || err); if (!(err && err.status === 429)) break; }
      }
      if (!result) { setRollOcrMsg("Gemini falló: " + lastErr); return; }
      const patch = mapLegsToRoll(result);
      let filled = 0;
      if (patch.date) { setRollDate(patch.date); filled++; }
      if (patch.strike) { setRollStrike(patch.strike); filled++; }
      if (patch.expiry) { setRollExpiry(patch.expiry); filled++; }
      if (patch.buyback) { setRollBuyback(patch.buyback); filled++; }
      if (patch.credit) { setRollCredit(patch.credit); filled++; }
      if (patch.comision) { setRollComision(patch.comision); filled++; }
      setRollOcrMsg(filled ? "✓ " + filled + " campos rellenados — revísalos antes de confirmar." : "No reconocí datos de roll en la captura.");
    } catch (e) {
      setRollOcrMsg("Error: " + String((e && e.message) || e));
    } finally { setRollOcrBusy(false); }
  };
  const openRoll = () => { setRollDate(new Date().toISOString().slice(0, 10)); setRollStrike(p.strike || ""); setRollExpiry(""); setRollBuyback(""); setRollCredit(""); setRollComision(""); setRollIvr(""); setRollDelta(""); setRollNote(""); setRollOcrMsg(""); setRolling(true); };
  const confirmRoll = () => {
    onRoll({ date: rollDate, strike: rollStrike, expiry: rollExpiry, buybackCost: rollBuyback, newCredit: rollCredit, comision: rollComision, ivr: rollIvr, delta: rollDelta, note: rollNote });
    setRolling(false);
  };
  const [closing, setClosing] = useState(false);
  const [closeDateV, setCloseDateV] = useState("");
  const [closePriceV, setClosePriceV] = useState("");
  const [closeComisionV, setCloseComisionV] = useState("");
  const [closeNoteV, setCloseNoteV] = useState("");
  const [closeLongPriceV, setCloseLongPriceV] = useState(""); // PMCC: precio de venta de la pata larga
  const [closeLongComisionV, setCloseLongComisionV] = useState("");
  const [closeKind, setCloseKind] = useState("recompra"); // v3.58: "recompra" | "exercised" | "expira"
  const closeExercised = closeKind === "exercised";
  const closeExpira = closeKind === "expira";
  const [closeMode, setCloseMode] = useState("total"); // acciones: total o parcial
  const [closeQtyV, setCloseQtyV] = useState(""); // nº de acciones en cierre parcial
  const openClose = () => { setCloseDateV(new Date().toISOString().slice(0, 10)); setClosePriceV(""); setCloseComisionV(""); setCloseNoteV(""); setCloseLongPriceV(""); setCloseLongComisionV(""); setCloseKind("recompra"); setCloseMode("total"); setCloseQtyV(String(n(p.qty))); setClosing(true); };
  const confirmClose = () => {
    const partial = natOf(p) === "ACC" && closeMode === "parcial";
    onClose({ date: closeDateV, price: (closeExercised || closeExpira || (isPMCC(p) && p.noShort)) ? "0" : closePriceV, comision: closeExpira ? "0" : closeComisionV, note: closeNoteV, longPrice: closeLongPriceV, longComision: closeLongComisionV, exercised: closeExercised, partial, qtyPart: partial ? closeQtyV : "" });
    setClosing(false);
  };
  /* v3.50: hoja de PATA de un vertical (Credit Spread) — cerrar / rolar / reabrir solo la corta o la larga */
  const [legSheet, setLegSheet] = useState(null); // { leg: "S" | "L" }
  const [legMode, setLegMode] = useState("close"); // close | roll | open
  const [legDate, setLegDate] = useState("");
  const [legPx, setLegPx] = useState("");
  const [legNewK, setLegNewK] = useState("");
  const [legNewP, setLegNewP] = useState("");
  const [legNewExpiry, setLegNewExpiry] = useState("");
  const [legFee, setLegFee] = useState("");
  const [legNote, setLegNote] = useState("");
  const openLeg = (leg) => {
    const closedLeg = leg === "S" ? p.noShort : p.noLong;
    setLegMode(closedLeg ? "open" : "close");
    setLegDate(new Date().toISOString().slice(0, 10));
    setLegPx(""); setLegNewK(""); setLegNewP(""); setLegNewExpiry(""); setLegFee(""); setLegNote("");
    setLegSheet({ leg });
  };
  const confirmLeg = () => {
    onLegOp && onLegOp({ leg: legSheet.leg, act: legMode, date: legDate, px: legMode === "open" ? legNewP : legPx, newK: legNewK, newP: legNewP, newExpiry: legNewExpiry, fee: legFee, note: legNote });
    setLegSheet(null);
  };
  useEffect(() => {
    if (pendingAction && pendingAction.id === p.id) {
      if (pendingAction.action === "roll") openRoll();
      if (pendingAction.action === "close") openClose();
      if (pendingAction.action === "legS") openLeg("S");
      if (pendingAction.action === "legL") openLeg("L");
      clearPending && clearPending();
    }
  }, [pendingAction]);
  /* avisa hacia arriba cuando hay una hoja de roll/cierre abierta (BlockCard desactiva el swipe-eliminar) */
  useEffect(() => { onRollingChange && onRollingChange(rolling || closing || !!legSheet); return () => { onRollingChange && onRollingChange(false); }; }, [rolling, closing, legSheet]);
  return (
    <div style={{ borderTop: `1px solid ${T.line}`, padding: "10px 0" }}>
      {coveredLabel && coveredLabel.length > 0 && natOf(p) === "ACC" && (
        <div style={{ background: T.tilePurple, borderLeft: `3px solid ${T.purple}`, borderRadius: 8, padding: "5px 9px", marginBottom: 7 }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: T.purple, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: coveredLabel.length > 1 ? 3 : 0, display: "flex", alignItems: "center", gap: 6 }}>
            <span>🛡️ {coveredLabel.length === 1 ? (coveredLabel[0].kind === "collar" ? "Collar" : "Covered") : "Cobertura"}</span>
            {coveredLabel.length === 1 && <span style={{ fontSize: 10.5, fontWeight: 700, textTransform: "none", letterSpacing: 0 }}>{coveredLabel[0].kind === "collar" ? coveredLabel[0].label : "call vendida: " + coveredLabel[0].label}</span>}
          </div>
          {coveredLabel.length > 1 && coveredLabel.map((e, i) => (
            <div key={i} style={{ fontSize: 10.5, fontWeight: 700, color: T.purple, lineHeight: 1.5 }}>{(e.kind === "collar" ? "Collar" : "CC") + " · " + e.label}</div>
          ))}
        </div>
      )}
      <div onClick={editing ? onDone : onToggle} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: T.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.tkr || (cash ? "Cash" : "Sin ticker")}</span>
              {p.tipo && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>{tipoChipLabel(p)}</span>}
              {detail && <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{detail}</span>}
              {rollChain.length > 0 && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.purple, background: T.tile, borderRadius: 6, padding: "2px 5px", display: "inline-flex", alignItems: "center", gap: 3 }}><ActIcon name="roll" size={10} />×{rollChain.length}</span>}
              {p.closed && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>Cerrada</span>}
            </div>
            {!cash && <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 700, marginTop: 3 }}>× {qtyNum} <span style={{ fontWeight: 600, fontSize: 11 }}>{qtyUnit}</span></div>}
          </div>
          <div style={{ textAlign: "right", flexShrink: 0 }}>
            <div style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>${money2(cap)}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.sub }}>{pct(pctCartera, 1)} NLV</div>
          </div>
        </div>
        {showPnl && !cash && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 7, padding: "6px 10px", borderRadius: 10, background: pnlVal > 0 ? T.tileGreen : pnlVal < 0 ? T.tileRed : T.tile }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>P&L{isAutoPnl(p) ? "" : " · manual"}</span>
            <span style={{ fontSize: 15, fontWeight: 800, color: pnlVal > 0 ? T.green : pnlVal < 0 ? T.red : T.sub }}>{signMoney(pnlVal)}{isFinite(pnlPct) ? <span style={{ fontSize: 12, fontWeight: 700, marginLeft: 6 }}>{(pnlPct >= 0 ? "+" : "") + (pnlPct * 100).toFixed(1) + "%"}</span> : null}</span>
          </div>
        )}
        {!cash && (
          <div style={{ display: "flex", gap: 8, marginTop: 7, flexWrap: "wrap" }}>
            {showsUnitPremium(p) ? (() => {
              const up = n(p.prima);
              const upStr = (up < 0 ? "−$" : "$") + money2(Math.abs(up));
              return <MicroStat label="Prima/u" value={upStr} />;
            })() : (
              <MicroStat label="BEP" value={"$" + money2(effBep(p))} />
            )}
            <MicroStat label="Último" value={p.last ? "$" + money2(p.last) : "—"} />
            <MicroStat label="% Bloque" value={pct(pctBloque, 1)} />
            <MicroStat label="Plausible" value={"$" + money(plausible)} />
          </div>
        )}
        {cash && (
          <div style={{ display: "flex", gap: 8, marginTop: 7, flexWrap: "wrap" }}>
            <MicroStat label="% Bloque" value={pct(pctBloque, 1)} />
            <MicroStat label="Broker" value={p.broker} />
          </div>
        )}
      </div>

      {editing && !rolling && (
        <div onTouchStart={(e) => e.stopPropagation()} onTouchMove={(e) => e.stopPropagation()} onTouchEnd={(e) => e.stopPropagation()}
          style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div style={{ gridColumn: "span 2", display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <span style={{ fontSize: 14, fontWeight: 800, color: T.ink, display: "inline-flex", alignItems: "center", gap: 7 }}><ActIcon name="edit" size={16} />Editar posición</span>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: T.sub }}>se guarda al instante</span>
          </div>
          <EditSection icon="pin" title="Posición" first />
          {!hideBroker && (
          <label>
            <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>Broker</span>
            <Pill options={brokers} value={p.broker} onChange={onChange("broker")} />
          </label>
          )}
          <EditField label="Ticker" value={p.tkr} onChange={onChange("tkr")} text />
          {/* v3.47: mover la posición de bloque (p.ej. de B2 a B1). Solo se ofrecen los bloques cuya lista
              de estrategias incluye el tipo de esta posición; si el tipo no casa con ninguno (o falta),
              se ofrecen B1-B3. El cambio recoloca la posición en Portfolio y re-atribuye sus eventos de
              Primas/MTM al bloque nuevo (los eventos leen p.block al construirse).
              v3.48: el cambio pide confirmación — tocar otro bloque arma blockAsk y sale un aviso ámbar
              con Confirmar/Cancelar; hasta confirmar no se toca p.block. */}
          <label style={{ gridColumn: "span 2" }}>
            <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>Bloque</span>
            <Pill options={(() => { const v = [0, 1, 2, 3].filter((b) => (STRATS[b] || []).includes(p.tipo)); return (v.length ? v : [1, 2, 3]).map((b) => "B" + b); })()} value={"B" + (blockAsk != null ? blockAsk : p.block)} onChange={(v) => { const nb = Number(String(v).slice(1)); if (nb === Number(p.block)) { setBlockAsk(null); return; } setBlockAsk(nb); }} />
          </label>
          {blockAsk != null && (
            <div style={{ gridColumn: "span 2", background: T.tileAmber, borderRadius: 12, padding: "10px 12px" }}>

              <div style={{ display: "flex", gap: 8 }}>

            const d = dcddOf(p);
            const legsNow = () => (dcddOf(p).legs) || { sp: {}, lp: {}, sc: {}, lc: {} };
            const resync = (nd) => {
              const abs = (v) => { const x = Math.abs(n(v)); return isFinite(x) ? x : 0; };
              const sh = abs(nd.legs.sp.p) + abs(nd.legs.sc.p);
              const lg = abs(nd.legs.lp.p) + abs(nd.legs.lc.p);
              const net = lg - sh;
              onChange("prima")(String(net));
              /* riesgo manual (v5.10): si el riesgo se fijó a mano (puede ser mayor que el débito pagado),
                 las ediciones de primas NO lo recalculan — solo prima y comisión siguen en auto */
              if (nd.riskManual !== "SI") {
                const tot = String(Math.max(0, net) * n(p.qty));
                onChange("riesgo")(tot); onChange("margen")(tot);
              }
              const fees = abs(nd.legs.sp.f) + abs(nd.legs.lp.f) + abs(nd.legs.sc.f) + abs(nd.legs.lc.f);
              onChange("comision")(String(fees));

            const setLeg = (legKey, field) => (v) => {
              const cur = legsNow();
              const nd = { ...dcddOf(p), legs: { ...cur, [legKey]: { ...(cur[legKey] || {}), [field]: v } } };
              onChange("dcdd")(nd);
              if (field === "p" || field === "f") resync(nd);
            };
            const setMeta = (k) => (v) => onChange("dcdd")({ ...dcddOf(p), [k]: v });
            const ratio = dcddRatio(d), ivSp = dcddIvSpread(d), net = dcNetDebit(d);
            const rTone = dcddRatioTone(ratio);
            const dteS = daysBetween(p.entryDate, p.expiry), dteL = daysBetween(p.entryDate, d.expiryLong);
            const dateStyle = { width: "100%", boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 11, color: d.expiryLong ? T.ink : T.sub, fontSize: 14, fontWeight: 700, padding: "0 10px", outline: "none", appearance: "none", WebkitAppearance: "none" };
            return (
              <>
                <EditSection icon="ruler" title={"Ficha " + (p.tipo === "DD" ? "Double Diagonal" : "Double Calendar")} />

                  <input type="date" value={d.expiryLong || ""} onChange={(e) => setMeta("expiryLong")(e.target.value)} style={dateStyle} />

                  <div style={{ gridColumn: "span 2", background: T.tile, borderRadius: 12, padding: "9px 11px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                    <span style={{ fontSize: 13.5, color: T.ink, fontWeight: 800 }}>{isFinite(dteS) ? dteS + "d" : "—"} / {isFinite(dteL) ? dteL + "d" : "—"}{weekdayOf(p.entryDate) ? " · " + weekdayOf(p.entryDate) : ""}</span>
                  </div>
                )}
                {DC_LEGS.map((leg) => (
                  <div key={leg.key} style={{ gridColumn: "span 2", background: T.tile, borderRadius: 12, padding: "10px 11px" }}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: leg.color === "red" ? T.red : T.green, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 7 }}>{leg.dir === "short" ? "▾ " : "▴ "}{leg.label}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                      <WizInput label="Strike" value={dcLeg(d, leg.key).k} onChange={setLeg(leg.key, "k")} inputMode="decimal" />
                      <WizInput label="Prima $/acc" value={dcLeg(d, leg.key).p} onChange={setLeg(leg.key, "p")} inputMode="decimal" />
                      <WizInput label="Fee $" value={dcLeg(d, leg.key).f} onChange={setLeg(leg.key, "f")} inputMode="decimal" />
                    </div>
                  </div>
                ))}
                {isFinite(ratio) && (
                  <div style={{ gridColumn: "span 2", background: rTone === "green" ? T.tileGreen : rTone === "amber" ? T.tileAmber : T.tileRed, borderRadius: 12, padding: "9px 11px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: rTone === "green" ? T.green : rTone === "amber" ? T.gold : T.red }}>Ratio shorts/longs (cobras ÷ pagas) · verde &gt;40%</span>
                    <span style={{ fontSize: 14.5, fontWeight: 800, color: rTone === "green" ? T.green : rTone === "amber" ? T.gold : T.red }}>{(ratio * 100).toFixed(0)}%</span>
                  </div>

                {isFinite(net) && (
                  <div style={{ gridColumn: "span 2", background: T.tile, borderRadius: 12, padding: "9px 11px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: net < 0 ? T.green : T.sub, fontWeight: 700 }}>{net < 0 ? "Crédito neto (cortas − largas)" : "Débito neto (largas − cortas)"}{d.riskManual === "SI" ? "" : (net < 0 ? "" : " · riesgo")}</span>
                    <span style={{ fontSize: 13.5, color: net < 0 ? T.green : T.ink, fontWeight: 800 }}>{(net < 0 ? "−$" : "$") + money2(Math.abs(net))}/acc · ${money2(Math.max(0, net) * n(p.qty))}</span>

                  <Pill options={["AUTO", "MANUAL"]} value={d.riskManual === "SI" ? "MANUAL" : "AUTO"} onChange={(v) => {
                    const nd = { ...dcddOf(p), riskManual: v === "MANUAL" ? "SI" : "" };

                    if (v === "AUTO") { const tot = String(Math.max(0, isFinite(net) ? net : 0) * n(p.qty)); onChange("riesgo")(tot); onChange("margen")(tot); }

          {!cash && isLongCallPos(p) && (
            <div style={{ gridColumn: "span 2", background: T.tile, borderRadius: 12, padding: "9px 11px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
