const loadAlerts = () => { try { const j = JSON.parse(localStorage.getItem(KEY_ALERTS) || "[]"); return Array.isArray(j) ? j : []; } catch (e) { return []; } };

  if (a.kind === "below" && last <= n(a.level)) return { val: last };

     retr = retracement INTRADÍA, desde el MÁXIMO DEL DÍA (un pullback: gap up +2% que cede al +0.5%
            ha retrocedido 1.5% aunque el día siga en verde);

            y NO dispara). El nombre de cada tipo dice su referencia para que no haya dudas. */
  if (a.kind === "retr" && isFinite(high) && high > 0) { const r = ((high - last) / high) * 100; if (r >= n(a.level)) return { val: r }; }

/* evalúa contra un mapa {TKR: {price, h}}: marca disparadas, intenta Notification, devuelve las nuevas */
function evalAlerts(quotes) {
  const alerts = loadAlerts();
  const fired = [];
  let changed = false;
  alerts.forEach((a) => {
    const q = quotes[a.tkr];
    /* v1.72: el último spot se guarda en la alerta SIEMPRE que hay cotización — es lo que enseña la
       tarjeta de "Armadas" para ver a cuánto está de disparar */
    if (q && isFinite(n(q.price)) && n(q.price) > 0) { a.lastPx = n(q.price); a.lastAt = new Date().toISOString(); changed = true; }
    if (!a.active || a.firedAt) return;
    const hit = q ? alertHit(a, q) : null;
    if (hit) { a.firedAt = new Date().toISOString(); a.firedVal = Math.round(hit.val * 100) / 100; changed = true; fired.push(a); }
  });
  if (changed) saveAlerts(alerts);
  if (fired.length && typeof Notification !== "undefined") {
    try {
      const notify = () => fired.forEach((a) => { try { new Notification("Bloques · " + a.tkr, { body: alertLabel(a) + " — ahora " + a.firedVal }); } catch (e) {} });

}
/* v1.71: próximo earnings desde Finnhub (/calendar/earnings, en el plan gratis). Devuelve fecha y sesión:
   hour = "bmo" (antes de la apertura) · "amc" (tras el cierre) · "dmh" (en sesión). Si no hay dato en los
   próximos 60 días, null — la app nunca inventa una fecha. */
async function fetchNextEarnings(symbol, key) {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const to = new Date(Date.now() + 60 * 864e5).toISOString().slice(0, 10);
    const r = await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${today}&to=${to}&symbol=${encodeURIComponent(symbol)}&token=${encodeURIComponent(key)}`);
    if (!r.ok) return null;
    const j = await r.json();
    const rows = (j && Array.isArray(j.earningsCalendar) ? j.earningsCalendar : []).filter((e) => e && e.date && e.date >= today).sort((a, b) => (a.date < b.date ? -1 : 1));
    /* v1.87: TRES estados, no dos — con dato {date,hour}; Finnhub respondió OK pero sin eventos {none};
       la LLAMADA FALLÓ (red, 429 del rate limit…) → null. Distinguirlos importa: un fallo no debe
       marcarse como "comprobado hoy" o la tarjeta queda sin fecha hasta mañana (el bug de STT). */
    return rows.length ? { date: rows[0].date, hour: rows[0].hour || null } : { none: true };
  } catch (e) { return null; }
}
/* v3.42: aviso de earnings reutilizable (wizard "Nueva posición" + hoja de roll). Caché a nivel de módulo
   para no repetir llamadas entre componentes; solo se cachean respuestas con dato ({date}|{none}) — un
   fallo (null: red, 429…) se reintenta. wizSave lee esta misma caché para persistir p.earnIn. */
const earnHintCache = {};
function EarningsHint({ tkr, expiry }) {
  const sym = String(tkr || "").trim().toUpperCase();
  const exp = String(expiry || "");
  const okExp = /^\d{4}-\d{2}-\d{2}$/.test(exp);
  const [st, setSt] = useState({ k: "idle" });
  useEffect(() => {
    if (!sym || !okExp) { setSt({ k: "idle" }); return; }
    let key = ""; try { key = localStorage.getItem(KEY_FINNHUB) || ""; } catch (e) {}
    if (!key) { setSt({ k: "nokey" }); return; }
    const c = earnHintCache[sym];
    if (c) { setSt({ k: "done", sym, data: c }); return; }
    setSt({ k: "busy", sym });
    let dead = false;
    const t = setTimeout(async () => {
      const nx = await fetchNextEarnings(sym, key);
      if (dead) return;
      if (nx) earnHintCache[sym] = nx;
      setSt({ k: "done", sym, data: nx });
    }, 600);
    return () => { dead = true; clearTimeout(t); };
  }, [sym, exp, okExp]);
  if (!sym || !okExp || st.k === "idle") return null;
  const line = (bg, col, txt) => (
    <div style={{ background: bg, borderRadius: 12, padding: "8px 12px", fontSize: 11.5, fontWeight: 700, color: col, lineHeight: 1.45 }}>{txt}</div>
  );
  if (st.k === "nokey") return line(T.tile, T.sub, "Sin key de Finnhub en Ajustes — no puedo comprobar earnings antes del vencimiento.");
  if (st.k === "busy") return line(T.tile, T.sub, "⏳ Comprobando earnings de " + sym + "…");
  if (st.k !== "done" || st.sym !== sym) return null;
  const d = st.data;
  if (!d) return line(T.tile, T.sub, "Finnhub no respondió — sin dato de earnings para " + sym + ". Compruébalo a mano si es carril B.");
  if (d.none) return line(T.tile, T.sub, "Sin earnings de " + sym + " en los próximos 60 días (Finnhub). Ojo: los ADRs a veces no aparecen.");
  const dTxt = new Date(d.date + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" });
  const hTxt = d.hour === "bmo" ? " (antes de la apertura)" : d.hour === "amc" ? " (tras el cierre)" : d.hour === "dmh" ? " (en sesión)" : "";
  if (d.date <= exp) return line(T.tileAmber, T.gold, "⚠️ Earnings de " + sym + " el " + dTxt + hTxt + " — DENTRO del vencimiento. Documentar y valorar sizing.");
  return line(T.tile, T.sub, "Earnings de " + sym + " el " + dTxt + " — después del vencimiento. ✓");
}
async function fetchQuote(symbol, key) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${key}`);
    if (r.status === 401 || r.status === 403) return { error: `key inválida (HTTP ${r.status})` };
    if (!r.ok) return { error: `HTTP ${r.status}` };

    /* v1.48: Finnhub ya devuelve el cambio del día del subyacente (dp = % y pc = cierre anterior);

/* ===== v1.92 — LIQUIDEZ DE OPCIONES vía MARKET DATA (api.marketdata.app). La v1.90 usaba el JSON de

   automática — un proxy para saltárselo sería construir sobre terreno prohibido, así que fuera.

async function fetchMdChain(symbol, key, expiration, date) {

     de hace segundos/minutos — para liquidez sobra. Se intenta caché primero (203 = OK desde caché,
     204 = sin caché disponible y sin cargo) y solo se cae a vivo si no hay; el panel dice de dónde vino.
     v2.01: con date → cadena HISTÓRICA de fin de sesión de ese día (plan Trader; coste 1 crédito/1000

  const parse = (j) => {

    const out = parse(await r.json());

    return { ...out, cached: false };

/* vencimiento del trade de earnings (dit=1): el primero que CUBRE el gap. BMO → se abre la tarde antes
   y el gap es la mañana del calDate → vale un vto ≥ calDate. AMC → se abre esa tarde y el gap es la
   noche → un vto del MISMO día expira antes del gap: hace falta vto > calDate. Sin fecha, el primero
   desde hoy. Devuelve null si no hay ninguno (no se elige un vencimiento ya pasado). */
const pickErExpiry = (exps, calDate, calHour) => {
  /* v2.11 FIX: el vencimiento se elige respecto a calDate (la fecha del earnings, pasada o futura), NO
     respecto a hoy. Antes, con un earnings PASADO (reconstrucción), calDate < hoy hacía ref = hoy y se
     colaba el primer vencimiento posterior a hoy — un LEAP a 1-2 años que ya cotizaba en la fecha
     histórica → straddle ~20-30% del spot → EM inflado y POP 100% falsos. AMC: el vto del mismo día
     expira antes de que el gap se resuelva al open siguiente, así que se exige estrictamente posterior. */
  const sorted = [...new Set(exps)].sort();
  const today = new Date().toISOString().slice(0, 10);
  const ref = calDate || today;
  const strict = calHour === "amc";
  for (const e of sorted) { if (strict ? e > ref : e >= ref) return e; }
  return null;
};
/* métricas de liquidez de un conjunto de contratos: MEDIANA del spread bid-ask en % del mid (solo
   contratos con cotización a dos lados) y OI mediano. Mediana y no media: un strike muerto en la cola
   no debe tumbar el veredicto de la zona operable. */
const liqStats = (rows) => {
  const med = (a) => (a.length ? a[Math.floor(a.length / 2)] : NaN);
  const quoted = rows.filter((c) => c.bid > 0 && c.ask > 0 && c.ask >= c.bid);
  const sprMed = med(quoted.map((c) => ((c.ask - c.bid) / ((c.ask + c.bid) / 2)) * 100).sort((a, b) => a - b));
  const oiMed = med(rows.map((c) => c.oi).sort((a, b) => a - b));
  return { n: rows.length, quoted: quoted.length, sprMed, oiMed };
};
/* veredicto: el spread manda (es fricción directa contra el crédito); el OI confirma. Umbrales a la
   vista en la UI: verde ≤5% y OI ≥100 · rojo >15% u OI <10 · ámbar el resto. */
const liqVerdict = (sprMed, oiMed) => {
  if (!isFinite(sprMed)) return { v: "S/D", col: "sub" };
  if (sprMed > 15 || (isFinite(oiMed) && oiMed < 10)) return { v: "ILÍQUIDO", col: "red" };
  if (sprMed <= 5 && (!isFinite(oiMed) || oiMed >= 100)) return { v: "LÍQUIDO", col: "green" };
  return { v: "JUSTO", col: "gold" };
};

/* ===== v1.94 — SCREENER AUTOMÁTICO DE EARNINGS (Victor: "que use todos esos datos para proponer trades y
   filtrar los que no valgan día a día sin subir nada"; eligió barrer TODOS los que reporten). Pipeline
   CREDIT-SAFE de dos fases: (1) gate BARATO con Finnhub (gratis) — quién reporta hoy + market cap por
   ticker; se descarta <$5B sin gastar créditos de Market Data. (2) solo los supervivientes tocan Market

async function fetchEarningsCal(key, from, to) {

/* EM implícito del straddle ATM: (call mid + put mid) del strike más cercano al spot, en % del spot. Es el
   movimiento de breakeven del straddle — un pelín más ancho que la 1σ, pero es el proxy estándar y no
   inventa ningún factor; solo usa strikes con cotización a dos lados en ambas patas. */
/* v1.98: ¿está abierta la sesión regular de NY? (9:30–16:00 ET, lun–vie). Los spreads de la caché con el
   mercado CERRADO vienen de cierre/preapertura — anchísimos — y castigan el veredicto de liquidez sin que
   el ticker tenga culpa (el barrido de Victor a las 6:05 ET pintó a MS con spread 12%). Con Intl la hora
   de NY sale bien todo el año (EDT/EST); si el runtime no lo soporta, no se avisa (true). */
const nyOpen = () => {
  try {
    const p = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", weekday: "short", hour: "numeric", minute: "numeric", hour12: false }).formatToParts(new Date());
    const get = (t) => { const x = p.find((q) => q.type === t); return x ? x.value : ""; };
    const wd = get("weekday");
    if (wd === "Sat" || wd === "Sun") return false;
    const mins = (parseInt(get("hour"), 10) % 24) * 60 + parseInt(get("minute"), 10);
    return mins >= 570 && mins < 960;
  } catch (e) { return true; }
};
const emFromChainX = (rows, spot) => {
  /* v2.13: como emFromChain pero devuelve también el strike ATM usado, para poder leer el IV de ESE
     mismo strike antes y después del earnings (IV crush) sin repetir la búsqueda del strike. */
  if (!(isFinite(spot) && spot > 0) || !rows || !rows.length) return { em: NaN, k: NaN };
  const strikes = [...new Set(rows.map((o) => o.k))].sort((a, b) => Math.abs(a - spot) - Math.abs(b - spot));
  for (const k of strikes) {
    const c = rows.find((o) => o.type === "C" && o.k === k), p = rows.find((o) => o.type === "P" && o.k === k);
    if (c && p && c.bid > 0 && c.ask > 0 && p.bid > 0 && p.ask > 0) return { em: (((c.bid + c.ask) / 2 + (p.bid + p.ask) / 2) / spot) * 100, k };
  }
  return { em: NaN, k: NaN };
};
const emFromChain = (rows, spot) => emFromChainX(rows, spot).em;

/* ===== v2.01 — RECONSTRUCCIÓN DEL HISTÓRICO DE POP desde Market Data (plan Trader; cadenas históricas a
   2005). Por cada earnings pasado de un ticker: (1) velas diarias del rango (1 llamada, reutilizada),
   (2) el GAP real de la reacción — BMO: open del día vs cierre anterior; AMC: open del día siguiente vs
   cierre del día; (3) el EM que había: cadena HISTÓRICA del día en que se abriría el trade (la tarde
   antes), vencimiento que cubre el gap → straddle ATM / spot. Produce eventos en el MISMO formato que el
   lector de moomoo, así erStats/tarjetas/cuadro salen idénticos. Con Trader esto reemplaza las capturas.
   Sesión desconocida → se asume BMO (limitación anotada; la validación de 30 días la destapa). */
async function fetchRetry(url, tries) {
  /* v2.06: reintenta ante saturación (429) o fallos temporales (500/502/503) con espera creciente —
     la reconstrucción encadena muchas llamadas y sin esto la mayoría de nombres caían por rate-limit. */
  const n = tries || 3;
  for (let i = 0; i < n; i++) {
    try {
      const r = await fetch(url);
      if (r.status === 429 || r.status === 500 || r.status === 502 || r.status === 503) {
        if (i < n - 1) { await new Promise((res) => setTimeout(res, 400 * (i + 1) + 300)); continue; }
      }
      return r;
    } catch (e) { if (i < n - 1) { await new Promise((res) => setTimeout(res, 400 * (i + 1))); continue; } throw e; }
  }
}

    if (!r.ok && r.status !== 203) return { error: mdErr(r) };
    const j = await r.json();
    if (!j || j.s === "no_data") return { error: "sin velas (no_data) " + sym };
    if (!j || j.s !== "ok" || !Array.isArray(j.t) || !j.t.length) return { error: "velas vacías " + sym };

async function fetchEarningsHistory(sym, key, from, to) {
  /* v2.07: el calendario de Finnhub (plan gratis) LIMITA el rango por llamada (~1 año) — pedir 3+ años
     de golpe devuelve vacío y salía "sin earnings pasados" hasta para NFLX. Se trocea en ventanas de
     ≤360 días y se juntan (dedup por fecha). fetchRetry cubre el 429. */
  const dayMs = 864e5;
  const start = new Date(from + "T00:00:00").getTime();
  const end = new Date(to + "T00:00:00").getTime();
  if (!(end > start)) return { error: "rango de fechas inválido" };
  const byDate = {};
  let lastErr = null, okAny = false, cursor = start;
  while (cursor < end) {
    const wEnd = Math.min(cursor + 360 * dayMs, end);
    const f = new Date(cursor).toISOString().slice(0, 10), t = new Date(wEnd).toISOString().slice(0, 10);
    try {
      const r = await fetchRetry("https://finnhub.io/api/v1/calendar/earnings?symbol=" + encodeURIComponent(sym) + "&from=" + f + "&to=" + t + "&token=" + encodeURIComponent(key));
      if (!r.ok) { lastErr = r.status === 401 || r.status === 403 ? "key de Finnhub inválida" : r.status === 429 ? "Finnhub saturado (429)" : "Finnhub HTTP " + r.status; }
      else { const j = await r.json(); okAny = true; (j && Array.isArray(j.earningsCalendar) ? j.earningsCalendar : []).forEach((e) => { if (e && e.date) byDate[e.date] = { date: e.date, hour: e.hour || null }; }); }
    } catch (e) { lastErr = "Finnhub: sin red"; }
    cursor = wEnd + dayMs;
  }
  const rows = Object.keys(byDate).map((k) => byDate[k]).sort((a, b) => (a.date < b.date ? 1 : -1)); /* recientes primero */
  if (!rows.length) return { error: okAny ? "Finnhub sin earnings para " + sym : (lastErr || "Finnhub sin datos " + sym) };
  return { rows };
}
async function fetchEarningsHistoryAV(sym, key) {
  /* v2.08: Alpha Vantage EARNINGS — UNA sola llamada trae TODO el histórico de fechas de un ticker
     (reportedDate, décadas atrás), y a veces la sesión (reportTime pre/post). Es la fuente de fechas
     pasadas porque el plan gratis de Finnhub solo da earnings FUTUROS, no pasados. Límite 25/día · 5/min.
     AV mete los errores dentro de un 200 (Note/Information = límite; Error Message = símbolo malo). */
  try {
    const r = await fetchRetry("https://www.alphavantage.co/query?function=EARNINGS&symbol=" + encodeURIComponent(sym) + "&apikey=" + encodeURIComponent(key));
    if (!r.ok) return { error: "Alpha Vantage HTTP " + r.status };
    const j = await r.json();
    if (j && (j.Note || j.Information)) return { error: "Alpha Vantage: límite (25/día o 5/min) agotado" };
    if (j && j["Error Message"]) return { error: "Alpha Vantage: símbolo no válido " + sym };
    const q = j && Array.isArray(j.quarterlyEarnings) ? j.quarterlyEarnings : [];
    const rows = q.filter((e) => e && e.reportedDate).map((e) => {
      const rt = String(e.reportTime || "").toLowerCase();
      const hour = rt.indexOf("pre") >= 0 ? "bmo" : rt.indexOf("post") >= 0 ? "amc" : null;
      return { date: e.reportedDate, hour };
    });
    rows.sort((a, b) => (a.date < b.date ? 1 : -1)); /* recientes primero */
    if (!rows.length) return { error: "Alpha Vantage sin earnings para " + sym };
    return { rows };
  } catch (e) { return { error: "Alpha Vantage: sin red" }; }
}
async function reconstructHistory(sym, mdKey, fhKey, onProgress, maxEvents, avKey) {
  const today = new Date().toISOString().slice(0, 10);
  const from3y = new Date(Date.now() - 3.3 * 365 * 864e5).toISOString().slice(0, 10);
  const to90 = new Date(Date.now() + 90 * 864e5).toISOString().slice(0, 10);
  const eh = avKey ? await fetchEarningsHistoryAV(sym, avKey) : await fetchEarningsHistory(sym, fhKey, from3y, to90);
  if (eh.error) return { error: eh.error };
  const past = eh.rows.filter((e) => e.date < today).slice(0, maxEvents || 12);
  if (!past.length) return { error: (avKey ? "Alpha Vantage" : "Finnhub") + " sin earnings pasados para " + sym };
  /* el próximo earnings sale de Finnhub (futuro SÍ funciona en su plan gratis); AV solo da pasados */
  let nextRow = null;
  const nx = await fetchNextEarnings(sym, fhKey);
  if (nx && nx.date) nextRow = { date: nx.date, hour: nx.hour || null };
  const cd = await fetchStockCandlesMD(sym, from3y, today, mdKey);
  if (cd.error) return { error: "velas: " + cd.error };
  const cds = cd.rows;
  const idxOf = (d) => { let ans = -1; for (let i = 0; i < cds.length; i++) { if (cds[i].date <= d) ans = i; else break; } return ans; };
  const events = [];
  let done = 0, nEmOk = 0;
  const total = past.length + (nextRow ? 1 : 0);
  for (const ev of past) {
    if (onProgress) onProgress(++done, total);
    const isAMC = ev.hour === "amc";
    const dIdx = idxOf(ev.date);
    if (dIdx < 1) continue;
    let gapIdx, refIdx, chainDate;
    if (isAMC) { gapIdx = dIdx + 1; refIdx = dIdx; chainDate = cds[dIdx].date; }
    else { gapIdx = dIdx; refIdx = dIdx - 1; chainDate = cds[dIdx - 1].date; }
    if (gapIdx >= cds.length || refIdx < 0) continue;
    const ref = cds[refIdx].c, g = cds[gapIdx];
    if (!(ref > 0)) continue;
    let em = NaN, ivCrush = NaN;
    /* v2.13: pausa entre eventos — el bucle encadenaba 2-3 llamadas históricas por earnings sin
       espera; bajo rate-limit, fetchMdChain(date) fallaba en silencio (antes sin retry) y el evento se
       guardaba con em:NaN, quedando fuera de M en erStats sin que se notara (parecían "menos earnings"
       de los que en realidad hay). Ahora con fetchRetry + esta pausa, y contando cuántos SÍ consiguieron
       EM (nEmOk) para poder avisar si el histórico queda incompleto. */
    await new Promise((r) => setTimeout(r, 150));
    const ex = await fetchMdExpirations(sym, mdKey, chainDate);
    if (!ex.error && ex.exps && ex.exps.length) {
      const exp = pickErExpiry(ex.exps, ev.date, ev.hour);
      if (exp) {
        const ch = await fetchMdChain(sym, mdKey, exp, chainDate);
        if (!ch.error) {
          const spotUse = ch.spot != null && ch.spot > 0 ? ch.spot : ref;
          const { em: emV, k } = emFromChainX(ch.opts, spotUse);
          em = emV;
          if (isFinite(em) && isFinite(k)) {
            nEmOk++;
            /* IV CRUSH: mismo strike ATM, mismo vencimiento, cadena histórica del día que resuelve el
               gap (después del earnings) — la caída de IV es la señal de que el evento ya pasó. */
            const c1 = ch.opts.find((o) => o.type === "C" && o.k === k), p1 = ch.opts.find((o) => o.type === "P" && o.k === k);
            const ivsBefore = [c1 && c1.iv, p1 && p1.iv].filter((v) => Number.isFinite(v) && v > 0);
            const ivBefore = ivsBefore.length ? ivsBefore.reduce((a, x) => a + x, 0) / ivsBefore.length : NaN;
            await new Promise((r) => setTimeout(r, 150));
            const chA = await fetchMdChain(sym, mdKey, exp, g.date);
            if (!chA.error) {
              const c2 = chA.opts.find((o) => o.type === "C" && o.k === k), p2 = chA.opts.find((o) => o.type === "P" && o.k === k);
              const ivsAfter = [c2 && c2.iv, p2 && p2.iv].filter((v) => Number.isFinite(v) && v > 0);
              const ivAfter = ivsAfter.length ? ivsAfter.reduce((a, x) => a + x, 0) / ivsAfter.length : NaN;
              if (Number.isFinite(ivBefore) && Number.isFinite(ivAfter)) ivCrush = (ivBefore - ivAfter) * 100; /* puntos porcentuales de IV, mismo formato "en %" que el lector de moomoo */
            }
          }
        }
      }
    }
    const y = ev.date.slice(0, 4), mo = parseInt(ev.date.slice(5, 7), 10);
    events.push({ periodo: y + "/Q" + (Math.floor((mo - 1) / 3) + 1), date: ev.date, hour: ev.hour, em: isFinite(em) ? em : NaN, open: ((g.o - ref) / ref) * 100, close: ((g.c - ref) / ref) * 100, high: ((g.h - ref) / ref) * 100, low: ((g.l - ref) / ref) * 100, ivCrush });
  }
  let nextEvent = null;
  if (nextRow) {
    if (onProgress) onProgress(++done, total);
    const ex = await fetchMdExpirations(sym, mdKey);
    if (!ex.error && ex.exps && ex.exps.length) {
      const exp = pickErExpiry(ex.exps, nextRow.date, nextRow.hour);
      if (exp) { const ch = await fetchMdChain(sym, mdKey, exp); if (!ch.error) { const em = emFromChain(ch.opts, ch.spot); if (isFinite(em)) nextEvent = { periodo: "próx", date: nextRow.date, hour: nextRow.hour, em, open: null, close: null, high: null, low: null, ivCrush: NaN, spot: ch.spot, exp }; } }
    }
  }
  const all = nextEvent ? [nextEvent, ...events] : events;
  return { events: all, next: nextEvent, nPast: events.length, nReq: past.length, nEmOk };
}

function bandZones(blk) {
  const { scaleMin: mn, scaleMax: mx, tMin, tMax, band } = blk;
  const clamp = (x) => Math.max(mn, Math.min(mx, x));
  const p1 = clamp(tMin - band), p2 = clamp(tMin), p3 = clamp(tMax), p4 = clamp(tMax + band);
  return [
    { to: p1, color: "rgba(224,86,77,0.22)" },
    { to: p2, color: "rgba(195,148,41,0.26)" },
    { to: p3, color: "rgba(27,163,76,0.20)" },
    { to: p4, color: "rgba(195,148,41,0.26)" },
    { to: mx, color: "rgba(224,86,77,0.22)" },
  ];
}

/* ---------- donut chart interactivo, sin recorte ---------- */
function Donut({ slices, size, thickness, selected, onSelect }) {
  const pad = 6; // margen reservado para el grosor extra al seleccionar
  const total = slices.reduce((s, x) => s + x.value, 0) || 1;
  const r = (size - thickness - pad) / 2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: "visible" }}>
      <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={T.tile} strokeWidth={thickness} />
        {slices.map((s, i) => {
          const frac = s.value / total;
          const dash = frac * c;
          const isSel = selected === s.id;
          const dim = selected && !isSel;
          const el = (
            <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth={isSel ? thickness + pad : thickness}
              strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-offset} strokeLinecap="butt"
              opacity={dim ? 0.32 : 1} style={{ cursor: "pointer", transition: "opacity .15s, stroke-width .15s" }}
              onClick={() => onSelect(isSel ? null : s.id)} />
          );
          offset += dash;
          return el;
        })}
      </g>
    </svg>
  );
}
/* ---------- v1.41: Resumen ejecutivo ----------
   Primera pestaña de Portfolio, antes de B0: de un vistazo, cuánto vale la cuenta, cómo está de salud
   y qué % de NLV ocupa cada bloque frente a su objetivo. El donut y la leyenda comparten selección
   (tocar una porción resalta su fila y viceversa) y tocar el nombre de un bloque salta a su pestaña
   — desde aquí se sigue deslizando a B0, B1… con el mismo gesto de siempre. */
function blockTone(p, blk) {
  if (!isFinite(p)) return "muted";
  if (p >= blk.tMin && p <= blk.tMax) return "green";
  if (p >= blk.tMin - blk.band && p <= blk.tMax + blk.band) return "amber";
  return "red";
}

/* ---------- v1.60: ScanOverlay ----------
   Los lectores de capturas tardan varios segundos (redimensionar → subir → que el modelo lea → volcar),
   y hasta ahora solo cambiaba el texto de un botón: parecía colgado, sobre todo con varias capturas.
   Este overlay muestra el paso vivo con un anillo girando, marca en verde los pasos ya hechos y, en
   los lotes, el progreso "captura N de M". No inventa progreso: los pasos los va marcando el propio
   lector conforme ocurren. ---------- */
const SCAN_STEPS = ["Preparando la imagen", "Enviando al lector", "Leyendo los datos", "Volcando al formulario"];
function ScanOverlay({ open, step, sub, steps }) {
  if (!open) return null;
  const list = steps || SCAN_STEPS;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 120, background: DARK ? "rgba(0,0,0,0.62)" : "rgba(24,22,26,0.42)",
      backdropFilter: "blur(3px)", WebkitBackdropFilter: "blur(3px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: T.card, borderRadius: 26, padding: "26px 22px", width: "100%", maxWidth: 320, boxShadow: T.shadow,
        display: "grid", gap: 18, justifyItems: "center", animation: "scanIn .22s ease-out" }}>
        <div style={{ position: "relative", width: 62, height: 62 }}>
          <svg width="62" height="62" viewBox="0 0 62 62" style={{ animation: "scanSpin 1s linear infinite" }}>
            <circle cx="31" cy="31" r="26" fill="none" stroke={T.line} strokeWidth="5" />
            <circle cx="31" cy="31" r="26" fill="none" stroke={T.purple} strokeWidth="5" strokeLinecap="round"
              strokeDasharray="41 122" />

          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <ActIcon name="camera" size={20} color={T.purple} />
          </div>
        </div>
        <div style={{ display: "grid", gap: 3, justifyItems: "center", textAlign: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Leyendo la captura</div>
          {sub && <div style={{ fontSize: 11.5, fontWeight: 700, color: T.sub }}>{sub}</div>}
        </div>
        <div style={{ display: "grid", gap: 9, width: "100%" }}>
          {list.map((s, i) => {
            const done = i < step, now = i === step;
            return (
              <div key={s} style={{ display: "flex", alignItems: "center", gap: 9, minWidth: 0 }}>
                <span style={{ flex: "none", width: 17, height: 17, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                  background: done ? T.green : now ? T.tilePurple : T.tile, animation: now ? "scanPulse 1.1s ease-in-out infinite" : "none" }}>
                  {done ? (
                    <svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6.4 4.6 9 10 3.2" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  ) : (
                    <span style={{ width: 5, height: 5, borderRadius: 3, background: now ? T.purple : T.line }} />
                  )}
                </span>
                <span style={{ fontSize: 12.5, fontWeight: now ? 800 : 700, color: done ? T.sub : now ? T.ink : T.sub, minWidth: 0,
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
/* ---------- v1.47: mayores movers del día ----------
   Debajo de la distribución, en la pestaña Resumen. Δ P&L de la posición desde el cierre del último
   día con snapshot, y Δ% del subyacente al lado cuando ese snapshot guardó la cotización. Barras
   proporcionales al mayor movimiento del día, para leer la magnitud sin comparar números. */
function MoversCard({ movers, onRefresh, refreshing }) {
  /* v1.59: la tarjeta nunca desaparece. Si todavía no hay datos del día (hace falta un 🔄 Precios
     para traer el cierre anterior de cada subyacente), enseña el botón para traerlos — una acción,
     no un cartel explicativo. */
  const maxD = movers ? movers.max : 1;

  const Row = ({ r, col }) => (
    /* v1.56: tarjeta de altura constante — la chapa del % se pinta SIEMPRE; si el subyacente no trae
       cotización del día (índices como SPX en el plan gratis de Finnhub) se pinta neutra con "—" en
       vez de desaparecer, para que todas las tarjetas midan y se lean igual. El importe se alinea
       arriba, a la altura del ticker, en vez de centrarse contra un bloque de altura variable. */
    /* v1.68 (Victor: "no quería que los ensancharas, solo ponerlos más altos, que estén como antes"):
       dos columnas como siempre; el ÚLTIMO PRECIO va bajo el ticker (solo número, sin $) y la tarjeta
       crece en ALTURA, no en anchura. El precio lleva su propia elipsis por si un índice de 5 cifras
       compite con el importe en media pantalla. */
    <div style={{ background: T.tile, borderRadius: 14, padding: "10px 11px", display: "grid", gap: 7, minWidth: 0 }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, minWidth: 0 }}>
        <span style={{ display: "grid", gap: 3, minWidth: 0, justifyItems: "start" }}>
          <span style={{ fontSize: 14, fontWeight: 800, color: T.ink, lineHeight: 1.2, minWidth: 0, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.tkr}</span>
          {isFinite(r.last) && (
            <span style={{ fontSize: 12, fontWeight: 700, color: T.sub, lineHeight: 1.2, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap", minWidth: 0, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis" }}>
              {r.last.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
            </span>
          )}
          <span style={{ fontSize: 11, fontWeight: 800, lineHeight: 1.25, borderRadius: 7, padding: "2px 7px", whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums",
            color: !isFinite(r.pxPct) ? T.sub : r.pxPct >= 0 ? T.green : T.red,
            background: !isFinite(r.pxPct) ? T.card : r.pxPct >= 0 ? T.tileGreen : T.tileRed }}>
            {isFinite(r.pxPct) ? signPct(r.pxPct, 2) : "—"}
          </span>
        </span>
        <span style={{ flex: "none", fontSize: 16, fontWeight: 800, color: col, letterSpacing: -0.4, lineHeight: 1.2, fontVariantNumeric: "tabular-nums", textAlign: "right" }}>{signMoney(r.d)}</span>
      </div>
      <div style={{ height: 6, background: T.card, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: Math.max(3, (Math.abs(r.d) / maxD) * 100) + "%", height: "100%", background: col, borderRadius: 3 }} />
      </div>
    </div>
  );
  const Col = ({ title, rows, col }) => (
    <div style={{ display: "grid", gap: 9, alignContent: "start", minWidth: 0 }}>
      <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5 }}>{title}</div>
      {rows.length ? rows.map((r) => <Row key={r.tkr} r={r} col={col} />)
        : <div style={{ fontSize: 11, fontWeight: 600, color: T.sub }}>Ninguno hoy</div>}
    </div>
  );
  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, display: "grid", gap: 14, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Movers del día</span>
        <span style={{ fontSize: 10.5, fontWeight: 700, color: T.sub }}>$ de tu posición · % del subyacente</span>
      </div>
      {movers ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, minWidth: 0 }}>{/* v1.68: dos columnas como siempre — el precio hace la tarjeta más ALTA, no más ancha */}
          <Col title="Ganadores" rows={movers.up} col={T.green} />
          <Col title="Perdedores" rows={movers.dn} col={T.red} />
        </div>
      ) : (
        <button type="button" onClick={onRefresh} disabled={refreshing}
          style={{ border: "none", cursor: refreshing ? "default" : "pointer", borderRadius: 14, padding: "12px 0", fontSize: 13.5, fontWeight: 800, background: T.tile, color: T.ink,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }}>
          <SetIcon name="refresh" size={15} color={T.ink} />{refreshing ? "Actualizando…" : "Actualizar precios"}
        </button>
      )}
    </div>
  );
}
/* ---------- v1.41: distribución por bloques — el contenido de la pestaña Resumen ---------- */
function BlockDistribution({ nlv, blockTotals, onGoBlock }) {
  const [sel, setSel] = useState(null);
  const rows = BLOCKS.map((b) => {
    const val = n(blockTotals[b.id]);
    const p = nlv > 0 ? val / nlv : NaN;
    return { blk: b, val, p, tone: blockTone(p, b) };
  });
  const slices = rows.filter((r) => r.val > 0).map((r) => ({ id: r.blk.id, label: r.blk.tag, value: r.val, color: r.blk.color }));
  const desplegado = rows.reduce((s, r) => s + r.val, 0);
  const selRow = rows.find((r) => r.blk.id === sel);
  return (
    <div style={{ marginBottom: 14 }}>
      {/* DISTRIBUCIÓN POR BLOQUES */}
      <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, display: "grid", gap: 14 }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Distribución por bloques</div>
        {desplegado > 0 ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", position: "relative", height: 172 }}>
            <Donut slices={slices} size={172} thickness={26} selected={sel} onSelect={setSel} />
            <div style={{ position: "absolute", textAlign: "center", pointerEvents: "none", maxWidth: 108 }}>
              {selRow ? (<>
                <div style={{ fontSize: 25, fontWeight: 800, color: selRow.blk.color, letterSpacing: -0.8, fontVariantNumeric: "tabular-nums" }}>{pct(selRow.p, 0)}</div>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, marginTop: 1 }}>{selRow.blk.tag}</div>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub }}>${money(selRow.val)}</div>
              </>) : (<>
                <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.8, fontVariantNumeric: "tabular-nums" }}>{nlv > 0 ? pct(desplegado / nlv, 0) : "—"}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginTop: 2, lineHeight: 1.3 }}>del NLV<br />desplegado</div>
              </>)}
            </div>
          </div>
        ) : (
          <div style={{ background: T.tile, borderRadius: 16, padding: "18px 14px", textAlign: "center", fontSize: 12.5, fontWeight: 700, color: T.sub }}>
            Aún no hay posiciones abiertas — añade una en cualquier bloque y aquí verás el reparto.
          </div>
        )}
        {/* LEYENDA: una fila por bloque, con barra contra su banda objetivo */}
        <div style={{ display: "grid", gap: 7 }}>
          {rows.map((r) => {
            const isSel = sel === r.blk.id;
            const dim = sel != null && !isSel;
            const maxP = Math.max(r.blk.tMax + r.blk.band, isFinite(r.p) ? r.p : 0, 0.05);
            const w = isFinite(r.p) ? Math.min(100, (r.p / maxP) * 100) : 0;
            const bandL = (r.blk.tMin / maxP) * 100, bandW = ((r.blk.tMax - r.blk.tMin) / maxP) * 100;
            return (
              <div key={r.blk.id} onClick={() => setSel(isSel ? null : r.blk.id)}
                style={{ background: isSel ? r.blk.bg : T.tile, borderRadius: 14, padding: "10px 12px", cursor: "pointer", opacity: dim ? 0.5 : 1, transition: "opacity .15s, background .15s", display: "grid", gap: 7, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 3, background: r.blk.color, flex: "none" }} />
                  <span onClick={(e) => { e.stopPropagation(); onGoBlock(r.blk.id); }}
                    style={{ fontSize: 13, fontWeight: 800, color: T.ink, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    B{r.blk.id} · {r.blk.tag} <span style={{ color: T.sub, fontWeight: 700 }}>›</span>
                  </span>
                  <span style={{ marginLeft: "auto", flex: "none", display: "flex", alignItems: "baseline", gap: 7 }}>
                    <span style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, fontVariantNumeric: "tabular-nums" }}>${money(r.val)}</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: HEX[r.tone] || T.ink, letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>{pct(r.p, 0)}</span>
                  </span>
                </div>
                <div style={{ position: "relative", height: 9, background: T.line, borderRadius: 5, overflow: "hidden" }}>
                  <div style={{ position: "absolute", left: bandL + "%", width: Math.max(bandW, 1.5) + "%", top: 0, bottom: 0, background: hexToRgba(r.blk.color, 0.28) }} />
                  <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: w + "%", background: HEX[r.tone] || r.blk.color, borderRadius: 5, transition: "width .3s" }} />
                </div>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.sub }}>
                  Objetivo {pct(r.blk.tMin, 0)}–{pct(r.blk.tMax, 0)} · {!isFinite(r.p) ? "—" : r.tone === "green" ? "en banda" : r.p < r.blk.tMin ? "por debajo " + pct(r.blk.tMin - r.p, 0) : "por encima " + pct(r.p - r.blk.tMax, 0)}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Exposición por subyacente</div>

                    ))}

                )}

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "6px 10px", borderRadius: 10, background: row.pnl > 0 ? T.tileGreen : row.pnl < 0 ? T.tileRed : T.tile }}>

/* ---------- gráfico de métrica con ejes, grid y fechas ---------- */
const kFmt = (v) => { const a = Math.abs(v); if (a >= 1e6) return (v / 1e6).toFixed(1) + "M"; if (a >= 1e3) return Math.round(v / 1e3) + "k"; return String(Math.round(v)); };
const shortDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" });
function MetricChart({ points, color, axisFmt, valueFmt, dateFmt }) {
  const [active, setActive] = useState(null);

  const W = 320, H = 150, padL = 44, padR = 12, padT = 10, padB = 22;
  const vs = points.map((p) => p.v);
  let min = Math.min(...vs), max = Math.max(...vs);
  if (min === max) { const d = Math.abs(min) * 0.05 || 1; min -= d; max += d; }
  const span = max - min; min -= span * 0.1; max += span * 0.1;
  const x = (i) => padL + (i / (points.length - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const line = points.map((p, i) => `${x(i)},${y(p.v)}`).join(" ");
  const area = `${x(0)},${H - padB} ${line} ${x(points.length - 1)},${H - padB}`;
  const ticks = [0, 1, 2, 3].map((i) => min + ((max - min) * i) / 3);
  const midIdx = points.length >= 3 ? Math.floor((points.length - 1) / 2) : null;
  /* con muchos puntos los círculos se solapan y quedan como una mancha — a partir de cierta densidad
     solo marcamos el último (la línea completa se sigue viendo con todo el detalle). */
  const dense = points.length > 24;
  const fmtV = valueFmt || axisFmt;
  const fmtD = dateFmt || shortDate;
  /* scrubbing: al arrastrar dedo/ratón se resalta el punto más cercano y se muestra su fecha y valor */
  const locate = (clientX) => {
    const svg = svgRef.current; if (!svg) return;
    const r = svg.getBoundingClientRect();
    const sx = ((clientX - r.left) / r.width) * W;
    let idx = Math.round(((sx - padL) / (W - padL - padR)) * (points.length - 1));
    idx = Math.max(0, Math.min(points.length - 1, idx));

    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", touchAction: "none" }}
      onMouseMove={(e) => locate(e.clientX)} onMouseLeave={() => setActive(null)}
      onTouchStart={(e) => locate(e.touches[0].clientX)} onTouchMove={(e) => locate(e.touches[0].clientX)} onTouchEnd={() => setActive(null)}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke={T.line} strokeWidth={1} />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{axisFmt(t)}</text>
        </g>
      ))}
      <polygon points={area} fill={color} opacity={0.12} />
      <polyline points={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (!dense || i === points.length - 1) && <circle key={i} cx={x(i)} cy={y(p.v)} r={i === points.length - 1 ? 4 : 2.4} fill={i === points.length - 1 ? color : "#fff"} stroke={color} strokeWidth={1.5} />)}
      <text x={x(0)} y={H - 7} textAnchor="start" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[0].date)}</text>
      {midIdx != null && midIdx !== 0 && midIdx !== points.length - 1 && (
        <text x={x(midIdx)} y={H - 7} textAnchor="middle" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[midIdx].date)}</text>
      )}
      <text x={x(points.length - 1)} y={H - 7} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[points.length - 1].date)}</text>
      {ap && (
        <g pointerEvents="none">
          <line x1={ax} x2={ax} y1={padT} y2={H - padB} stroke={color} strokeWidth={1} strokeDasharray="3 3" opacity={0.7} />
          <circle cx={ax} cy={y(ap.v)} r={4.5} fill={color} stroke="#fff" strokeWidth={1.6} />
          <g transform={`translate(${tipRight ? ax - 94 : ax + 6}, ${padT})`}>
            {/* v1.69 FIX modo noche (Victor: "no se lee la etiqueta de fecha y porcentaje"): el rect usa
                T.ink (casi blanco en oscuro) y el texto era "#fff" fijo — blanco sobre blanco. El texto pasa
                a T.card (el fondo de la app), que contrasta con T.ink en LOS DOS modos. */}
            <rect x={0} y={0} width={88} height={30} rx={6} fill={T.ink} opacity={0.92} />
            <text x={7} y={12} fontSize={9} fontWeight={600} fill={T.card} opacity={0.8}>{fmtD(ap.date)}</text>
            <text x={7} y={24} fontSize={11} fontWeight={800} fill={T.card}>{fmtV(ap.v)}</text>
          </g>
        </g>
      )}
    </svg>
  );
}

/* ---------- rendimiento: snapshots fechados con variación ---------- */
const METRICS = {
  "NLV": { get: (s) => s.nlv, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.green },
  "MKT VL": { get: (s) => s.mktvl, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.green },
  "P&L": { get: (s) => s.totalPnl, fmt: (v) => signMoney(v), axis: (v) => "$" + kFmt(v), color: T.purple },
  "Riesgo": { get: (s) => s.totalRiesgo, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.orange },
  "Apal.": { get: (s) => s.leverage, fmt: (v) => (isFinite(v) ? v.toFixed(2) + "×" : "—"), axis: (v) => v.toFixed(2), color: T.purple },
  "EL/Margen": { get: (s) => s.elMrgn, fmt: (v) => pct(v), axis: (v) => Math.round(v * 100) + "%", color: T.gold },
  "EL/NLV": { get: (s) => s.elNlv, fmt: (v) => pct(v), axis: (v) => Math.round(v * 100) + "%", color: T.orange },
};
/* ---------- selector de métricas: dos filas fijas — arriba patrimonio/rentabilidad, abajo riesgo/exposición ---------- */
const METRIC_ROW1 = ["NLV", "MKT VL", "P&L", "Rent. real", "Aportado"];
const METRIC_ROW2 = ["Riesgo", "Drawdown", "Apal.", "EL/Margen", "EL/NLV"]; /* v1.70 */
/* nombre largo para el encabezado (la pill va abreviada para que quepa en dos líneas) */
const METRIC_TITLE = { "Apal.": "Apalancamiento" };
/* métricas cuyo % de variación no significa nada: el divisor es la propia métrica en el primer snapshot
   (P&L partiendo de casi cero da cifras absurdas tipo +781%; Aportado igual). Solo delta en $. */
const NO_PCT = ["P&L", "Aportado"];
/* ---------- rangos del gráfico de Rendimiento: filtra qué snapshots se muestran, evita saturación con historial largo ---------- */
const RANGE_DAYS = { "7D": 7, "1M": 30, "3M": 90, "1A": 365 };
const RANGE_KEYS = ["7D", "1M", "3M", "YTD", "1A", "Todo", "Fechas"];
function rangeCutoffISO(range) {
  if (range === "YTD") return new Date().getFullYear() + "-01-01";
  if (range === "Todo" || !RANGE_DAYS[range]) return null;
  const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - RANGE_DAYS[range]);
  return d.toISOString().slice(0, 10);
}
function RendimientoCard({ snapshots, flows, onSave, onDelete }) {
  const [expanded, setExpanded] = useState(null);
  const [metric, setMetric] = useState("NLV");
  const [range, setRange] = useState("1M");
  const [showSnaps, setShowSnaps] = useState(false); // lista cruda de snapshots plegada por defecto
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const dateInputStyle = { width: "100%", boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 12, padding: "0 12px", fontSize: 13, fontWeight: 600, color: T.ink, outline: "none", WebkitAppearance: "none", appearance: "none" };
  const sorted = [...snapshots].sort((a, b) => (a.date < b.date ? 1 : -1)); // desc
  const first = sorted[sorted.length - 1];
  const asc = [...snapshots].sort((a, b) => (a.date < b.date ? -1 : 1));
  /* aportaciones netas en el intervalo (d0, d1] — el flujo real que entró/salió de la cuenta es el importe
     MENOS la comisión de bróker (v3.32): un depósito con comisión mete menos capital, una retirada con
     comisión saca más. flowNet = amount − fee cuadra en ambos sentidos (fee siempre resta). */
  const flowNet = (f) => n(f.amount) - n(f.fee);
  const flowBetween = (d0, d1) => (flows || []).reduce((s, f) => (f.date > d0 && f.date <= d1 ? s + flowNet(f) : s), 0);
  /* TWR: encadena retornos por tramo, neutralizando aportaciones/retiros (Dietz modificado, flujo a mitad de tramo) */
  const twrSeries = (() => {
    let idx = 100; const out = [];
    asc.forEach((s, i) => {
      if (i === 0) { out.push({ date: s.date, v: 100 }); return; }
      const prev = asc[i - 1];
      const F = flowBetween(prev.date, s.date);
      const denom = prev.nlv + 0.5 * F;
      const r = denom ? (s.nlv - prev.nlv - F) / denom : 0;
      idx *= 1 + r;
      out.push({ date: s.date, v: idx });
    });
    return out;
  })();
  const flowsAsc = [...(flows || [])].sort((a, b) => (a.date < b.date ? -1 : 1));
  const aportSeries = (() => { let acc = 0; return flowsAsc.map((f) => { acc += n(f.amount); return { date: f.date, v: acc }; }); })();
  /* v1.70 (Victor: "pon también que se vea drawdown"): la CURVA de drawdown como métrica propia — % bajo
     el máximo histórico de la TWR en cada momento (0% = en máximos; el valle más hondo es el Máx DD de la
     tile). Se calcula sobre la serie COMPLETA y luego se recorta al rango: el pico de referencia es el de
     toda la historia, no el del rango visible — un drawdown re-basado al mes mentiría. */
  const ddSeries = (() => {
    let peak = -Infinity;
    return twrSeries.map((p) => { peak = Math.max(peak, p.v); return { date: p.date, v: peak > 0 ? (p.v / peak - 1) * 100 : 0 }; });
  })();
  const SPECIAL = {
    "Rent. real": { series: twrSeries, fmt: (v) => (isFinite(v) ? (v / 100 - 1 >= 0 ? "+" : "") + ((v / 100 - 1) * 100).toFixed(1) + "%" : "—"), axis: (v) => Math.round(v - 100) + "%", color: T.green },
    "Drawdown": { series: ddSeries, fmt: (v) => (isFinite(v) ? v.toFixed(1) + "%" : "—"), axis: (v) => Math.round(v) + "%", color: T.red },
    "Aportado": { series: aportSeries, fmt: (v) => signMoney(v), axis: (v) => "$" + kFmt(v), color: T.purple },
  };
  const sp = SPECIAL[metric];
  const m = sp ? null : METRICS[metric];
  const fullSeries = sp ? sp.series : asc.map((s) => ({ date: s.date, v: m.get(s) })).filter((p) => isFinite(p.v));
  const inRange = (d) => {
    if (range === "Fechas") return (!customFrom || d >= customFrom) && (!customTo || d <= customTo);
    const cut = rangeCutoffISO(range);
    return !cut || d >= cut;
  };
  let series = fullSeries.filter((p) => inRange(p.date));
  /* v1.69 (Victor: "¿MAR ratio? en rendimiento, ¿no?"): sí — aquí, y sobre la serie CORRECTA: la TWR
     (sin aportaciones), no el NLV. MAR = CAGR / |max drawdown|, ambos del HISTÓRICO COMPLETO, no del rango
     visible — un MAR de 3 meses no significa nada. Guardas: hacen falta ≥60 días de historia para
     anualizar sin inventar (por debajo, la tarjeta lo dice en vez de enseñar un CAGR ridículo). */
  const marStats = (() => {
    if (twrSeries.length < 2) return null;
    const firstT = twrSeries[0], lastT = twrSeries[twrSeries.length - 1];
    const days = daysBetween(firstT.date, lastT.date);
    if (!isFinite(days) || days < 60) return { days: isFinite(days) ? days : 0, short: true };
    const cagr = Math.pow(lastT.v / firstT.v, 365 / days) - 1;
    let peak = -Infinity, maxDD = 0;
    twrSeries.forEach((pt) => { peak = Math.max(peak, pt.v); if (peak > 0) maxDD = Math.min(maxDD, pt.v / peak - 1); });
    const mar = maxDD < 0 ? cagr / Math.abs(maxDD) : null; /* sin drawdown aún, el MAR no está definido */
    return { days, short: false, cagr, maxDD, mar };
  })();
  /* Rent. real: re-basar el índice TWR al inicio del rango visible, para que tanto la cifra como la curva
     reflejen el periodo seleccionado (antes mostraba siempre el acumulado desde el primer snapshot). */
  if (metric === "Rent. real" && series.length) {
    const base = series[0].v || 100;
    series = series.map((p) => ({ date: p.date, v: (p.v / base) * 100 }));
  }
  const mFmt = sp ? sp.fmt : m.fmt;
  const mAxis = sp ? sp.axis : m.axis;
  const mColor = sp ? sp.color : m.color;
  const curV = metric === "Rent. real"
    ? (series.length ? series[series.length - 1].v : NaN)
    : (fullSeries.length ? fullSeries[fullSeries.length - 1].v : NaN);
  const firstV = series.length ? series[0].v : NaN;
  const dTotal = curV - firstV;
  const dTotalPct = firstV ? dTotal / Math.abs(firstV) : NaN;
  const isMoney = ["NLV", "MKT VL", "P&L", "Riesgo", "Aportado"].includes(metric);
  const showPct = isMoney && !NO_PCT.includes(metric);

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 17, fontWeight: 800, color: T.ink }}>Rendimiento</div>{/* v1.71: 15→17, Victor lo veía pequeño */}
      </div>
      {/* v1.71 (Victor: "mal encuadrados"): CAGR · Máx DD · MAR salen del flex del encabezado (competían
         con el título por la fila) a su propio bloque a TODO EL ANCHO, justo debajo. El botón "+ Snapshot
         de hoy" se elimina: cada 🔄 Precios ya guarda el snapshot del día con precios recién traídos —

      {marStats && (marStats.short ? (
        <div style={{ background: T.tile, borderRadius: 12, padding: "8px 12px", fontSize: 11, fontWeight: 600, color: T.sub, marginBottom: 14 }}>

        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 14 }}>
          <div style={{ background: T.tile, borderRadius: 12, padding: "9px 6px", textAlign: "center", minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: marStats.cagr >= 0 ? T.green : T.red, fontVariantNumeric: "tabular-nums" }}>{(marStats.cagr >= 0 ? "+" : "") + (marStats.cagr * 100).toFixed(1) + "%"}</div>
            <div style={{ fontSize: 9, fontWeight: 600, color: T.sub, marginTop: 1 }}>CAGR (TWR)</div>
          </div>
          <div onClick={() => setMetric("Drawdown")} style={{ background: T.tile, borderRadius: 12, padding: "9px 6px", textAlign: "center", minWidth: 0, cursor: "pointer" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.red, fontVariantNumeric: "tabular-nums" }}>{(marStats.maxDD * 100).toFixed(1) + "%"}</div>
            <div style={{ fontSize: 9, fontWeight: 600, color: T.sub, marginTop: 1 }}>Máx drawdown ▸</div>
          </div>
          <div style={{ background: T.tile, borderRadius: 12, padding: "9px 6px", textAlign: "center", minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: marStats.mar == null ? T.sub : marStats.mar >= 1 ? T.green : marStats.mar >= 0.5 ? T.gold : T.red, fontVariantNumeric: "tabular-nums" }}>{marStats.mar == null ? "—" : marStats.mar.toFixed(2)}</div>

      {snapshots.length === 0 && (

      {snapshots.length >= 1 && (

            </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>{metric === "Rent. real" ? "Rentabilidad sin aportaciones ni traspasos (TWR)" : metric === "Drawdown" ? "% bajo el máximo histórico (TWR)" : metric === "Aportado" ? "Aportaciones netas acumuladas" : (METRIC_TITLE[metric] || metric) + " · último snapshot"}</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.5, marginTop: 1 }}>{isFinite(curV) ? mFmt(curV) : "—"}</div>
            </div>
            {series.length >= 2 && metric !== "Rent. real" && metric !== "Drawdown" && (
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>desde {shortDate(series[0].date)}</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: dTotal >= 0 ? T.green : T.red, marginTop: 1 }}>
                  {isMoney ? signMoney(dTotal) : (dTotal >= 0 ? "+" : "") + mFmt(dTotal).replace("+", "")}{isFinite(dTotalPct) && showPct ? ` (${dTotalPct >= 0 ? "+" : ""}${(dTotalPct * 100).toFixed(1)}%)` : ""}
                </div>

            )}
          </div>
          {series.length >= 2 ? (

            </div>
          ) : fullSeries.length >= 2 ? (
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500 }}>Sin snapshots en este rango — prueba "Todo" o un rango mayor.</div>
          ) : (
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500 }}>{metric === "Aportado" ? "Registra aportaciones en la pestaña 💶 Aportaciones para ver el acumulado." : "Guarda un segundo snapshot para ver la evolución."}</div>

        </div>

      {snapshots.length >= 1 && (
        <button onClick={() => setShowSnaps((v) => !v)} style={{ width: "100%", background: T.tile, border: "none", borderRadius: 12, padding: "10px 0", fontSize: 12.5, fontWeight: 700, color: T.sub, cursor: "pointer", marginBottom: showSnaps ? 6 : 0 }}>

        let tickerMovers = [];
        if (prev) {
          const allTkrs = new Set([...Object.keys(s.tickers || {}), ...Object.keys(prev.tickers || {})]);
          tickerMovers = [...allTkrs].map((t) => {
            const cur = (s.tickers || {})[t] || { riesgo: 0, pnl: 0 };

                <span style={{ fontSize: 14, fontWeight: 800, color: T.ink }}>{new Date(s.date + "T00:00:00").toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" })} {prev && <span style={{ fontSize: 10, color: T.sub, fontWeight: 700 }}>{isOpen ? "▲" : "▼"}</span>}</span>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>

                <MicroStat label="Δ Apal." value={dLev != null ? (dLev >= 0 ? "+" : "") + dLev.toFixed(2) + "×" : "—"} color={dLev != null ? (dLev > 0 ? T.gold : T.green) : T.sub} />
              </div>

            {isOpen && prev && (
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Por bloque</div>

                      <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>Riesgo Δ{signMoney(t.dRiesgo)} · P&L <span style={{ color: t.dPnl >= 0 ? T.green : T.red, fontWeight: 800 }}>Δ{signMoney(t.dPnl)}</span></span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })}

      <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginTop: 12 }}>Cada "🔄 Precios" guarda un snapshot automático del día; el mismo día se sobrescribe, así que el que queda registrado es siempre el último del día. Cada snapshot recoge NLV, MKT VL, riesgo total, plausible, P&L y el detalle por bloque y subyacente de toda la cartera, sin importar el filtro de broker. "Rent. real" es la rentabilidad encadenada por tramos (TWR) descontando las aportaciones, retiros y traspasos de acciones registrados en 💶 Aportaciones (Dietz modificado, flujo ponderado a mitad de tramo) — es la cifra comparable con un índice. Δ Real = Δ NLV − flujos netos del tramo (efectivo + traspasos). Toca un snapshot con anterior para ver el desglose.</div>
    </div>
  );
}

/* ---------- aportaciones y retiros de cash: no son rendimiento ---------- */
function AportacionesCard({ flows, setFlows, brokers, accounts }) {
  const today = new Date().toISOString().slice(0, 10);
  const [date, setDate] = useState(today);
  const [amount, setAmount] = useState("");
  const [fee, setFee] = useState(""); /* v3.32: comisión de bróker del movimiento */
  const [kind, setKind] = useState("Aportación");
  const [via, setVia] = useState("Efectivo"); // "Efectivo" | "Acciones" (traspaso in-kind, a valor de mercado)
  const [brk, setBrk] = useState(brokers[0] || "");
  const [note, setNote] = useState("");
  const [warn, setWarn] = useState(false); /* v3.32: aviso post-aportación si el bróker tiene cash negativo */
  useEffect(() => { if (!brokers.includes(brk)) setBrk(brokers[0] || ""); }, [brokers]);
  const brkCash = (b) => n(((accounts || {})[b] || {}).cash); /* cash manual del bróker (negOnly → negativo = margen) */
  const negCashBrk = brkCash(brk) < 0;
  const add = () => {
    const a = Math.abs(n(amount));
    if (!a || !date) return;
    const signed = kind === "Retiro" ? -a : a;
    setFlows((fs) => [...fs, { id: newId(), date, amount: String(signed), broker: brk, note: note.trim(), via, fee: String(n(fee) || 0) }]);
    setWarn(negCashBrk); /* si aportas/retiras sobre un bróker con cash negativo, recuérdalo */
    setAmount(""); setNote(""); setFee("");
  };
  const del = (id) => setFlows((fs) => fs.filter((f) => f.id !== id));
  const sorted = [...flows].sort((a, b) => (a.date < b.date ? 1 : -1));
  const totalIn = flows.reduce((s, f) => s + Math.max(0, n(f.amount)), 0);
  const totalOut = flows.reduce((s, f) => s + Math.min(0, n(f.amount)), 0);
  const totalFees = flows.reduce((s, f) => s + n(f.fee), 0);
  const neto = totalIn + totalOut;
  const cumSeries = (() => { let acc = 0; return [...flows].sort((a, b) => (a.date < b.date ? -1 : 1)).map((f) => { acc += n(f.amount); return { date: f.date, v: acc }; }); })();
  /* height fija + lineHeight en vez de solo padding: en iOS los input[type=date] y los select renderizan
     con alturas propias distintas al input de texto y la rejilla 2×2 quedaba descuadrada */
  const inputStyle = { width: "100%", boxSizing: "border-box", height: 44, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 12, padding: "0 12px", fontSize: 14, fontWeight: 600, color: T.ink, outline: "none", WebkitAppearance: "none", appearance: "none", display: "flex", alignItems: "center" };
  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, marginBottom: 12 }}>Aportaciones y retiros</div>

      <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
        <MicroStat label="Aportado" value={"$" + money(totalIn)} color={T.green} />
        <MicroStat label="Retirado" value={"-$" + money(Math.abs(totalOut))} color={T.red} />
        <MicroStat label="Neto" value={signMoney(neto)} color={neto >= 0 ? T.green : T.red} />
        {totalFees > 0 && <MicroStat label="Comisiones" value={"-$" + money(totalFees)} color={T.red} />}
      </div>

      {cumSeries.length >= 2 && (
        <div style={{ background: T.tile, borderRadius: 16, padding: "12px 10px 8px", marginBottom: 14 }}>
          <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6, paddingLeft: 4 }}>Aportaciones netas acumuladas</div>
          <MetricChart points={cumSeries} color={T.purple} axisFmt={(v) => "$" + kFmt(v)} valueFmt={(v) => signMoney(v)} />
        </div>
      )}

      <div style={{ background: T.tile, borderRadius: 16, padding: 12, marginBottom: 14 }}>
        <div style={{ marginBottom: 10 }}>
          <Pill options={["Aportación", "Retiro"]} value={kind} onChange={setKind} size="sm" />
        </div>
        <div style={{ marginBottom: 10 }}>
          <Pill options={["Efectivo", "Acciones"]} value={via} onChange={setVia} size="sm" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
          <input type="number" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder={via === "Acciones" ? "Valor mercado USD" : "Importe USD"} style={inputStyle} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <select value={brk} onChange={(e) => setBrk(e.target.value)} style={{ ...inputStyle, appearance: "none", WebkitAppearance: "none" }}>
            {brokers.map((b) => <option key={b} value={b}>{b}</option>)}
          </select>
          <input type="number" inputMode="decimal" value={fee} onChange={(e) => setFee(e.target.value)} placeholder="Comisión USD (opc.)" style={inputStyle} />
        </div>
        <div style={{ marginBottom: 10 }}>
          <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="Nota (opcional)" style={inputStyle} />
        </div>
        {/* v3.32: pista en vivo — si el bróker elegido está en cash negativo (margen), la aportación real
           lo reduce/cancela antes de sumar a B0. Recordatorio antes de registrar. */}
        {negCashBrk && (
          <div style={{ fontSize: 11, fontWeight: 700, color: T.gold, background: T.tileAmber, borderRadius: 10, padding: "8px 10px", lineHeight: 1.5, marginBottom: 10 }}>
            ⚠️ {brk} tiene cash negativo ({signMoney(brkCash(brk))}). Una {kind === "Retiro" ? "retirada lo agranda" : "aportación real lo reduce o lo cancela"} antes de tocar B0 — al registrar, acuérdate de actualizar el <b>cash negativo</b> y el <b>cash de B0</b> en la cuenta.
          </div>
        )}
        <button onClick={add} style={{ width: "100%", background: kind === "Retiro" ? T.red : T.green, border: "none", borderRadius: 14, padding: "12px 0", fontSize: 14.5, fontWeight: 700, color: "#fff", cursor: "pointer" }}>{via === "Acciones" ? (kind === "Retiro" ? "− Traspaso de acciones (salida)" : "+ Traspaso de acciones (entrada)") : (kind === "Retiro" ? "− Registrar retiro" : "+ Registrar aportación")}</button>
        {warn && (
          <div style={{ marginTop: 10, fontSize: 11.5, fontWeight: 700, color: T.gold, background: T.tileAmber, borderRadius: 12, padding: "10px 12px", lineHeight: 1.5, display: "flex", gap: 8, alignItems: "flex-start" }}>
            <span style={{ flex: 1 }}>✅ Registrado. Recuerda: esto es solo para el rendimiento, no mueve el cash de la cuenta. Ve a la cuenta y revisa el <b>cash negativo</b> y el <b>cash de B0</b> para que reflejen el saldo real tras el movimiento.</span>
            <button onClick={() => setWarn(false)} style={{ background: "transparent", border: "none", color: T.gold, fontSize: 14, fontWeight: 800, cursor: "pointer", padding: "0 2px", flexShrink: 0 }}>✕</button>
          </div>
        )}
      </div>

      {sorted.length === 0 && <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "4px 0" }}>Sin movimientos. Registra cada aportación o retirada —de efectivo o por traspaso de acciones (a valor de mercado)— con su fecha: el Rendimiento las descuenta para que la rentabilidad no se distorsione.</div>}
      {sorted.map((f) => (
        <div key={f.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${T.line}`, padding: "9px 0" }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>{new Date(f.date + "T00:00:00").toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" })}</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{f.via === "Acciones" ? "🔄 Acciones · " : ""}{f.broker}{n(f.fee) > 0 ? " · com. $" + money2(n(f.fee)) : ""}{f.note ? " · " + f.note : ""}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <span style={{ fontSize: 14.5, fontWeight: 800, color: n(f.amount) >= 0 ? T.green : T.red }}>{signMoney(f.amount)}</span>
            <button onClick={() => del(f.id)} style={{ background: "transparent", border: "none", color: T.red, fontSize: 12, fontWeight: 700, cursor: "pointer", padding: "2px 4px" }}>✕</button>
          </div>
        </div>
      ))}

      <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginTop: 12 }}>Solo registro para el cálculo de rendimiento: no modifica el cash ni las posiciones de la cuenta. Cuando aportas o retiras de verdad, refléjalo en la cuenta: si el bróker estaba en <b>cash negativo</b> (margen), una aportación primero lo reduce o lo cancela; el resto es liquidez que sumas como <b>cash de B0</b> (y una retirada baja B0 o agranda el cash negativo). Por eso, tras registrar un movimiento sobre un bróker con cash negativo, salta el aviso de revisar esos dos saldos. La <b>comisión de bróker</b> se guarda aparte y el rendimiento (TWR) la descuenta del flujo — un depósito con comisión cuenta como capital neto entrante (importe − comisión). Un traspaso de acciones se registra a su valor de mercado en la fecha del traspaso, igual que una aportación de cash, para que el salto de NLV no cuente como rentabilidad. Puedes añadir movimientos con fecha pasada; el TWR se recalcula al momento.</div>
    </div>
  );
}

/* ---------- swipe a la izquierda para eliminar ---------- */
function SwipeDelete({ onDelete, disabled, radius, children }) {
  /* radius (v5.10): el fondo del contenedor deslizable era un rectángulo cuadrado que asomaba por
     detrás de las tarjetas redondeadas del Comparador — con radius, wrapper y fila comparten esquina */
  const [dx, setDx] = useState(0);
  const ref = React.useRef({ x: 0, y: 0, drag: null, base: 0 });
  const W = 100; // 92 de botón + 8 de separación con la fila
  const OVER_MAX = 70; // exceso máximo de arrastre más allá del botón (con resistencia)
  /* con disabled (fila expandida en edición o roll) el swipe se desactiva por completo: el panel de roll
     tiene una tabla con scroll horizontal propio y el gesto chocaba con el deslizable de eliminar */
  useEffect(() => { if (disabled && dx !== 0) setDx(0); }, [disabled]);
  const onTouchStart = (e) => { if (disabled) return; const t = e.touches[0]; ref.current = { x: t.clientX, y: t.clientY, drag: null, base: dx }; };
  const onTouchMove = (e) => {
    if (disabled) return;
    const t = e.touches[0]; const r = ref.current;
    const mx = t.clientX - r.x, my = t.clientY - r.y;
    if (r.drag == null) { if (Math.abs(mx) < 8 && Math.abs(my) < 8) return; r.drag = Math.abs(mx) > Math.abs(my) * 1.2; }
    if (!r.drag) return;
    /* estilo iOS: hasta −W la fila sigue al dedo 1:1; más allá sigue moviéndose pero con resistencia
       elástica (0.35×), para que el gesto se sienta fluido en vez de chocar con un tope duro */
    let next = Math.min(0, r.base + mx);
    if (next < -W) next = -W + Math.max(next + W, -OVER_MAX / 0.35) * 0.35;
    setDx(next);
  };
  const onTouchEnd = () => { ref.current.drag = null; setDx((d) => (d < -W / 2 ? -W : 0)); };
  return (
    <div data-swipeopen={dx !== 0 ? "1" : undefined} style={{ position: "relative", overflow: "hidden", borderRadius: radius || 0 }}>
      {!disabled && (
      <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: Math.max(W, -dx), display: "flex" }}>{/* la zona roja se estira con el exceso de arrastre; el texto queda anclado */}
        <button onClick={() => { setDx(0); onDelete(); }} style={{ flex: 1, margin: "10px 0 10px 8px", border: "none", borderRadius: 14, background: T.red, color: "#fff", fontSize: 12.5, fontWeight: 800, cursor: "pointer", opacity: dx < -10 ? 1 : 0, transition: "opacity 0.15s" }}>Eliminar</button>
      </div>
      )}
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        data-swipedelete={disabled ? undefined : "1"}
        onClickCapture={(e) => { if (dx !== 0) { e.stopPropagation(); e.preventDefault(); setDx(0); } }}
        style={{ transform: dx ? `translateX(${dx}px)` : "none", transition: ref.current.drag ? "none" : "transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.3)", background: T.card, position: "relative", borderRadius: radius || 0 }}>{/* cubic-bezier con sobreimpulso: al soltar, la fila vuelve a su posición con un pequeño rebote. transform solo si hay desplazamiento: un transform permanente rompe el position:fixed de las hojas de roll/cierre (quedaban recortadas dentro de la fila) */}
        {children}
      </div>
    </div>
  );
}

/* ---------- fila de posición ---------- */
/* ---------- Tabla de patas / cadena de rolls: componente compartido. Es exactamente la misma tabla que se
   ve en Movimientos → Estrategias al expandir una posición, y también se muestra dentro del panel de "Rolar"
   para que el histórico completo esté delante al decidir el nuevo strike/expiry. Scroll horizontal en móvil. ---------- */
/* v3.52: historial de operaciones por pata de un vertical (Credit Spread) — solo lectura. Las de cierre/
   roll muestran el REALIZADO ya reservado (o.cash, neto de comisión); las de apertura muestran "pendiente"
   porque ese crédito no se apunta hasta que esa pata se cierre a su vez. */
function LegOpsTable({ p }) {
  const ops = (p && p.legOps) || [];
  const openNotes = [p && p.sNote ? { leg: "Corta", note: p.sNote } : null, p && p.lNote ? { leg: "Larga", note: p.lNote } : null].filter(Boolean);
  if (!ops.length && !openNotes.length) return null;
  const actLbl = (o) => o.act === "close" ? (o.leg === "S" ? "Recompra corta" : "Venta larga") : o.act === "open" ? (o.leg === "S" ? "Venta corta" : "Compra larga") : (o.leg === "S" ? "Roll corta" : "Roll larga");
  /* v3.57: reconstruye el precio vivo de cada pata tras cada operación (como el BEP tras cada roll de
     puts/calls) — para close/roll, el precio ANTES se deriva de cash/fee/px (cash = (antes−px)×qty−fee
     en la corta, (px−antes)×qty−fee en la larga); tras un close la pata queda plana (null, no aporta al
     neto); tras un open/roll el precio vivo es el nuevo (px en open, newP en roll). */
  const qty = n(p.qty) || 1;
  const firstSOp = ops.find((o) => o.leg === "S");
  const firstLOp = ops.find((o) => o.leg === "L");
  /* precio original (antes de tocar la pata): si nunca se ha tocado, es el vivo actual p.sP/p.lP (no ha
     cambiado); si se tocó, se deriva del cash reservado en la PRIMERA operación de esa pata — misma
     fórmula que usa legOp para reservar (cash = (original−px)×qty−fee en la corta, (px−original)×qty−fee
     en la larga) — así las filas ANTERIORES a esa operación muestran el neto real, no un 0 fantasma. */
  let runS = firstSOp ? (n(firstSOp.cash) + n(firstSOp.fee)) / qty + n(firstSOp.px) : n(p.sP);
  let runL = firstLOp ? n(firstLOp.px) - (n(firstLOp.cash) + n(firstLOp.fee)) / qty : n(p.lP);
  const netAfter = ops.map((o) => {
    if (o.leg === "S") {
      if (o.act === "close") runS = null;
      else if (o.act === "open") runS = n(o.px);
      else if (o.act === "roll") runS = n(o.newP);
    } else {
      if (o.act === "close") runL = null;
      else if (o.act === "open") runL = n(o.px);
      else if (o.act === "roll") runL = n(o.newP);
    }
    return (runS != null ? runS : 0) - (runL != null ? runL : 0);
  });
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 4 }}>Ciclo por pata{ops.length ? " · " + ops.length + " operación" + (ops.length === 1 ? "" : "es") : ""}</div>
      {openNotes.map((o, i) => (
        <div key={"open" + i} style={{ display: "flex", alignItems: "baseline", gap: 8, fontSize: 11.5, fontWeight: 700, color: T.ink, padding: "3px 0", borderTop: i ? `1px solid ${T.line}` : "none" }}>
          <span style={{ color: T.sub, fontVariantNumeric: "tabular-nums", flexShrink: 0 }}>{p.entryDate || ""}</span>
          <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Apertura {o.leg} · {o.note}</span>
        </div>
      ))}
      {ops.map((o, i) => {
        const booked = o.cash != null;
        const net = booked ? n(o.cash) : null;
        return (
          <div key={i} style={{ borderTop: (i || openNotes.length) ? `1px solid ${T.line}` : "none", padding: "3px 0" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8, fontSize: 11.5, fontWeight: 700, color: T.ink }}>
              <span style={{ color: T.sub, fontVariantNumeric: "tabular-nums", flexShrink: 0 }}>{o.date}</span>
              <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{actLbl(o)}{o.k ? " " + o.k : ""}{o.expiry ? " · " + ibkrDate(o.expiry) : ""}{o.note ? " · " + o.note : ""}</span>
              <span style={{ fontVariantNumeric: "tabular-nums", color: booked ? (net >= 0 ? T.green : T.red) : T.sub, flexShrink: 0 }}>{booked ? (net >= 0 ? "+" : "−") + "$" + Math.abs(net).toFixed(2) : "pendiente"}</span>
            </div>
            <div style={{ fontSize: 10, fontWeight: 700, color: T.sub, marginTop: 1 }}>Neto en juego tras esto: <span style={{ color: netAfter[i] >= 0 ? T.ink : T.red }}>${netAfter[i].toFixed(2)}</span>/acc</div>
          </div>
        );
      })}
    </div>
  );
}
function RollChainTable({ p }) {
  /* v1.69 (Victor): en la cadena de rolls la fecha lleva AÑO — una cadena puede cruzar diciembre y
     "12 may" no dice de qué año. Solo aquí; el resto de la app sigue con la fecha corta. */
  const shortDate = (iso) => { if (!iso) return ""; const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "2-digit" }); };
  const chain = p.rollChain || [];
  const cs = isCreditSpread(p);
  const dcdd = isDCDD(p);
  /* sin columna de retorno (v5.11): credit spreads Y DC/DD — el %strike no aplica a una estructura
     multi-pata con varios strikes; la rentabilidad ya la dan ROI/Annualized en la cabecera. */
  const noRet = cs || dcdd;
  /* etiqueta de la pata: en credit spreads no es CALL/PUT sino la propia estrategia (IC = Iron Condor,
     BW = Broken Wing), porque cada "pata" es en realidad el spread completo abierto/cerrado de una vez. */
  const rightLabel = cs ? (isVertical(p) ? (vDisplayPrima(p) >= 0 ? "CS" : "DS") : csAbbr(p.tipo)) : (p.right === "C" ? "CALL" : "PUT");
  /* strikes que se muestran en la columna Strike: en IC los dos spreads APILADOS en dos mini-filas dentro
     de la misma celda (v5.00 — en una sola línea desbordaban la columna y pisaban el Expiry); en broken
     wing, el único spread. Fuente mucho más pequeña que la de un strike normal. */
  const csStrikes = cs ? [p.putSpread, p.callSpread].filter(Boolean) : [];
  const shortSide = natOf(p) === "CRED" || isCreditSpread(p); // corta (o credit spread): apertura = VENTA, recompra = COMPRA
  const q = n(p.qty);
  /* PMCC: el strike de la short no representa el riesgo real de la operación (que es de débito, cubierto
     por la long). La última columna pasa a ser %Riesgo = prima de cada pata / BEP actual del PMCC (débito
     neto por acción), en vez de %Strike. */
  const pmcc = isPMCC(p);
  /* credBep (v5.15): short put / covered call (crédito de una pata, no PMCC ni spread) — llevan una columna
     BEP junto a la prima que muestra el breakeven vigente tras cada roll (strike − prima acumulada). Si se
     cambia el strike al rolar, el nuevo BEP se recalcula solo con ese strike. */
  const credBep = natOf(p) === "CRED" && !pmcc;
  const retLabel = pmcc ? "%Riesgo" : "%Strike";
  /* credit spreads (v5.02): sin columna %Strike — el retorno sobre strike no aplica a un spread de dos alas
     (no hay un strike de referencia); la rentabilidad ya la dan ROI y Annualized en la cabecera. */
  const gridCols = pmcc ? "62px 118px 64px 78px 44px 46px 42px 60px 66px 84px 60px 72px" : credBep ? "62px 104px 64px 78px 44px 46px 60px 66px 64px 84px 72px" : noRet ? "62px 104px 64px 78px 44px 46px 60px 66px 84px" : "62px 104px 64px 78px 44px 46px 60px 66px 84px 72px";
  const gridMinW = pmcc ? 886 : credBep ? 826 : noRet ? 680 : 758;
  const retDenom = pmcc ? Math.abs(pmccNetDebit(p)) : null;
  const retOf = (perShare, strike) => (pmcc ? (retDenom ? perShare / retDenom : NaN) : (n(strike) ? perShare / n(strike) : NaN));
  const openingPrima = chain.length > 0 ? n(chain[0].prevPrima) : n(p.prima);
  const openingStk = chain.length > 0 ? chain[0].prevStrike : p.strike;
  const openingExp = chain.length > 0 ? chain[0].prevExpiry : p.expiry;
  const stkAfter = (idx) => (idx + 1 < chain.length ? chain[idx + 1].prevStrike : p.strike);
  const expAfter = (idx) => (idx + 1 < chain.length ? chain[idx + 1].prevExpiry : p.expiry);
  const LegRow = ({ date, action, actionLabel, strike, expiry, perShare, amount, fee, ivr, delta, bepAfter, ret, isBuy, isExp }) => {
    const legDays = daysBetween(date, expiry);
    return (
      <div style={{ display: "grid", gridTemplateColumns: gridCols, gap: 6, alignItems: "center", padding: "8px 10px", borderRadius: 9, background: T.card, marginBottom: 4, fontVariantNumeric: "tabular-nums" }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: T.sub, whiteSpace: "nowrap" }}>{shortDate(date)}</span>
        <span style={{ fontSize: 12, fontWeight: 800, color: isExp ? T.sub : isBuy ? T.red : T.green, whiteSpace: "nowrap" }}>{actionLabel || (action + " " + rightLabel)}</span>
        {cs ? (
          <span style={{ display: "flex", flexDirection: "column", lineHeight: 1.25, justifyContent: "center" }}>
