          const editing = editSet.has(c.id);
          return (
            <SwipeDelete key={c.id} onDelete={() => delTrade(c.id)}>
            <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, border: isBest ? `2px solid ${T.green}` : "2px solid transparent" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 9, minWidth: 0 }}>
                  <span style={{ background: vbg, color: vcol, borderRadius: 10, padding: "5px 9px", fontSize: 12, fontWeight: 800, letterSpacing: 0.5, whiteSpace: "nowrap" }}>{c.status}</span>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: -0.4, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", color: c.tkr ? T.ink : T.sub, lineHeight: 1.1 }}>{tickerOf(c)}</div>
                    {strikeLineOf(c) && <div style={{ fontSize: 12, color: T.sub, fontWeight: 600, marginTop: 1 }}>{strikeLineOf(c)}</div>}
                    {dteDeltaOf(c) && <div style={{ fontSize: 11, color: T.sub, fontWeight: 600, marginTop: 1 }}>{dteDeltaOf(c)}</div>}
                  </div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: T.green, letterSpacing: -0.5 }}>{signPct(c.annRoi, 2)}</div>
                  <div style={{ fontSize: 12, color: T.sub, fontWeight: 500 }}>Annualized ROI</div>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 22, marginBottom: 14, flexWrap: "wrap" }}>
                <div style={{ display: "flex", gap: 26 }}>
                  <MiniStat label="Premium" value={"$" + money2(c.premium)} />
                  <MiniStat label="ROI" value={signPct(c.roi, 2)} color={T.green} />
                </div>
                <div style={{ display: "flex", gap: 14, background: T.tile, borderRadius: 12, padding: "8px 12px", flexShrink: 0 }}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: T.sub, fontWeight: 500 }}>Riesgo</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>${money(c.notional)}</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: T.sub, fontWeight: 500 }}>BEP</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{isFinite(c.bep) ? "$" + money2(c.bep) : "—"}</div>
                    {isFinite(c.bepMargin) && <div style={{ fontSize: 11, fontWeight: 700, color: c.bepMargin <= 0 ? T.green : T.red }}>({pct(c.bepMargin, 0)})</div>}
                  </div>
                  {c.pop && (
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 10, color: T.sub, fontWeight: 500 }}>POP</div>
                      <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{c.pop}%</div>
                    </div>
                  )}
                </div>
              </div>

              {editing && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${T.line}` }}>
                  <EditField label="Ticker / nombre" value={c.tkr} onChange={setTr(c.id, "tkr")} span={2} text />
                  <EditField label="DTE" value={c.dte} onChange={setTr(c.id, "dte")} />
                  <EditField label="Strike" prefix="$" value={c.strike} onChange={setTr(c.id, "strike")} />
                  <label>
                    <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>Expiry</span>
                    <input type="date" value={c.expiry || ""} onChange={(e) => {
                      const val = e.target.value;
                      if (!val) { setTr(c.id, "expiry")(""); return; }
                      const exp = new Date(val + "T00:00:00Z");
                      const today = new Date(); const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
                      const newDte = isNaN(exp.getTime()) ? null : Math.max(Math.round((exp.getTime() - todayUTC) / 86400000), 0);
                      setTrades((ts) => ts.map((t) => (t.id === c.id ? { ...t, expiry: val, dte: newDte != null ? String(newDte) : t.dte } : t)));
                    }} style={{ width: "100%", boxSizing: "border-box", height: 36, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 11, color: c.expiry ? T.ink : T.sub, fontSize: 13, fontWeight: 700, padding: "0 8px", outline: "none", appearance: "none", WebkitAppearance: "none" }} />
                  </label>
                  <EditField label="Credit" prefix="$" value={c.credit} onChange={setTr(c.id, "credit")} />
                  <EditField label="Margin" prefix="$" value={c.margin} onChange={setTr(c.id, "margin")} />
                  <EditField label="Precio subyacente" prefix="$" value={c.underlying} onChange={setTr(c.id, "underlying")} span={2} />
                  <EditField label="Delta" value={c.delta} onChange={setTr(c.id, "delta")} span={2} />
                  <EditField label="POP (%)" value={c.pop} onChange={setTr(c.id, "pop")} span={2} />
                </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginBottom: 14 }}>
                <Tile label="Position Size" value={pct(c.posSize)} />
                <Tile label="Return on margin" value={pct(c.rom, 1)} />
                <Tile label="Annualized return on margin" value={pct(c.annRom, 0)} tone="green" />
              </div>

              <ElRow label="EL / NLV post" post={c.elNlv} base={base.elNlv} delta={c.dElNlv} color={HEX[toneNlv(c.elNlv)]} min={0} max={0.6} zones={Z_NLV} marks={M_NLV_FULL} />
              <ElRow label="EL / MRGN post" post={c.elMrgn} base={base.elMrgn} delta={c.dElMrgn} color={HEX[toneMrgn(c.elMrgn)]} min={0} max={1.5} zones={Z_MRGN} marks={M_MRGN_FULL} />

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4, paddingTop: 13, borderTop: `1px solid ${T.line}` }}>
                <button onClick={() => toggleEdit(c.id)} style={{ background: editing ? T.dark : T.tile, border: "none", borderRadius: 12, padding: "8px 16px", fontSize: 13.5, fontWeight: 700, color: editing ? "#fff" : T.ink, cursor: "pointer" }}>{editing ? "✓ Hecho" : "✎ Editar"}</button>
                <button onClick={() => delTrade(c.id)} style={{ background: "transparent", border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 13.5, fontWeight: 700, color: T.red, cursor: "pointer" }}>Eliminar</button>
              </div>
            </div>
            </SwipeDelete>
          );
        })}
        {computed.length === 0 && !baseEmpty && (
          <div style={{ background: T.card, borderRadius: 24, padding: 30, textAlign: "center", boxShadow: T.shadow }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: T.sub }}>Añade una operación con "+ Operación" para compararla contra tu cuenta ({brokerLabel}).</div>
          </div>
        )}
      </div>
    </>
  );
}

/* ============================================================ */
function App() {
  /* modo oscuro: por defecto CLARO siempre, sin importar el ajuste del sistema — el icono ☀️/🌙 de arriba
     lo cambia a mano y se recuerda para la próxima vez (localStorage). No sigue al iPhone.
     applyTheme() se llama de forma síncrona en cada render — así T/BLOCKS/HEX/TABS/PALETTE
     están siempre al día para ese render, sea cual sea el motivo del cambio. */
  const [darkOverride, setDarkOverride] = useState(() => {
    try { return localStorage.getItem(KEY_DARK_OVERRIDE) === "dark"; } catch (e) { return false; }
  });
  const isDark = darkOverride;
  applyTheme(isDark);
  useEffect(() => {
    try {
      const tc = document.getElementById("theme-color-meta"); if (tc) tc.setAttribute("content", isDark ? "#17140F" : "#EEE9E0");
      const cs = document.getElementById("color-scheme-meta"); if (cs) cs.setAttribute("content", isDark ? "dark" : "light");
    } catch (e) {}
  }, [isDark]);
  const toggleDark = () => {
    const next = !isDark;
    setDarkOverride(next);
    try { localStorage.setItem(KEY_DARK_OVERRIDE, next ? "dark" : "light"); } catch (e) {}
  };
  const [accounts, setAccounts] = useState(SEED_ACC);
  const [positions, setPositions] = useState(SEED_POS);
  const [broker, setBroker] = useState("Todos");
  const [activeTab, setActiveTab] = useState(0);
  const [chartScope, setChartScope] = useState("Bloque");
  const [selectedSlice, setSelectedSlice] = useState(null);
  const [editSet, setEditSet] = useState(() => new Set());
  const [confirmClear, setConfirmClear] = useState(false);
  const [info, setInfo] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [refreshMsg, setRefreshMsg] = useState("");
  const [pullDist, setPullDist] = useState(0);
  const pullTrackingRef = useRef(false);
  const pullStartYRef = useRef(0);
  const rootRef = useRef(null);
  const [apiKey, setApiKey] = useState("");
  const [keyModalOpen, setKeyModalOpen] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const [geminiKey, setGeminiKey] = useState("");
  const [geminiModalOpen, setGeminiModalOpen] = useState(false);
  const [geminiInput, setGeminiInput] = useState("");
  const [refreshChoiceOpen, setRefreshChoiceOpen] = useState(false);
  const [updChecking, setUpdChecking] = useState(false);
  const [updCheckMsg, setUpdCheckMsg] = useState("");
  const [snapshots, setSnapshots] = useState([]);
  const [flows, setFlows] = useState([]);
  const [autoBackups, setAutoBackups] = useState([]);
  const [updateNotice, setUpdateNotice] = useState(null);
  const [confirmAutoBk, setConfirmAutoBk] = useState(null);
  const [brokers, setBrokers] = useState(SEED_BROKERS);
  const [brokerModalOpen, setBrokerModalOpen] = useState(false);
  const [newBrokerName, setNewBrokerName] = useState("");
  const [removeTarget, setRemoveTarget] = useState({});
  const [view, setView] = useState(() => { try { return localStorage.getItem(KEY_VIEW) === "comparador" ? "comparador" : "bloques"; } catch (e) { return "bloques"; } });
  const selectView = (v) => { setView(v); try { localStorage.setItem(KEY_VIEW, v); } catch (e) {} };
  const [trades, setTrades] = useState([]);
  const [basis, setBasis] = useState(() => { try { const v = localStorage.getItem(KEY_BASIS); return BASIS_KEYS.includes(v) ? v : "annRom"; } catch (e) { return "annRom"; } });
  const [confirmClearTr, setConfirmClearTr] = useState(false);
  const clearTrades = () => {
    if (!confirmClearTr) { setConfirmClearTr(true); setTimeout(() => setConfirmClearTr(false), 3000); return; }
    setTrades([]); setConfirmClearTr(false);
  };
  const [showPnl, setShowPnl] = useState(() => { try { return localStorage.getItem("bloques_show_pnl") === "1"; } catch (e) { return false; } });
  const togglePnl = () => setShowPnl((v) => { const nv = !v; try { localStorage.setItem("bloques_show_pnl", nv ? "1" : "0"); } catch (e) {} return nv; });

  const withNat = (arr) => arr.map((p) => ({
    factor: p.factor != null ? p.factor : "1",
    margen: p.margen != null ? p.margen : "",
    margenPct: p.margenPct != null ? p.margenPct : "100",
    margenModo: p.margenModo != null ? p.margenModo : "PCT",
    mktModo: p.mktModo != null ? p.mktModo : "AUTO",
    pnlModo: p.pnlModo != null ? p.pnlModo : "AUTO",
    prima: p.prima != null ? p.prima : "",
    ...p,
    nat: p.nat || inferNat(p),
  }));
  useEffect(() => {
    /* versión de proyecto: si el HTML es una versión nueva, copia automática de los datos actuales antes de tocarlos */
    try {
      const stored = localStorage.getItem(KEY_APPVER);
      let bks = [];
      try { const raw = localStorage.getItem(KEY_AUTOBK); if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr)) bks = arr; } } catch (e) {}
      /* si venías de una versión que guardaba más (antes eran 8), recorta ya lo existente a 3 */
      if (bks.length > 3) { bks = bks.slice(0, 3); try { localStorage.setItem(KEY_AUTOBK, JSON.stringify(bks)); } catch (e) {} }
      if (stored !== APP_VERSION) {
        const hasData = BACKUP_KEYS.some((k) => localStorage.getItem(k) != null);
        if (stored != null || hasData) {
          const data = {};
          BACKUP_KEYS.forEach((k) => { const v = localStorage.getItem(k); if (v != null) data[k] = v; });
          bks = [{ version: stored || "pre-1.0", ts: Date.now(), data }, ...bks].slice(0, 3);
          localStorage.setItem(KEY_AUTOBK, JSON.stringify(bks));
          setUpdateNotice({ from: stored ? "v" + stored : "versión anterior", to: APP_VERSION });
        }
        localStorage.setItem(KEY_APPVER, APP_VERSION);
      }
      setAutoBackups(bks);
    } catch (e) {}
    let haveAcc = false, havePos = false;
    try { const f = localStorage.getItem(KEY_FLOWS); if (f) { const arr = JSON.parse(f); if (Array.isArray(arr)) setFlows(arr); } } catch (e) {}
    try { const a = localStorage.getItem(KEY_ACC); if (a) { setAccounts(JSON.parse(a)); haveAcc = true; } } catch (e) {}
    try { const p = localStorage.getItem(KEY_POS); if (p) { setPositions(withNat(JSON.parse(p))); havePos = true; } } catch (e) {}
    try { const k = localStorage.getItem(KEY_FINNHUB); if (k) setApiKey(k); } catch (e) {}
    try { const gk = localStorage.getItem(KEY_GEMINI); if (gk) setGeminiKey(gk); } catch (e) {}
    try { const s = localStorage.getItem(KEY_SNAP); if (s) setSnapshots(JSON.parse(s)); } catch (e) {}
    try { const bk = localStorage.getItem(KEY_BROKERS); if (bk) { const arr = JSON.parse(bk); if (Array.isArray(arr) && arr.length) setBrokers(arr); } } catch (e) {}
    let haveTr = false;
    try { const tr = localStorage.getItem(KEY_TRADES); if (tr) { const arr = JSON.parse(tr); if (Array.isArray(arr)) { setTrades(arr); haveTr = true; } } } catch (e) {}
    if (!haveTr) { try { const trOld = localStorage.getItem(KEY_TR_OLD); if (trOld) { const arr = JSON.parse(trOld); if (Array.isArray(arr) && arr.length) { setTrades(arr); haveTr = true; } } } catch (e) {} }
    (async () => {
      if (!haveTr) { const tr = await idbGet(KEY_TRADES); if (tr) { try { const arr = JSON.parse(tr); if (Array.isArray(arr)) setTrades(arr); } catch (e) {} } }
      if (!haveAcc) { const a = await idbGet(KEY_ACC); if (a) { try { setAccounts(JSON.parse(a)); haveAcc = true; } catch (e) {} } }
      if (!havePos) { const p = await idbGet(KEY_POS); if (p) { try { setPositions(withNat(JSON.parse(p))); havePos = true; } catch (e) {} } }
      if (!haveAcc || !havePos) {
        try {
          const aOld = localStorage.getItem(KEY_ACC_OLD);
          const pOld = localStorage.getItem(KEY_POS_OLD);
          if (!haveAcc && aOld) setAccounts(JSON.parse(aOld));
          if (!havePos && pOld) {
            setPositions(withNat(JSON.parse(pOld)));
          }
        } catch (e) {}
      }
      setLoaded(true);
    })();
  }, []);
  useEffect(() => { if (loaded) saveKV(KEY_ACC, accounts); }, [accounts, loaded]);
  useEffect(() => { if (loaded) saveKV(KEY_POS, positions); }, [positions, loaded]);
  useEffect(() => { if (loaded) saveKV(KEY_SNAP, snapshots); }, [snapshots, loaded]);
  useEffect(() => { if (loaded) saveKV(KEY_FLOWS, flows); }, [flows, loaded]);
  useEffect(() => { if (loaded) saveKV(KEY_BROKERS, brokers); }, [brokers, loaded]);
  useEffect(() => { if (loaded) saveKV(KEY_TRADES, trades); }, [trades, loaded]);
  useEffect(() => { if (loaded) { try { localStorage.setItem(KEY_BASIS, basis); } catch (e) {} } }, [basis, loaded]);
  /* con un solo broker no existe "Todos": se selecciona directo y su cash/margin queda editable */
  useEffect(() => {
    if (brokers.length === 1) { if (broker !== brokers[0]) setBroker(brokers[0]); }
    else if (broker !== "Todos" && !brokers.includes(broker)) setBroker("Todos");
  }, [brokers]);
  useEffect(() => {
    setAccounts((a) => {
      let changed = false; const next = { ...a };
      brokers.forEach((b) => { if (!next[b]) { next[b] = emptyAcc(); changed = true; } });
      return changed ? next : a;
    });
  }, [brokers]);

  const [backupOpen, setBackupOpen] = useState(false);
  const [backupText, setBackupText] = useState("");
  const [copied, setCopied] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState("");
  const openBackup = () => {
    // graba un snapshot de hoy antes de exportar, para no perder el track del rendimiento
    const snap = buildSnapshot();
    const nextSnaps = [...snapshots.filter((s) => s.date !== snap.date), snap];
    setSnapshots(nextSnaps);
    const posOut = positions.map((p) => ({
      ...p,
      margen: p.margen != null ? p.margen : "",
      margenPct: p.margenPct != null ? p.margenPct : "100",
      margenModo: p.margenModo != null ? p.margenModo : "PCT",
    }));
    setBackupText(JSON.stringify({ v: 11, appVersion: APP_VERSION, ts: Date.now(), brokers, accounts, positions: posOut, snapshots: nextSnaps, aportaciones: flows, trades, compBasis: basis, finnhubKey: apiKey, geminiKey, showPnl }, null, 2));
    setCopied(false); setRestoreMsg(""); setBackupOpen(true);
  };
  const copyBackup = async () => {
    setRestoreMsg("");
    try { await navigator.clipboard.writeText(backupText); setCopied(true); }
    catch (e) { try { const el = document.getElementById("backup-ta"); if (el) { el.focus(); el.select(); document.execCommand("copy"); setCopied(true); } } catch (e2) {} }
    setTimeout(() => setCopied(false), 2500);
  };
  const pasteBackup = async () => {
    setCopied(false);
    try {
      const txt = await navigator.clipboard.readText();
      if (txt && txt.trim()) { setBackupText(txt); setRestoreMsg("pasted"); }
      else setRestoreMsg("pasteEmpty");
    } catch (e) { setRestoreMsg("pasteErr"); }
  };
  const restoreBackup = () => {
    try {
      const d = JSON.parse(backupText);
      const brokerList = Array.isArray(d.brokers) && d.brokers.length ? d.brokers : (d.accounts ? Object.keys(d.accounts) : SEED_BROKERS);
      if (brokerList.length) setBrokers(brokerList);
      if (d.accounts) {
        const next = {};
        brokerList.forEach((brk) => { next[brk] = { cash: "0", margin: "0", ...(d.accounts[brk] || {}) }; });
        setAccounts(next);
      }
      if (Array.isArray(d.positions)) setPositions(withNat(d.positions));
      if (Array.isArray(d.snapshots)) setSnapshots(d.snapshots);
      if (Array.isArray(d.aportaciones)) setFlows(d.aportaciones);
      if (Array.isArray(d.trades)) setTrades(d.trades);
      if (typeof d.compBasis === "string" && BASIS_KEYS.includes(d.compBasis)) setBasis(d.compBasis);
      if (typeof d.finnhubKey === "string" && d.finnhubKey) { setApiKey(d.finnhubKey); try { localStorage.setItem(KEY_FINNHUB, d.finnhubKey); } catch (e) {} }
      if (typeof d.geminiKey === "string" && d.geminiKey) { setGeminiKey(d.geminiKey); try { localStorage.setItem(KEY_GEMINI, d.geminiKey); } catch (e) {} }
      if (typeof d.showPnl === "boolean") { setShowPnl(d.showPnl); try { localStorage.setItem("bloques_show_pnl", d.showPnl ? "1" : "0"); } catch (e) {} }
      setBroker("Todos");
      setRestoreMsg("ok"); setTimeout(() => setBackupOpen(false), 700);
    } catch (err) { setRestoreMsg("err"); }
  };

  /* restaura una copia automática (raw localStorage) y recarga la app para releer todo limpio */
  /* comprobación manual de versión: pide el propio index.html a la red sin caché y compara — botón porque el chequeo
     automático al abrir puede no dispararse a tiempo en apps guardadas en pantalla de inicio de iOS */
  const checkForNewerVersion = () => {
    setUpdChecking(true); setUpdCheckMsg("Buscando actualización…");
    fetch(location.pathname + "?_cachebust=" + Date.now(), { cache: "no-store" })
      .then((r) => r.text())
      .then((html) => {
        const m = html.match(/const APP_VERSION = "([^"]+)"/);
        if (m && m[1] !== APP_VERSION) {
          setUpdCheckMsg(`Hay una versión nueva (v${m[1]}) — actualizando…`);
          const url = new URL(location.href);
          url.searchParams.set("v", m[1]);
          url.searchParams.set("_", Date.now());
          setTimeout(() => location.replace(url.toString()), 500);
        } else {
          setUpdChecking(false);
          setUpdCheckMsg("Ya tienes la última versión (v" + APP_VERSION + ").");
          setTimeout(() => setUpdCheckMsg(""), 4000);
        }
      })
      .catch(() => {
        setUpdChecking(false);
        setUpdCheckMsg("No se pudo comprobar — revisa la conexión.");
        setTimeout(() => setUpdCheckMsg(""), 4000);
      });
  };

  const restoreAutoBackup = (bk) => {
    if (confirmAutoBk !== bk.ts) { setConfirmAutoBk(bk.ts); setTimeout(() => setConfirmAutoBk(null), 4000); return; }
    try {
      BACKUP_KEYS.forEach((k) => { const v = bk.data[k]; if (v == null) localStorage.removeItem(k); else localStorage.setItem(k, v); });
      localStorage.setItem(KEY_APPVER, APP_VERSION);
      location.reload();
    } catch (e) { setRestoreMsg("err"); }
  };

  const runRefresh = async (key) => {
    setRefreshing(true); setRefreshMsg("");
    const tickers = [...new Set(positions.map((p) => p.tkr).filter(Boolean))];
    const results = {};
    const errors = {};
    for (const t of tickers) {
      const res = await fetchQuote(t, key);
      if (res.price != null) results[t] = res.price;
      else errors[res.error] = (errors[res.error] || 0) + 1;
      await new Promise((r) => setTimeout(r, 150));
    }
    const nextPositions = positions.map((p) => (results[p.tkr] != null ? { ...p, last: String(results[p.tkr]) } : p));
    setPositions(nextPositions);
    setRefreshing(false);
    const found = Object.keys(results).length;
    if (found > 0) {
      /* snapshot automático con los precios recién cargados; mismo día se sobrescribe → queda el último del día */
      const snap = buildSnapshot(nextPositions);
      setSnapshots((ss) => [...ss.filter((s) => s.date !== snap.date), snap]);
      setRefreshMsg(`Precios actualizados: ${found} de ${tickers.length} tickers. Snapshot de hoy guardado en 📈 Rendimiento (se sobrescribe con cada actualización: queda el último del día). Los no encontrados (Euronext, LSE…) se actualizan a mano.`);
    } else {
      const detalle = Object.entries(errors).map(([e, c]) => `${e} ×${c}`).join(" · ") || "motivo desconocido";
      setRefreshMsg(`No se encontró ningún precio. Detalle: ${detalle}. Si dice "red/CORS", prueba a abrir el archivo en Safari normal (no el icono guardado) o revisa la conexión. Si dice "key inválida", cópiala de nuevo en finnhub.io/dashboard.`);
    }
    setTimeout(() => setRefreshMsg(""), 12000);
  };
  const onRefreshClick = () => {
    if (apiKey) { setRefreshChoiceOpen(true); return; }
    setKeyInput(""); setKeyModalOpen(true);
  };
  /* tirar de la página hacia abajo = refrescar precios directamente (sin el modal de elegir acción:
     el gesto ya es una intención inequívoca). Si no hay key guardada, abre el modal para pedirla,
     igual que la primera vez que se toca el botón "🔄 Precios". */
  const PULL_THRESHOLD = 64;
  const pullRefreshNow = () => {
    if (refreshing) return;
    if (apiKey) runRefresh(apiKey);
    else { setKeyInput(""); setKeyModalOpen(true); }
  };
  useEffect(() => {
    const el = rootRef.current;
    if (!el) return;
    const onTouchStart = (e) => {
      if (view !== "bloques" || refreshing) { pullTrackingRef.current = false; return; }
      const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
      if (scrollTop <= 0 && e.touches && e.touches.length === 1) {
        pullTrackingRef.current = true;
        pullStartYRef.current = e.touches[0].clientY;
      } else {
        pullTrackingRef.current = false;
      }
    };
    const onTouchMove = (e) => {
      if (!pullTrackingRef.current) return;
      const diff = e.touches[0].clientY - pullStartYRef.current;
      if (diff <= 0) { setPullDist(0); return; }
      const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
      if (scrollTop > 0) { pullTrackingRef.current = false; setPullDist(0); return; }
      try { e.preventDefault(); } catch (_) {}
      setPullDist(Math.min(diff * 0.45, 90));
    };
    const onTouchEnd = () => {
      if (!pullTrackingRef.current) return;
      pullTrackingRef.current = false;
      setPullDist((d) => { if (d >= PULL_THRESHOLD) pullRefreshNow(); return 0; });
    };
    el.addEventListener("touchstart", onTouchStart, { passive: true });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: true });
    el.addEventListener("touchcancel", onTouchEnd, { passive: true });
    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [view, refreshing, apiKey]);
  const openChangeKey = () => { setRefreshChoiceOpen(false); setKeyInput(apiKey); setKeyModalOpen(true); };
  const useSelectedKey = () => { setRefreshChoiceOpen(false); runRefresh(apiKey); };
  const saveKeyAndRefresh = () => {
    const k = keyInput.trim();
    if (!k) return;
    setApiKey(k);
    try { localStorage.setItem(KEY_FINNHUB, k); } catch (e) {}
    setKeyModalOpen(false);
    runRefresh(k);
  };
  const openGeminiModal = () => { setGeminiInput(geminiKey); setGeminiModalOpen(true); };
  const saveGeminiKey = () => {
    const k = geminiInput.trim();
    setGeminiKey(k);
    try { localStorage.setItem(KEY_GEMINI, k); } catch (e) {}
    setGeminiModalOpen(false);
  };

  const filtered = useMemo(() => broker === "Todos" ? positions : positions.filter((p) => p.broker === broker), [positions, broker]);

  const mktvl = useMemo(() => filtered.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0), [filtered]);
  /* posiciones Cash de B0: cuentan como cash del estado de cuenta (no como MKT VL) para no duplicar ni tener que meterlo a mano */
  const posCash = useMemo(() => filtered.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0), [filtered]);
  const sumField = (field) => brokers.reduce((s, b) => s + n((accounts[b] || {})[field]), 0);
  const manualCash = broker === "Todos" ? sumField("cash") : n((accounts[broker] || {}).cash);
  const cash = manualCash + posCash;
  const margin = broker === "Todos" ? sumField("margin") : n((accounts[broker] || {}).margin);
  const nlv = mktvl + cash;
  const el = nlv - margin;
  const leverage = nlv !== 0 ? mktvl / nlv : NaN;
  const elNlv = nlv !== 0 ? el / nlv : NaN;
  const elMrgn = margin !== 0 ? el / margin : NaN;
  const totalPnl = useMemo(() => filtered.reduce((s, p) => s + effPnl(p), 0), [filtered]);
  const totalRiesgo = useMemo(() => filtered.reduce((s, p) => s + capDesplegado(p), 0), [filtered]);

  const setAccField = (brk, k) => (v) => setAccounts((a) => ({ ...a, [brk]: { ...a[brk], [k]: v } }));
  const setPos = (id, k, v) => setPositions((ps) => ps.map((p) => (p.id === id ? { ...p, [k]: v } : p)));
  const toggleEdit = (id) => setEditSet((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
  const addPos = (blockId) => {
    const id = newId();
    const b = broker === "Todos" ? (brokers[0] || "IBKR") : broker;
    const defNat = blockId === 2 ? "CRED" : blockId === 3 ? "DEF" : "ACC";
    setPositions((ps) => [...ps, { id, block: blockId, broker: b, tkr: "", tipo: "", nat: defNat, strike: "", right: "P", expiry: "", qty: "", bep: "", prima: "", last: "", mktValue: "", riesgo: "", factor: "1", margen: "", margenPct: "100", margenModo: "PCT", mktModo: "AUTO", pnlModo: "AUTO", pnl: "" }]);
    setEditSet((s) => new Set(s).add(id));
  };
  const delPos = (id) => setPositions((ps) => ps.filter((p) => p.id !== id));
  const clearAll = () => {
    if (!confirmClear) { setConfirmClear(true); setTimeout(() => setConfirmClear(false), 3000); return; }
    setPositions([]); setEditSet(new Set()); setConfirmClear(false);
    setAccounts((a) => { const next = {}; Object.keys(a).forEach((b) => { next[b] = emptyAcc(); }); return next; });
  };

  const selectTab = (id) => {
    if (id === activeTab) { setEditSet(new Set()); return; } // re-tap del bloque activo → cierra todas las ediciones abiertas
    setActiveTab(id); setSelectedSlice(null);
    if (id === "exposicion" && chartScope === "Bloque") setChartScope("NLV");
  };
  const setScopeAndReset = (s) => { setChartScope(s); setSelectedSlice(null); };

  const isBlockTab = typeof activeTab === "number";
  const blk = isBlockTab ? BLOCKS.find((b) => b.id === activeTab) : null;
  const blockPositions = isBlockTab ? filtered.filter((p) => p.block === activeTab) : [];

  const blockTotals = useMemo(() => {
    const t = {};
    BLOCKS.forEach((b) => { t[b.id] = filtered.filter((p) => p.block === b.id).reduce((s, p) => s + capDesplegado(p), 0); });
    return t;
  }, [filtered]);

  /* agrega posiciones del mismo ticker (una posición en acción + opción cuenta como UNA sola porción) */
  const aggregateByTicker = (pool, getValue) => {
    const map = {};
    pool.forEach((p) => {
      const v = getValue(p);
      if (v <= 0 || !p.tkr) return;
      if (!map[p.tkr]) map[p.tkr] = 0;
      map[p.tkr] += v;
    });
    return Object.entries(map).map(([tkr, value]) => ({ id: tkr, label: tkr, value })).sort((a, b) => b.value - a.value);
  };

  const chartData = useMemo(() => {
    const pool = isBlockTab ? blockPositions : filtered;
    let denom = nlv, denomLabel = "NLV", getValue = (p) => capDesplegado(p);
    if (chartScope === "Bloque") { denom = blockTotals[activeTab] || 0; denomLabel = "del " + (blk ? blk.name : ""); }
    else if (chartScope === "MKT VL") { denom = mktvl; denomLabel = "MKT VL"; }
    else if (chartScope === "NLV") { denom = nlv; denomLabel = "NLV"; }
    else { denom = margin; denomLabel = "del margen usado"; getValue = effMargen; }
    const agg = aggregateByTicker(pool, getValue);
    const poolTotal = agg.reduce((s, x) => s + x.value, 0);
    const slices = agg.map((x, i) => ({ ...x, color: PALETTE[i % PALETTE.length], pctAbs: denom ? x.value / denom : NaN }));
    return { slices, total: poolTotal, denomPct: denom ? poolTotal / denom : NaN, denomLabel };
  }, [chartScope, activeTab, filtered, nlv, mktvl, margin, blockPositions, blockTotals, isBlockTab, blk, isDark]);

  const scopeOptions = isBlockTab ? ["Bloque", "MKT VL", "NLV", "Margen"] : ["MKT VL", "NLV", "Margen"];

  const exposureRows = useMemo(() => {
    const map = {};
    filtered.forEach((p) => {
      if (!p.tkr) return;
      if (!map[p.tkr]) map[p.tkr] = { tkr: p.tkr, riesgo: 0, plausible: 0, margen: 0, pnl: 0, pnlBasis: 0, last: 0, byBlock: {}, items: [] };
      map[p.tkr].riesgo += capDesplegado(p);
      map[p.tkr].plausible += plausibleOf(p);
      map[p.tkr].margen += effMargen(p);
      map[p.tkr].pnl += effPnl(p);
      map[p.tkr].pnlBasis += Math.abs(effBep(p) * n(p.qty)) || Math.abs(n(p.mktValue)) || capDesplegado(p);
      if (n(p.last) > 0 && (natOf(p) === "ACC" || !map[p.tkr].last)) map[p.tkr].last = n(p.last);
      map[p.tkr].byBlock[p.block] = (map[p.tkr].byBlock[p.block] || 0) + capDesplegado(p);
      if (natOf(p) !== "CASH") map[p.tkr].items.push(p);
    });
    return Object.values(map).filter((r) => r.riesgo > 0).sort((a, b) => b.riesgo - a.riesgo).map((r) => {
      /* filas de detalle: agrupa por bloque + (acciones: solo bloque) / (opción: bloque+right+strike+expiry) —
         así "2 put" con el mismo strike/vencimiento en el mismo bloque se funden en una fila con BEP ponderado */
      const groups = {};
      r.items.forEach((p) => {
        const isOpt = isOptionNat(p);
        const key = p.block + "|" + (isOpt ? (p.right || "") + "|" + (p.strike || "") + "|" + (p.expiry || "") : "ACC");
        if (!groups[key]) groups[key] = { block: p.block, isOpt, right: p.right, strike: p.strike, expiry: p.expiry, qty: 0, bepW: 0, riesgo: 0 };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          block: g.block,
          isOpt: g.isOpt,
          qtyNum: g.isOpt ? (Number.isInteger(contratos) ? contratos : g.qty) : g.qty,
          qtyUnit: g.isOpt ? (Number.isInteger(contratos) ? "contr." : "opc") : "acc",
          desc: g.isOpt ? optionDetail({ strike: g.strike, expiry: g.expiry, right: g.right }) : "",
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo,
        };
      }).sort((a, b) => a.block - b.block || (a.isOpt === b.isOpt ? 0 : a.isOpt ? 1 : -1));
      return {
        ...r,
        pctMktvl: mktvl ? r.riesgo / mktvl : NaN,
        pctNlv: nlv ? r.riesgo / nlv : NaN,
        pctMargen: margin ? r.margen / margin : NaN,
        pnlPct: r.pnlBasis ? r.pnl / r.pnlBasis : NaN,
        blockChips: Object.entries(r.byBlock).map(([bid, val]) => {
          const b = BLOCKS.find((x) => x.id === Number(bid));
          return { id: bid, name: b.name.replace("Bloque ", "B"), color: b.color, bg: b.bg, value: r.riesgo ? val / r.riesgo : NaN };
        }),
        detailRows,
      };
    });
  }, [filtered, mktvl, nlv, margin, isDark]);

  const vencimientosRows = useMemo(() => {
    const map = {};
    filtered.forEach((p) => {
      if (!isOptionNat(p) || !p.expiry) return;
      if (!map[p.expiry]) map[p.expiry] = { expiry: p.expiry, riesgo: 0, items: [] };
      map[p.expiry].riesgo += capDesplegado(p);
      map[p.expiry].items.push(p);
    });
    const today = new Date(); today.setHours(0, 0, 0, 0);
    return Object.values(map).sort((a, b) => (a.expiry < b.expiry ? -1 : 1)).map((r) => {
      /* dentro de cada fecha, agrupa por subyacente + bloque + strike/right — así "2 put" iguales
         en el mismo bloque se funden en una fila con BEP ponderado, igual que en Exposición */
      const groups = {};
      r.items.forEach((p) => {
        const key = p.tkr + "|" + p.block + "|" + (p.right || "") + "|" + (p.strike || "");
        if (!groups[key]) groups[key] = { tkr: p.tkr, block: p.block, right: p.right, strike: p.strike, qty: 0, bepW: 0, riesgo: 0 };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          tkr: g.tkr, block: g.block, right: g.right, strike: g.strike,
          qtyNum: Number.isInteger(contratos) ? contratos : g.qty,
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo,
        };
      }).sort((a, b) => b.riesgo - a.riesgo);
      const dte = Math.round((new Date(r.expiry + "T00:00:00") - today) / 86400000);
      return { ...r, detailRows, dte };
    });
  }, [filtered]);

  /* ---------- exportar cartera completa (ignora filtro de broker) para pegar y pedir feedback ---------- */
  const [exportOpen, setExportOpen] = useState(false);
  const [exportText, setExportText] = useState("");
  const [exportCopied, setExportCopied] = useState(false);

  const buildExportText = () => {
    const mktvlAll = positions.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = positions.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const cashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0) + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    const nlvAll = mktvlAll + cashAll;
    const elAll = nlvAll - marginAll;
    const blockTotalsAll = {};
    BLOCKS.forEach((b) => { blockTotalsAll[b.id] = positions.filter((p) => p.block === b.id).reduce((s, p) => s + capDesplegado(p), 0); });

    const lines = [];
    lines.push(`CARTERA — ${new Date().toLocaleDateString("es-ES")}`);
    lines.push("");
    lines.push("CUENTA (IBKR + DEGIRO)");
    lines.push(`MKT VL: $${money(mktvlAll)}`);
    lines.push(`NLV: $${money(nlvAll)}`);
    lines.push(`Cash: $${money(cashAll)}`);
    lines.push(`Margin: $${money(marginAll)}`);
    lines.push(`Excess Liquidity: $${money(elAll)}`);
    lines.push(`EL/NLV: ${pct(nlvAll ? elAll / nlvAll : NaN)}`);
    lines.push(`EL/Margin: ${pct(marginAll ? elAll / marginAll : NaN)}`);
    lines.push(`Apalancamiento MKT VL/NLV: ${nlvAll ? (mktvlAll / nlvAll).toFixed(2) : "—"}x`);
    lines.push("");

    BLOCKS.forEach((b) => {
      const bp = positions.filter((p) => p.block === b.id);
      const capTotal = bp.reduce((s, p) => s + capDesplegado(p), 0);
      const plausible = bp.reduce((s, p) => s + plausibleOf(p), 0);
      const pnl = bp.reduce((s, p) => s + effPnl(p), 0);
      lines.push(`${b.name} · ${b.tag} (objetivo ${pct(b.tMin, 0)}–${pct(b.tMax, 0)} NLV)`);
      lines.push(`  Riesgo total $${money(capTotal)} (${pct(nlvAll ? capTotal / nlvAll : NaN)} NLV) · Plausible $${money(plausible)} (${pct(nlvAll ? plausible / nlvAll : NaN)}) · P&L ${signMoney(pnl)}`);
      bp.forEach((p) => {
        const det = optionDetail(p);
        const natL = (NATS.find((x) => x.id === natOf(p)) || {}).label || natOf(p);
        lines.push(`  - ${p.tkr} [${p.broker}] ${natL}${p.tipo ? "/" + p.tipo : ""}${det ? " (" + det + ")" : ""} · Riesgo $${money2(capDesplegado(p))} · Plausible $${money2(plausibleOf(p))} · Margen $${money2(effMargen(p))}${isPctMargin(p) ? " (" + (p.margenPct || 0) + "%)" : ""} · BEP $${money2(effBep(p))} · Último ${p.last ? "$" + money2(p.last) : "—"} · P&L ${signMoney(effPnl(p))}${isAutoPnl(p) ? " (auto)" : ""}`);
      });
      lines.push("");
    });

    lines.push("EXPOSICIÓN POR SUBYACENTE (todas las posiciones agregadas por ticker)");
    const expMap = {};
    positions.forEach((p) => {
      if (!p.tkr) return;
      if (!expMap[p.tkr]) expMap[p.tkr] = { riesgo: 0, margen: 0 };
      expMap[p.tkr].riesgo += capDesplegado(p);
      expMap[p.tkr].margen += effMargen(p);
    });
    Object.entries(expMap).sort((a, b) => b[1].riesgo - a[1].riesgo).forEach(([tkr, v]) => {
      lines.push(`  ${tkr}: $${money(v.riesgo)} riesgo total · MKT VL ${pct(mktvlAll ? v.riesgo / mktvlAll : NaN)} · NLV ${pct(nlvAll ? v.riesgo / nlvAll : NaN)} · Margen ${pct(marginAll ? v.margen / marginAll : NaN)}`);
    });
    lines.push("");

    const totalRiesgoAll = positions.reduce((s, p) => s + capDesplegado(p), 0);
    const totalPnlAll = positions.reduce((s, p) => s + effPnl(p), 0);
    lines.push(`TOTAL RIESGO: $${money(totalRiesgoAll)} · P&L TOTAL: ${signMoney(totalPnlAll)}`);
    return lines.join("\n");
  };
  const openExport = () => { setExportText(buildExportText()); setExportCopied(false); setExportOpen(true); };
  const copyExport = async () => {
    try { await navigator.clipboard.writeText(exportText); setExportCopied(true); }
    catch (e) { try { const el = document.getElementById("export-ta"); if (el) { el.focus(); el.select(); document.execCommand("copy"); setExportCopied(true); } } catch (e2) {} }
    setTimeout(() => setExportCopied(false), 2500);
  };

  /* ---------- snapshots de rendimiento: siempre sobre la cartera completa, no el filtro actual ---------- */
  const buildSnapshot = (posArg) => {
    const pos = posArg || positions;
    const mktvlAll = pos.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = pos.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const cashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0) + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    const nlvAll = mktvlAll + cashAll;
    const elAll = nlvAll - marginAll;
    const blocks = {};
    BLOCKS.forEach((b) => {
      const bp = pos.filter((p) => p.block === b.id);
      blocks[b.id] = { riesgo: bp.reduce((s, p) => s + capDesplegado(p), 0), plausible: bp.reduce((s, p) => s + plausibleOf(p), 0), pnl: bp.reduce((s, p) => s + effPnl(p), 0) };
    });
    const tickers = {};
    pos.forEach((p) => {
      if (!p.tkr) return;
      if (!tickers[p.tkr]) tickers[p.tkr] = { riesgo: 0, pnl: 0 };
      tickers[p.tkr].riesgo += capDesplegado(p);
      tickers[p.tkr].pnl += effPnl(p);
    });
    return {
      date: new Date().toISOString().slice(0, 10),
      mktvl: mktvlAll, cash: cashAll, margin: marginAll, nlv: nlvAll, el: elAll,
      elNlv: nlvAll ? elAll / nlvAll : NaN, elMrgn: marginAll ? elAll / marginAll : NaN,
      leverage: nlvAll ? mktvlAll / nlvAll : NaN,
      totalRiesgo: pos.reduce((s, p) => s + capDesplegado(p), 0),
      totalPlausible: pos.reduce((s, p) => s + plausibleOf(p), 0),
      totalPnl: pos.reduce((s, p) => s + effPnl(p), 0),
      blocks, tickers,
    };
  };
  const saveSnapshot = () => {
    const snap = buildSnapshot();
    setSnapshots((ss) => [...ss.filter((s) => s.date !== snap.date), snap]);
  };
  const deleteSnapshot = (date) => setSnapshots((ss) => ss.filter((s) => s.date !== date));

  const addBroker = () => {
    const name = newBrokerName.trim().toUpperCase();
    if (!name || brokers.includes(name)) { setNewBrokerName(""); return; }
    setBrokers((bs) => [...bs, name]);
    setAccounts((a) => ({ ...a, [name]: emptyAcc() }));
    setNewBrokerName("");
  };
  const removeBroker = (name) => {
    if (brokers.length <= 1) return;
    const count = positions.filter((p) => p.broker === name).length;
    const dest = removeTarget[name] || brokers.find((b) => b !== name);
    if (count > 0 && dest) setPositions((ps) => ps.map((p) => (p.broker === name ? { ...p, broker: dest } : p)));
    setBrokers((bs) => bs.filter((b) => b !== name));
    setAccounts((a) => { const next = { ...a }; delete next[name]; return next; });
    setRemoveTarget((rt) => { const next = { ...rt }; delete next[name]; return next; });
    if (broker === name) setBroker("Todos");
  };

  return (
    <div ref={rootRef} style={{ minHeight: "100vh", background: T.bg, fontFamily: T.sans, color: T.ink, padding: "18px 14px 50px" }}>
      <style>{`
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        @keyframes pullSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      `}</style>
      {view === "bloques" && (pullDist > 0 || refreshing) && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: refreshing ? 40 : pullDist, overflow: "hidden", transition: refreshing ? "height 0.15s" : "none", marginBottom: (pullDist > 0 || refreshing) ? 4 : 0 }}>
          <span style={{ fontSize: 20, display: "inline-block", animation: (refreshing || pullDist >= PULL_THRESHOLD) ? "pullSpin 0.8s linear infinite" : "none", opacity: Math.min((refreshing ? 1 : pullDist / PULL_THRESHOLD), 1) }}>🔄</span>
          <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, marginLeft: 8 }}>{refreshing ? "Actualizando precios…" : pullDist >= PULL_THRESHOLD ? "Suelta para actualizar" : "Tira para actualizar precios"}</span>
        </div>
      )}
      <div style={{ maxWidth: 720, margin: "0 auto" }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, gap: 8 }}>
          <div>
            <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.8 }}>{view === "bloques" ? "Portfolio" : "Comparador"}</div>
            <div style={{ fontSize: 15, color: T.sub, fontWeight: 500 }}>{view === "bloques" ? "Composición de cartera en tiempo real" : "Sizing e impacto de margen"}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexWrap: "wrap", justifyContent: "flex-end" }}>
            <button onClick={toggleDark} aria-label="Modo oscuro/claro" style={{ background: T.card, border: "none", borderRadius: 14, width: 36, height: 36, fontSize: 15, cursor: "pointer", boxShadow: T.shadow, display: "flex", alignItems: "center", justifyContent: "center" }}>{isDark ? "☀️" : "🌙"}</button>
            {view === "bloques" && <button onClick={onRefreshClick} disabled={refreshing} style={{ background: T.card, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: T.sub, cursor: "pointer", boxShadow: T.shadow }}>{refreshing ? "…" : "🔄 Precios"}</button>}
            {view === "bloques" && <button onClick={openExport} style={{ background: T.card, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: T.sub, cursor: "pointer", boxShadow: T.shadow }}>Exportar</button>}
            {view === "bloques" && <button onClick={openBackup} style={{ background: T.card, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: T.sub, cursor: "pointer", boxShadow: T.shadow }}>Backup</button>}
            {view === "comparador" && <button onClick={openGeminiModal} style={{ background: geminiKey ? T.card : T.tileAmber, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: T.sub, cursor: "pointer", boxShadow: T.shadow }}>{geminiKey ? "🔑 Lector" : "🔑 Activar Lector"}</button>}
            {view === "bloques" && <button onClick={clearAll} style={{ background: confirmClear ? T.red : T.card, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: confirmClear ? "#fff" : T.sub, cursor: "pointer", boxShadow: T.shadow }}>{confirmClear ? "¿Vaciar?" : "Limpiar"}</button>}
            {view === "comparador" && trades.length > 0 && <button onClick={clearTrades} style={{ background: confirmClearTr ? T.red : T.card, border: "none", borderRadius: 14, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: confirmClearTr ? "#fff" : T.sub, cursor: "pointer", boxShadow: T.shadow }}>{confirmClearTr ? "¿Vaciar?" : "Limpiar"}</button>}
          </div>
        </div>

        {/* SWITCHER DE APP */}
        <div style={{ display: "flex", gap: 6, background: T.card, borderRadius: 18, padding: 6, marginBottom: 14, boxShadow: T.shadow }}>
          {[["bloques", "Portfolio"], ["comparador", "Comparador"]].map(([id, label]) => (
            <button key={id} onClick={() => selectView(id)} style={{
              flex: 1, border: "none", cursor: "pointer", borderRadius: 13, padding: "10px 0", fontSize: 14, fontWeight: 800,
              background: view === id ? T.dark : "transparent", color: view === id ? "#fff" : T.sub,
            }}>{label}</button>
          ))}
        </div>
        {updateNotice && (
          <div style={{ background: T.tileGreen, borderRadius: 14, padding: "10px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 12.5, color: T.ink, fontWeight: 700, lineHeight: 1.45 }}>App actualizada a v{updateNotice.to} (antes {updateNotice.from}). Se guardó una copia automática de tus datos por seguridad.</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, lineHeight: 1.45, marginTop: 3 }}>Si tras la actualización algo no cuadra o faltan datos, restaura la copia desde Backup → Copias automáticas.</div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={() => { setUpdateNotice(null); openBackup(); }} style={{ background: T.dark, border: "none", borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Ver copias</button>
              <button onClick={() => setUpdateNotice(null)} style={{ background: "transparent", border: "none", borderRadius: 10, padding: "7px 10px", fontSize: 12, fontWeight: 700, color: T.sub, cursor: "pointer" }}>Todo OK</button>
            </div>
          </div>
        )}
        {refreshMsg && <div style={{ fontSize: 12, color: T.green, fontWeight: 700, marginBottom: 12, background: T.tileGreen, borderRadius: 12, padding: "8px 12px" }}>{refreshMsg}</div>}

        {/* SELECTOR BROKER */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "stretch" }}>
          <div style={{ background: T.dark, borderRadius: 18, padding: 6, display: "flex", gap: 6, flex: 1, overflowX: "auto" }}>
            {(brokers.length > 1 ? ["Todos", ...brokers] : brokers).map((b) => (
              <button key={b} onClick={() => setBroker(b)} style={{
                flex: "1 0 auto", border: "none", cursor: "pointer", borderRadius: 13, padding: "10px 14px", fontSize: 14, fontWeight: 700, whiteSpace: "nowrap",
                background: broker === b ? "#fff" : "transparent", color: broker === b ? T.dark : "#C4CCD4",
              }}>{b}</button>
            ))}
          </div>
          {view === "bloques" && <button onClick={() => { setBrokerModalOpen(true); setNewBrokerName(""); setRemoveTarget({}); }} aria-label="Gestionar brokers" style={{ flexShrink: 0, background: T.card, border: "none", borderRadius: 16, padding: "0 14px", fontSize: 18, fontWeight: 700, color: T.sub, cursor: "pointer", boxShadow: T.shadow }}>⚙</button>}
        </div>

        {/* CUENTA */}
        <div style={{ background: T.card, borderRadius: 24, padding: 16, marginBottom: 16, boxShadow: T.shadow }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 12 }}>
            Cuenta · {broker === "Todos" ? "consolidado" : broker}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 9 }}>
            <Tile label="MKT VL (suma bloques)" value={(mktvl < 0 ? "-$" : "$") + money(Math.abs(mktvl))} />
            <Tile label="NLV (MKTV + Cash)" value={(nlv < 0 ? "-$" : "$") + money(Math.abs(nlv))} tone={nlv > 0 ? "green" : "red"} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 9 }}>
            {broker === "Todos" ? (
              <>
                <Tile label={"Cash (" + brokers.join(" + ") + ")"} value={(cash < 0 ? "-$" : "$") + money(Math.abs(cash))} />
                <Tile label={"Margin (" + brokers.join(" + ") + ")"} value={"$" + money(margin)} />
              </>
            ) : (
              <>
                <MoneyField label={"Cash manual · " + broker} value={(accounts[broker] || {}).cash} onChange={setAccField(broker, "cash")} signed />
                <MoneyField label={"Margin · " + broker} value={(accounts[broker] || {}).margin} onChange={setAccField(broker, "margin")} />
              </>
            )}
          </div>
          {posCash !== 0 && <div style={{ fontSize: 11, color: T.sub, marginBottom: 9, padding: "0 2px" }}>Cash = manual {(manualCash < 0 ? "-$" : "$") + money(Math.abs(manualCash))} + posiciones Cash B0 {(posCash < 0 ? "-$" : "$") + money(Math.abs(posCash))} → total {(cash < 0 ? "-$" : "$") + money(Math.abs(cash))}. Las posiciones Cash de B0 ya cuentan aquí (no en MKT VL): no las dupliques en el cash manual.</div>}
          {broker === "Todos" && <div style={{ fontSize: 11, color: T.sub, marginBottom: 9, padding: "0 2px" }}>Elige un broker arriba para editar su cash/margin. Toca ⚙ para añadir o quitar brokers.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 9, marginBottom: 14 }}>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                <span style={{ fontSize: 13, color: T.ink, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5 }}>EL / NLV <InfoDot onClick={() => setInfo("nlv")} /></span>

              </div>
              <ZoneBar value={elNlv} min={0} max={0.6} zones={Z_NLV} />
              <Scale min={0} max={0.6} marks={M_NLV_MINI} />
            </div>
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                <span style={{ fontSize: 13, color: T.ink, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5 }}>EL / MRGN <InfoDot onClick={() => setInfo("mrgn")} /></span>
                <span style={{ fontSize: 17, fontWeight: 800, color: HEX[toneMrgn(elMrgn)] }}>{pct(elMrgn)}</span>
              </div>
              <ZoneBar value={elMrgn} min={0} max={1.5} zones={Z_MRGN} />
              <Scale min={0} max={1.5} marks={M_MRGN_MINI} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 12, fontSize: 11, color: T.sub, fontWeight: 600, flexWrap: "wrap" }}>
            {[["riesgo", T.red], ["ajustado", T.gold], ["saludable", T.green]].map(([txt, col]) => (
              <span key={txt} style={{ display: "inline-flex", alignItems: "center" }}>
                <span style={{ display: "inline-block", width: 9, height: 9, borderRadius: 3, background: col, marginRight: 6 }} />{txt}
              </span>
            ))}
          </div>
        </div>

        {view === "comparador" && (
          <ComparadorContent nlv={nlv} margin={margin} el={el} brokerLabel={broker === "Todos" ? "consolidado " + brokers.join(" + ") : broker}
            trades={trades} setTrades={setTrades} basis={basis} setBasis={setBasis} />
        )}

        {view === "bloques" && (<>
        {/* RESUMEN */}
        <div style={{ background: T.dark, borderRadius: 24, padding: 18, marginBottom: 16, color: "#fff", boxShadow: T.shadow, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#B9C2CC", letterSpacing: 0.5, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 5 }}>
              Riesgo total · P&L <InfoDot onClick={() => setInfo("riesgo")} />
            </div>

          </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto" }}>

          <VencimientosCard rows={vencimientosRows} onOpen={setInfo} />

          <ExposureCard rows={exposureRows} onOpen={setInfo} showPnl={showPnl} togglePnl={togglePnl} />

        {/* DISTRIBUCIÓN — debajo del contenido del bloque (no aplica en Rendimiento, Aportaciones ni Vencimientos) */}
        {activeTab !== "rendimiento" && activeTab !== "aportaciones" && activeTab !== "vencimientos" && (
          <ChartCard scope={chartScope} setScope={setScopeAndReset} scopeOptions={scopeOptions} slices={chartData.slices} total={chartData.total} denomPct={chartData.denomPct} denomLabel={chartData.denomLabel} selected={selectedSlice} onSelect={setSelectedSlice} />

        </>)}

<script>
/* ---------- auto-actualización: hosting estático (GitHub Pages/Netlify/Vercel) y apps guardadas en pantalla de
   inicio pueden servir una copia cacheada y no recargar solos tras un deploy. Este script, en cada apertura,
   pide de red (sin caché) el propio index.html, compara su APP_VERSION con la que está corriendo, y si hay una
   más nueva en el servidor, fuerza una recarga con un parámetro que rompe cualquier caché. ---------- */
(function () {
  function checkForUpdate() {
    try {
      fetch(location.pathname + "?_cachebust=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var m = html.match(/const APP_VERSION = "([^"]+)"/);
          if (m && window.APP_VERSION && m[1] !== window.APP_VERSION) {
            var url = new URL(location.href);
            url.searchParams.set("v", m[1]);
            url.searchParams.set("_", Date.now());
            location.replace(url.toString());
          }
        })
        .catch(function () {});
    } catch (e) {}
  }
  if (document.readyState === "complete") checkForUpdate();
  else window.addEventListener("load", checkForUpdate);
})();
</script>
