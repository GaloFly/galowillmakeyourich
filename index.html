function MovimientosView({ positions, nlv, reopenPos, onEditChain, onEditLots, onEditDiv, snapshots, flows, saveSnapshot, deleteSnapshot, linkAssigned, linkCoveredCall, assignFromPut }) {
  const [sub, setSub] = useState("primas");
  const [stratCat, setStratCat] = useState("Acciones");
  const [stratStatus, setStratStatus] = useState("Abiertas");
  const [stratView, setStratView] = useState("cats"); /* v1.02: "cats" (por estrategia) | "tikr" (Acumulado TIKR) */
  const [stratSort, setStratSort] = useState("fecha"); /* v1.02: orden del listado — fecha | ticker | profit */
  const [tikrStatus, setTikrStatus] = useState("Todas"); /* v1.03: filtro de la vista Por ticker — Todas | Abiertas | Cerradas */
  const [stratWin, setStratWin] = useState("Todas"); /* v1.07: filtro de resultado — Todas | Ganadoras | Perdedoras */
  const [stratTkr, setStratTkr] = useState("Todos"); /* v1.07: filtro por ticker dentro de la estrategia */
  const [filterOpen, setFilterOpen] = useState(false); /* v1.08: modal de filtros */
  const [exportMsg, setExportMsg] = useState(""); /* v1.14: confirmación del export */
  const [expanded, setExpanded] = useState(new Set());
  const toggleExpand = (id) => setExpanded((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
  const [openMonths, setOpenMonths] = useState(new Set());
  const toggleMonth = (key) => setOpenMonths((s) => { const x = new Set(s); x.has(key) ? x.delete(key) : x.add(key); return x; });
  const [openYears, setOpenYears] = useState(new Set());
  const toggleYear = (key) => setOpenYears((s) => { const x = new Set(s); x.has(key) ? x.delete(key) : x.add(key); return x; });

  const openingPrimaPerShare = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? n(chain[0].prevPrima) : n(p.prima);
  };
  const openingStrike = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? chain[0].prevStrike : p.strike;
  };
  const strikeAfterRoll = (p, idx) => {
    const chain = p.rollChain || [];
    return idx + 1 < chain.length ? chain[idx + 1].prevStrike : p.strike;
  };
  const openingExpiry = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? chain[0].prevExpiry : p.expiry;
  };
  const expiryAfterRoll = (p, idx) => {
    const chain = p.rollChain || [];
    return idx + 1 < chain.length ? chain[idx + 1].prevExpiry : p.expiry;
  };
  const qtyLabelOf = (p) => {
    if (!isOptionNat(p)) return n(p.qty) ? String(n(p.qty)) : "";
    const c = n(p.qty) / 100;
    return Number.isInteger(c) ? String(c) : String(n(p.qty));
  };
  const dirSign = (p) => (natOf(p) === "CRED" || isCreditSpread(p) ? -1 : 1); // corta (o credit spread): cerrar/recomprar es pagar

  const primaEvents = [];
  const mtmEvents = [];

  positions.forEach((p) => {
    const qty = n(p.qty);
    if (isOptionNat(p)) {
      const autoStrat = bepAutoStrat(p);
      const chain = p.rollChain || [];
      if (autoStrat === "CREDIT" && p.entryDate) {
        /* solo las opciones de CRÉDITO registran prima en la apertura. El débito (Long Call, y la pata larga
           del PMCC) no se registra hasta que se cierra, igual que las acciones. */
        const fee = n(p.comision);
        const cash = openingPrimaPerShare(p) * qty - fee;
        primaEvents.push({ id: p.id + "-open", posId: p.id, date: p.entryDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Apertura", cash, fee, strike: openingStrike(p), right: p.right, qty: qtyLabelOf(p), expiry: openingExpiry(p), bep: n(openingStrike(p)) - n(openingPrimaPerShare(p)), note: p.entryNote || "", legs: [
          { side: "V", label: strikeStr(openingStrike(p)) + (p.right || "") + (openingExpiry(p) ? " " + ibkrDate(openingExpiry(p)) : ""), perShare: openingPrimaPerShare(p), cash: openingPrimaPerShare(p) * qty },
        ] });
      }
      chain.forEach((r, idx) => {
        const fee = n(r.comision);
        const cashRoll = (n(r.newCredit) - n(r.buybackCost)) * qty - fee;
        primaEvents.push({ id: p.id + "-roll" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Roll", cash: cashRoll, fee, strike: strikeAfterRoll(p, idx), right: p.right, prevStrike: r.prevStrike, qty: qtyLabelOf(p), expiry: expiryAfterRoll(p, idx), note: r.note || "", legs: [
          { side: "C", label: strikeStr(r.prevStrike) + (p.right || "") + (r.prevExpiry ? " " + ibkrDate(r.prevExpiry) : ""), perShare: -n(r.buybackCost), cash: -n(r.buybackCost) * qty },
          { side: "V", label: strikeStr(strikeAfterRoll(p, idx)) + (p.right || "") + (expiryAfterRoll(p, idx) ? " " + ibkrDate(expiryAfterRoll(p, idx)) : ""), perShare: n(r.newCredit), cash: n(r.newCredit) * qty },
        ] });
        const legBefore = idx === 0 ? openingPrimaPerShare(p) : n(chain[idx - 1].newCredit);
        const realized = dirSign(p) * (n(r.buybackCost) - legBefore) * qty - fee;
        mtmEvents.push({ id: p.id + "-rollmtm" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Roll", cash: realized, fee, strike: r.prevStrike, right: p.right, qty: qtyLabelOf(p), expiry: r.prevExpiry, note: r.note || "", legs: [
          { side: "V", label: strikeStr(r.prevStrike) + (p.right || "") + (r.prevExpiry ? " " + ibkrDate(r.prevExpiry) : ""), perShare: legBefore, cash: legBefore * qty },
          { side: "C", label: strikeStr(r.prevStrike) + (p.right || ""), perShare: -n(r.buybackCost), cash: -n(r.buybackCost) * qty },
        ] });
      });
      if (p.closed && p.closePrice !== "" && p.closePrice != null && !isPMCC(p)) {
        const fee = n(p.closeComision);
        const isExpira = n(p.closePrice) === 0;
        const shortP = dirSign(p) === -1;
        /* credit spreads (v5.00): la etiqueta de las patas en Primas/MTM pasa a ser la abreviatura de la
           estrategia (IC / BW) + vencimiento — la ristra "715/720 · 760/765" no cabía y se truncaba;
           los strikes completos siguen visibles en Estrategias y en la cadena de la posición. */
        const stkLbl = isCreditSpread(p) ? (csAbbr(p.tipo) + (p.tipo === "Credit Spread" ? " " + (p.right === "C" ? "Call" : "Put") : "")) : isGenericDebitPos(p) ? (p.tipo || "Débito") : strikeStr(p.strike) + (p.right || "");
        const expLbl = p.expiry ? " " + ibkrDate(p.expiry) : "";
        /* credit spreads (Iron Condor / Broken Wings): la prima cobrada NO se registró al abrir, así que
           el cierre materializa el NETO = (prima cobrada − recompra) × qty − fee, como un MTM. Si solo se
           registrara la recompra (pago), Primas quedaría en negativo sin el crédito que la compensa. */
        /* débito genérico B3 (v5.04): mismo modelo — el débito de apertura no se registró, así que el
           cierre materializa el NETO = (venta − open price) × qty − fee. Expirar sin valor = pérdida
           completa del débito. Primas y MTM cuadran exactamente para estas estrategias. */
        /* v1.28: el Long Call entra en el mismo modelo de neto que los débitos genéricos — su apertura
           no registró el débito (comentario de la apertura: "no se registra hasta que se cierra"), así que
           el cierre debe materializar (venta − coste) × qty − fee, y la expiración la pérdida completa.
           Antes caía en la rama genérica y apuntaba la VENTA BRUTA, inflando Primas con el coste jamás restado. */
        const gd = isGenericDebitPos(p) || isLongCallPos(p);
        const cashClose = isCreditSpread(p)
          ? (n(p.prima) - n(p.closePrice)) * qty - fee
          : gd
            ? (n(p.closePrice) - n(p.prima)) * qty - fee
            : dirSign(p) * n(p.closePrice) * qty - fee;
        const primaLegs = isCreditSpread(p)
          ? [
              { side: "V", label: stkLbl + expLbl, perShare: n(p.prima), cash: n(p.prima) * qty },
              { side: "C", label: stkLbl + expLbl, perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
            ]
          : gd
            ? [
                { side: "C", label: stkLbl + expLbl, perShare: -n(p.prima), cash: -n(p.prima) * qty },
                isExpira
                  ? { side: null, label: stkLbl + expLbl + " · expira", perShare: 0, cash: 0 }
                  : { side: "V", label: stkLbl + expLbl, perShare: n(p.closePrice), cash: n(p.closePrice) * qty },
              ]
            : isExpira
              ? [{ side: null, label: stkLbl + expLbl + " · expira", perShare: 0, cash: 0 }]
              : [{ side: shortP ? "C" : "V", label: stkLbl + expLbl, perShare: dirSign(p) * n(p.closePrice), cash: dirSign(p) * n(p.closePrice) * qty }];
        primaEvents.push({ id: p.id + "-close", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: p.exercised ? "Asignada" : isExpira ? "Expirada" : "Cierre", cash: cashClose, fee, strike: p.strike, right: p.right, qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: primaLegs });
        const legEntry = chain.length > 0 ? n(chain[chain.length - 1].newCredit) : openingPrimaPerShare(p);
        const realizedClose = dirSign(p) * (n(p.closePrice) - legEntry) * qty - fee;
        const mtmLegs = (isCreditSpread(p) || gd)
          ? primaLegs
          : shortP
            ? [
                { side: "V", label: stkLbl + expLbl, perShare: legEntry, cash: legEntry * qty },
                { side: "C", label: stkLbl, perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
              ]
            : [
                { side: "C", label: stkLbl + expLbl, perShare: -legEntry, cash: -legEntry * qty },
                { side: "V", label: stkLbl, perShare: n(p.closePrice), cash: n(p.closePrice) * qty },
              ];
        mtmEvents.push({ id: p.id + "-closemtm", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: p.exercised ? "Asignada" : isExpira ? "Expirada" : "Cierre", cash: realizedClose, fee, strike: p.strike, right: p.right, qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: mtmLegs });
      }
      /* PMCC — CIERRE (modelo acordado):
         · PRIMAS: UN evento combinado = (venta long − coste long − recompra short) × qty − comisiones.
           Total Primas de la estrategia = crédito apertura + rolls + cierre = profit real.
         · MTM: DOS eventos, el realizado POR PATA — short: (prima vigente − recompra) × qty − fee;
           long: (venta − coste) × qty − fee. Suman lo mismo que el combinado de Primas + crédito ya
           registrado, y permiten ver qué aportó cada pata. */
      if (isPMCC(p) && p.closed && p.closePrice !== "" && p.closePrice != null && p.closeLongPrice !== "" && p.closeLongPrice != null) {
        const lg = p.long || {};
        const fees = n(p.closeComision) + n(p.closeLongComision);
        const combined = (n(p.closeLongPrice) - n(lg.prima) - n(p.closePrice)) * qty - fees;
        primaEvents.push({ id: p.id + "-close", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre PMCC", cash: combined, fee: fees, strike: p.strike, right: "C", qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: [
          { side: "C", label: strikeStr(lg.strike) + "C · long", perShare: -n(lg.prima), cash: -n(lg.prima) * qty },
          { side: "C", label: strikeStr(p.strike) + "C" + (p.expiry ? " " + ibkrDate(p.expiry) : "") + " · short", perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
          { side: "V", label: strikeStr(lg.strike) + "C" + (lg.expiry ? " " + ibkrDate(lg.expiry) : "") + " · long", perShare: n(p.closeLongPrice), cash: n(p.closeLongPrice) * qty },
        ] });
        const shortLegEntry = chain.length > 0 ? n(chain[chain.length - 1].newCredit) : openingPrimaPerShare(p);
        const realizedShort = (shortLegEntry - n(p.closePrice)) * qty - n(p.closeComision);
        mtmEvents.push({ id: p.id + "-closemtm-s", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre short", cash: realizedShort, fee: n(p.closeComision), strike: p.strike, right: "C", qty: qtyLabelOf(p), expiry: p.expiry, note: p.closeNote || "", legs: [
          { side: "V", label: strikeStr(p.strike) + "C" + (p.expiry ? " " + ibkrDate(p.expiry) : ""), perShare: shortLegEntry, cash: shortLegEntry * qty },
          { side: "C", label: strikeStr(p.strike) + "C", perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
        ] });
        const realizedLong = (n(p.closeLongPrice) - n(lg.prima)) * qty - n(p.closeLongComision);
        mtmEvents.push({ id: p.id + "-closemtm-l", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre long", cash: realizedLong, fee: n(p.closeLongComision), strike: lg.strike, right: "C", qty: qtyLabelOf(p), expiry: lg.expiry, note: p.closeNote || "", legs: [
          { side: "C", label: strikeStr(lg.strike) + "C" + (lg.expiry ? " " + ibkrDate(lg.expiry) : ""), perShare: -n(lg.prima), cash: -n(lg.prima) * qty },
          { side: "V", label: strikeStr(lg.strike) + "C", perShare: n(p.closeLongPrice), cash: n(p.closeLongPrice) * qty },
        ] });
      }
    } else if ((natOf(p) === "ACC" || natOf(p) === "COLLAR") && p.closed && p.closePrice !== "" && p.closePrice != null) {
      const fee = n(p.closeComision);
      const useFifo = natOf(p) === "ACC" && hasLots(p);
      const net = useFifo ? fifoRealized(p.lots, p.closePrice, fee) : (n(p.closePrice) - n(effBep(p))) * qty - fee;
      mtmEvents.push({ id: p.id + "-closemtm", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: useFifo ? "Cierre FIFO" : "Cierre", cash: net, fee, strike: "", right: "", qty: qtyLabelOf(p), bep: n(effBep(p)), note: p.closeNote || "" });
    }
    /* ventas por lote (v5.24): cada venta parcial/total de acciones registra su P&L realizado en MTM,
       independientemente de que la posición siga abierta. Realizado = (precio − coste del lote) × qty − fee. */
    if (natOf(p) === "ACC" && Array.isArray(p.soldLots)) {
      p.soldLots.forEach((s, idx) => {
        const sfee = n(s.fee);
        const realized = (n(s.price) - n(s.cost)) * n(s.qty) - sfee;
        mtmEvents.push({ id: p.id + "-sold" + (s.id || idx), posId: p.id, date: s.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Venta lote", cash: realized, fee: sfee, strike: "", right: "", qty: n(s.qty) + " acc", bep: n(s.cost), note: "Venta " + n(s.qty) + " @ $" + money2(n(s.price)) + " (coste $" + money2(n(s.cost)) + ")" });
      });
    }
    /* dividendos (v5.28): ingreso de acciones/ETF. Va tanto a Primas (cobro) como a MTM (cash realizado).
       Cash neto = importe − comisión. Son listas distintas (dos pestañas), así que no se duplica en un total. */
    if (natOf(p) === "ACC" && Array.isArray(p.dividends)) {
      p.dividends.forEach((d, idx) => {
        const dfee = n(d.fee);
        const cash = n(d.amount) - dfee;
        const base = { posId: p.id, date: d.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Dividendo", cash, fee: dfee, strike: "", right: "", qty: "", note: "Dividendo" + (dfee ? " · comisión $" + money2(dfee) : "") };
        primaEvents.push({ ...base, id: p.id + "-div" + (d.id || idx) });
        mtmEvents.push({ ...base, id: p.id + "-divmtm" + (d.id || idx) });
      });
    }
  });

  const events = sub === "primas" ? primaEvents : mtmEvents;
  events.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));

  const monthGroups = {};
  const yearTotals = {};
  events.forEach((e) => {
    const mKey = e.date ? e.date.slice(0, 7) : "sin-fecha";
    const yKey = e.date ? e.date.slice(0, 4) : "sin-fecha";
    if (!monthGroups[mKey]) monthGroups[mKey] = { items: [], total: 0, fees: 0 };
    monthGroups[mKey].items.push(e);
    monthGroups[mKey].total += e.cash;
    monthGroups[mKey].fees += e.fee || 0;
    if (!yearTotals[yKey]) yearTotals[yKey] = { total: 0, fees: 0 };
    yearTotals[yKey].total += e.cash;
    yearTotals[yKey].fees += e.fee || 0;
  });
  const monthKeys = Object.keys(monthGroups).sort();
  const yearKeys = Object.keys(yearTotals).sort();
  const monthsOfYear = (y) => monthKeys.filter((k) => (k === "sin-fecha" ? y === "sin-fecha" : k.slice(0, 4) === y));
  const grandTotal = events.reduce((s, e) => s + e.cash, 0);
  const grandFees = events.reduce((s, e) => s + (e.fee || 0), 0);
  const MESES = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
  const monthLabel = (key) => { if (key === "sin-fecha") return "Sin fecha"; const [y, m] = key.split("-"); return MESES[Number(m) - 1] + " " + y; };

  /* ---------- Estrategias: todas las posiciones archivadas por tipo ---------- */
  const STRAT_CATS = ["Acciones", "Covered Calls", "Short Puts", "Long Calls", "PMCC", "Diagonal", "Iron Condor", "Earnings", "Iron Fly", "Iron Man", "DC/DD", "Otras"];
  const categoryOf = (p) => {
    const t = (p.tipo || "").toLowerCase();
    if (isCashNat(p)) return null; // cash no es una estrategia
    if (natOf(p) === "ACC") return "Acciones";
    if (t === "pmcc") return "PMCC";
    if (t === "diagonal") return "Diagonal";
    if (isLongCallPos(p)) return "Long Calls";
    if (t === "iron condor") return "Iron Condor";
    if (t === "earnings") return "Earnings"; /* v1.06: calco de IC con pestaña propia */
    if (t === "iron fly") return "Iron Fly";
    if (t === "iron man") return "Iron Man";
    if (["dc", "dd", "calendar"].includes(t)) return "DC/DD";
    if (t === "short put") return "Short Puts";
    if (t === "short call") return "Covered Calls";
    /* cualquier opción corta (nat Crédito) de CUALQUIER bloque cae en su estrategia por el right,
       aunque la etiqueta de estrategia esté vacía o sea otra: P → Short Puts, C → Covered Calls */
    if (natOf(p) === "CRED") return p.right === "C" ? "Covered Calls" : "Short Puts";
    return "Otras"; /* Credit Spread, Broken Wings y demás débitos genéricos caen aquí */
  };
  const catCount = (c, closed) => positions.filter((p) => categoryOf(p) === c && !!p.closed === closed).length;

  const primaSumOf = (p) => primaEvents.filter((e) => e.posId === p.id).reduce((s, e) => s + e.cash, 0);
  const mtmSumOf = (p) => mtmEvents.filter((e) => e.posId === p.id).reduce((s, e) => s + e.cash, 0);
  /* resultado realizado de una posición CERRADA (v5.13) — mismo criterio que la tarjeta de cada operación:
     opciones cortas normales → prima acumulada; Long Call y credit spreads → realizado MTM (neto contra
     apertura); acciones y débitos → MTM. Se usa para el resumen agregado de la pestaña de estrategia. */
  const closedResultOf = (p) => {
    if (!isOptionNat(p)) return mtmSumOf(p);
    const noOpenBooked = isLongCallPos(p) || isCreditSpread(p);
    return noOpenBooked ? mtmSumOf(p) : primaSumOf(p);
  };
  /* v1.02: resultado "hasta ahora" de una posición ABIERTA — en opciones, la prima ya cobrada (aperturas +
     rolls registrados en Primas); en acciones/otros, el realizado MTM (dividendos, ventas parciales). Los
     credit spreads abiertos no registran nada hasta el cierre (por diseño), así que su abierto es 0. */
  const openResultOf = (p) => (isOptionNat(p) ? primaSumOf(p) : mtmSumOf(p));
  const stratResultOf = (p) => (p.closed ? closedResultOf(p) : openResultOf(p));
  /* v1.02: listado de la estrategia activa con orden seleccionable — fecha (cierre/apertura, reciente
     primero, el comportamiento histórico), ticker (alfabético, empate por fecha) o profit (mayor primero;
     cerradas usan el realizado y abiertas la prima acumulada hasta ahora). */
  const stratDateOf = (p) => p.closeDate || p.entryDate || "";
  /* ---------- v1.29: CICLO COMPLETO DE UNA PUT ASIGNADA ----------
     Al asignar, closePos crea la acción con assignedFrom = id de la put y coste base = BEP
     (strike − prima acumulada). Por tanto el P&L de esa acción YA lleva la prima dentro:

         (último − BEP) × qty  =  prima − (strike − último) × qty

     Sumar la prima otra vez sería contarla DOS VECES. El resultado económico real de la operación
     es, sin más, el P&L de la acción resultante: realizado (ventas por lote, dividendos, cierre)
     más el no realizado del resto que siga en cartera.

     Ojo: la prima sí es cash cobrado y sigue contando en Primas/MTM — eso no cambia. Lo que cambia
     es cómo se JUZGA la operación en el histórico de estrategias. */
  /* v1.33 REDISEÑO. La versión anterior calculaba el ciclo a partir de una posición de acciones
     creada por la app. Dos errores:
       · Duplicaba acciones que YA existían en cartera (la migración del Excel ya las tenía).
       · Esa acción nacía sin `last`, y el P&L salía −BEP×qty (pérdida total fantasma).
     El ciclo NO necesita ninguna acción nueva. La put asignada tiene todo lo que hace falta:

         ciclo = (precio actual − BEP de la put) × acciones asignadas

     donde BEP = strike − prima neta acumulada (rolls incluidos). Es exactamente el resultado
     económico: cobraste la prima, te quedaste las acciones al strike, y valen lo que valen.
     Así, además, varias puts pueden desembocar en una misma posición de acciones sin conflicto. */
  const tkrKeyOf = (p) => (p.tkr || "").toUpperCase().trim();
  const spotOf = (tkr) => {
    const k = (tkr || "").toUpperCase().trim();
    if (!k) return 0;
    const acc = positions.find((p) => tkrKeyOf(p) === k && natOf(p) === "ACC" && n(p.last));
    if (acc) return n(acc.last);
    const any = positions.find((p) => tkrKeyOf(p) === k && n(p.last));
    return any ? n(any.last) : 0;
  };
  /* acción enlazada (opcional, solo para la rueda y para saber si el ciclo ya se cerró) */
  const assignedStockOf = (p) => {
    if (!p.exercised) return null;
    if (p.assignedTo) return positions.find((s) => s.id === p.assignedTo) || null;
    return positions.find((s) => s.assignedFrom === p.id) || null;
  };
  const cicloOf = (p) => {
    if (!p.exercised || natOf(p) !== "CRED" || p.right !== "P" || isPMCC(p)) return null;
    const qty = n(p.qty), bep = effBep(p);
    if (!qty || !bep) return null;
    const stock = assignedStockOf(p);
    const resuelto = !!(stock && stock.closed && n(stock.closePrice));
    const px = resuelto ? n(stock.closePrice) : spotOf(p.tkr);
    if (!px) return { stock, bep, qty, px: 0, total: 0, resuelto: false, sinPrecio: true };
    return { stock, bep, qty, px, total: (px - bep) * qty, resuelto, sinPrecio: false };
  };
  const judgedResultOf = (p) => { const c = cicloOf(p); return (c && !c.sinPrecio) ? c.total : closedResultOf(p); };
  /* ---------- v1.30: LA RUEDA ENTERA (put asignada → acción → covered calls) ----------
     Diferencia clave con la put: la prima de una covered call NO se incorpora al coste base de la acción
     (la acción ya existe cuando la vendes). Es cash adicional y limpio → aquí SÍ se suma.

         rueda = ciclo (P&L de la acción, prima de la put ya dentro) + Σ primas de las CC escritas sobre ella

     Se mantienen como dos números distintos a propósito: el CICLO juzga la put (win rate), la RUEDA mide
     cuánto ha dado el subyacente en total. Sumar la rueda al total de la pestaña de Covered Calls sería
     contar esas primas dos veces — son dos vistas del mismo dinero, no dos ingresos. */
  const isCoveredCall = (p) => natOf(p) === "CRED" && p.right === "C" && !isPMCC(p);
  const stockOfCC = (cc) => (cc.onStock ? positions.find((s) => s.id === cc.onStock) || null : null);
  const ccsOnStock = (stock) => (stock ? positions.filter((c) => c.onStock === stock.id && isCoveredCall(c)) : []);
  /* v1.33: si varias puts desembocan en la MISMA acción, las primas de las CC escritas sobre ella se
     reparten proporcionalmente a las acciones que aportó cada put. Así la suma de las ruedas cuenta
     cada prima UNA vez, no una por put. */
  const ruedaOf = (p) => {
    const c = cicloOf(p);
    if (!c || c.sinPrecio || !c.stock) return null;
    const ccs = ccsOnStock(c.stock);
    if (!ccs.length) return { ...c, ccs: [], ccTotal: 0, rueda: c.total };
    const hermanas = positions.filter((q) => q.exercised && (q.assignedTo === c.stock.id || (!q.assignedTo && q.id === c.stock.assignedFrom)));
    const totalQty = hermanas.reduce((a, q) => a + n(q.qty), 0) || c.qty;
    const share = c.qty / totalQty;
    const ccTotal = ccs.reduce((a, cc) => a + stratResultOf(cc), 0) * share;
    return { ...c, ccs, ccTotal, rueda: c.total + ccTotal };
  };
  /* v1.29: TRES estados, no dos. Una asignada cuya acción sigue en cartera no es ganadora ni
     perdedora — todavía no ha terminado. Sacarla del win rate evita el sesgo en las dos direcciones
     (ni "gané porque me quedé la prima" ni "perdí porque me asignaron"). */
  const outcomeOf = (p) => {
    if (!p.closed) return openResultOf(p) > 0 ? "win" : openResultOf(p) < 0 ? "loss" : "flat";
    if (p.exercised) {
      const c = cicloOf(p);
      if (!c || c.sinPrecio) return "loss";   // sin datos para juzgar → criterio antiguo (conservador)
      if (!c.resuelto) return "curso";        // acciones todavía en cartera → sin desenlace
      return c.total > 0 ? "win" : c.total < 0 ? "loss" : "flat";
    }
    return closedResultOf(p) > 0 ? "win" : closedResultOf(p) < 0 ? "loss" : "flat";
  };
  const isWinner = (p) => outcomeOf(p) === "win";
  const isLoser = (p) => outcomeOf(p) === "loss";
  const isEnCurso = (p) => outcomeOf(p) === "curso";
  const stratBase = positions.filter((p) => categoryOf(p) === stratCat && !!p.closed === (stratStatus === "Cerradas"));
  const stratTkrs = Array.from(new Set(stratBase.map((p) => (p.tkr || "").toUpperCase().trim()).filter(Boolean))).sort();
  const stratItems = stratBase
    .filter((p) => stratTkr === "Todos" || (p.tkr || "").toUpperCase().trim() === stratTkr)
    .filter((p) => stratWin === "Todas" || (stratWin === "Ganadoras" ? isWinner(p) : isLoser(p)))
    .sort((a, b) => {
      if (stratSort === "ticker") {
        const t = (a.tkr || "").localeCompare(b.tkr || "");
        return t !== 0 ? t : (stratDateOf(b) < stratDateOf(a) ? -1 : 1);
      }
      if (stratSort === "profit") return stratResultOf(b) - stratResultOf(a);
      return stratDateOf(b) < stratDateOf(a) ? -1 : 1;
    });
  const todayIso = new Date().toISOString().slice(0, 10);
  /* v1.14: exportar las cerradas de la estrategia activa (respetando filtros) como JSON compacto para
     pegar en un chat y que la evalúe una IA — condiciones de entrada, gestión y resultado por operación,
     más el resumen agregado. Copia al portapapeles; si no se puede, abre la hoja de compartir. */
  const exportStrat = () => {
    const ops = stratItems.map((p) => {
      const isOpt = isOptionNat(p);
      const rolls = (p.rollChain || []).length;
      const openStrike = openingStrike(p), openExpiry = openingExpiry(p), openPrima = openingPrimaPerShare(p);
      const o = {
        tkr: p.tkr || null, tipo: p.tipo || categoryOf(p), bloque: "B" + p.block,
        abierta: p.entryDate || null, cerrada: p.closeDate || null,
        dit: isFinite(daysBetween(p.entryDate, p.closeDate)) ? daysBetween(p.entryDate, p.closeDate) : null,
        resultado: Math.round(closedResultOf(p) * 100) / 100,
        ejercida: !!p.exercised,
      };
      /* v1.29: en las asignadas, el resultado que importa es el del ciclo (P&L de la acción, que ya
         incorpora la prima vía coste base = BEP). Se exporta junto al de prima para poder comparar. */
      const cic = cicloOf(p);
      if (p.exercised) {
        o.desenlace = !cic ? "sin datos" : cic.sinPrecio ? "sin precio" : cic.resuelto ? "resuelta" : "en curso";
        const ru = ruedaOf(p);
        if (ru && ru.ccs.length) {
          o.coveredCalls = ru.ccs.length;
          o.primasCC = Math.round(ru.ccTotal * 100) / 100;
          o.pnlRueda = Math.round(ru.rueda * 100) / 100;
        }
        if (cic && !cic.sinPrecio) {
          o.pnlCiclo = Math.round(cic.total * 100) / 100;
          o.accionesAsignadas = cic.qty;
          o.bepPut = Math.round(cic.bep * 100) / 100;
          o.precioSubyacente = Math.round(cic.px * 100) / 100;
        }
      }
      if (isOpt) {
        o.contratos = Number.isInteger(n(p.qty) / 100) ? n(p.qty) / 100 : n(p.qty) + " opc";
        o.right = p.right || null;
        o.strikeApertura = openStrike || null; o.expiryApertura = openExpiry || null;
        o.primaAperturaPorAcc = n(openPrima) || null;
        o.dteApertura = isFinite(daysBetween(p.entryDate, openExpiry)) ? daysBetween(p.entryDate, openExpiry) : null;
        o.deltaApertura = p.delta || null; o.ivrApertura = p.ivr || null;
        o.rolls = rolls;
        if (rolls > 0) { o.strikeFinal = p.strike || null; o.expiryFinal = p.expiry || null; }
        if (isCreditSpread(p)) { o.putSpread = p.putSpread || null; o.callSpread = p.callSpread || null; o.riesgoManual = n(p.margen) || null; }
        else if (natOf(p) === "CRED" && !isPMCC(p)) o.riesgo = Math.round(Math.abs((n(openStrike) - n(openPrima)) * n(p.qty)));
      } else {
        o.acciones = n(p.qty);
        o.bep = n(effBep(p)) || null; o.precioVenta = n(p.closePrice) || null;
      }
      if (p.closeNote) o.nota = p.closeNote;
      return o;
    });
    const wins = stratItems.filter(isWinner).length;
    const losses = stratItems.filter(isLoser).length;
    const curso = stratItems.filter(isEnCurso).length;
    const decided = wins + losses;
    const total = stratItems.reduce((s, pp) => s + closedResultOf(pp), 0);
    const totalCiclo = stratItems.reduce((s, pp) => s + judgedResultOf(pp), 0);
    const ruedasX = stratItems.map(ruedaOf).filter(Boolean);
    const ccTotalX = ruedasX.reduce((a, r) => a + r.ccTotal, 0);
    const nCCX = ruedasX.reduce((a, r) => a + r.ccs.length, 0);
    const payload = {
      app: "Bloques v" + APP_VERSION, exportado: todayIso, estrategia: stratCat,
      filtro: { ticker: stratTkr, resultado: stratWin },
      resumen: {
        operaciones: ops.length, ganadoras: wins, perdedoras: losses, enCurso: curso,
        winRate: decided ? Math.round((wins / decided) * 100) + "%" : null,
        profitPrimas: Math.round(total * 100) / 100,
        profitCiclo: Math.round(totalCiclo * 100) / 100,
        mediaPorOp: ops.length ? Math.round((totalCiclo / ops.length) * 100) / 100 : null,
        sinPrecio: stratItems.filter((pp) => { const c = cicloOf(pp); return pp.exercised && (!c || c.sinPrecio); }).length,
        coveredCallsEnlazadas: nCCX,
        primasCC: Math.round(ccTotalX * 100) / 100,
        profitRueda: Math.round((totalCiclo + ccTotalX) * 100) / 100,
      },
      nota: "profitPrimas = cash de primas cobrado. profitCiclo = resultado económico real: en las asignadas, el P&L de la acción resultante (cuyo coste base es el BEP, ya con la prima de la put descontada). profitRueda = profitCiclo + primas de las covered calls escritas sobre esas acciones (la prima de una CC NO entra en el coste base, por eso aquí sí se suma); esas primas ya cuentan además en la pestaña de Covered Calls, así que profitRueda es una vista, no un ingreso adicional. El win rate juzga la PUT por su ciclo y excluye las asignadas 'en curso'.",
      operaciones: ops,
    };
    const text = JSON.stringify(payload, null, 1);
    const done = () => { setExportMsg("Copiado para el análisis"); setTimeout(() => setExportMsg(""), 3500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => { if (navigator.share) navigator.share({ text }).catch(() => {}); else done(); });
    } else if (navigator.share) { navigator.share({ text }).catch(() => {}); }
  };
  const shortDate = (iso) => { if (!iso) return ""; const [y, m, d] = iso.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

  return (
    <>
      <div style={{ display: "flex", gap: 6, background: T.card, borderRadius: 18, padding: 6, marginBottom: 14, boxShadow: T.shadow }}>
        {[["primas", "Primas"], ["mtm", "MTM"], ["rendimiento", "Rendimiento"], ["estrategias", "Histórico"]].map(([id, label]) => (
          <button key={id} onClick={() => setSub(id)} style={{
            flex: 1, border: "none", cursor: "pointer", borderRadius: 13, padding: "8px 0 7px", fontSize: 12, fontWeight: 700,
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            background: sub === id ? T.dark : "transparent", color: sub === id ? "#fff" : T.sub,
          }}>
            <NavIcon name={id} />
            <span>{label}</span>
          </button>
        ))}
      </div>

      {sub === "rendimiento" ? (
        <RendimientoCard snapshots={snapshots} flows={flows} onSave={saveSnapshot} onDelete={deleteSnapshot} />
      ) : sub !== "estrategias" ? (
        <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>{sub === "primas" ? "Primas" : "MTM · resultado realizado"}</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, marginTop: 1 }}>
              {sub === "primas" ? "Cash de cada apertura, roll (neto) y cierre. Toca una línea para ver strike y detalle." : "Ganancia/pérdida realizada de cada roll y cierre, comparando contra el precio de entrada de esa pata. Fee incluido en el neto y visible por línea."}
            </div>
          </div>

          {events.length === 0 && (
            <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>
              {sub === "primas" ? "Aún no hay primas registradas. Se generan al abrir, rolar o cerrar una posición de opciones con fecha." : "Aún no hay resultado realizado. Se genera al rolar una opción o cerrar una posición."}
            </div>
          )}

          {events.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "64px 1fr 76px 100px", gap: 0, padding: "4px 0 6px 12px", borderBottom: `1px solid ${T.line}` }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Fecha</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Ticker</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, textAlign: "right", paddingRight: 8 }}>Fee</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, textAlign: "right", paddingLeft: 8, paddingRight: 10 }}>{sub === "primas" ? "Prima" : "P&L"}</span>
            </div>
          )}
          {yearKeys.map((y) => {
            const yCollapsed = !openYears.has(y);
            return (
            <div key={y} style={{ marginTop: 10 }}>
              <div onClick={() => toggleYear(y)} style={{ display: "grid", gridTemplateColumns: "1fr 76px 100px", gap: 0, alignItems: "center", background: T.dark, borderRadius: 12, padding: "10px 0 10px 12px", fontVariantNumeric: "tabular-nums", cursor: "pointer" }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: "#fff", textTransform: "uppercase", letterSpacing: 0.5 }}>
                  {y === "sin-fecha" ? "TOTAL SIN FECHA" : "TOTAL " + y}
                </span>
                <span style={{ fontSize: 12, fontWeight: 800, color: "#C4CCD4", textAlign: "right", paddingRight: 8 }}>${money2(yearTotals[y].fees)}</span>
                <div style={{ textAlign: "right", borderLeft: "1.5px solid rgba(255,255,255,0.25)", paddingLeft: 8, paddingRight: 10 }}>
                  <div style={{ fontSize: 16.5, fontWeight: 800, color: yearTotals[y].total >= 0 ? T.green : T.red, lineHeight: 1.1 }}>{signMoney(yearTotals[y].total)}</div>
                  {isFinite(nlv) && nlv > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: "#9AA4AE", marginTop: 1 }}>{signPct(yearTotals[y].total / nlv)} NLV</div>}
                </div>
              </div>
              {!yCollapsed && monthsOfYear(y).map((key) => {
            const isCollapsed = !openMonths.has(key);
            return (
            <div key={key} style={{ marginTop: 4 }}>
              <div onClick={() => toggleMonth(key)} style={{ display: "grid", gridTemplateColumns: "1fr 76px 100px", gap: 0, alignItems: "center", margin: "10px 0 4px", background: T.tile, borderRadius: 10, padding: "8px 0 8px 12px", fontVariantNumeric: "tabular-nums", cursor: "pointer" }}>
                <span style={{ fontSize: 12, fontWeight: 800, color: T.ink, textTransform: "uppercase", letterSpacing: 0.5 }}>
                  {key === "sin-fecha" ? "TOTAL SIN FECHA" : "TOTAL " + monthLabel(key)}

               (closedResultOf, mismo criterio que la tarjeta de cada operación) y distribución por
               estrategia (Short Puts, Covered Calls, etc.) con nº de operaciones y resultado de cada una. */
            const byTkr = {};
            positions.forEach((p) => {
              const cat = categoryOf(p);
              if (!cat) return;
              if (tikrStatus === "Abiertas" && p.closed) return; /* v1.03: filtro de estado */
              if (tikrStatus === "Cerradas" && !p.closed) return;
              const k = (p.tkr || "—").toUpperCase().trim() || "—";
              if (!byTkr[k]) byTkr[k] = { open: 0, closed: 0, nOpen: 0, nClosed: 0, cats: {} };
              const g = byTkr[k];
              const r = p.closed ? closedResultOf(p) : openResultOf(p);
              if (p.closed) { g.closed += r; g.nClosed++; } else { g.open += r; g.nOpen++; }
              if (!g.cats[cat]) g.cats[cat] = { n: 0, res: 0, shOpen: 0, shClosed: 0 };
              g.cats[cat].n++;
              /* v1.05: los dividendos (incluidos en el MTM realizado de la acción) se sacan a su propia
                 línea "Dividendos" — se restan de la fila Acciones para que las filas sumen el total del
                 ticker sin duplicar. Siguen el estado de su posición (abierta/cerrada) para el filtro. */
              const dv = cat === "Acciones" && Array.isArray(p.dividends) ? p.dividends.reduce((s, d) => s + n(d.amount) - n(d.fee), 0) : 0;
              const nDv = cat === "Acciones" && Array.isArray(p.dividends) ? p.dividends.length : 0;
              g.cats[cat].res += r - dv;
              if (nDv > 0 || dv !== 0) {
                if (!g.cats["Dividendos"]) g.cats["Dividendos"] = { n: 0, res: 0, shOpen: 0, shClosed: 0 };
                g.cats["Dividendos"].n += nDv; g.cats["Dividendos"].res += dv;

              if (cat === "Acciones") { if (p.closed) g.cats[cat].shClosed += n(p.qty); else g.cats[cat].shOpen += n(p.qty); }

            const sumOpen = tkrs.reduce((s, k) => s + byTkr[k].open, 0);
            const sumClosed = tkrs.reduce((s, k) => s + byTkr[k].closed, 0);

                  <div style={{ display: "grid", gridTemplateColumns: tikrStatus === "Todas" ? "1fr 1fr" : "1fr", gap: 8 }}>
                    {(tikrStatus === "Abiertas" ? [["Primas · abiertas", sumOpen]] : tikrStatus === "Cerradas" ? [["Realizado · cerradas", sumClosed]] : [["Primas · abiertas", sumOpen], ["Realizado · cerradas", sumClosed]]).map(([lbl, val]) => (
                      <div key={lbl} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "9px 6px", textAlign: "center" }}>
                        <div style={{ fontSize: 15, fontWeight: 800, color: val >= 0 ? T.green : T.red, letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>{signMoney(val)}</div>
                        <div style={{ fontSize: 9.5, color: "#B9C2CC", marginTop: 2, fontWeight: 600 }}>{lbl}</div>

                </div>

                {tkrs.map((k) => {
                  const g = byTkr[k];
                  const total = g.open + g.closed;
                  const nOps = g.nOpen + g.nClosed;
                  const isOpenT = expanded.has("tikr-" + k);
                  const catList = [...STRAT_CATS.filter((c) => g.cats[c]), ...(g.cats["Dividendos"] ? ["Dividendos"] : [])];

            const wins = stratItems.filter(isWinner).length;

            const closed = positions.filter((x) => categoryOf(x) === "DC/DD" && x.closed && (stratTkr === "Todos" || (x.tkr || "").toUpperCase().trim() === stratTkr)); /* v1.13: respeta el filtro de ticker */

          {(stratCat === "Short Puts" || stratCat === "Covered Calls") && (() => {
            /* auditoría SP/CC (v1.09): "en qué falla y en qué no", calcada a la de DC/DD. Sobre las
               CERRADAS de la categoría, compara ganadoras vs perdedoras (mismo criterio que el resumen:
               ejercida = perdedora) en las condiciones DE ENTRADA: delta de apertura, DTE de apertura
               (vencimiento ORIGINAL, pre-rolls), IVR de apertura y DIT real.
               Las medias solo cuentan operaciones con ese dato registrado — el histórico sin ficha no
               contamina. Diferencias grandes entre columnas = esa variable discrimina; iguales = no. */
            /* v1.13: la auditoría respeta el filtro de TICKER (delta/DTE/IVR/DIT de UN subyacente).
               El filtro Ganadoras/Perdedoras NO se aplica: la auditoría compara precisamente ambos
               grupos entre sí — aplicarlo vaciaría una columna y perdería el sentido. */
            const closedA = positions.filter((x) => categoryOf(x) === stratCat && x.closed && (stratTkr === "Todos" || (x.tkr || "").toUpperCase().trim() === stratTkr));
            if (closedA.length < 2) return null;

            /* delta guardada como 0.30 o como 30 según la época — se normaliza a fracción */
            const normDelta = (x) => { const d = Math.abs(n(x.delta)); return d ? (d > 1 ? d / 100 : d) : NaN; };
            const grpA = (arr) => ({

                  {rowsA.map(([lbl, w, l]) => (

                      <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, textAlign: "right", padding: "5px 0", fontVariantNumeric: "tabular-nums" }}>{w}</span>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: T.ink, textAlign: "right", padding: "5px 0", fontVariantNumeric: "tabular-nums" }}>{l}</span>
                    </React.Fragment>
                  ))}
                </div>
              </div>
            );
          })()}

          {stratItems.length === 0 && (
            <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>No hay posiciones {stratStatus.toLowerCase()} en "{stratCat}".</div>
          )}

          {stratItems.map((p) => {
            const blk = BLOCKS.find((b) => b.id === p.block);
            const isOpt = isOptionNat(p);
            const primaSum = primaSumOf(p);
            /* Long Call y credit spreads (Iron Condor, Broken Wings) no registran su pata de apertura en
               Primas (por diseño: no reflejan nada hasta el cierre). Una vez cerradas, "primaSum" solo
               contendría el cash de esa única pata de cierre (venta o recompra), sin netear contra el coste/
               crédito de apertura — daría un profit engañoso. Para esos casos, una vez cerrada, se usa el
               resultado realizado (MTM), que sí neta correctamente contra la apertura original. */
            /* noOpenBooked: estrategias cuyo débito de apertura NO se registró en Primas y cuyo cierre NO
               materializa el neto completo (Long Call, credit spreads) → cerradas usan el realizado MTM.
               El PMCC NO está aquí: su cierre combinado (venta long − coste long − recompra short) hace que
               la suma de Primas (crédito apertura + rolls + cierre) sea exactamente el profit total. */
            const noOpenBooked = isLongCallPos(p) || isCreditSpread(p);
            const primaBasis = noOpenBooked && p.closed ? mtmSumOf(p) : primaSum;
            /* credit spread ABIERTO: no hay nada registrado (por diseño), pero sí se puede mostrar el
               crédito pendiente (prima × qty − comisión) y su ROI potencial sobre el riesgo introducido.
               Al cerrar, pasa a medirse el realizado: P&L (neto prima − recompra) / riesgo. */
            const csPending = isCreditSpread(p) && !p.closed;
            const csCredit = isCreditSpread(p) ? n(p.prima) * n(p.qty) - n(p.comision) : NaN;
            const romNumer = csPending ? csCredit : primaBasis;
            const result = isOpt ? primaBasis : mtmSumOf(p);
            /* riesgo de la estrategia para el histórico: en opciones cortas siempre BEP × acciones (contratos ×100),
               aunque en cartera compute 0 por estar cubierta — aquí interesa el capital que respaldó la operación.
               v5.15: el BEP de referencia es el ORIGINAL de apertura (strike original − prima de apertura), no el
               vigente tras los rolls. Así la rentabilidad de un put rolado se mide contra el capital que
               comprometiste al abrir, no contra el strike al que lo hayas movido. */
            const origBep = n(openingStrike(p)) - n(openingPrimaPerShare(p));
            const riesgo = isOpt && natOf(p) === "CRED" ? (isPMCC(p) ? riesgoTotalOf(p) : Math.abs(origBep * n(p.qty))) : capDesplegado(p);
            const rom = isOpt && riesgo ? romNumer / riesgo : NaN;
            const dte = isOpt ? daysBetween(p.entryDate, p.expiry) : NaN;
            const dit = daysBetween(p.entryDate, p.closed ? p.closeDate : todayIso);
            /* anualizado del ROI (prima/riesgo): mientras está abierta se proyecta sobre el periodo total
               previsto de la operación — de la apertura original al vencimiento vigente (el mismo dte de
               arriba, que ya incorpora los rolls: si se rolo, el vencimiento es el nuevo pero la apertura
               sigue siendo la primera). Al cerrarse, se usa el DIT real (apertura → cierre). Los credit
               spreads (Iron Condor, Broken Wings) no rolan y no reflejan prima hasta el cierre: cerrados se
               anualizan con el DIT real; ABIERTOS se proyecta el ROI potencial sobre el DTE (v5.00 — antes
               usaban DIT y el día de apertura, con DIT=0, el anualizado salía "—"). */
            const annPeriod = p.closed ? dit : dte;
            const romAnn = isFinite(rom) && isFinite(annPeriod) && annPeriod > 0 ? rom * (365 / annPeriod) : NaN;
            /* ROI de acciones: P&L / capital invertido (BEP × qty). Cerradas usan el P&L realizado; abiertas,
               el unrealised. Anualizado con el DIT real (rentabilidad × 365/DIT), mismo criterio en ambos casos.
               En abiertas el DIT es apertura→hoy, así que el anualizado extrapola el periodo mantenido hasta ahora. */
            const stockBasis = Math.abs(n(effBep(p)) * n(p.qty));
            const stockPnl = !isOpt ? (p.closed ? result : effPnl(p)) : NaN;
            const stockRoi = !isOpt && stockBasis ? stockPnl / stockBasis : NaN;
            const stockAnnRoi = isFinite(stockRoi) && isFinite(dit) && dit > 0 ? stockRoi * (365 / dit) : NaN;
            const fmtPct2 = (v) => (isFinite(v) ? (v >= 0 ? "+" : "") + (v * 100).toFixed(2) + "%" : "\u2014");
            const contratos = n(p.qty) / 100;
            const qtyLabel = isOpt ? (Number.isInteger(contratos) ? contratos + " contr." : n(p.qty) + " opc") : n(p.qty) + " acc";
            const chain = p.rollChain || [];
            const cyc = cicloOf(p);                       // v1.29: null si no está asignada/enlazada
            const rue = ruedaOf(p);                       // v1.30: ciclo + primas de las CC sobre la acción
            const ccStock = isCoveredCall(p) ? stockOfCC(p) : null;   // v1.30: acción sobre la que se escribió
            const outc = outcomeOf(p);
            const open = expanded.has("strat-" + p.id);
            return (
              <div key={p.id} onClick={() => toggleExpand("strat-" + p.id)} style={{ borderTop: `1px solid ${T.line}`, padding: "10px 0", cursor: "pointer" }}>

                    <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>{p.tkr || "—"}</span>
                      {p.tipo && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>{p.tipo}</span>}
                      {isOpt && optionDetail(p) && <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{optionDetail(p)}</span>}
                      {blk && <span style={{ fontSize: 9.5, fontWeight: 800, color: blk.color, background: blk.bg, borderRadius: 6, padding: "2px 5px" }}>{blk.name.replace("Bloque ", "B")}</span>}
                      {chain.length > 0 && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.purple, background: T.tile, borderRadius: 6, padding: "2px 5px", display: "inline-flex", alignItems: "center", gap: 3 }}><ActIcon name="roll" size={10} />×{chain.length}</span>}
                      {p.exercised && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 6, padding: "2px 5px" }}>{outc === "curso" ? "Asignada · en curso" : (cyc && !cyc.sinPrecio) ? "Asignada · resuelta" : "Asignada · sin precio"}</span>}
                      {cyc && !cyc.sinPrecio && <span style={{ fontSize: 9.5, fontWeight: 800, color: cyc.total >= 0 ? T.green : T.red, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>ciclo {signMoney(cyc.total)}</span>}
                    </div>
                    <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 600, marginTop: 3 }}>× {qtyLabel} · {ibkrDate(p.entryDate)}{p.closed ? " → " + ibkrDate(p.closeDate) : " · abierta"}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 14.5, fontWeight: 800, color: result >= 0 ? T.green : T.red }}>{signMoney(result)}</div>

                      {isOpt && !!onEditChain && <button type="button" onClick={(ev) => { ev.stopPropagation(); onEditChain(p.id); }} style={{ background: "transparent", border: "none", fontSize: 11, fontWeight: 700, color: T.purple, cursor: "pointer", padding: 0 }}>Editar</button>}
                      {p.closed && !!reopenPos && <button type="button" onClick={(ev) => { ev.stopPropagation(); reopenPos(p.id); }} style={{ background: "transparent", border: "none", fontSize: 11, fontWeight: 700, color: T.purple, cursor: "pointer", padding: 0 }}>Reabrir</button>}
                    </div>
                  </div>
                </div>
                {open && (
                  <div onClick={(ev) => ev.stopPropagation()} style={{ marginTop: 8, background: T.tile, borderRadius: 16, padding: "12px 12px" }}>
                    {isOpt ? (
                      <>
                        {/* v1.29: panel de CICLO — solo en asignadas. Para una put asignada, el resultado que
                            cuenta no es la prima (esa ya está dentro del coste base de la acción) sino el P&L
                            de la acción resultante. Si no hay acción enlazada, se ofrece enlazarla a mano. */}
                        {(p.exercised || (p.closed && natOf(p) === "CRED" && p.right === "P" && !isPMCC(p))) && (() => {
                          const cands = positions.filter((s2) => natOf(s2) === "ACC"
                            && (s2.tkr || "").toUpperCase().trim() === (p.tkr || "").toUpperCase().trim());
                          /* v1.32: una put CERRADA que no se marcó como asignada — se puede asignar a posteriori
                             desde aquí, sin tener que reabrirla y volver a cerrarla. */
                          if (!p.exercised) {
                            if (!assignFromPut) return null;
                            return (
                              <div style={{ background: T.tile, borderRadius: 14, padding: "11px 12px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                                <div style={{ minWidth: 0 }}>
                                  <div style={{ fontSize: 11.5, fontWeight: 800, color: T.ink }}>¿Te asignaron esta put?</div>
                                  <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 600, marginTop: 3, lineHeight: 1.35 }}>Crea {n(p.qty)} acc de {p.tkr} en B1 al BEP ${money2(effBep(p))} y pone la recompra a $0 — en una asignación no recompras nada.</div>
                                </div>
                                <button type="button" onClick={() => assignFromPut(p.id)} style={{ flexShrink: 0, background: T.card, border: "none", borderRadius: 10, padding: "9px 12px", fontSize: 11.5, fontWeight: 800, color: T.gold, cursor: "pointer", whiteSpace: "nowrap" }}>Asignar</button>

                                        : n(cyc.qty) + " acc · BEP $" + money2(cyc.bep) + " vs $" + money2(cyc.px) + (cyc.resuelto ? " (vendidas)" : " (actual)") + " · la prima ya está dentro del BEP"}

                                  </div>

                              </div>
                              {/* v1.30: la rueda entera — ciclo + primas de las covered calls escritas sobre esa acción */}

                                <div style={{ marginTop: 9, paddingTop: 9, borderTop: `1px solid ${T.line}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>

                                  </div>
                                  <div style={{ fontSize: 18, fontWeight: 800, color: rue.rueda >= 0 ? T.green : T.red, letterSpacing: -0.4, flexShrink: 0 }}>{signMoney(rue.rueda)}</div>

                                <div style={{ marginTop: 9, display: "flex", gap: 8, alignItems: "center" }}>

                        {isCoveredCall(p) && !!linkCoveredCall && (() => {

                              <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 600, marginTop: 3, lineHeight: 1.35 }}>
                                {ccStock
                                  ? n(ccStock.qty) + " acc de " + (ccStock.tkr || "?") + " · coste base $" + money2(effBep(ccStock)) + (origen ? " · asignadas desde la put de " + ibkrDate(origen.entryDate) : "")
                                  : "Sin enlazar. Enlázala a la acción para que su prima cuente en la rueda de ese subyacente."}
                              </div>
                              <div style={{ marginTop: 9, display: "flex", gap: 8, alignItems: "center" }}>
                                <select
                                  value={ccStock ? ccStock.id : ""}
                                  onChange={(ev) => linkCoveredCall(p.id, ev.target.value)}
                                  style={{ flex: 1, minWidth: 0, WebkitAppearance: "none", appearance: "none", background: T.card, border: "none", borderRadius: 10, padding: "9px 10px", fontSize: 12, fontWeight: 700, color: T.ink, fontFamily: "inherit" }}>
                                  <option value="">— sin enlazar —</option>
                                  {cands.map((s2) => (
                                    <option key={s2.id} value={s2.id}>
                                      {(s2.tkr || "?") + " · " + n(s2.qty) + " acc · $" + money2(effBep(s2)) + (s2.closed ? " · cerrada" : "") + (s2.entryDate ? " · " + ibkrDate(s2.entryDate) : "")}
                                    </option>
                                  ))}
                                </select>
                                {!cands.length && <span style={{ fontSize: 10.5, color: T.sub, fontWeight: 600 }}>No hay acción de {p.tkr} en cartera</span>}
                              </div>
                            </div>
                          );
                        })()}
                        {/* cabecera al estilo Comparador: prima grande a la izquierda, Annualized ROI grande a la derecha */}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 12 }}>
                          <div>
                            <div style={{ fontSize: 24, fontWeight: 800, color: (csPending ? csCredit : primaBasis) >= 0 ? T.ink : T.red, letterSpacing: -0.5 }}>{signMoney(csPending ? csCredit : primaBasis)}</div>
                            <div style={{ fontSize: 11, color: T.sub, fontWeight: 500 }}>{csPending ? "Crédito pendiente (no registrado hasta el cierre)" : noOpenBooked ? (p.closed ? "P&L realizado" : "Prima acumulada") : "Prima acumulada"}</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 24, fontWeight: 800, color: isFinite(romAnn) && romAnn >= 0 ? T.green : T.red, letterSpacing: -0.5 }}>{fmtPct2(romAnn)}</div>
                            <div style={{ fontSize: 11, color: T.sub, fontWeight: 500 }}>Annualized ROI{csPending ? " (potencial · DTE)" : ""}</div>
                          </div>
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
                          <MiniStat label={csPending ? "ROI potencial (crédito/riesgo)" : isCreditSpread(p) ? "ROI (P&L/riesgo)" : "ROI (prima/riesgo)"} value={fmtPct2(rom)} color={isFinite(rom) && rom >= 0 ? T.green : T.red} size={18} />
                          <div style={{ display: "flex", gap: 14, background: T.card, borderRadius: 12, padding: "8px 12px", flexShrink: 0 }}>
                            <div style={{ textAlign: "center" }}>
                              <div style={{ fontSize: 10, color: T.sub, fontWeight: 500 }}>Riesgo</div>
                              <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>${money(riesgo)}</div>
                            </div>
                            {!isCreditSpread(p) && (
                            <div style={{ textAlign: "center" }}>
                              <div style={{ fontSize: 10, color: T.sub, fontWeight: 500 }}>BEP</div>
                              <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>${money2(effBep(p))}</div>
                            </div>
                            )}
                          </div>
                        </div>
                        {/* fila alineada de tiles: IVR · Strike(s) · DTE · DIT — en credit spreads el Strike son los spreads */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: (natOf(p) === "CRED" || chain.length > 0 || p.closed) ? 10 : 0 }}>
                          {/* Strikes de credit spreads (v5.00): las dos alas apiladas (put arriba, call debajo) en vez
                             de una línea truncada con "…" — así ambos spreads se leen completos dentro del tile. */}
                          {[["IVR", p.ivr || "—"], [isSimpleCredit(p) ? "VIX" : (isCreditSpread(p) || (isDCDD(p) && (dcStrikePut(dcddOf(p)) || dcStrikeCall(dcddOf(p)))) ? "Strikes" : "Strike"), isSimpleCredit(p) ? (p.vix || "—") : isCreditSpread(p) ? ([p.putSpread, p.callSpread].filter(Boolean)) : (isDCDD(p) && (dcStrikePut(dcddOf(p)) || dcStrikeCall(dcddOf(p)))) ? ([dcStrikePut(dcddOf(p)) ? "P " + dcStrikePut(dcddOf(p)) : "", dcStrikeCall(dcddOf(p)) ? "C " + dcStrikeCall(dcddOf(p)) : ""].filter(Boolean)) : (n(p.strike) ? "$" + strikeStr(p.strike) : "—")], [isDCDD(p) && dcddOf(p).expiryLong ? "DTE S/L" : "DTE", isDCDD(p) && dcddOf(p).expiryLong ? (isFinite(dte) ? dte : "—") + "/" + (isFinite(daysBetween(p.entryDate, dcddOf(p).expiryLong)) ? daysBetween(p.entryDate, dcddOf(p).expiryLong) : "—") + "d" : (isFinite(dte) ? dte + "d" : "—")], ["DIT", isFinite(dit) ? dit + "d" : "—"]].map(([lbl, val]) => (
                            <div key={lbl} style={{ background: T.card, borderRadius: 14, padding: "10px 4px", textAlign: "center", minWidth: 0, display: "flex", flexDirection: "column", justifyContent: "center" }}>

                                </div>

                                <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{val}</div>

                              <div style={{ fontSize: 10, color: T.sub, marginTop: 2, fontWeight: 500 }}>{lbl}</div>
                            </div>
                          ))}
                        </div>
                        {isDCDD(p) && (() => {
                          /* fila extra DC/DD (v5.08): la ficha de la operación de un vistazo — ratio shorts/longs,

                          const d = dcddOf(p);
                          const ratio = dcddRatio(d), ivSp = dcddIvSpread(d);
                          const hasIvRow = d.ivAvg || d.ivShort || d.ivLong;
                          if (!isFinite(ratio) && !isFinite(ivSp) && !d.vix && !hasIvRow && !(d.eventIn === "SI" || d.eventIn === "NO")) return null;
                          return (
                            <>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginTop: 8, marginBottom: hasIvRow ? 0 : ((natOf(p) === "CRED" || chain.length > 0 || p.closed) ? 10 : 0) }}>

                            {hasIvRow && (

                                <Tile label="IV longs" value={d.ivLong || "—"} />
                              </div>
                            )}
                            </>
                          );
                        })()}
                      </>
                    ) : (

                        <div style={{ background: T.card, borderRadius: 14, padding: "10px 12px", display: "flex", justifyContent: "space-around", gap: 10, marginBottom: 10 }}>

                    {isOpt && (natOf(p) === "CRED" || chain.length > 0 || p.closed) && (

                    )}
                    {isOpt && onEditChain && (
                      <button onClick={(ev) => { ev.stopPropagation(); onEditChain(p.id); }} style={{ width: "100%", marginTop: 12, background: T.tilePurple, border: "none", borderRadius: 12, padding: "12px 0", fontSize: 13, fontWeight: 800, color: T.purple, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }}><ActIcon name="edit" size={15} />Editar {chain.length > 0 ? "rolls, apertura y cierre" : p.closed ? "apertura y cierre" : "apertura"}</button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          </>)}
        </div>
      )}
    </>
  );
}

}

/* v1.21: Herramientas — contenedor con selector Puts | Earnings (estilo Movimientos) */
function HerramientasView({ apiKey, geminiKey, onOpenPosition, nlv, margin, el, brokerLabel, trades, setTrades, basis, setBasis }) {

          <button key={id} onClick={() => pick(id)} style={{
            flex: 1, border: "none", cursor: "pointer", borderRadius: 13, padding: "8px 0 7px", fontSize: 12, fontWeight: 700,

            background: sub === id ? T.dark : "transparent", color: sub === id ? "#fff" : T.sub,
