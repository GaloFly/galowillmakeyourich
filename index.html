  const [syncTkr, setSyncTkr] = useState(null);
  /* v1.37: stats VIVAS para una idea — si su ticker tiene histórico de tablas guardado, M/X/U salen
     de ahí (una relectura de la tabla actualiza la idea sola); si no, se usan los congelados al guardar. */
  const liveForm = (rec) => {
    const f = rec && rec.form ? rec.form : {};
    const h = rec && hist[rec.tkr];
    if (!h) return f;
    const s = erStats(h.events);
    if (!s.M) return f;
    return { ...f, nHist: String(s.M), xOpen: String(s.xOpen), xClose: String(s.xClose), xHigh: String(s.xHigh), xLow: String(s.xLow), nUp: String(s.nUp) };
  };
  /* v1.38: mismo orden en los dos carruseles — alfabético por ticker, de modo que la posición N de
     arriba y la de abajo sean el mismo ticker siempre que exista en ambos. */
  const ideasSorted = [...ideas].sort((a, b) => String(a.tkr || "").localeCompare(String(b.tkr || "")));
  const histSyms = Object.keys(hist).sort((a, b) => a.localeCompare(b));
  /* v1.39: un único carrusel — tarjeta COMBINADA por ticker (idea + histórico de tabla en una),
     sobre la unión de tickers de ambas fuentes, en el mismo orden alfabético. */
  /* v1.86 (Victor: "ordena las tarjetas por fecha de release, pre antes que post si es el mismo día"):
     el carrusel pasa de alfabético a CRONOLÓGICO por el próximo earnings (calDate del calendario de
     Finnhub) — el que toca antes, primero. En el mismo día manda la sesión en su orden real de
     publicación: BMO (pre) < en sesión < AMC (post) < sin sesión. Sin fecha futura conocida, al final
     en alfabético — nunca se inventa un orden con una fecha que no existe. */
  const unionSyms = (() => {
    const today = new Date().toISOString().slice(0, 10);
    const HOUR_ORD = { bmo: 0, dmh: 1, amc: 2 };
    const keyOf = (sym) => {
      const h = hist[sym] || {};
      const hasDate = h.calDate && h.calDate >= today;
      return { date: hasDate ? h.calDate : "9999-99-99", hour: hasDate ? (HOUR_ORD[h.calHour] != null ? HOUR_ORD[h.calHour] : 3) : 9 };
    };
    return Array.from(new Set([...ideasSorted.map((r) => String(r.tkr)), ...histSyms])).sort((a, b) => {
      const ka = keyOf(a), kb = keyOf(b);
      return ka.date < kb.date ? -1 : ka.date > kb.date ? 1 : ka.hour - kb.hour || a.localeCompare(b);
    });
  })();
  const [st, setSt] = useState(() => {
    /* v1.62: wings = anchos añadidos al comparador, [{ w, c }] — se guardan con el resto del formulario
       (y por tanto también dentro de una idea). Solo se guarda ancho + crédito: strikes, sizing y EV se
       vuelven a derivar del spot/EM/histórico vigentes, así que el comparador nunca enseña datos rancios. */
    const base = { tkr: "", spot: "", em: "", wing: "5", put: "", call: "", credit: "", obj: String(getRiesgoObj()), nHist: "", xOpen: "", xClose: "", xHigh: "", xLow: "", nUp: "", wings: [], putOff: "0", callOff: "0" };
    try { const raw = localStorage.getItem(KEY_EARNCALC); if (raw) return { ...base, ...JSON.parse(raw), obj: String(getRiesgoObj()) }; } catch (e) {}
    return base;
  });
  const [spotMsg, setSpotMsg] = useState("");
  const [spotBusy, setSpotBusy] = useState(false);
  const [liqInfoOpen, setLiqInfoOpen] = useState(false); /* v1.91: desplegable de criterios */
  /* v2.00: cuadro resumen (para comparar con moomoo sin cambiar de pestaña) */
  const [erSumOpen, setErSumOpen] = useState(false);

  const [erSumMinPop, setErSumMinPop] = useState(0); /* v3.23: filtro por POP (Dentro EM) mínima del Resumen por ticker */
  const set = (k) => (v) => setSt((s) => {

  /* v1.29: vuelca el histórico guardado de un ticker a la calculadora (M, X por serie, U y,

  /* v1.29: lector de la tabla "Historical Earnings Data". v1.30: el ticker sale de la propia

  const runTableOcr = async (files) => {

    if (savedSyms.length) {

         navega solo a la tarjeta recién leída */
      setSyncTkr(savedSyms.indexOf(String(st.tkr || "").trim().toUpperCase()) >= 0 ? String(st.tkr).trim().toUpperCase() : savedSyms[0]);
      /* v1.73: fecha y sesión (pre/post) del próximo earnings desde Finnhub, guardadas en el histórico del
         ticker para que la TARJETA las enseñe. Sin key o sin dato, no se guarda nada — nunca se inventa. */
      if (apiKey) {

  };
  const dropHistTkr = (sym) => {

  /* v1.78 (Victor: "que sea más fácil borrar las tarjetas"): UN botón ✕ que borra la TARJETA ENTERA
     (idea + tabla del ticker) con dos toques — antes eran "✕ idea" y "✕ tabla" por separado, cuatro

  /* v3.33 (Victor: "pon un botón para borrarlas todas tipo el comparador de put"): vacía TODAS las

  const [confirmClearEr, setConfirmClearEr] = useState(false);

  /* v1.32: guardar/cargar/borrar ideas. Una por ticker: volver a guardar el mismo la actualiza
     (una idea de earnings ES el próximo evento de ese ticker, no tiene sentido tener dos). */
  const saveIdea = () => {
    const sym = String(st.tkr || "").trim().toUpperCase();
    if (!sym) return;
    const list = loadErIdeas();
    const i = list.findIndex((x) => x && x.tkr === sym);
    const rec = { id: i >= 0 ? list[i].id : "eri_" + Date.now(), tkr: sym, saved: Date.now(), form: { ...st, tkr: sym } };
    if (i >= 0) list[i] = rec; else list.unshift(rec);

    setTimeout(() => setIdeaMsg(""), 5000);

  const loadIdea = (rec) => { if (rec && rec.form) { setMany({ ...liveForm(rec), obj: String(getRiesgoObj()) }); setSyncTkr(rec.tkr); } };
  /* v1.96: receptor del salto desde la pestaña Screener — si hay un patch pendiente en KEY_ERJUMP,
     se aplica al montarse (histórico del ticker si lo hay + spot/EM/strikes que traiga el screener)
     y se borra. Así "Abrir en Earnings" del screener aterriza con todo cargado. */
  useEffect(() => {

    if (!j || !j.tkr) return;
    try { localStorage.removeItem(KEY_ERJUMP); } catch (e) {}
    if (hist[j.tkr]) applyHist(j.tkr);
    const patch = { tkr: j.tkr };

    if (j.em) patch.em = String(j.em);
    if (j.put) patch.put = j.put;

  }, []);
  /* v1.34: vaciar el formulario para el siguiente análisis — el riesgo objetivo (global) se conserva
     y ni las ideas guardadas ni el histórico de tablas se tocan (cada uno tiene su ✕ propia). */
  const clearCalc = () => setMany({ tkr: "", spot: "", em: "", wing: "5", put: "", call: "", credit: "", nHist: "", xOpen: "", xClose: "", xHigh: "", xLow: "", nUp: "", wings: [], putOff: "0", callOff: "0", putAbs: "", callAbs: "", spSOff: "0", spLOff: "0", spSAbs: "", spLAbs: "", spCredit: "" });
  const dropIdea = (id) => {

    const list = loadErIdeas().filter((x) => x && x.id !== id);

  };

  /* v1.71: junto al spot, el PRÓXIMO EARNINGS del calendario de Finnhub — fecha y si es pre o post market
     (la sesión decide cuándo abres: AMC se abre ese mismo día 15:30-16:00; BMO, la tarde ANTERIOR). */
  const [erCal, setErCal] = useState(null); // { tkr, date, hour } | { tkr, none: true }
  const [histOpen, setHistOpen] = useState(false); /* v1.73: M/X/U plegados — casi siempre los rellena el lector */
  const [chartSel, setChartSel] = useState("open"); /* v3.70 (Victor): el gráfico bajo las POP sigue a la tile tocada; Open por defecto (es su salida) */
  const [minInfo, setMinInfo] = useState(null); /* v3.75: hoja ⓘ del crédito mínimo dinámico ({t:"ic"|"sp", d:{...}}) */
  const [infoSym, setInfoSym] = useState(null); /* v1.73: tarjeta con la leyenda Ø desplegada */
  /* v1.77 (Victor: "mete que se vea en la tarjeta la fecha y pre/post"): la v1.73 solo guardaba
     calDate/calHour AL LEER una tabla — las tarjetas ya existentes se quedaban sin fecha para siempre.

     tarjetas viejas se rellenan solas y las fechas pasadas se renuevan tras cada earnings. */
  useEffect(() => {
    if (!apiKey) return;
    const today = new Date().toISOString().slice(0, 10);
    const pend = Object.keys(hist).filter((sym) => { const h = hist[sym] || {}; return !(h.calDate && h.calDate >= today) && h.calChecked !== today; });
    if (!pend.length) return;
    let alive = true;
    (async () => {
      const upd = { ...loadErHist() };
      let touched = false;
      for (const sym of pend) {
        if (!alive) return;
        const cal = await fetchNextEarnings(sym, apiKey);
        /* v1.87 FIX (STT de Victor sin fecha en la tarjeta): antes calChecked se marcaba SIEMPRE, también
           cuando la llamada FALLABA (429 al encadenar consultas) — el ticker quedaba bloqueado hasta
           mañana aunque Finnhub sí tuviera la fecha. Ahora: fallo → NO se marca (reintenta en la próxima
           apertura); respuesta sin eventos → calChecked; con dato → fecha + calChecked. */
        if (upd[sym] && cal) { upd[sym] = { ...upd[sym], calChecked: today, ...(cal.date ? { calDate: cal.date, calHour: cal.hour || null } : {}) }; touched = true; }

  }, [apiKey]);
  const getSpot = async () => {
    const sym = String(st.tkr || "").trim().toUpperCase();

    if (!apiKey) { setSpotMsg("Sin key de Finnhub — actívala en Ajustes → Precios."); return; }
    setSpotBusy(true); setSpotMsg("");

          saveErHist(upd); setHist(upd);
        }
      }
    });
  };

  /* redondeo al incremento de strike típico según precio */
  const strikeStep = (px) => (px >= 200 ? 5 : px >= 100 ? 2.5 : px >= 25 ? 1 : 0.5);
  const roundStrike = (x, px) => { const s = strikeStep(px); return Math.round(x / s) * s; };
  const spot = pf(st.spot), em = pf(st.em);
  const emOk = isFinite(spot) && spot > 0 && isFinite(em) && em > 0;
  const icMode = st.erStrat !== "SP"; /* v3.64: selector de estrategia — IC (defecto, todo como siempre) o Credit spread */
  /* v1.66 (Victor: "que se pueda modificar el strike de la put y call para ver qué margen de seguridad"):
     los cortos salen del EM redondeado MÁS un desvío en escalones del bróker (putOff/callOff, ± con los
     steppers de cada tile). Todo lo de abajo — % real, aviso de asimetría, panel del ala, comparador,
     sizing, EV — lee estos cortos, así que mover un strike recalcula el margen entero en vivo. El desvío
     se guarda con el formulario (y con la idea); Generar spreads y cambiar de ticker lo resetean. */
  const putOff = Math.round(pf(st.putOff) || 0), callOff = Math.round(pf(st.callOff) || 0);
  const shortPut = emOk ? (pf(st.putAbs) > 0 ? pf(st.putAbs) : roundStrike(spot * (1 - em / 100), spot) + putOff * strikeStep(spot)) : NaN; /* v3.69: strike escrito a mano manda */
  const shortCall = emOk ? (pf(st.callAbs) > 0 ? pf(st.callAbs) : roundStrike(spot * (1 + em / 100), spot) + callOff * strikeStep(spot)) : NaN;
  const nudge = (k) => (d) => { const abs = k === "putOff" ? pf(st.putAbs) : pf(st.callAbs); const cur = Math.round(pf(st[k]) || 0); const wN = r && isFinite(r.width) && r.width > 0 ? r.width : pf(st.wing); const nsP = k === "putOff" ? shortPut + d * strikeStep(spot) : shortPut; const nsC = k === "callOff" ? shortCall + d * strikeStep(spot) : shortCall; const patch = abs > 0 ? { [k === "putOff" ? "putAbs" : "callAbs"]: String(k === "putOff" ? nsP : nsC) } : { [k]: String(cur + d) }; setMany({ ...patch, ...(emOk && isFinite(wN) && wN > 0 ? { put: fmtK(nsP) + "/" + fmtK(nsP - wN), call: fmtK(nsC) + "/" + fmtK(nsC + wN) } : {}) }); };
  /* v3.69: escribir el strike directamente — guarda el texto tal cual (putAbs/callAbs) y, si parsea,
     reescribe el spread de esa pata con el ancho vigente. Vaciar el campo = volver al automático. */
  const typeAbs = (k) => (v) => { const wN = r && isFinite(r.width) && r.width > 0 ? r.width : pf(st.wing); const num = pf(v); const patch = { [k]: v }; if (Number.isFinite(num) && num > 0 && emOk && isFinite(wN) && wN > 0) { if (k === "putAbs") patch.put = fmtK(num) + "/" + fmtK(num - wN); else patch.call = fmtK(num) + "/" + fmtK(num + wN); } setMany(patch); };
  const wing = pf(st.wing);
  /* v1.66 FIX (Victor, con su IC de ASML: "no calcula bien con patas de 10"): fmtK generaba "1,640" con
     separador de miles y el parser leía 1.64 — el ancho de CUALQUIER ticker de más de $1,000 salía 0.01 y
     todo el sizing era basura. No era el ala de 10: era ASML. Sin agrupación de miles, nunca más. */
  const fmtK = (x) => (Math.round(x * 100) / 100).toLocaleString("en-US", { maximumFractionDigits: 2, useGrouping: false });
  const genSpreads = () => {
    if (!emOk || !isFinite(wing) || wing <= 0) return;
    const p0 = roundStrike(spot * (1 - em / 100), spot), c0 = roundStrike(spot * (1 + em / 100), spot);
    setMany({ putOff: "0", callOff: "0", putAbs: "", callAbs: "", put: fmtK(p0) + "/" + fmtK(p0 - wing), call: fmtK(c0) + "/" + fmtK(c0 + wing) }); /* v1.66: generar = volver al EM */
  };
  /* v1.61: al cambiar el ancho del ala, los spreads se regeneran solos (si hay spot y EM). Antes el
     selector cambiaba pero el sizing seguía calculando con el ancho de los strikes viejos, así que la
     pérdida máxima, los contratos y el EV no se movían — que es justo lo que Victor detectó. */
  const setWing = (w) => {
    const wn = pf(w);
    if (!emOk || !isFinite(wn) || wn <= 0) { set("wing")(w); return; }
    setMany({ wing: w, put: fmtK(shortPut) + "/" + fmtK(shortPut - wn), call: fmtK(shortCall) + "/" + fmtK(shortCall + wn) });
  };

  const r = condorRisk(st.put, st.call, st.credit);
  const obj = pf(st.obj);
  const creditPC = r && r.credit != null ? r.credit * 100 : NaN;
  const sug = r && r.maxLossPC > 0 && isFinite(obj) && obj > 0 ? Math.floor(obj / r.maxLossPC) : null;
  const beWr = r && r.maxLossPC > 0 && isFinite(creditPC) ? r.maxLossPC / (r.maxLossPC + creditPC) : NaN;

  const M = pf(st.nHist);
  const scen = [["xOpen", "Open"], ["xClose", "Close"], ["xHigh", "High"], ["xLow", "Low"]].map(([k, lbl]) => {
    const X = pf(st[k]);
    const pop = isFinite(M) && M > 0 && isFinite(X) && X >= 0 && X <= M ? 1 - X / M : NaN;
    return { k, lbl, X, pop };
  });
  const popOpen = scen[0].pop; /* CRUDO — el hecho histórico, es lo que enseñan las 4 tarjetas de POP */
  /* v1.62: el EV y el veredicto van sobre la POP SUAVIZADA. Con M=12 y 0 roturas el crudo dice 100%, que
     no es una probabilidad sino "todavía no ha pasado": inflaba el EV justo donde menos datos hay. */
  const popOpenS = popSmooth(M, pf(st.xOpen));
  const ev = r && isFinite(popOpenS) && isFinite(creditPC) ? popOpenS * creditPC - (1 - popOpenS) * r.maxLossPC : NaN;
  const evTot = isFinite(ev) && sug ? ev * sug : NaN;
  const edge = isFinite(popOpenS) && isFinite(beWr) ? popOpenS - beWr : NaN;

  /* recomendación de estrategia según el sesgo direccional y la permanencia dentro del EM */
  const U = pf(st.nUp);
  const dirUp = isFinite(M) && M > 0 && isFinite(U) && U >= 0 && U <= M ? U / M : NaN;
  let reco = null;
  if (isFinite(dirUp) && dirUp >= 0.7) reco = { t: "Short Put · Bull Put Spread", txt: "Sube tras earnings el " + (dirUp * 100).toFixed(0) + "% de las veces — sesgo alcista consistente. Vende la put (20-30Δ) o el bull put spread (25-50Δ) y deja el lado call en paz.", col: T.green, bg: T.tileGreen };
  else if (isFinite(dirUp) && dirUp <= 0.3) reco = { t: "Bear Call Spread", txt: "Solo cierra en verde el " + (dirUp * 100).toFixed(0) + "% de las veces — sesgo bajista consistente. Vende el bear call spread (25-50Δ).", col: T.red, bg: T.tileRed };
  else if (isFinite(popOpenS) && popOpenS >= 0.7) reco = { t: "Iron Condor", txt: "Sin dirección clara pero se queda dentro del expected move el " + (popOpenS * 100).toFixed(0) + "% de las veces (open, suavizada). Cóndor con strikes en el EM y crédito ≥ ⅓ del ancho.", col: T.green, bg: T.tileGreen };
  else if (isFinite(popOpenS) && popOpenS < 0.5) reco = { t: "Skip · o comprar la estructura", txt: "Rompe el expected move más de la mitad de las veces — vender prima aquí es la apisonadora. Pasa, o dale la vuelta: compra el IC/Fly con las alas dentro de tu EM.", col: T.gold, bg: T.tileAmber };
  else if (isFinite(dirUp) || isFinite(popOpenS)) reco = { t: "Sin edge claro", txt: "Ni sesgo direccional consistente ni permanencia fiable dentro del EM. No te sientas obligado a tradear — a la siguiente.", col: T.sub, bg: T.tile };

  /* v1.23: Plan B. Solo se plantea si el trade ABRE en pérdida (el gap se pasó de tus strikes).
     La pregunta es si el día suele corregir ese gap o si lo profundiza:
       · POP close > POP open  → el precio vuelve dentro del EM durante la sesión → aguantar tiene histórico a favor.
       · POP close ≤ POP open  → los gaps se extienden → cerrar en el open, sin dudar.
     High/Low miden la excursión adversa: si son mucho peores que el open, el intradía te puede sacar
     mucho más lejos antes de cualquier recuperación — aguantar duele aunque acabe corrigiendo. */
  const popClose = scen[1].pop, popHigh = scen[2].pop, popLow = scen[3].pop;
  const revert = isFinite(popClose) && isFinite(popOpen) ? popClose - popOpen : NaN;
  const worstIntra = [popHigh, popLow].filter((x) => isFinite(x));
  const excursion = worstIntra.length && isFinite(popOpen) ? Math.min(...worstIntra) - popOpen : NaN;
  /* v1.66 FIX (Victor: "la barra de cierra no sirve, siempre dice cierra"): el plan B compara la POP al
     cierre con la POP al open, pero con 0 roturas las dos son 100%, revert = 0, y caía en la rama CIERRA
     con el texto absurdo "cierre 100% vs open 100%: los gaps se extienden". El plan B solo tiene sentido
     cuando el histórico HA ROTO alguna vez — es un plan para la rotura. Ahora:
       · 0 roturas al open → SIN CASOS: nunca abrió fuera del EM en M earnings; no hay evidencia de cómo se
         comporta una rotura. Por defecto, el marco: cerrar al abrir.
       · |revert| < 5 pts → SIN SEÑAL: cierre ≈ open, el histórico no favorece ni aguantar ni cortar.
       · el resto, como antes: AGUANTA / AGUANTA CON DOLOR / CIERRA, ahora con evidencia de verdad. */
  const xOpenN = pf(st.xOpen);
  let plan = null;
  if (isFinite(revert)) {
    const deep = isFinite(excursion) && excursion <= -0.15;
    if (isFinite(xOpenN) && xOpenN === 0) plan = { t: "SIN CASOS", col: T.sub, bg: T.tile, txt: "Nunca abrió fuera del EM en " + (isFinite(M) ? M : "los") + " earnings — no hay roturas de las que aprender. Si llega la primera, el marco manda: cierra al abrir." };
    else if (revert >= 0.05 && !deep) plan = { t: "AGUANTA", col: T.green, bg: T.tileGreen, txt: "Cierre " + (popClose * 100).toFixed(0) + "% vs open " + (popOpen * 100).toFixed(0) + "%: los gaps se corrigen durante la sesión. Si abre en pérdida, dale tiempo." };
    else if (revert >= 0.05 && deep) plan = { t: "AGUANTA CON DOLOR", col: T.gold, bg: T.tileAmber, txt: "Corrige al cierre, pero el intradía se va mucho más en contra antes (" + (Math.min(...worstIntra) * 100).toFixed(0) + "% vs " + (popOpen * 100).toFixed(0) + "%). Solo si el tamaño te deja dormir." };
    else if (revert > -0.05) plan = { t: "SIN SEÑAL", col: T.sub, bg: T.tile, txt: "Cierre " + (popClose * 100).toFixed(0) + "% ≈ open " + (popOpen * 100).toFixed(0) + "%: el histórico no favorece ni aguantar ni cortar. Marco por defecto: cierra al abrir." };
    else plan = { t: "CIERRA", col: T.red, bg: T.tileRed, txt: "Cierre " + (popClose * 100).toFixed(0) + "% vs open " + (popOpen * 100).toFixed(0) + "%: los gaps se extienden, no se corrigen. Si abre en pérdida, cierra." };
  }

  const verdict = !r || !isFinite(ev) ? null : ev > 0 && r.ratio != null && r.ratio >= 0.25 && edge >= 0.05 ? { t: "GO", col: T.green, bg: T.tileGreen, txt: "EV positiva con colchón — entra dentro de tu marco" } : ev > 0 ? { t: "CAUTION", col: T.gold, bg: T.tileAmber, txt: "EV positiva pero fina — poco margen si el histórico no se repite" } : { t: "NO-GO", col: T.red, bg: T.tileRed, txt: "EV negativa — con tu histórico esta estructura pierde dinero a la larga" };
  const money0 = (v) => "$" + Math.abs(v).toLocaleString("en-US", { maximumFractionDigits: 0 });
  const money2 = (v) => "$" + Math.abs(v).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const sgn = (v) => (v >= 0 ? "+" : "−");
  const fmtW = (w) => w.toLocaleString("en-US", { maximumFractionDigits: 2 });
  const pctS = (x) => sgn(x) + Math.abs(x).toFixed(1) + "%";

  /* ---------- v1.62: COMPARADOR DE ANCHOS ----------
     El % del ancho por sí solo no decide: el WR mínimo es 1 − crédito/ancho, así que un ala estrecha SIEMPRE
     saca mejor ratio (la curva de precios es convexa) — no es edge, es geometría. Lo que de verdad separa un
     ancho de otro es la ZONA DE PÉRDIDA PARCIAL: entre el strike corto y el largo el ala ancha pierde solo lo
     recorrido, la estrecha ya está en pérdida máxima. Por eso cada ancho se juzga con DOS modelos y se queda
     con el PEOR de los dos (prudencia, no optimismo):
       · RÉPLICA — se pasa cada movimiento de open REAL del histórico por el payoff exacto del cóndor. Una
         rotura suave cuesta lo que cuesta, no la pérdida máxima. Es el modelo que ve el colchón.
       · BINARIO — POP suavizada (Laplace) × crédito − (1 − POP) × pérdida máxima. Es pesimista con el ala
         ancha (toda rotura = máximo) pero es el único que deja hueco a la cola que el histórico aún no ha visto.
     El EV se compara a IGUAL RIESGO (contratos = riesgo objetivo / pérdida máx), que es como se decide de verdad.
     Nota honesta: la réplica valora al intrínseco del open; el extrínseco que sobrevive al IV crush juega
     ligeramente en contra. Es una aproximación conservadora del lado bueno, no un número inventado. */
  const histEvsAll = (() => {
    const h = hist[String(st.tkr || "").trim().toUpperCase()];
    return erEvents(h).filter((e) => e && Number(e.em) > 0 && e.open != null && isFinite(Number(e.open)));
  })();
  const histOpens = histEvsAll.map((e) => Number(e.open));
  /* v1.66 (Victor: "¿le darías más peso a los últimos 6? o al menos poner el dato"): se PONE EL DATO, sin
     ponderar el modelo. Con 6 puntos una ponderación mete más ruido que señal — pero si el ticker ha
     cambiado de régimen (crecimiento→maduro, nuevo CEO, re-rating), los últimos 6 lo delatan y eso sí hay
     que verlo. La tabla lista lo más reciente arriba, así que últimos 6 = primeras 6 filas con open. */
  const rec6 = histEvsAll.slice(0, 6);
  const rec6Stats = rec6.length >= 3 ? (() => {
    const breaks = rec6.filter((e) => Math.abs(Number(e.open)) > Number(e.em)).length;
    const absOpen = rec6.reduce((t, e) => t + Math.abs(Number(e.open)), 0) / rec6.length;
    const allBreaks = histEvsAll.filter((e) => Math.abs(Number(e.open)) > Number(e.em)).length;
    const absAll = histOpens.reduce((t, o) => t + Math.abs(o), 0) / histOpens.length;
    /* diverge = las roturas recientes superan claramente la tasa histórica → el pasado largo engaña */
    const diverge = rec6.length > 0 && histOpens.length > rec6.length && breaks / rec6.length > allBreaks / histOpens.length + 0.15;
    return { n: rec6.length, breaks, absOpen, absAll, diverge };
  })() : null;
  const wingEval = (w, c) => {
    if (!emOk || !(w > 0) || !(c > 0)) return null;
    const spK = shortPut, lpK = shortPut - w, scK = shortCall, lcK = shortCall + w;
    const maxLossPC = Math.max(w - c, 0) * 100;
    if (!(maxLossPC > 0)) return null;
    const cts = isFinite(obj) && obj > 0 ? Math.floor(obj / maxLossPC) : null;
    const ratio = c / w;
    const beWr = maxLossPC / (maxLossPC + c * 100);
    const dnPct = (lpK / spot - 1) * 100; // dónde toca la pérdida máxima por abajo
    const upPct = (lcK / spot - 1) * 100; // ...y por arriba
    let evRep = NaN, nWin = 0, nPart = 0, nMax = 0;
    const pts = [];
    if (histOpens.length) {
      let sum = 0;
      histOpens.forEach((o) => {
        const v = condorValueAt(spot * (1 + o / 100), spK, lpK, scK, lcK);
        sum += (c - v) * 100;
        const kind = v <= 1e-9 ? "win" : v >= w - 1e-9 ? "max" : "part";
        if (kind === "win") nWin++; else if (kind === "max") nMax++; else nPart++;
        pts.push({ o, kind });
      });
      evRep = sum / histOpens.length;
    }
    const evBin = isFinite(popOpenS) ? popOpenS * c * 100 - (1 - popOpenS) * maxLossPC : NaN;
    const both = [evRep, evBin].filter(isFinite);
    const evCons = both.length ? Math.min(...both) : NaN;
    const evTot = isFinite(evCons) && cts > 0 ? evCons * cts : NaN;
    /* % SOBRE RIESGO — lo que de verdad cobras por cada dólar que pones en juego: crédito / pérdida máx.
       No es lo mismo que el % del ancho (crédito / ancho): con ala 2 y $0.60, el % del ancho es 30% pero
       sobre riesgo es 43%. El primero fija el WR mínimo; este es la rentabilidad de la operación. */
    const ror = (c * 100) / maxLossPC;
    return { w, c, maxLossPC, cts, ratio, ror, beWr, dnPct, upPct, evRep, evBin, evCons, evTot, nWin, nPart, nMax, pts };
  };
  const wingRows = (Array.isArray(st.wings) ? st.wings : []).map((x) => wingEval(Number(x.w), Number(x.c))).filter(Boolean).sort((a, b) => a.w - b.w);
  const bestWing = wingRows.filter((x) => isFinite(x.evTot) && x.cts > 0).sort((a, b) => b.evTot - a.evTot)[0] || null;
  const addWing = () => {
    const wN = r && isFinite(r.width) && r.width > 0 ? r.width : pf(st.wing);
    const c = pf(st.credit);
    if (!isFinite(wN) || wN <= 0 || !isFinite(c) || c <= 0) return;
    const list = (Array.isArray(st.wings) ? st.wings : []).slice();
    const i = list.findIndex((x) => Math.abs(Number(x.w) - wN) < 1e-9);
    if (i >= 0) list[i] = { w: wN, c }; else list.push({ w: wN, c });
    setMany({ wings: list.sort((a, b) => a.w - b.w) });
  };
  const dropWing = (w) => setMany({ wings: (Array.isArray(st.wings) ? st.wings : []).filter((x) => Math.abs(Number(x.w) - w) > 1e-9) });
  const useWing = (w, c) => {
    if (!emOk) return;
    setMany({ wing: String(w), credit: String(c), put: fmtK(shortPut) + "/" + fmtK(shortPut - w), call: fmtK(shortCall) + "/" + fmtK(shortCall + w) });
  };
  /* el PORQUÉ de la recomendación, escrito desde los datos — nunca una frase genérica */
  /* el porqué, en una línea y con números — no un párrafo */
  let wingWhy = null;
  if (bestWing && wingRows.length > 1) {
    const alt = wingRows.filter((x) => x !== bestWing && isFinite(x.evTot)).sort((a, b) => b.evTot - a.evTot)[0];
    const gap = alt ? sgn(bestWing.evTot - alt.evTot) + money0(bestWing.evTot - alt.evTot) + " vs ala " + fmtW(alt.w) : null;
    const cushion = !histOpens.length ? "sin histórico: solo modelo binario"
      : wingRows.some((x) => x.nPart > 0) ? "el colchón entró en juego"
      : "el colchón nunca se usó en " + histOpens.length + " earnings";
    wingWhy = [cushion, gap, bestWing.ror.toFixed(0) + "% sobre riesgo"].filter(Boolean).join(" · ");
  }

  /* v1.62: el % REAL de los strikes tras el redondeo al incremento del bróker — casi nunca coincide con
     el EM, y ese desvío decide por qué flanco te van a romper primero. */
  const putPct = emOk ? (shortPut / spot - 1) * 100 : NaN;
  const callPct = emOk ? (shortCall / spot - 1) * 100 : NaN;
  const asym = emOk ? Math.abs(callPct) - Math.abs(putPct) : NaN;
  /* v1.63: BARRA DE RIESGO — lo que antes eran tres frases, en 22px de alto.
     Verde = entre los strikes cortos (crédito entero) · ámbar = zona de pérdida PARCIAL (corto→largo:
     aquí es donde un ala ancha amortigua y una estrecha ya no) · rojo = pérdida máxima. Los puntos son
     los movimientos de open REALES del histórico, cada uno pintado por lo que habría costado. */
  const WingBar = ({ x }) => {
    const spP = (shortPut / spot - 1) * 100, scP = (shortCall / spot - 1) * 100;
    const span = Math.max(Math.abs(x.dnPct), Math.abs(x.upPct), ...histOpens.map(Math.abs), 1) * 1.15;
    const at = (v) => Math.max(0, Math.min(100, ((v + span) / (2 * span)) * 100));
    const seg = (a, b, bg) => <div style={{ position: "absolute", left: at(a) + "%", width: Math.max(0, at(b) - at(a)) + "%", top: 0, bottom: 0, background: bg }} />;
    const dotCol = { win: T.green, part: T.gold, max: T.red };
    return (
      <div style={{ position: "relative", height: 22, borderRadius: 7, overflow: "hidden", background: T.tileRed }}>
        {seg(x.dnPct, spP, T.tileAmber)}
        {seg(scP, x.upPct, T.tileAmber)}
        {seg(spP, scP, T.tileGreen)}
        <div style={{ position: "absolute", left: at(0) + "%", top: 0, bottom: 0, width: 1, background: T.sub, opacity: 0.45 }} />
        {x.pts.map((pt, i) => (
          <div key={i} style={{ position: "absolute", left: "calc(" + at(pt.o) + "% - 3.5px)", top: 7.5, width: 7, height: 7, borderRadius: 4, background: dotCol[pt.kind], border: "1.5px solid " + T.card, boxSizing: "border-box" }} />
        ))}
      </div>
    );
  };
  const MicroTile = ({ v, l, c }) => (
    <div style={{ background: T.card, borderRadius: 10, padding: "6px 4px", textAlign: "center", minWidth: 0 }}>
      <div style={{ fontSize: 13.5, fontWeight: 800, color: c || T.ink, fontVariantNumeric: "tabular-nums" }}>{v}</div>
      <div style={{ fontSize: 9, fontWeight: 600, color: T.sub, marginTop: 1 }}>{l}</div>
    </div>
  );
  const Dot = ({ c }) => <span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 4, background: c, marginRight: 4 }} />;
  /* v3.73 (Victor: "cada tecla cierra el teclado"): StrikeTile estaba definido AQUÍ DENTRO — cada
     re-render creaba un tipo de componente nuevo, React remontaba el input y el foco (y el teclado de
     iOS) se perdía por tecla. Movido a nivel de módulo (StrikeTile, antes del componente) con em como
     prop. Regla para el futuro: ningún componente con inputs se define dentro de otro componente. */

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 18, marginBottom: 16, boxShadow: T.shadow }}>
      <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, letterSpacing: -0.3, display: "flex", alignItems: "center", gap: 8 }}><ActIcon name="calc" size={18} />Análisis de earnings</div>
      <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub, marginTop: 2, marginBottom: 14 }}>Estrategia · estructura · probabilidad · sizing — todo antes de abrir</div>
      <div style={{ display: "grid", gap: 10 }}>
        <ScanOverlay open={!!scan} step={scan ? scan.step : 0} sub={scan ? scan.sub : null} />
        {autoMsg && (
          <div style={{ background: T.tilePurple, borderRadius: 12, padding: "10px 13px", fontSize: 11, fontWeight: 700, color: T.purple }}>{autoMsg}</div>
        )}
        {/* v2.00 (Victor: "puedes meter cuadro resumen también en la herramienta de earnings, y así
            comparamos"): resumen colapsable de TODO el histórico de moomoo por ticker — las columnas del
            Summary by name, todas derivadas del histórico. Para cotejar con moomoo sin salir de Earnings. */}
        {Object.keys(hist).length > 0 && (
          <div style={{ background: T.tile, borderRadius: 14, overflow: "hidden" }}>
            <button type="button" onClick={() => setErSumOpen(!erSumOpen)}
              style={{ border: "none", cursor: "pointer", width: "100%", background: "transparent", padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 13.5, fontWeight: 800, color: T.ink, display: "inline-flex", alignItems: "center", gap: 7 }}>
                Resumen por ticker
                <span style={{ fontSize: 10, fontWeight: 800, borderRadius: 8, padding: "1px 7px", background: T.card, color: T.sub }}>{Object.keys(hist).length}</span>
              </span>
              <span style={{ fontSize: 11, fontWeight: 800, color: T.sub, transform: erSumOpen ? "rotate(180deg)" : "none", transition: "transform .15s" }}>▾</span>
            </button>
            {erSumOpen && (() => {
              const rows = Object.keys(hist).map((sym) => {
                const s = erStats(erEvents(hist[sym]));
                const liq = hist[sym].liq || null;
                return { sym, n: s.M, within: s.popOpen, nextEm: s.nextEm, em: s.emAvg, absOpen: s.absOpen, edge: isFinite(s.emAvg) && isFinite(s.absOpen) ? s.emAvg - s.absOpen : NaN, ivCrush: s.ivCrush, worst: s.worst, liq, oi: liq && isFinite(liq.oiMed) ? liq.oiMed : NaN, spr: liq && isFinite(liq.sprMed) ? liq.sprMed : NaN, calDate: hist[sym].calDate || "", calHour: hist[sym].calHour || "" };
              });
              const val = (r, c) => c === "sym" ? r.sym : r[c];
              const dir = erSumSort.dir === "asc" ? 1 : -1;
              rows.sort((a, b) => {
                if (erSumSort.col === "sym") return a.sym < b.sym ? -dir : a.sym > b.sym ? dir : 0;
                if (erSumSort.col === "date") { const ad = a.calDate || "9999", bd = b.calDate || "9999"; return ad < bd ? -dir : ad > bd ? dir : 0; } /* v2.14: orden por fecha del próximo earnings */
                const av = val(a, erSumSort.col), bv = val(b, erSumSort.col);
                const an = isFinite(av), bn = isFinite(bv);
                if (!an && !bn) return 0; if (!an) return 1; if (!bn) return -1;
                return (av - bv) * dir;
              });
              /* v3.23: filtro por POP (Dentro EM) mínima — con umbral activo, los tickers sin POP quedan fuera */
              const shownRows = erSumMinPop > 0 ? rows.filter((r) => isFinite(r.within) && r.within >= erSumMinPop) : rows;
              const popChips = [[0, "Todas"], [0.5, "≥50%"], [0.6, "≥60%"], [0.7, "≥70%"]];
              /* v2.14: columna "Próx" con fecha del próximo earnings + pre/post (Victor: "en el resumen por
                 ticker de earnings, la fecha del earnings y si es pre o post") */
              const cols = [["sym", "Símbolo"], ["date", "Próx"], ["n", "N"], ["within", "Dentro EM"], ["nextEm", "EM próx"], ["em", "Ø EM"], ["absOpen", "Ø open"], ["edge", "Ø edge"], ["ivCrush", "IV crush"], ["worst", "Peor"]];
              const colTip = { edge: "Ø EM − Ø|open| (cuánto sobra o falta del EM frente al movimiento real medio)", nextEm: "EM del próximo earnings (fila pendiente del histórico)", absOpen: "Movimiento real medio en el open (Ø|open|)", ivCrush: "Caída media de IV tras el earnings" };
              const th = (c, lbl) => (
                <th key={c} title={colTip[c] || undefined} onClick={() => setErSumSort((p) => ({ col: c, dir: p.col === c && p.dir === "desc" ? "asc" : "desc" }))}
                  style={{ padding: "7px 8px", textAlign: c === "sym" ? "left" : "right", fontSize: 10, fontWeight: 800, color: erSumSort.col === c ? T.ink : T.sub, whiteSpace: "nowrap", cursor: "pointer", position: c === "sym" ? "sticky" : "static", left: 0, background: T.tile }}>
                  {lbl}{erSumSort.col === c ? (erSumSort.dir === "desc" ? " ▾" : " ▴") : ""}
                </th>
              );
              const pct = (x) => isFinite(x) ? (x * 100).toFixed(0) + "%" : "—";
              const p1 = (x) => isFinite(x) ? x.toFixed(1) + "%" : "—";
              const dShort = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" }) : "—"; /* v2.14 */
              const colMap = { green: T.green, gold: T.gold, red: T.red, sub: T.sub };
              return (
                <div style={{ padding: "0 6px 10px" }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: T.sub, padding: "0 6px 8px" }}>Ø edge = ØEM − Ø|open| (el "Avg P&L" de moomoo). Próx = fecha del próximo earnings · pre/post. Tocar fila carga el ticker abajo.</div>
                  {/* v3.23: filtro por POP (Dentro EM) mínima */}
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", padding: "0 6px 10px" }}>
                    <span style={{ fontSize: 10, fontWeight: 800, color: T.sub, letterSpacing: 0.3 }}>POP ≥</span>
                    {popChips.map(([v, l]) => (
                      <button key={l} type="button" onClick={() => setErSumMinPop(v)}
                        style={{ border: "none", cursor: "pointer", borderRadius: 9, padding: "5px 10px", fontSize: 11, fontWeight: 800, background: erSumMinPop === v ? T.ink : T.card, color: erSumMinPop === v ? T.card : T.sub }}>{l}</button>
                    ))}
                    {erSumMinPop > 0 && <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, marginLeft: "auto" }}>{shownRows.length} de {rows.length}</span>}
                  </div>
                  <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
                    <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 660 }}>
                      <thead><tr style={{ borderBottom: "1.5px solid " + T.line }}>{cols.map(([c, l]) => th(c, l))}</tr></thead>
                      <tbody>
                        {shownRows.map((r) => {
                          const isSel = String(st.tkr || "").trim().toUpperCase() === r.sym;
                          return (
                            <tr key={r.sym} onClick={() => { applyHist(r.sym); setSyncTkr(r.sym); }}
                              style={{ borderBottom: "1px solid " + T.line, cursor: "pointer", background: isSel ? T.card : "transparent" }}>
                              <td style={{ padding: "8px", textAlign: "left", fontSize: 12.5, fontWeight: 800, color: T.ink, whiteSpace: "nowrap", position: "sticky", left: 0, background: isSel ? T.card : T.tile }}>{r.sym}</td>
                              <td style={{ padding: "8px", textAlign: "right", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", color: T.sub, fontVariantNumeric: "tabular-nums" }}>{r.calDate ? (<span>{dShort(r.calDate)}<span style={{ color: r.calHour === "bmo" ? T.gold : r.calHour === "amc" ? T.green : T.sub, fontWeight: 800 }}>{r.calHour === "bmo" ? " · pre" : r.calHour === "amc" ? " · post" : r.calHour === "dmh" ? " · sesión" : ""}</span></span>) : "—"}</td>
                              <td style={{ padding: "8px", textAlign: "right", fontSize: 11.5, fontWeight: 700, color: T.sub, fontVariantNumeric: "tabular-nums" }}>{r.n || "—"}</td>
                              <td style={{ padding: "8px", textAlign: "right", fontSize: 11.5, fontWeight: 800, color: isFinite(r.within) ? (r.within >= 0.7 ? T.green : r.within >= 0.5 ? T.gold : T.red) : T.sub, fontVariantNumeric: "tabular-nums" }}>{pct(r.within)}</td>

          console.error("[Comparador] Gemini OCR falló (" + model + "):", err);
          geminiErr = errToStr(err);
          if (err && err.status === 429) {
            rateLimited = true;
            if (err.retryAfterMs) waitMs = Math.max(waitMs, err.retryAfterMs);
            continue; // prueba el siguiente modelo
          }
          // error que no es de cupo (key inválida, respuesta rara…): no tiene sentido seguir probando
          return { trade: null, message: "Gemini falló: " + geminiErr };
        }
      }
      // llegamos aquí = todos los modelos dieron 429 en esta vuelta
      if (round === 0 && rateLimited && waitMs) {
        const ms = Math.min(waitMs + 500, 65000);
        if (onWaiting) onWaiting(ms);
        await sleep(ms);
        continue; // una segunda y última vuelta tras esperar
      }
      break;
    }
    return { trade: null, message: "Gemini falló en Flash y Flash-Lite (cupo agotado en ambos): " + geminiErr };
  };
  /* acepta una o varias fotos; las procesa en orden y añade cada operación YA COLAPSADA
     (sin abrir el editable) — revisar los campos leídos es opcional, no forzoso */
  const runOcr = async (files) => {
    const list = Array.from(files || []).filter(Boolean);
    if (!list.length) return;
    if (ocrLockRef.current) { console.warn("[Comparador] runOcr ya en curso, ignoro disparo duplicado"); return; }
    ocrLockRef.current = true;
    const gkey = (() => { try { return localStorage.getItem(KEY_GEMINI) || ""; } catch (e) { return ""; } })();
    setOcrBusy(true);
    const multi = list.length > 1;
    /* Antes se leía una captura por vez (i=0..n-1 en serie): con un lote de varias fotos, el tiempo
       total era la SUMA de la latencia de cada llamada a Gemini. Cada foto es independiente, así que
       las lanzamos en paralelo con un límite de 3 a la vez (evita disparar 429 de golpe si hay muchas). */
    const CONCURRENCY = Math.min(3, list.length);
    const results = new Array(list.length);
    const trades = new Array(list.length);
    let doneCount = 0;
    /* v1.60: el overlay refleja el progreso real del lote; como las capturas van en paralelo, el paso
       vivo es "leyendo" y el subtítulo lleva la cuenta de las terminadas. */
    setScan({ step: 1, sub: multi ? "0 de " + list.length + " capturas" : null });
    setOcrMsg(multi ? `Leyendo ${list.length} capturas… (0/${list.length})` : (gkey ? "Leyendo captura con Gemini…" : "Leyendo captura…"));
    let nextIndex = 0;
    const worker = async () => {
      while (nextIndex < list.length) {
        const i = nextIndex++;
        const onWaiting = (ms) => setOcrMsg(`${multi ? `Captura ${i + 1}/${list.length}: ` : ""}límite de Gemini alcanzado, esperando ${Math.ceil(ms / 1000)}s para reintentar…`);
        const { trade, message } = await readOneScreenshot(list[i], gkey, onWaiting);
        trades[i] = trade;
        results[i] = multi ? `#${i + 1}: ${message}` : message;
        doneCount++;
        setScan({ step: doneCount >= list.length ? 3 : 2, sub: multi ? doneCount + " de " + list.length + " capturas" : null });
        if (multi) setOcrMsg(`Leyendo ${list.length} capturas… (${doneCount}/${list.length})`);
      }
    };
    await Promise.all(Array.from({ length: CONCURRENCY }, worker));
    /* insertamos en el mismo orden final que daba la versión en serie: la última foto del lote queda
       arriba del todo (más reciente primero), igual que antes. */
    const newRows = [];
    for (let i = list.length - 1; i >= 0; i--) {
      const trade = trades[i];
      if (trade) {
        const id = newId();
        newRows.push({ id, tkr: trade.tkr || "", dte: trade.dte || "30", strike: trade.strike || "", credit: trade.credit || "", margin: trade.margin || "", right: trade.right || "P", expiry: trade.expiry || "", underlying: trade.underlying || "", delta: trade.delta || "", pop: trade.pop || "" });
      }
    }
    if (newRows.length) setTrades((ts) => [...newRows, ...ts]);
    setScan(null);
    setOcrBusy(false);
    ocrLockRef.current = false;
    setOcrMsg(results.join("  ·  ") + ". Revisa los campos antes de usarlos.");
    setTimeout(() => setOcrMsg(""), Math.min(10000 + list.length * 3000, 22000));
  };

  const seg = (key, label) => (

/* ============================================================ */
function App() {
  /* modo oscuro: por defecto CLARO siempre, sin importar el ajuste del sistema — el icono ☀️/🌙 de arriba
     lo cambia a mano y se recuerda para la próxima vez (localStorage). No sigue al iPhone.
     applyTheme() se llama de forma síncrona en cada render — así T/BLOCKS/HEX/TABS/PALETTE
     están siempre al día para ese render, sea cual sea el motivo del cambio. */
  const [darkOverride, setDarkOverride] = useState(() => {
    try { return localStorage.getItem(KEY_DARK_OVERRIDE) === "dark"; } catch (e) { return false; }
  });
  const isDark = darkOverride;
  applyTheme(isDark);
  useEffect(() => {
    try {
      const tc = document.getElementById("theme-color-meta"); if (tc) tc.setAttribute("content", isDark ? "#0A0A0A" : "#EEE9E0");
      const cs = document.getElementById("color-scheme-meta"); if (cs) cs.setAttribute("content", isDark ? "dark" : "light");
    } catch (e) {}
  }, [isDark]);
  const toggleDark = () => {
    const next = !isDark;
    setDarkOverride(next);
    try { localStorage.setItem(KEY_DARK_OVERRIDE, next ? "dark" : "light"); } catch (e) {}
  };
  const [accounts, setAccounts] = useState(SEED_ACC);
  const [positions, setPositions] = useState(SEED_POS);
  /* v5.31: ref siempre-actual con las posiciones. runRefresh es async (tarda segundos bajando precios) y antes
     capturaba `positions` por cierre; si arrancaba con una versión previa a la fusión de carga, al terminar
     escribía esa versión pequeña ENCIMA de las posiciones ya fusionadas → borraba movimientos/estrategias.
     Con la ref (y setPositions funcional) siempre parte del estado más reciente. */
  const positionsRef = useRef(positions);
  positionsRef.current = positions;
  const [broker, setBroker] = useState("Todos");
  const [accOpen, setAccOpen] = useState(false); // estado de cuenta plegado por defecto (ahorra espacio)
  /* v1.48: % de cambio del día del SUBYACENTE, tal cual lo da Finnhub al refrescar precios. Se guarda
     con la fecha: si es de otro día ya no vale y se ignora (no se enseña un % viejo como si fuera de hoy). */
  const [dayPct, setDayPct] = useState(() => {
    try { const j = JSON.parse(localStorage.getItem(KEY_DAYPCT) || "null"); return j && j.date === new Date().toISOString().slice(0, 10) && j.pct ? j.pct : {}; } catch (e) { return {}; }
  });
  /* v1.58: cierre anterior por ticker (pc de Finnhub). Con él, el movimiento del día de una posición
     en acciones se calcula solo: (último − cierre anterior) × qty. Sin snapshots, sin esperar a mañana. */
  const [dayPrev, setDayPrev] = useState(() => {
    try { const j = JSON.parse(localStorage.getItem(KEY_DAYPCT) || "null"); return j && j.date === new Date().toISOString().slice(0, 10) && j.pc ? j.pc : {}; } catch (e) { return {}; }
  });
  const navBarRef = useRef(null);
  const [navHover, setNavHover] = useState(null); // índice de pestaña bajo el dedo al deslizar por el menú inferior
  const [activeTab, setActiveTab] = useState("resumen"); // v1.41: Portfolio abre en el resumen ejecutivo
  const [chartScope, setChartScope] = useState("Bloque");
  const [selectedSlice, setSelectedSlice] = useState(null);
  const [editSet, setEditSet] = useState(() => new Set());
  const [confirmClear, setConfirmClear] = useState(false);
  /* v1.74 FIX CRASH (Victor: "al pulsar Ajustes la app hace crash y ya no abre"): en la v1.72 el bloque de
     notificaciones cayó dentro de ComparadorContent — el archivo tiene DOS "const [confirmClear" y el
     parche ancló en el primero. La fila de Ajustes usaba notifPerm/askNotifPerm desde App →
     ReferenceError al pintar Ajustes; y como KEY_VIEW recuerda la última pestaña, la app arrancaba en
     Ajustes y reventaba AL ABRIR. Los datos nunca corrieron peligro: viven en localStorage/IndexedDB. */
  const [notifPerm, setNotifPerm] = useState(() => (typeof Notification !== "undefined" ? Notification.permission : "unsupported"));

      for (const k of BACKUP_KEYS) {

     posiciones con valor de mercado como cualquier otra. Para las señales de riesgo (apalancamiento y
     % de concentración) se usa mktvlInv (solo lo invertido, ex-cash), que es el numerador con sentido:
     cuánto capital está desplegado en riesgo respecto al NLV. */
  const mktvlInv = useMemo(() => active.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0), [active]);
  /* posiciones Cash de B0: cuentan como cash del estado de cuenta y en el MKT VL total */
  const posCash = useMemo(() => active.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0), [active]);
  const mktvl = mktvlInv + posCash;
  const sumField = (field) => brokers.reduce((s, b) => s + n((accounts[b] || {})[field]), 0);
  const manualCash = broker === "Todos" ? sumField("cash") : n((accounts[broker] || {}).cash);
  const cash = manualCash + posCash;
  const margin = broker === "Todos" ? sumField("margin") : n((accounts[broker] || {}).margin);
  /* NLV: MKT VL total (ya incluye el cash de B0) + solo el cash manual NEGATIVO (débito de margen).
     El cash manual positivo no se suma (se asume liquidez ya reflejada como posición). */
  const nlv = mktvl + Math.min(manualCash, 0);
  const el = nlv - margin;
  const leverage = nlv !== 0 ? mktvlInv / nlv : NaN;

  const totalPnl = useMemo(() => active.reduce((s, p) => s + effPnl(p), 0), [active]);
  /* riesgo total de la cuenta: excluye B0 (liquidez) — B0 sigue contando en la distribución (donut,

  const totalRiesgo = useMemo(() => active.filter((p) => p.block !== 0).reduce((s, p) => s + capDesplegado(p), 0), [active]);
  /* v1.42: cambio del día para el Resumen — el snapshot más reciente de un día ANTERIOR a hoy.
     Los snapshots son de la cartera entera (todos los brókers), así que solo tiene sentido comparar
     con el consolidado: con un filtro de bróker activo no se muestra en vez de comparar peras con
     manzanas. Sin snapshot previo tampoco se inventa nada. */
  /* v1.47: mayores movers del día — Δ P&L por ticker contra el snapshot del último día cerrado, y
     Δ% del precio del subyacente si ese snapshot guardó cotización (v1.47+). Solo entran tickers que
     YA existían en el snapshot: una posición abierta hoy no es un "movimiento", es capital nuevo. */
  /* v1.58: movers del día SIN depender de snapshots.

     - Estructuras con P&L manual (condors, spreads, 0DTE de SPX): la app NO tiene mark intradía,
       así que su P&L solo cambia si Victor lo edita. Su movimiento del día se toma del snapshot
       por posición (posPnl) cuando lo haya, y si no, es 0 — nunca inventado.

     de mercado, es rotación de capital (era el fantasma de SPX en la v1.56). */
  const movers = useMemo(() => {

         no lineal), sin duplicar la matemática ni aproximarla. */
