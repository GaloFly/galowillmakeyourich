/* T, HEX, BLOCKS, TABS, PALETTE dependen todos del tema activo. Son "let" (no "const") y se reconstruyen
   entera vía applyTheme() cuando cambia el modo claro/oscuro del sistema — ver el listener en App(). */

  BLOCKS = [

}

/* concentración por subyacente (% NLV) — mismo marco que usan los objetivos de bloque (10/12%, 70/80%…) */

const SEED_BROKERS = ["IBKR"];

const M_MRGN_FULL = [{ at: 0.5, label: "50% suelo" }, { at: 1.0, label: "100% obj" }, { at: 1.5, label: "150%" }];

/* ---------- seed. factor = corrección plausible (0.5 = mitad del notional cuenta como riesgo real), default 1 ---------- */
const SEED_POS = [];
const SEED_ACC = { IBKR: { cash: "0", margin: "0" } };
const KEY_ACC = "bloques_acc_v5", KEY_POS = "bloques_pos_v5";

const GEMINI_MODEL = "gemini-2.5-flash"; // lector de capturas del Comparador (modelo primario)
/* Modelos que se prueban EN ORDEN si el anterior da 429: cada uno tiene su propio cupo gratuito
   independiente, así que Flash-Lite sigue teniendo margen cuando Flash ya está agotado
   (Flash: 5 RPM / 20-250 RPD · Flash-Lite: 15 RPM / 1000 RPD, ambos leen imágenes igual). */
const GEMINI_MODELS = ["gemini-2.5-flash", "gemini-2.5-flash-lite"];
const KEY_SNAP = "bloques_snapshots_v1";
const KEY_BROKERS = "bloques_brokers_v1";
const KEY_TRADES = "bloques_trades_v2";

const KEY_VIEW = "bloques_view_v1";
const KEY_TR_OLD = "tradecomp_tr_blank_v4"; // migración del Comparador standalone (mismo esquema: tkr/dte/strike/credit/margin)
/* ---------- versión de proyecto: al detectar un update se guarda copia automática de los datos ----------
   REGLA (ampliada): Claude sube APP_VERSION aquí mismo en CUALQUIER entrega que se despliegue — no solo
   cambios de datos/esquema, también UI, cálculos, renombrados, etc. Así "buscar actualización" SIEMPRE
   deja copia de seguridad automática antes de aplicar lo nuevo, sin tener que juzgar caso a caso si el
   cambio "tocaba datos". Empezamos en 1.0 y sumamos 0.1 por entrega: 1.0, 1.1, 1.2… */
const APP_VERSION = "4.3";
window.APP_VERSION = APP_VERSION;
const KEY_APPVER = "bloques_app_version";
const KEY_AUTOBK = "bloques_autobackups_v1"; // últimas 3 copias automáticas (raw localStorage)
const KEY_FLOWS = "bloques_aportaciones_v1";
const BACKUP_KEYS = [KEY_ACC, KEY_POS, KEY_SNAP, KEY_BROKERS, KEY_TRADES, KEY_BASIS, KEY_VIEW, KEY_FINNHUB, KEY_GEMINI, KEY_FLOWS, "bloques_show_pnl"];
const BASIS_KEYS = ["roi", "annRoi", "rom", "annRom", "impact"];

/* ---------- persistencia ---------- */
const IDB_NAME = "bloques_db_v5", IDB_STORE = "kv";
function idbOpen() {
  return new Promise((res, rej) => {
    try {
      const r = indexedDB.open(IDB_NAME, 1);
      r.onupgradeneeded = () => { const db = r.result; if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    } catch (e) { rej(e); }
  });
}
async function idbSet(key, val) {
  try { const db = await idbOpen(); await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).put(val, key); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); } catch (e) {}
}
async function idbGet(key) {
  try { const db = await idbOpen(); return await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, "readonly"); const rq = tx.objectStore(IDB_STORE).get(key); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); } catch (e) { return undefined; }
}
function saveKV(key, obj) {
  const s = JSON.stringify(obj);
  try { localStorage.setItem(key, s); } catch (e) {}
  idbSet(key, s);
}

const n = (v) => { if (v === "" || v == null) return 0; const x = Number(String(v).replace(",", ".")); return isNaN(x) ? 0 : x; };
/* evita que al escribir sobre un "0" se quede como "05": quita ceros a la izquierda salvo que formen un decimal (0.5, 0,5) */
const stripLead0 = (s) => s.replace(/^0+(?=\d)/, "");
const factorOf = (p) => (p.factor === "" || p.factor == null ? 1 : n(p.factor));

/* ---------- naturaleza de la posición: gobierna capital desplegado y riesgo plausible ----------
   ACC    Acción                → cap = último × qty            · plausible = cap × factor
   CRED   Crédito (short put,   → cap = BEP × qty               · plausible = cap × factor
          covered call, hybrid collar)
   DEF    Débito / def. riesgo  → cap = riesgo máx (editable,   · plausible = cap (factor 1)
          (long opt, spreads, B3)      def. BEP × qty)
   COLLAR Collar sin riesgo     → cap = último × qty            · plausible = riesgo fijo (editable)
*/
const NATS = [
  { id: "ACC", label: "Acción" },
  { id: "CRED", label: "Crédito" },
  { id: "DEF", label: "Débito" },
  { id: "COLLAR", label: "Collar" },
  { id: "CASH", label: "Cash" },
];
const natsForBlock = (block) => {
  if (block === 0) return NATS.filter((x) => x.id === "ACC" || x.id === "CASH");
  if (block === 1) return NATS.filter((x) => x.id !== "CASH");
  return NATS.filter((x) => x.id !== "COLLAR" && x.id !== "CASH");
};
/* estrategias por bloque (desplegable de la etiqueta p.tipo) */
const STRATS = {
  0: ["Treasury ETF", "Money Market", "Cash"],
  1: ["Long Stock", "Short Put", "Short Call", "Collar"],
  2: ["Short Put", "Short Call", "Diagonal", "DD", "Calendar", "DC", "Iron Condor", "PMCC", "Call Broken Wing", "Put Broken Wing", "Long Call Leaps"],
  3: ["Calendar", "DC", "Diagonal", "DD", "Iron Man", "Iron Fly", "Iron Condor"],
};
const natFromStrat = (strat) => {
  const t = (strat || "").toLowerCase();
  if (t === "long stock") return "ACC";
  if (t === "short put" || t === "short call") return "CRED";
  if (t === "collar") return "COLLAR";
  if (t === "cash") return "CASH";
  if (t.includes("etf") || t.includes("money")) return "ACC";
  return "DEF";
};
const inferNat = (p) => {
  const t = (p.tipo || "").toLowerCase();
  if (p.block === 0) return "ACC";
  if (t.includes("stock") || t.includes("acci")) return "ACC";
  if (t.includes("collar")) return "COLLAR";
  if (t.includes("short put") || t.includes("covered")) return "CRED";
  return "DEF";
};
const natOf = (p) => p.nat || inferNat(p);
const isCashNat = (p) => natOf(p) === "CASH";
const isOptionNat = (p) => { const x = natOf(p); return x !== "ACC" && x !== "CASH"; };
const contractsOf = (p) => n(p.qty) / 100;
/* BEP automático por prima: cualquier posición de Tipo "Crédito" (short put, covered call, hybrid collar) cobra prima → BEP = Strike − Prima.
   Se basa en "nat" (Tipo), no en el texto de Estrategia, para que funcione siempre que el Tipo sea Crédito, se haya elegido la estrategia como se haya elegido.
   "Long Call Leaps" es la única estrategia de débito con esta fórmula simple (Strike + Prima); el resto de nat=Débito son multi-pata y llevan BEP manual. */
const BEP_DEBIT_STRATS = new Set(["Long Call Leaps"]);
const bepAutoStrat = (p) => (natOf(p) === "CRED" ? "CREDIT" : BEP_DEBIT_STRATS.has(p.tipo) ? "DEBIT" : null);
const effBep = (p) => {
  const s = bepAutoStrat(p);
  if (s === "CREDIT") return n(p.strike) - n(p.prima);
  if (s === "DEBIT") return n(p.strike) + n(p.prima);
  return n(p.bep);
};
/* capital desplegado — numerador del barbell (/ NLV → 80/15/5) */
const capDesplegado = (p) => {
  const nat = natOf(p);
  if (nat === "CASH") return Math.abs(n(p.mktValue));
  if (nat === "ACC" || nat === "COLLAR") return Math.abs(n(p.last) * n(p.qty));
  if (nat === "CRED") return Math.abs(effBep(p) * n(p.qty));
  return n(p.riesgo) || Math.abs(effBep(p) * n(p.qty)); // DEF
};
/* riesgo total / techo — para acción y crédito coincide con capital desplegado */
const riesgoTotalOf = (p) => {
  const nat = natOf(p);
  if (nat === "COLLAR" || nat === "DEF") return n(p.riesgo) || (nat === "DEF" ? Math.abs(effBep(p) * n(p.qty)) : 0);
  return capDesplegado(p);
};
/* riesgo plausible — numerador de sizing (/ NLV) */
const plausibleOf = (p) => {
  const nat = natOf(p);
  if (nat === "CASH") return 0;
  if (nat === "COLLAR") return n(p.riesgo);
  if (nat === "DEF") return riesgoTotalOf(p);
  return capDesplegado(p) * factorOf(p);
};
/* valor de mercado — para acciones (ACC) se recalcula solo: Último × Cantidad. Manual para opciones o si se fuerza. */
const isAutoMkt = (p) => natOf(p) === "ACC" && p.mktModo !== "MANUAL" && p.last !== "" && p.last != null;
const effMkt = (p) => (isAutoMkt(p) ? n(p.last) * n(p.qty) : n(p.mktValue));
const isPctMargin = (p) => p.margenModo !== "VALOR";
const effMargen = (p) => (natOf(p) === "CASH" ? 0 : (isPctMargin(p) ? Math.abs(effMkt(p)) * (p.margenPct === "" || p.margenPct == null ? 0 : n(p.margenPct)) / 100 : n(p.margen)));
const isAutoPnl = (p) => p.pnlModo !== "MANUAL";
const effPnl = (p) => (isAutoPnl(p) ? (n(p.last) - effBep(p)) * n(p.qty) : n(p.pnl));
const money = (v) => n(v).toLocaleString("en-US", { maximumFractionDigits: 0 });
const money2 = (v) => n(v).toLocaleString("en-US", { maximumFractionDigits: 2 });
const pct = (v, d = 1) => (isFinite(v) ? (v * 100).toFixed(d) + "%" : "—");

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => { const s = String(r.result || ""); resolve(s.slice(s.indexOf(",") + 1)); };
    r.onerror = () => reject(new Error("no pude leer el fichero"));

   visión que el modelo tiene que procesar → respuesta más rápida, sobre todo con capturas de escritorio
   (2000-3000px) que van mucho más allá de lo que hace falta para leer texto de una app de bróker.
   Seguimos usando PNG (sin pérdida) para no meter artefactos de compresión que compliquen leer el texto.
   Si algo falla (navegador raro, archivo corrupto…) caemos de vuelta al fichero original sin redimensionar. */
const OCR_MAX_DIM = 1280;
function resizeImageToBase64(file, maxDim) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const { width, height } = img;
        const scale = Math.min(1, maxDim / Math.max(width, height));
        const w = Math.max(1, Math.round(width * scale));
        const h = Math.max(1, Math.round(height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/png");
        URL.revokeObjectURL(url);
        resolve(dataUrl.slice(dataUrl.indexOf(",") + 1));
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("no pude cargar la imagen para redimensionar")); };
    img.src = url;
  });
}

  if (typeof data.expiry === "string" && /^\d{4}-\d{2}-\d{2}$/.test(data.expiry)) {
    expiry = data.expiry;
    const exp = new Date(data.expiry + "T00:00:00Z");
    const photo = new Date(file && file.lastModified ? file.lastModified : Date.now());
    const photoUTC = Date.UTC(photo.getFullYear(), photo.getMonth(), photo.getDate());
    if (!isNaN(exp.getTime())) dte = String(Math.max(Math.round((exp.getTime() - photoUTC) / 86400000), 0));

function bandZones(blk) {
  const { scaleMin: mn, scaleMax: mx, tMin, tMax, band } = blk;
  const clamp = (x) => Math.max(mn, Math.min(mx, x));
  const p1 = clamp(tMin - band), p2 = clamp(tMin), p3 = clamp(tMax), p4 = clamp(tMax + band);
  return [
    { to: p1, color: "rgba(224,86,77,0.22)" },
    { to: p2, color: "rgba(195,148,41,0.26)" },
    { to: p3, color: "rgba(27,163,76,0.20)" },
    { to: p4, color: "rgba(195,148,41,0.26)" },
    { to: mx, color: "rgba(224,86,77,0.22)" },
  ];
}

/* ---------- donut chart interactivo, sin recorte ---------- */
function Donut({ slices, size, thickness, selected, onSelect }) {
  const pad = 6; // margen reservado para el grosor extra al seleccionar
  const total = slices.reduce((s, x) => s + x.value, 0) || 1;
  const r = (size - thickness - pad) / 2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: "visible" }}>
      <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={T.tile} strokeWidth={thickness} />
        {slices.map((s, i) => {
          const frac = s.value / total;
          const dash = frac * c;
          const isSel = selected === s.id;
          const dim = selected && !isSel;
          const el = (
            <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth={isSel ? thickness + pad : thickness}
              strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-offset} strokeLinecap="butt"
              opacity={dim ? 0.32 : 1} style={{ cursor: "pointer", transition: "opacity .15s, stroke-width .15s" }}
              onClick={() => onSelect(isSel ? null : s.id)} />
          );
          offset += dash;
          return el;
        })}
      </g>
    </svg>
  );
}

/* ---------- gráfico de métrica con ejes, grid y fechas ---------- */
const kFmt = (v) => { const a = Math.abs(v); if (a >= 1e6) return (v / 1e6).toFixed(1) + "M"; if (a >= 1e3) return Math.round(v / 1e3) + "k"; return String(Math.round(v)); };
const shortDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" });
function MetricChart({ points, color, axisFmt }) {
  if (points.length < 2) return null;
  const W = 320, H = 150, padL = 44, padR = 12, padT = 10, padB = 22;
  const vs = points.map((p) => p.v);
  let min = Math.min(...vs), max = Math.max(...vs);
  if (min === max) { const d = Math.abs(min) * 0.05 || 1; min -= d; max += d; }
  const span = max - min; min -= span * 0.1; max += span * 0.1;
  const x = (i) => padL + (i / (points.length - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const line = points.map((p, i) => `${x(i)},${y(p.v)}`).join(" ");
  const area = `${x(0)},${H - padB} ${line} ${x(points.length - 1)},${H - padB}`;
  const ticks = [0, 1, 2, 3].map((i) => min + ((max - min) * i) / 3);
  const midIdx = points.length >= 3 ? Math.floor((points.length - 1) / 2) : null;
  /* con muchos puntos los círculos se solapan y quedan como una mancha — a partir de cierta densidad
     solo marcamos el último (la línea completa se sigue viendo con todo el detalle). */
  const dense = points.length > 24;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke={T.line} strokeWidth={1} />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{axisFmt(t)}</text>
        </g>
      ))}
      <polygon points={area} fill={color} opacity={0.12} />
      <polyline points={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (!dense || i === points.length - 1) && <circle key={i} cx={x(i)} cy={y(p.v)} r={i === points.length - 1 ? 4 : 2.4} fill={i === points.length - 1 ? color : "#fff"} stroke={color} strokeWidth={1.5} />)}
      <text x={x(0)} y={H - 7} textAnchor="start" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[0].date)}</text>
      {midIdx != null && midIdx !== 0 && midIdx !== points.length - 1 && (
        <text x={x(midIdx)} y={H - 7} textAnchor="middle" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[midIdx].date)}</text>
      )}
      <text x={x(points.length - 1)} y={H - 7} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[points.length - 1].date)}</text>
    </svg>
  );
}

};
/* ---------- rangos del gráfico de Rendimiento: filtra qué snapshots se muestran, evita saturación con historial largo ---------- */
const RANGE_DAYS = { "7D": 7, "1M": 30, "3M": 90, "1A": 365 };
const RANGE_KEYS = ["7D", "1M", "3M", "1A", "Todo"];
function rangeCutoffISO(range) {
  if (range === "Todo" || !RANGE_DAYS[range]) return null;
  const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - RANGE_DAYS[range]);
  return d.toISOString().slice(0, 10);
}
function RendimientoCard({ snapshots, flows, onSave, onDelete }) {
  const [expanded, setExpanded] = useState(null);
  const [metric, setMetric] = useState("NLV");
  const [range, setRange] = useState("1M");
  const sorted = [...snapshots].sort((a, b) => (a.date < b.date ? 1 : -1)); // desc
  const first = sorted[sorted.length - 1];
  const asc = [...snapshots].sort((a, b) => (a.date < b.date ? -1 : 1));
  /* aportaciones netas en el intervalo (d0, d1] */
  const flowBetween = (d0, d1) => (flows || []).reduce((s, f) => (f.date > d0 && f.date <= d1 ? s + n(f.amount) : s), 0);
  /* TWR: encadena retornos por tramo, neutralizando aportaciones/retiros (Dietz modificado, flujo a mitad de tramo) */
  const twrSeries = (() => {
    let idx = 100; const out = [];
    asc.forEach((s, i) => {
      if (i === 0) { out.push({ date: s.date, v: 100 }); return; }
      const prev = asc[i - 1];
      const F = flowBetween(prev.date, s.date);
      const denom = prev.nlv + 0.5 * F;
      const r = denom ? (s.nlv - prev.nlv - F) / denom : 0;
      idx *= 1 + r;
      out.push({ date: s.date, v: idx });
    });
    return out;
  })();
  const flowsAsc = [...(flows || [])].sort((a, b) => (a.date < b.date ? -1 : 1));
  const aportSeries = (() => { let acc = 0; return flowsAsc.map((f) => { acc += n(f.amount); return { date: f.date, v: acc }; }); })();
  const SPECIAL = {
    "Rent. real": { series: twrSeries, fmt: (v) => (isFinite(v) ? (v / 100 - 1 >= 0 ? "+" : "") + ((v / 100 - 1) * 100).toFixed(1) + "%" : "—"), axis: (v) => Math.round(v - 100) + "%", color: T.green },
    "Aportado": { series: aportSeries, fmt: (v) => signMoney(v), axis: (v) => "$" + kFmt(v), color: T.purple },
  };
  const METRIC_KEYS = [...Object.keys(METRICS), ...Object.keys(SPECIAL)];
  const sp = SPECIAL[metric];
  const m = sp ? null : METRICS[metric];
  const fullSeries = sp ? sp.series : asc.map((s) => ({ date: s.date, v: m.get(s) })).filter((p) => isFinite(p.v));
  const rangeCutoff = rangeCutoffISO(range);
  const series = rangeCutoff ? fullSeries.filter((p) => p.date >= rangeCutoff) : fullSeries;
  const mFmt = sp ? sp.fmt : m.fmt;
  const mAxis = sp ? sp.axis : m.axis;
  const mColor = sp ? sp.color : m.color;
  const curV = fullSeries.length ? fullSeries[fullSeries.length - 1].v : NaN;
  const firstV = series.length ? series[0].v : NaN;
  const dTotal = curV - firstV;
  const dTotalPct = firstV ? dTotal / Math.abs(firstV) : NaN;
  const isMoney = ["NLV", "MKT VL", "P&L", "Riesgo", "Aportado"].includes(metric);

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Rendimiento</div>
        <button onClick={onSave} style={{ background: T.dark, border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 12.5, fontWeight: 700, color: "#fff", cursor: "pointer" }}>+ Snapshot de hoy</button>
      </div>

      {snapshots.length === 0 && (
        <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>Sin snapshots todavía. Guarda uno cada semana o mes para trackear la evolución de NLV, riesgo total y P&L por cuenta, bloque y subyacente a lo largo del tiempo.</div>
      )}

      {snapshots.length >= 1 && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ marginBottom: 8 }}>
            <Pill options={METRIC_KEYS} value={metric} onChange={setMetric} size="sm" />
          </div>
          <div style={{ marginBottom: 8 }}>
            <Pill options={RANGE_KEYS} value={range} onChange={setRange} size="sm" />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>{metric === "Rent. real" ? "Rentabilidad sin aportaciones (TWR)" : metric === "Aportado" ? "Aportaciones netas acumuladas" : metric + " · último snapshot"}</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.5, marginTop: 1 }}>{isFinite(curV) ? mFmt(curV) : "—"}</div>
            </div>
            {series.length >= 2 && metric !== "Rent. real" && (
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>desde {shortDate(series[0].date)}</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: dTotal >= 0 ? T.green : T.red, marginTop: 1 }}>
                  {isMoney ? signMoney(dTotal) : (dTotal >= 0 ? "+" : "") + mFmt(dTotal).replace("+", "")}{isFinite(dTotalPct) && isMoney ? ` (${dTotalPct >= 0 ? "+" : ""}${(dTotalPct * 100).toFixed(1)}%)` : ""}
                </div>
              </div>
            )}
          </div>
          {series.length >= 2 ? (
            <div style={{ background: T.tile, borderRadius: 16, padding: "12px 10px 8px" }}>
              <MetricChart points={series} color={mColor} axisFmt={mAxis} />
            </div>
          ) : fullSeries.length >= 2 ? (
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500 }}>Sin snapshots en este rango — prueba "Todo" o un rango mayor.</div>
          ) : (
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500 }}>{metric === "Aportado" ? "Registra aportaciones en la pestaña 💶 Aportaciones para ver el acumulado." : "Guarda un segundo snapshot para ver la evolución."}</div>
          )}
        </div>
      )}

      {sorted.map((s, i) => {
        const prev = sorted[i + 1];
        const vsFirst = first && first !== s;
        const dNlv = prev ? s.nlv - prev.nlv : null;
        const dNlvPct = prev && prev.nlv ? dNlv / prev.nlv : NaN;
        const F = prev ? flowBetween(prev.date, s.date) : 0;
        const dReal = prev ? dNlv - F : null;
        const dRealPct = prev && (prev.nlv + 0.5 * F) ? dReal / (prev.nlv + 0.5 * F) : NaN;
        const dPnl = prev ? s.totalPnl - prev.totalPnl : null;
        const dLev = prev && isFinite(s.leverage) && isFinite(prev.leverage) ? s.leverage - prev.leverage : null;
        const isOpen = expanded === s.date;

        let tickerMovers = [];
        if (prev) {
          const allTkrs = new Set([...Object.keys(s.tickers || {}), ...Object.keys(prev.tickers || {})]);
          tickerMovers = [...allTkrs].map((t) => {
            const cur = (s.tickers || {})[t] || { riesgo: 0, pnl: 0 };
            const bef = (prev.tickers || {})[t] || { riesgo: 0, pnl: 0 };
            return { tkr: t, dRiesgo: cur.riesgo - bef.riesgo, dPnl: cur.pnl - bef.pnl };
          }).sort((a, b) => Math.abs(b.dPnl) - Math.abs(a.dPnl)).slice(0, 6);
        }

        return (
          <div key={s.date} style={{ borderTop: `1px solid ${T.line}`, padding: "10px 0" }}>
            <div onClick={() => prev && setExpanded(isOpen ? null : s.date)} style={{ cursor: prev ? "pointer" : "default" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontSize: 14, fontWeight: 800, color: T.ink }}>{new Date(s.date + "T00:00:00").toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" })} {prev && <span style={{ fontSize: 10, color: T.sub, fontWeight: 700 }}>{isOpen ? "▲" : "▼"}</span>}</span>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                  <span style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>${money(s.nlv)}</span>
                  <span style={{ fontSize: 10, color: T.sub, fontWeight: 700 }}>NLV</span>
                  <button onClick={(e) => { e.stopPropagation(); onDelete(s.date); }} style={{ background: "transparent", border: "none", color: T.red, fontSize: 12, fontWeight: 700, cursor: "pointer", padding: "2px 4px" }}>✕</button>
                </div>
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 6, flexWrap: "wrap" }}>
                <MicroStat label="Riesgo" value={"$" + money(s.totalRiesgo)} />
                <MicroStat label="P&L" value={signMoney(s.totalPnl)} color={s.totalPnl >= 0 ? T.green : T.red} />
                <MicroStat label="Apal." value={isFinite(s.leverage) ? s.leverage.toFixed(2) + "×" : "—"} />
                <MicroStat label="EL/NLV" value={pct(s.elNlv)} />
              </div>
            </div>
            {prev && (
              <div style={{ display: "flex", gap: 12, marginTop: 7, flexWrap: "wrap", background: T.tile, borderRadius: 12, padding: "7px 10px" }}>
                <MicroStat label="Δ NLV" value={signMoney(dNlv) + (isFinite(dNlvPct) ? " (" + (dNlvPct >= 0 ? "+" : "") + (dNlvPct * 100).toFixed(1) + "%)" : "")} color={dNlv >= 0 ? T.green : T.red} />
                {F !== 0 && <MicroStat label="Aport." value={signMoney(F)} color={T.purple} />}
                {F !== 0 && <MicroStat label="Δ Real" value={signMoney(dReal) + (isFinite(dRealPct) ? " (" + (dRealPct >= 0 ? "+" : "") + (dRealPct * 100).toFixed(1) + "%)" : "")} color={dReal >= 0 ? T.green : T.red} />}
                <MicroStat label="Δ P&L" value={signMoney(dPnl)} color={dPnl >= 0 ? T.green : T.red} />
                <MicroStat label="Δ Apal." value={dLev != null ? (dLev >= 0 ? "+" : "") + dLev.toFixed(2) + "×" : "—"} color={dLev != null ? (dLev > 0 ? T.gold : T.green) : T.sub} />
              </div>
            )}
            {!prev && vsFirst && <div style={{ fontSize: 11, color: T.sub, fontWeight: 600, marginTop: 4 }}>Primer snapshot guardado</div>}

            {isOpen && prev && (
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Por bloque</div>
                <div style={{ display: "grid", gap: 6, marginBottom: 12 }}>
                  {BLOCKS.map((b) => {
                    const cur = s.blocks[b.id] || { riesgo: 0, pnl: 0 };
                    const bef = prev.blocks[b.id] || { riesgo: 0, pnl: 0 };
                    return (
                      <div key={b.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 10, padding: "7px 10px" }}>
                        <span style={{ fontSize: 12, fontWeight: 800, color: b.color }}>{b.name.replace("Bloque ", "B")}</span>
                        <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>Riesgo Δ{signMoney(cur.riesgo - bef.riesgo)} · P&L <span style={{ color: cur.pnl - bef.pnl >= 0 ? T.green : T.red, fontWeight: 800 }}>Δ{signMoney(cur.pnl - bef.pnl)}</span></span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Mayor movimiento por subyacente</div>
                <div style={{ display: "grid", gap: 4 }}>
                  {tickerMovers.map((t) => (
                    <div key={t.tkr} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 2px" }}>
                      <span style={{ fontSize: 12.5, fontWeight: 700, color: T.ink }}>{t.tkr}</span>
                      <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>Riesgo Δ{signMoney(t.dRiesgo)} · P&L <span style={{ color: t.dPnl >= 0 ? T.green : T.red, fontWeight: 800 }}>Δ{signMoney(t.dPnl)}</span></span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })}

      <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginTop: 12 }}>Cada "🔄 Precios" guarda un snapshot automático del día; el mismo día se sobrescribe, así que el que queda registrado es siempre el último del día. Cada snapshot recoge NLV, MKT VL, riesgo total, plausible, P&L y el detalle por bloque y subyacente de toda la cartera, sin importar el filtro de broker. "Rent. real" es la rentabilidad encadenada por tramos (TWR) descontando las aportaciones y retiros registrados en 💶 Aportaciones (Dietz modificado, flujo ponderado a mitad de tramo) — es la cifra comparable con un índice. Δ Real = Δ NLV − aportaciones netas del tramo. Toca un snapshot con anterior para ver el desglose.</div>
    </div>
  );
}

/* ---------- aportaciones y retiros de cash: no son rendimiento ---------- */
function AportacionesCard({ flows, setFlows, brokers }) {
  const today = new Date().toISOString().slice(0, 10);
  const [date, setDate] = useState(today);
  const [amount, setAmount] = useState("");
  const [kind, setKind] = useState("Aportación");
  const [brk, setBrk] = useState(brokers[0] || "");
  const [note, setNote] = useState("");
  useEffect(() => { if (!brokers.includes(brk)) setBrk(brokers[0] || ""); }, [brokers]);
  const add = () => {
    const a = Math.abs(n(amount));
    if (!a || !date) return;
    const signed = kind === "Retiro" ? -a : a;
    setFlows((fs) => [...fs, { id: newId(), date, amount: String(signed), broker: brk, note: note.trim() }]);
    setAmount(""); setNote("");
  };
  const del = (id) => setFlows((fs) => fs.filter((f) => f.id !== id));
  const sorted = [...flows].sort((a, b) => (a.date < b.date ? 1 : -1));
  const totalIn = flows.reduce((s, f) => s + Math.max(0, n(f.amount)), 0);
  const totalOut = flows.reduce((s, f) => s + Math.min(0, n(f.amount)), 0);
  const neto = totalIn + totalOut;
  const cumSeries = (() => { let acc = 0; return [...flows].sort((a, b) => (a.date < b.date ? -1 : 1)).map((f) => { acc += n(f.amount); return { date: f.date, v: acc }; }); })();
  const inputStyle = { width: "100%", boxSizing: "border-box", background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 12, padding: "10px 12px", fontSize: 14, fontWeight: 600, color: T.ink, outline: "none" };
  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, marginBottom: 12 }}>Aportaciones y retiros</div>

      <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
        <MicroStat label="Aportado" value={"$" + money(totalIn)} color={T.green} />
        <MicroStat label="Retirado" value={"-$" + money(Math.abs(totalOut))} color={T.red} />
        <MicroStat label="Neto" value={signMoney(neto)} color={neto >= 0 ? T.green : T.red} />
      </div>

      {cumSeries.length >= 2 && (
        <div style={{ background: T.tile, borderRadius: 16, padding: "12px 10px 8px", marginBottom: 14 }}>
          <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6, paddingLeft: 4 }}>Aportaciones netas acumuladas</div>
          <MetricChart points={cumSeries} color={T.purple} axisFmt={(v) => "$" + kFmt(v)} />
        </div>
      )}

      <div style={{ background: T.tile, borderRadius: 16, padding: 12, marginBottom: 14 }}>
        <div style={{ marginBottom: 10 }}>
          <Pill options={["Aportación", "Retiro"]} value={kind} onChange={setKind} size="sm" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
          <input type="number" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Importe USD" style={inputStyle} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
          <select value={brk} onChange={(e) => setBrk(e.target.value)} style={{ ...inputStyle, appearance: "none", WebkitAppearance: "none" }}>
            {brokers.map((b) => <option key={b} value={b}>{b}</option>)}
          </select>
          <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="Nota (opcional)" style={inputStyle} />
        </div>
        <button onClick={add} style={{ width: "100%", background: kind === "Retiro" ? T.red : T.green, border: "none", borderRadius: 14, padding: "12px 0", fontSize: 14.5, fontWeight: 700, color: "#fff", cursor: "pointer" }}>{kind === "Retiro" ? "− Registrar retiro" : "+ Registrar aportación"}</button>
      </div>

      {sorted.length === 0 && <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "4px 0" }}>Sin movimientos. Registra cada depósito o retirada de cash con su fecha: el Rendimiento los descuenta para que la rentabilidad no se distorsione.</div>}
      {sorted.map((f) => (
        <div key={f.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${T.line}`, padding: "9px 0" }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>{new Date(f.date + "T00:00:00").toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" })}</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{f.broker}{f.note ? " · " + f.note : ""}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <span style={{ fontSize: 14.5, fontWeight: 800, color: n(f.amount) >= 0 ? T.green : T.red }}>{signMoney(f.amount)}</span>
            <button onClick={() => del(f.id)} style={{ background: "transparent", border: "none", color: T.red, fontSize: 12, fontWeight: 700, cursor: "pointer", padding: "2px 4px" }}>✕</button>
          </div>
        </div>
      ))}

      <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginTop: 12 }}>Solo registro para el cálculo de rendimiento: no modifica el cash de la cuenta (ese lo actualizas en la cuenta o con posiciones Cash en B0). Puedes añadir movimientos con fecha pasada; el TWR se recalcula al momento.</div>
    </div>
  );
}

/* ---------- swipe a la izquierda para eliminar ---------- */
function SwipeDelete({ onDelete, children }) {
  const [dx, setDx] = useState(0);
  const ref = React.useRef({ x: 0, y: 0, drag: null, base: 0 });
  const W = 92;
  const onTouchStart = (e) => { const t = e.touches[0]; ref.current = { x: t.clientX, y: t.clientY, drag: null, base: dx }; };
  const onTouchMove = (e) => {
    const t = e.touches[0]; const r = ref.current;
    const mx = t.clientX - r.x, my = t.clientY - r.y;
    if (r.drag == null) { if (Math.abs(mx) < 8 && Math.abs(my) < 8) return; r.drag = Math.abs(mx) > Math.abs(my) * 1.2; }
    if (!r.drag) return;
    setDx(Math.max(-W, Math.min(0, r.base + mx)));
  };
  const onTouchEnd = () => { ref.current.drag = null; setDx((d) => (d < -W / 2 ? -W : 0)); };
  return (
    <div style={{ position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: W, display: "flex" }}>
        <button onClick={() => { setDx(0); onDelete(); }} style={{ flex: 1, margin: "10px 0", border: "none", borderRadius: 14, background: T.red, color: "#fff", fontSize: 12.5, fontWeight: 800, cursor: "pointer", opacity: dx < -10 ? 1 : 0, transition: "opacity 0.15s" }}>Eliminar</button>
      </div>
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onClickCapture={(e) => { if (dx !== 0) { e.stopPropagation(); e.preventDefault(); setDx(0); } }}
        style={{ transform: `translateX(${dx}px)`, transition: ref.current.drag ? "none" : "transform 0.2s ease", background: T.card, position: "relative" }}>
        {children}
      </div>
    </div>
  );
}

/* ---------- fila de posición ---------- */
function PositionRow({ p, editing, onToggle, onChange, onDelete, pctBloque, pctCartera, showPnl, brokers }) {
  const detail = optionDetail(p);
  const nat = natOf(p);
  const cap = capDesplegado(p);
  const plausible = plausibleOf(p);
  const opt = isOptionNat(p);
  const contratos = contractsOf(p);
  const cash = isCashNat(p);
  const qtyNum = opt ? (Number.isInteger(contratos) ? contratos : n(p.qty)) : n(p.qty);
  const qtyUnit = opt ? (Number.isInteger(contratos) ? "contr." : "opc") : "acc";
  const pnlVal = effPnl(p);
  const pnlBasis = Math.abs(effBep(p) * n(p.qty)) || Math.abs(n(p.mktValue)) || cap;
  const pnlPct = pnlBasis ? pnlVal / pnlBasis : NaN;
  return (
    <div style={{ borderTop: `1px solid ${T.line}`, padding: "10px 0" }}>
      <div onClick={onToggle} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: T.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.tkr || (cash ? "Cash" : "Sin ticker")}</span>
              {p.tipo && <span style={{ fontSize: 9.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 6, padding: "2px 5px" }}>{p.tipo}</span>}
              {detail && <span style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{detail}</span>}
            </div>
            {!cash && <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 700, marginTop: 3 }}>× {qtyNum} <span style={{ fontWeight: 600, fontSize: 11 }}>{qtyUnit}</span></div>}
          </div>
          <div style={{ textAlign: "right", flexShrink: 0 }}>
            <div style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>${money2(cap)}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.sub }}>{pct(pctCartera, 1)} NLV</div>
          </div>
        </div>
        {showPnl && !cash && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 7, padding: "6px 10px", borderRadius: 10, background: pnlVal > 0 ? T.tileGreen : pnlVal < 0 ? T.tileRed : T.tile }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>P&L{isAutoPnl(p) ? "" : " · manual"}</span>
            <span style={{ fontSize: 15, fontWeight: 800, color: pnlVal > 0 ? T.green : pnlVal < 0 ? T.red : T.sub }}>{signMoney(pnlVal)}{isFinite(pnlPct) ? <span style={{ fontSize: 12, fontWeight: 700, marginLeft: 6 }}>{(pnlPct >= 0 ? "+" : "") + (pnlPct * 100).toFixed(1) + "%"}</span> : null}</span>
          </div>
        )}
        {!cash && (
          <div style={{ display: "flex", gap: 8, marginTop: 7, flexWrap: "wrap" }}>
            <MicroStat label="BEP" value={"$" + money2(effBep(p))} />
            <MicroStat label="Último" value={p.last ? "$" + money2(p.last) : "—"} />
            <MicroStat label="% Bloque" value={pct(pctBloque, 1)} />
            <MicroStat label="Plausible" value={"$" + money(plausible)} />
          </div>
        )}
        {cash && (
          <div style={{ display: "flex", gap: 8, marginTop: 7, flexWrap: "wrap" }}>
            <MicroStat label="% Bloque" value={pct(pctBloque, 1)} />
            <MicroStat label="Broker" value={p.broker} />
          </div>
        )}
      </div>

      {editing && (
        <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <label>
            <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>Broker</span>
            <Pill options={brokers} value={p.broker} onChange={onChange("broker")} />

/* ---------- COMPARADOR: contenido de la vista (la cuenta base viene de Portfolio) ---------- */
function ComparadorContent({ nlv, margin, el, brokerLabel, trades, setTrades, basis, setBasis }) {
  const [editSet, setEditSet] = useState(() => new Set());
  const [ocrBusy, setOcrBusy] = useState(false);
  /* algunos iOS disparan el evento "change" del <input type=file> DOS veces para la misma selección
     (sobre todo saliendo de la cámara/galería) — sin esto, "una foto" podía convertirse en 2 llamadas
     a Gemini de golpe. setOcrBusy(true) es async (no se ve hasta el siguiente render), así que un ref
     síncrono es la única forma fiable de bloquear el segundo disparo en el mismo tick. */
  const ocrLockRef = useRef(false);
  const [ocrMsg, setOcrMsg] = useState("");
  const base = { elNlv: nlv ? el / nlv : NaN, elMrgn: margin ? el / margin : NaN };
  const baseEmpty = !nlv && !margin;

  const computed = useMemo(() => trades.map((tr) => {
    const strike = n(tr.strike), creditPS = n(tr.credit), tMargin = n(tr.margin);
    const notional = strike > 0 ? (strike - creditPS) * 100 : 0;   // (Strike − Credit) × 100
    const premium = creditPS * 100;                                // Credit × 100
    const bep = strike > 0 ? strike - creditPS : NaN;               // break-even = Strike − Credit (por acción)
    const underlyingN = n(tr.underlying);
    /* margen de seguridad del BEP: % que necesitaría CAER el subyacente para tocar el BEP (por eso negativo = a salvo,
       igual que decir "-20% hasta breakeven"). Positivo = el subyacente ya está por debajo del BEP (ya en pérdida).
       Asume el modelo suelo-por-debajo (short put), que es el que usa todo el Comparador (Strike − Credit);
       en un short call leería al revés. */
    const bepMargin = (underlyingN > 0 && isFinite(bep)) ? (bep - underlyingN) / underlyingN : NaN;
    const newEL = el - tMargin;
    const newMargin = margin + tMargin;
    const elNlv = nlv ? newEL / nlv : NaN;
    const elMrgn = newMargin ? newEL / newMargin : NaN;
    const posSize = nlv ? notional / nlv : NaN;
    const roi = notional ? premium / notional : NaN;               // ROI = Premium / Notional
    const rom = tMargin ? premium / tMargin : NaN;                  // Return on margin = Premium / Margin
    const ann = n(tr.dte) ? 365 / n(tr.dte) : 0;
    const annRoi = roi * ann;
    /* eficiencia vs Delta: cuánto Annualized ROI (%) consigues por cada punto de Delta expuesto —
       a igual ROI, menos Delta (menos "acción sintética" comprometida) es mejor; por eso se divide, no se multiplica. */
    const deltaAbs = Math.abs(n(tr.delta));
    const deltaEff = deltaAbs ? (annRoi * 100) / deltaAbs : NaN;
    let status = "GO";
    if (elNlv < RULES.elNlv.amber || elMrgn < RULES.elMrgn.amber) status = "NO-GO";
    else if (elNlv < RULES.elNlv.green || elMrgn < RULES.elMrgn.green) status = "CAUTION";
    return { ...tr, notional, premium, bep, bepMargin, elNlv, elMrgn, dElNlv: elNlv - base.elNlv, dElMrgn: elMrgn - base.elMrgn, posSize, roi, rom, annRoi, annRom: rom * ann, deltaAbs, deltaEff, status };
  }), [trades, nlv, margin, el]);

  const rankVal = (c) => (basis === "roi" ? c.roi : basis === "annRoi" ? c.annRoi : basis === "rom" ? c.rom : basis === "impact" ? c.elNlv : basis === "delta" ? c.deltaEff : c.annRom);
  const okOrder = { GO: 0, CAUTION: 1, "NO-GO": 2 };
  const ranked = useMemo(() => [...computed].sort((a, b) => {
    if (okOrder[a.status] !== okOrder[b.status]) return okOrder[a.status] - okOrder[b.status];
    return (rankVal(b) || -Infinity) - (rankVal(a) || -Infinity);
  }), [computed, basis]);

  // tarjeta "vacía" = recién añadida sin datos → debe salir arriba para no bajar
  const isEmptyCard = (c) => !((c.tkr || "").trim()) && n(c.strike) === 0 && n(c.credit) === 0 && n(c.margin) === 0;
  const display = useMemo(() => {
    const empties = computed.filter(isEmptyCard);
    const rest = ranked.filter((c) => !isEmptyCard(c));
    return [...empties, ...rest];
  }, [computed, ranked]);

  const winner = ranked[0];
  const allNoGo = computed.length > 0 && computed.every((c) => c.status === "NO-GO");
  const BASIS = {
    roi: { lead: "Mejor ROI", label: "ROI", val: (c) => pct(c.roi, 2) },
    annRoi: { lead: "Mejor Annualized ROI", label: "Annualized ROI", val: (c) => pct(c.annRoi, 1) },
    rom: { lead: "Mejor return on margin", label: "Return on margin", val: (c) => pct(c.rom, 2) },
    annRom: { lead: "Mejor annualized return on margin", label: "Annualized return on margin", val: (c) => pct(c.annRom, 0) },
    impact: { lead: "Menor impacto en margen", label: "EL/NLV que deja", val: (c) => pct(c.elNlv) },
    delta: { lead: "Mejor eficiencia vs Delta", label: "Annualized ROI / Delta", val: (c) => (isFinite(c.deltaEff) ? c.deltaEff.toFixed(2) + "%/Δ" : "—") },
  };
  let rationale = "";
  if (winner) {
    const lead = BASIS[basis].lead;
    if (allNoGo) rationale = `Ninguna respeta los suelos de margen. La menos agresiva deja EL/NLV en ${pct(winner.elNlv)}.`;
    else if (winner.status === "GO") rationale = `${lead}. Deja EL/NLV en ${pct(winner.elNlv)} y EL/MRGN en ${pct(winner.elMrgn)}, ambos sobre suelo.`;
    else rationale = `${lead}, pero deja EL/MRGN en ${pct(winner.elMrgn)} (bajo objetivo 100%). Vigila el colchón.`;
  }

  const setTr = (id, k) => (v) => setTrades((ts) => ts.map((t) => (t.id === id ? { ...t, [k]: v } : t)));
  const toggleEdit = (id) => setEditSet((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
  const addTrade = () => { const id = newId(); setTrades((ts) => [{ id, tkr: "", dte: "30", strike: "", credit: "", margin: "", right: "P", expiry: "", underlying: "", delta: "", pop: "" }, ...ts]); setEditSet((s) => new Set(s).add(id)); };
  const delTrade = (id) => setTrades((ts) => ts.filter((t) => t.id !== id));

  const errToStr = (err) => {
    if (!err) return "error desconocido";
    if (err.message) return err.message;
    try { return String(err); } catch (_) { return "error desconocido"; }
  };
  const summarizeTrade = (p, prefix) => {
    const parts = [];
    if (p.tkr) parts.push(p.tkr + (p.right || ""));
    if (p.strike) parts.push("strike $" + p.strike);
    if (p.dte) parts.push(p.dte + " DTE");
    if (p.ask != null && p.bid != null) parts.push(`mid $${p.credit} (ask ${p.ask} / bid ${p.bid})`);
    else if (p.credit) parts.push("prima $" + p.credit);
    if (p.margin) parts.push("margen $" + p.margin);
    if (p.underlying) parts.push("subyacente $" + p.underlying);
    if (p.delta) parts.push("delta " + p.delta);
    if (p.pop) parts.push("POP " + p.pop + "%");
    return (prefix || "") + (parts.length ? `Leído: ${parts.join(" · ")}` : "no pude leer los datos con claridad");
  };
  /* lee UNA captura y devuelve { trade, message } sin tocar el estado de UI — así el llamador
     (una sola foto o un lote de varias) decide cómo mostrar progreso/errores.
     onWaiting(ms) es opcional: se llama mientras esperamos el cooldown de un 429 para poder avisar en pantalla. */
  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  const readOneScreenshot = async (file, gkey, onWaiting) => {
    if (!gkey) return { trade: null, message: "añade tu API key de Gemini en Ajustes para leer capturas" };
    let geminiErr = "";
    /* Ante 429 (cupo gratuito agotado): prueba el SIGUIENTE modelo de GEMINI_MODELS — tiene cupo
       independiente (Flash → Flash-Lite). Solo si TODOS están a 429 esperamos el cooldown del
       primero y reintentamos una última vuelta antes de rendirnos. */
    for (let round = 0; round < 2; round++) {
      let rateLimited = false, waitMs = 0;
      for (let mi = 0; mi < GEMINI_MODELS.length; mi++) {
        const model = GEMINI_MODELS[mi];
        try {
          const data = await extractOptionFromImage(file, gkey, model);
          const trade = buildTradeFromGemini(data, file);
          return { trade, message: summarizeTrade(trade) };
        } catch (err) {
          console.error("[Comparador] Gemini OCR falló (" + model + "):", err);
          geminiErr = errToStr(err);
          if (err && err.status === 429) {
            rateLimited = true;
            if (err.retryAfterMs) waitMs = Math.max(waitMs, err.retryAfterMs);
            continue; // prueba el siguiente modelo
          }
          // error que no es de cupo (key inválida, respuesta rara…): no tiene sentido seguir probando
          return { trade: null, message: "Gemini falló: " + geminiErr };
        }
      }
      // llegamos aquí = todos los modelos dieron 429 en esta vuelta
      if (round === 0 && rateLimited && waitMs) {
        const ms = Math.min(waitMs + 500, 65000);
        if (onWaiting) onWaiting(ms);
        await sleep(ms);
        continue; // una segunda y última vuelta tras esperar
      }
      break;
    }
    return { trade: null, message: "Gemini falló en Flash y Flash-Lite (cupo agotado en ambos): " + geminiErr };
  };
  /* acepta una o varias fotos; las procesa en orden y añade cada operación YA COLAPSADA
     (sin abrir el editable) — revisar los campos leídos es opcional, no forzoso */
  const runOcr = async (files) => {
    const list = Array.from(files || []).filter(Boolean);
    if (!list.length) return;
    if (ocrLockRef.current) { console.warn("[Comparador] runOcr ya en curso, ignoro disparo duplicado"); return; }
    ocrLockRef.current = true;
    const gkey = (() => { try { return localStorage.getItem(KEY_GEMINI) || ""; } catch (e) { return ""; } })();
    setOcrBusy(true);
    const multi = list.length > 1;
    /* Antes se leía una captura por vez (i=0..n-1 en serie): con un lote de varias fotos, el tiempo
       total era la SUMA de la latencia de cada llamada a Gemini. Cada foto es independiente, así que
       las lanzamos en paralelo con un límite de 3 a la vez (evita disparar 429 de golpe si hay muchas). */
    const CONCURRENCY = Math.min(3, list.length);
    const results = new Array(list.length);
    const trades = new Array(list.length);
    let doneCount = 0;
    setOcrMsg(multi ? `Leyendo ${list.length} capturas… (0/${list.length})` : (gkey ? "Leyendo captura con Gemini…" : "Leyendo captura…"));
    let nextIndex = 0;
    const worker = async () => {
      while (nextIndex < list.length) {
        const i = nextIndex++;
        const onWaiting = (ms) => setOcrMsg(`${multi ? `Captura ${i + 1}/${list.length}: ` : ""}límite de Gemini alcanzado, esperando ${Math.ceil(ms / 1000)}s para reintentar…`);
        const { trade, message } = await readOneScreenshot(list[i], gkey, onWaiting);
        trades[i] = trade;
        results[i] = multi ? `#${i + 1}: ${message}` : message;
        doneCount++;
        if (multi) setOcrMsg(`Leyendo ${list.length} capturas… (${doneCount}/${list.length})`);
      }
    };
    await Promise.all(Array.from({ length: CONCURRENCY }, worker));
    /* insertamos en el mismo orden final que daba la versión en serie: la última foto del lote queda
       arriba del todo (más reciente primero), igual que antes. */
    const newRows = [];
    for (let i = list.length - 1; i >= 0; i--) {
      const trade = trades[i];
      if (trade) {
        const id = newId();
        newRows.push({ id, tkr: trade.tkr || "", dte: trade.dte || "30", strike: trade.strike || "", credit: trade.credit || "", margin: trade.margin || "", right: trade.right || "P", expiry: trade.expiry || "", underlying: trade.underlying || "", delta: trade.delta || "", pop: trade.pop || "" });
      }
    }
    if (newRows.length) setTrades((ts) => [...newRows, ...ts]);
    setOcrBusy(false);
    ocrLockRef.current = false;
    setOcrMsg(results.join("  ·  ") + ". Revisa los campos antes de usarlos.");
    setTimeout(() => setOcrMsg(""), Math.min(10000 + list.length * 3000, 22000));
  };

  const seg = (key, label) => (
    <button onClick={() => setBasis(key)} style={{ border: "none", cursor: "pointer", borderRadius: 11, padding: "7px 11px", fontSize: 12, fontWeight: 700, fontFamily: T.sans, background: basis === key ? "#fff" : "rgba(255,255,255,0.07)", color: basis === key ? T.dark : "#C4CCD4" }}>{label}</button>
  );

  return (
    <>
      {baseEmpty && (
        <div style={{ background: T.card, borderRadius: 24, padding: 18, marginBottom: 16, boxShadow: T.shadow, fontSize: 13.5, color: T.sub, fontWeight: 600, lineHeight: 1.5 }}>
          El estado base (NLV, Margin, Excess Liq) sale de la tarjeta Cuenta de arriba — la misma de Portfolio. Añade posiciones y cash/margin en Portfolio y el Comparador evalúa contra esos números.
        </div>
      )}

      {/* MEJOR OPCIÓN */}
      {winner && (
        <div style={{ background: T.dark, borderRadius: 24, padding: 18, marginBottom: 16, color: "#fff", boxShadow: T.shadow }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#B9C2CC", letterSpacing: 0.5, textTransform: "uppercase" }}>Mejor opción</div>
              <div style={{ fontSize: 26, fontWeight: 800, marginTop: 3, letterSpacing: -0.5, color: winner.tkr ? "#fff" : "#8A94A0", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", lineHeight: 1.05 }}>{tickerOf(winner)}</div>
              {strikeLineOf(winner) && <div style={{ fontSize: 13, color: "#B9C2CC", fontWeight: 600, marginTop: 2 }}>{strikeLineOf(winner)}</div>}
              {dteDeltaOf(winner) && <div style={{ fontSize: 12, color: "#8B95A0", fontWeight: 600, marginTop: 1 }}>{dteDeltaOf(winner)}</div>}
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ fontSize: 26, fontWeight: 800, color: allNoGo ? T.orange : T.green, letterSpacing: -0.5 }}>{BASIS[basis].val(winner)}</div>
              <div style={{ fontSize: 12, color: "#B9C2CC", fontWeight: 500 }}>{BASIS[basis].label}</div>
            </div>
          </div>
          <div style={{ fontSize: 13.5, color: "#DDE3E9", lineHeight: 1.45, margin: "10px 0 14px" }}>{rationale}</div>
          <div style={{ fontSize: 11, color: "#8B95A0", fontWeight: 600, marginBottom: 7, letterSpacing: 0.4, textTransform: "uppercase" }}>Comparar por</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {seg("roi", "ROI")}{seg("annRoi", "Annualized ROI")}{seg("rom", "Return on margin")}{seg("annRom", "Annualized return on margin")}{seg("impact", "Impacto")}{seg("delta", "Eficiencia vs Delta")}
          </div>
        </div>
      )}

      {ocrMsg && (
        <div style={{ fontSize: 12, color: ocrMsg.startsWith("Error") ? T.red : T.green, fontWeight: 700, marginBottom: 12, background: ocrMsg.startsWith("Error") ? T.tileRed : T.tileGreen, borderRadius: 12, padding: "8px 12px", lineHeight: 1.4 }}>{ocrMsg}</div>
      )}

      {/* añadir / limpiar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 4px 12px", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>Candidatas · {computed.length}</span>
        <div style={{ display: "flex", gap: 8 }}>
          <input id="ocr-file-input" type="file" accept="image/*" multiple style={{ display: "none" }}

          <button onClick={() => document.getElementById("ocr-file-input").click()} disabled={ocrBusy} style={{ background: T.card, border: "none", borderRadius: 14, padding: "9px 14px", fontSize: 13.5, fontWeight: 700, color: T.ink, cursor: "pointer", boxShadow: T.shadow }}>{ocrBusy ? "Leyendo…" : "📷 Leer captura(s)"}</button>
          <button onClick={addTrade} style={{ background: T.green, border: "none", borderRadius: 14, padding: "9px 16px", fontSize: 14, fontWeight: 700, color: "#fff", cursor: "pointer", boxShadow: "0 4px 12px rgba(27,163,76,0.3)" }}>+ Operación</button>
        </div>
      </div>

      {/* TARJETAS */}
      <div style={{ display: "grid", gap: 14 }}>
        {display.map((c) => {
          const isBest = !allNoGo && winner && c.id === winner.id && !isEmptyCard(c);
          const vt = c.status === "GO" ? "green" : c.status === "CAUTION" ? "amber" : "red";
          const vcol = HEX[vt];
