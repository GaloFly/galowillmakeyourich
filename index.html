  /* cierre de posición: acciones (o ETF/collar) solo necesitan precio de venta → resultado realizado va a MTM;
     opciones necesitan precio de recompra → cash de prima va a Primas. En ambos casos la posición se marca
     "closed" pero NO se borra (así conserva su historial para Movimientos) y deja de contar en riesgo/exposición. */
  /* exercised (v5.15): al cerrar una opción se puede marcar "Ejercida / Asignada".
     · Cuenta como PÉRDIDA para el win rate de esa estrategia (ver closedResultOf en Movimientos), aunque
       te quedes la prima — la asignación es el desenlace adverso de vender la opción.
     · Short PUT asignada → se crea automáticamente una posición de acción en B1 (Long Stock) con coste base
       = el BEP que había hasta la fecha (strike − prima acumulada), la cantidad de acciones asignadas y el
       mismo broker. La opción queda cerrada y archivada con su cadena. */
  const closePos = (id, { date, price, comision, note, longPrice, longComision, exercised, partial, qtyPart }) => {
    let closedObj = null; /* v2.14: posición que queda CERRADA en esta acción → tarjeta-resumen */
    setPositions((ps) => {
      const tgt = ps.find((p) => p.id === id);
      const closeDate = date || new Date().toISOString().slice(0, 10);
      /* cierre PARCIAL de acciones (v5.26): vende qtyPart acciones por FIFO, registra cada parcela en soldLots
         (→ Movimientos/MTM) y deja el resto abierto. Si se venden todas, la posición queda cerrada. */
      if (partial && tgt && natOf(tgt) === "ACC") {
        const total = n(tgt.qty);
        const Q = Math.min(n(qtyPart) || total, total);
        if (Q <= 0) return ps;
        const baseLots = hasLots(tgt) ? tgt.lots : [{ id: "l" + Math.random().toString(36).slice(2, 6), date: tgt.entryDate || "", qty: String(total), price: String(n(effBep(tgt))) }];
        const { outLots, sales } = fifoSell(baseLots, Q, price, closeDate, comision);
        const merged = [...sales, ...(Array.isArray(tgt.soldLots) ? tgt.soldLots : [])];
        const remainingQty = outLots.reduce((s, l) => s + n(l.qty), 0);
        const applied = applyLots(tgt, outLots);
        const updated = remainingQty <= 0
          ? { ...applied, qty: "0", soldLots: merged, closed: true, closeDate, closePrice: "", closeComision: "", closeNote: note || "" }
          : { ...applied, soldLots: merged, closed: false };
        if (updated.closed) closedObj = updated;
        return ps.map((p) => (p.id === id ? updated : p));
      }
      let next = ps.map((p) => (p.id === id ? { ...p, closed: true, closeDate: date, closePrice: price, closeComision: comision, closeNote: note || "", closeLongPrice: longPrice != null ? longPrice : "", closeLongComision: longComision != null ? longComision : "", exercised: !!exercised } : p));
      closedObj = next.find((p) => p.id === id) || null;
      /* asignación de short put → nueva acción en B1 al BEP vigente */
      if (exercised && tgt && natOf(tgt) === "CRED" && tgt.right === "P" && !isPMCC(tgt)) {
        const shares = n(tgt.qty);
        if (shares > 0) {
          const costBasis = effBep(tgt); // strike − prima acumulada, a la fecha de asignación
          const id2 = newId();
          next = [...next, {
            id: id2, block: 1, broker: tgt.broker, tkr: tgt.tkr, tipo: "Long Stock", nat: "ACC",
            strike: "", right: "P", expiry: "", qty: String(shares), bep: String(costBasis), prima: "",
            comision: "", ivr: "", last: "", mktValue: "", riesgo: "", factor: "1", margen: "",
            margenPct: "100", margenModo: "PCT", mktModo: "AUTO", pnlModo: "AUTO", pnl: "",
            entryDate: closeDate, rollChain: [], closed: false, closeDate: "", closePrice: "",
            closeComision: "", closeNote: "", assignedFrom: id,
            entryNote: "Asignada desde put " + (tgt.tkr || "") + " · coste base = BEP $" + money2(costBasis),
          }];
        }
      }
      return next;
    });
    if (closedObj) setSummaryPos(closedObj); /* v2.14: resumen de cierre sin salir del menú actual */
  };
  const reopenPos = (id) => setPositions((ps) => ps.map((p) => (p.id === id ? { ...p, closed: false } : p)));
  const clearAll = () => {
    if (!confirmClear) { setConfirmClear(true); setTimeout(() => setConfirmClear(false), 3000); return; }
    setPositions([]); setEditSet(new Set()); setConfirmClear(false);
    setAccounts((a) => { const next = {}; Object.keys(a).forEach((b) => { next[b] = emptyAcc(); }); return next; });
  };


  const selectTab = (id) => {
    if (id === activeTab) { setEditSet(new Set()); return; } // re-tap del bloque activo → cierra todas las ediciones abiertas
    setActiveTab(id); setSelectedSlice(null);
    if (id === "exposicion" && chartScope === "Bloque") setChartScope("NLV");
  };
  const setScopeAndReset = (s) => { setChartScope(s); setSelectedSlice(null); };

  /* ---------- swipe lateral entre pestañas de bloques (animado) ----------
     El contenido sigue el dedo en horizontal; al soltar pasado el umbral, sale deslizando hacia un lado
     y la pestaña nueva entra desde el contrario. Si no llega al umbral, vuelve a su sitio con muelle.
     Reglas para no molestar:
     - solo engancha con un gesto claramente horizontal; el scroll vertical y el pull-to-refresh siguen igual
     - se ignora si el toque empezó dentro de un elemento con scroll horizontal propio (fila de tabs,
       tabla de rolls…), para que esos sigan scrolleando normal
     - si el arrastre va hacia un extremo sin pestaña siguiente/anterior, se amortigua (efecto tope)
     - los paneles que cortan la propagación táctil (edición, hojas de roll/cierre) no lo disparan */
  const swipeRef = useRef({ x: 0, y: 0, active: false, engaged: false, dir: 0 });
  const [slideX, setSlideX] = useState(0);      // desplazamiento actual del contenido (px)
  const [slideAnim, setSlideAnim] = useState(false); // true → con transición CSS
  const slideTimerRef = useRef(null);
  const tabsRowRef = useRef(null);
  const swipeElRef = useRef(null); // nodo del panel deslizable: aquí se enganchan los listeners nativos no-pasivos
  /* al cambiar de bloque (tap o swipe), la fila de tabs se desplaza para centrar la pestaña activa —
     la barra "sigue" al deslizamiento entre bloques. El scroll se calcula a mano y se aplica SOLO sobre
     la fila (nada de scrollIntoView, que desplazaba también la página entera). Como el usuario puede
     mover la fila con el dedo de forma independiente, esto solo actúa en el momento del cambio de pestaña. */
  useEffect(() => {
    const row = tabsRowRef.current;
    if (!row) return;
    const btn = row.querySelector(`[data-tabid="${String(activeTab)}"]`);
    if (!btn) return;
    const target = Math.max(0, Math.min(btn.offsetLeft - (row.clientWidth - btn.offsetWidth) / 2, row.scrollWidth - row.clientWidth));
    try { row.scrollTo({ left: target, behavior: "smooth" }); } catch (_) { row.scrollLeft = target; }
  }, [activeTab]);
  const tabIds = TABS.map((t) => t.id);
  const nextTabId = (dir) => {
    const idx = tabIds.indexOf(activeTab);
    if (idx < 0) return null;
    const next = idx + dir;
    return next >= 0 && next < tabIds.length ? tabIds[next] : null;
  };
  const hasHScrollAncestor = (el, stopAt) => {
    let node = el;
    while (node && node !== stopAt && node.nodeType === 1) {
      try {
        const st = window.getComputedStyle(node);
        if ((st.overflowX === "auto" || st.overflowX === "scroll") && node.scrollWidth > node.clientWidth + 2) return true;
      } catch (_) {}
      node = node.parentNode;
    }
    return false;
  };
  const onSwipeStart = (e) => {
    if (slideTimerRef.current) return; // animación de cambio en curso: no interrumpir
    if (!e.touches || e.touches.length !== 1) { swipeRef.current.active = false; return; }
    if (hasHScrollAncestor(e.target, e.currentTarget)) { swipeRef.current.active = false; return; }
    /* onRow: el toque empezó dentro de una fila con swipe-eliminar activo. Con los listeners nativos
       del panel, este handler corre ANTES que los onTouch de React de SwipeDelete (React los delega en
       la raíz), así que hay que ceder explícitamente. Pero solo hacia la izquierda (única dirección de
       eliminar): hacia la derecha el swipe de pestañas sigue funcionando aunque empiece sobre una fila.
       EXCEPCIÓN: si la fila está ABIERTA (botón Eliminar visible), se cede en AMBAS direcciones — el
       deslizamiento a la derecha ahí significa "cancelar el eliminar", no "cambiar de bloque". */
    if (e.target && e.target.closest && e.target.closest('[data-swipeopen]')) { swipeRef.current.active = false; return; }
    const onRow = !!(e.target && e.target.closest && e.target.closest('[data-swipedelete]'));
    swipeRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, active: true, engaged: false, dir: 0, onRow };
  };
  const onSwipeMove = (e) => {
    const s = swipeRef.current;
    if (!s.active || !e.touches || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - s.x;
    const dy = e.touches[0].clientY - s.y;
    if (!s.engaged) {
      /* engancha solo cuando el gesto es claramente horizontal; si arranca vertical, se suelta */
      if (Math.abs(dy) > 14 && Math.abs(dy) > Math.abs(dx)) { s.active = false; return; }
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.3) {
        /* gesto hacia la izquierda que empezó sobre una fila con swipe-eliminar: se lo queda la fila */
        if (s.onRow && dx < 0) { s.active = false; return; }
        s.engaged = true;
      }
      else return;
    }
    /* una vez enganchado el gesto horizontal, se bloquea el comportamiento nativo del navegador
       (scroll/rebote horizontal, gesto de "volver atrás" en iOS/Android): sin esto, el fondo de la
       página podía desplazarse por su cuenta a la vez que el panel se movía por transform, dando la
       sensación de que "todo" se movía en vez de solo el contenido del bloque */
    try { e.preventDefault(); } catch (_) {}
    const dir = dx < 0 ? 1 : -1; // izquierda = siguiente pestaña
    s.dir = dir;
    const blocked = nextTabId(dir) === null;
    setSlideAnim(false);
    setSlideX(blocked ? dx * 0.25 : dx); // tope elástico en los extremos
  };
  const onSwipeEnd = (e) => {
    const s = swipeRef.current;
    swipeRef.current = { x: 0, y: 0, active: false, engaged: false, dir: 0 };
    if (!s.active || !s.engaged || !e.changedTouches || e.changedTouches.length !== 1) { if (s.engaged) { setSlideAnim(true); setSlideX(0); } return; }
    const dx = e.changedTouches[0].clientX - s.x;
    const dir = dx < 0 ? 1 : -1;
    const target = nextTabId(dir);
    const W = Math.min(window.innerWidth || 400, 720);
    if (Math.abs(dx) < 56 || target === null) {
      /* no llega al umbral (o tope): vuelve a su sitio con transición */
      setSlideAnim(true); setSlideX(0);
      slideTimerRef.current = setTimeout(() => { setSlideAnim(false); slideTimerRef.current = null; }, 240);
      return;
    }
    /* sale deslizando del todo, cambia la pestaña y entra desde el lado contrario */
    setSlideAnim(true);
    setSlideX(dir === 1 ? -W : W);
    slideTimerRef.current = setTimeout(() => {
      selectTab(target);
      setSlideAnim(false);
      setSlideX(dir === 1 ? W : -W);
      requestAnimationFrame(() => requestAnimationFrame(() => { setSlideAnim(true); setSlideX(0); }));
      slideTimerRef.current = setTimeout(() => { setSlideAnim(false); slideTimerRef.current = null; }, 260);
    }, 170);
  };

  const isBlockTab = typeof activeTab === "number";
  const blk = isBlockTab ? BLOCKS.find((b) => b.id === activeTab) : null;
  const blockPositions = isBlockTab ? active.filter((p) => p.block === activeTab) : [];

  const blockTotals = useMemo(() => {
    const t = {};
    BLOCKS.forEach((b) => { t[b.id] = active.filter((p) => p.block === b.id).reduce((s, p) => s + capDesplegado(p), 0); });
    return t;
  }, [active]);

  /* agrega posiciones del mismo ticker (una posición en acción + opción cuenta como UNA sola porción) */
  const aggregateByTicker = (pool, getValue) => {
    const map = {};
    pool.forEach((p) => {
      const v = getValue(p);
      if (v <= 0 || !p.tkr) return;
      if (!map[p.tkr]) map[p.tkr] = 0;
      map[p.tkr] += v;
    });
    return Object.entries(map).map(([tkr, value]) => ({ id: tkr, label: tkr, value })).sort((a, b) => b.value - a.value);
  };

  const chartData = useMemo(() => {
    const pool = isBlockTab ? blockPositions.filter((p) => !p.closed) : active;
    let denom = nlv, denomLabel = "NLV", getValue = (p) => capDesplegado(p);
    if (chartScope === "Bloque") { denom = blockTotals[activeTab] || 0; denomLabel = "del " + (blk ? blk.name : ""); }
    else if (chartScope === "MKT VL") { denom = mktvlInv; denomLabel = "MKT VL (invertido)"; }
    else if (chartScope === "NLV") { denom = nlv; denomLabel = "NLV"; }
    else { denom = margin; denomLabel = "del margen usado"; getValue = effMargen; }
    const agg = aggregateByTicker(pool, getValue);
    const poolTotal = agg.reduce((s, x) => s + x.value, 0);
    const slices = agg.map((x, i) => ({ ...x, color: PALETTE[i % PALETTE.length], pctAbs: denom ? x.value / denom : NaN }));
    return { slices, total: poolTotal, denomPct: denom ? poolTotal / denom : NaN, denomLabel };
  }, [chartScope, activeTab, active, nlv, mktvlInv, margin, blockPositions, blockTotals, isBlockTab, blk, isDark]);

  const scopeOptions = isBlockTab ? ["Bloque", "MKT VL", "NLV", "Margen"] : ["MKT VL", "NLV", "Margen"];

  const exposureRows = useMemo(() => {
    const map = {};
    active.forEach((p) => {
      if (!p.tkr) return;
      if (!map[p.tkr]) map[p.tkr] = { tkr: p.tkr, riesgo: 0, plausible: 0, margen: 0, pnl: 0, pnlBasis: 0, last: 0, byBlock: {}, items: [] };
      map[p.tkr].riesgo += capDesplegado(p);
      map[p.tkr].plausible += plausibleOf(p);
      map[p.tkr].margen += effMargen(p);
      map[p.tkr].pnl += effPnl(p);
      map[p.tkr].pnlBasis += Math.abs(effBep(p) * n(p.qty)) || Math.abs(n(p.mktValue)) || capDesplegado(p);
      if (n(p.last) > 0 && (natOf(p) === "ACC" || !map[p.tkr].last)) map[p.tkr].last = n(p.last);
      map[p.tkr].byBlock[p.block] = (map[p.tkr].byBlock[p.block] || 0) + capDesplegado(p);
      if (natOf(p) !== "CASH") map[p.tkr].items.push(p);
    });
    return Object.values(map).filter((r) => r.riesgo > 0).sort((a, b) => b.riesgo - a.riesgo).map((r) => {
      /* filas de detalle: agrupa por bloque + (acciones: solo bloque) / (opción: bloque+right+strike+expiry) —
         así "2 put" con el mismo strike/vencimiento en el mismo bloque se funden en una fila con BEP ponderado */
      const groups = {};
      r.items.forEach((p) => {
        const isOpt = isOptionNat(p);
        const key = p.block + "|" + (isOpt ? (p.right || "") + "|" + (p.strike || "") + "|" + (p.expiry || "") : "ACC");
        if (!groups[key]) groups[key] = { block: p.block, isOpt, right: p.right, strike: p.strike, expiry: p.expiry, qty: 0, bepW: 0, riesgo: 0 };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          block: g.block,
          isOpt: g.isOpt,
          qtyNum: g.isOpt ? (Number.isInteger(contratos) ? contratos : g.qty) : g.qty,
          qtyUnit: g.isOpt ? (Number.isInteger(contratos) ? "contr." : "opc") : "acc",
          desc: g.isOpt ? optionDetail({ strike: g.strike, expiry: g.expiry, right: g.right }) : "",
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo,
        };
      }).sort((a, b) => a.block - b.block || (a.isOpt === b.isOpt ? 0 : a.isOpt ? 1 : -1));
      return {
        ...r,
        pctMktvl: mktvlInv ? r.riesgo / mktvlInv : NaN,
        pctNlv: nlv ? r.riesgo / nlv : NaN,
        pctMargen: margin ? r.margen / margin : NaN,
        pnlPct: r.pnlBasis ? r.pnl / r.pnlBasis : NaN,
        blockChips: Object.entries(r.byBlock).map(([bid, val]) => {
          const b = BLOCKS.find((x) => x.id === Number(bid));
          return { id: bid, name: b.name.replace("Bloque ", "B"), color: b.color, bg: b.bg, value: r.riesgo ? val / r.riesgo : NaN };
        }),
        detailRows,
      };
    });
  }, [active, mktvlInv, nlv, margin, isDark]);

  /* mapa id-de-acción → lista de covered call(s) abiertas que la cubren (ordenadas por vencimiento):
     alimenta el banner "COVERED" en la fila de la acción en B1, una línea por call. Usa el enlace
     explícito coveredBy si existe; si no, el heurístico broker+ticker (covered calls antiguas sin enlace). */
  const coveredMap = useMemo(() => {
    const m = {};
    positions.forEach((cc) => {
      if (cc.closed) return;
      const isCC = natOf(cc) === "CRED" && cc.right === "C" && cc.covered;
      const isCollar = natOf(cc) === "COLLAR" && cc.coveredBy; /* collar solo si está vinculado explícitamente */
      if (!isCC && !isCollar) return;
      const cts = n(cc.qty) / 100;
      const ctsStr = cts ? (Number.isInteger(cts) ? cts : cts.toFixed(1)) + (cts === 1 ? " contrato" : " contratos") : "";
      const det = isCC ? strikeStr(cc.strike) + "C" : (n(cc.strike) ? strikeStr(cc.strike) + (cc.right || "") : "");
      const label = [det, cc.expiry ? ibkrDate(cc.expiry) : "", ctsStr].filter(Boolean).join(" · ") || (isCollar ? "activo" : "");
      const k = (cc.tkr || "").trim().toUpperCase();
      const ids = cc.coveredBy
        ? [cc.coveredBy]
        : positions.filter((s) => natOf(s) === "ACC" && !s.closed && s.broker === cc.broker && (s.tkr || "").trim().toUpperCase() === k).map((s) => s.id);
      ids.forEach((id) => { (m[id] = m[id] || []).push({ label, kind: isCollar ? "collar" : "cc", expiry: cc.expiry || "9999-12-31" }); });
    });
    Object.keys(m).forEach((id) => { m[id] = m[id].sort((a, b) => (a.expiry < b.expiry ? -1 : 1)).map((x) => ({ label: x.label, kind: x.kind })); });
    return m;
  }, [positions]);

  const vencimientosRows = useMemo(() => {
    const map = {};
    active.forEach((p) => {
      if (!isOptionNat(p) || !p.expiry) return;
      if (!map[p.expiry]) map[p.expiry] = { expiry: p.expiry, riesgo: 0, items: [] };
      map[p.expiry].riesgo += capDesplegado(p);
      map[p.expiry].items.push(p);
    });
    const today = new Date(); today.setHours(0, 0, 0, 0);
    return Object.values(map).sort((a, b) => (a.expiry < b.expiry ? -1 : 1)).map((r) => {
      /* dentro de cada fecha, agrupa por subyacente + bloque + strike/right — así "2 put" iguales
         en el mismo bloque se funden en una fila con BEP ponderado, igual que en Exposición */
      const groups = {};
      r.items.forEach((p) => {
        /* credit spreads y DC/DD (v5.10): no tienen un strike único — la etiqueta son sus spreads/strikes,
           que también entran en la clave para no fundir estructuras distintas en la misma fila */
        const cs = isCreditSpread(p);
        const dc = isDCDD(p);
        const spreads = cs ? [p.putSpread, p.callSpread].filter(Boolean).join(" · ") : "";
        const dcStk = dc ? [dcStrikePut(dcddOf(p)) ? "P " + dcStrikePut(dcddOf(p)) : "", dcStrikeCall(dcddOf(p)) ? "C " + dcStrikeCall(dcddOf(p)) : ""].filter(Boolean).join(" · ") : "";
        const key = p.tkr + "|" + p.block + "|" + (p.right || "") + "|" + (p.strike || "") + "|" + (p.tipo || "") + "|" + spreads + "|" + dcStk;
        if (!groups[key]) groups[key] = { tkr: p.tkr, block: p.block, right: p.right, strike: p.strike, tipo: p.tipo, spreads, dcStk, qty: 0, bepW: 0, riesgo: 0, last: "", covered: false };
        groups[key].qty += n(p.qty);
        groups[key].bepW += effBep(p) * n(p.qty);
        groups[key].riesgo += capDesplegado(p);
        if (!groups[key].last && p.last) groups[key].last = p.last;
        if (p.covered) groups[key].covered = true;
      });
      const detailRows = Object.values(groups).map((g) => {
        const contratos = g.qty / 100;
        return {
          tkr: g.tkr, block: g.block, right: g.right, strike: g.strike,
          tipo: g.tipo, spreads: g.spreads, dcStk: g.dcStk,
          qtyNum: Number.isInteger(contratos) ? contratos : g.qty,
          bep: g.qty ? g.bepW / g.qty : NaN,
          riesgo: g.riesgo, last: g.last, covered: g.covered,
        };
      }).sort((a, b) => b.riesgo - a.riesgo);
      const dte = Math.round((new Date(r.expiry + "T00:00:00") - today) / 86400000);
      return { ...r, detailRows, dte };
    });
  }, [active]);

  /* ---------- exportar cartera completa (ignora filtro de broker) para pegar y pedir feedback ---------- */
  const [exportOpen, setExportOpen] = useState(false);
  const [exportText, setExportText] = useState("");
  const [exportCopied, setExportCopied] = useState(false);

  const buildExportText = () => {
    /* v1.15: SOLO abiertas — las cerradas conservan qty/BEP/último y estaban inflando riesgo,
       MKT VL y exposición del export. La foto de cartera es de lo vivo; el histórico cerrado
       se exporta desde Histórico → Cerradas → "Exportar para análisis". */
    const openPos = positions.filter((p) => !p.closed);
    const invAll = openPos.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = openPos.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const mktvlAll = invAll + posCashAll; /* MKT VL total = invertido + posiciones Cash B0 (v5.61) */
    const manualCashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0);
    const cashAll = manualCashAll + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    const nlvAll = mktvlAll + Math.min(manualCashAll, 0);
    const elAll = nlvAll - marginAll;
    const blockTotalsAll = {};
    BLOCKS.forEach((b) => { blockTotalsAll[b.id] = openPos.filter((p) => p.block === b.id).reduce((s, p) => s + capDesplegado(p), 0); });

    const lines = [];
    lines.push(`CARTERA — ${new Date().toLocaleDateString("es-ES")}`);
    lines.push("");
    lines.push("CUENTA (IBKR + DEGIRO)");
    lines.push(`MKT VL: $${money(mktvlAll)}`);
    lines.push(`NLV: $${money(nlvAll)}`);
    lines.push(`Cash: $${money(cashAll)}`);
    lines.push(`Margin: $${money(marginAll)}`);
    lines.push(`Excess Liquidity: $${money(elAll)}`);
    lines.push(`EL/NLV: ${pct(nlvAll ? elAll / nlvAll : NaN)}`);
    lines.push(`EL/Margin: ${pct(marginAll ? elAll / marginAll : NaN)}`);
    lines.push(`Apalancamiento Invertido/NLV: ${nlvAll ? (invAll / nlvAll).toFixed(2) : "—"}x`);
    lines.push("");

    BLOCKS.forEach((b) => {
      const bp = openPos.filter((p) => p.block === b.id);
      const capTotal = bp.reduce((s, p) => s + capDesplegado(p), 0);
      const plausible = bp.reduce((s, p) => s + plausibleOf(p), 0);
      const pnl = bp.reduce((s, p) => s + effPnl(p), 0);
      lines.push(`${b.name} · ${b.tag} (objetivo ${pct(b.tMin, 0)}–${pct(b.tMax, 0)} NLV)`);
      lines.push(`  Riesgo total $${money(capTotal)} (${pct(nlvAll ? capTotal / nlvAll : NaN)} NLV) · Plausible $${money(plausible)} (${pct(nlvAll ? plausible / nlvAll : NaN)}) · P&L ${signMoney(pnl)}`);
      bp.forEach((p) => {
        const det = optionDetail(p);
        const natL = natLabelOf(p); /* v1.63: un IC/Earnings ya no se anuncia como "Débito" */
        lines.push(`  - ${p.tkr} [${p.broker}] ${natL}${p.tipo ? "/" + p.tipo : ""}${det ? " (" + det + ")" : ""} · Riesgo $${money2(capDesplegado(p))} · Plausible $${money2(plausibleOf(p))} · Margen $${money2(effMargen(p))}${isPctMargin(p) ? " (" + (p.margenPct || 0) + "%)" : ""} · BEP $${money2(effBep(p))} · Último ${p.last ? "$" + money2(p.last) : "—"} · P&L ${signMoney(effPnl(p))}${isAutoPnl(p) ? " (auto)" : ""}`);
      });
      lines.push("");
    });

    lines.push("EXPOSICIÓN POR SUBYACENTE (todas las posiciones agregadas por ticker)");
    const expMap = {};
    openPos.forEach((p) => {
      if (!p.tkr) return;
      if (!expMap[p.tkr]) expMap[p.tkr] = { riesgo: 0, margen: 0 };
      expMap[p.tkr].riesgo += capDesplegado(p);
      expMap[p.tkr].margen += effMargen(p);
    });
    Object.entries(expMap).sort((a, b) => b[1].riesgo - a[1].riesgo).forEach(([tkr, v]) => {
      lines.push(`  ${tkr}: $${money(v.riesgo)} riesgo total · MKT VL ${pct(invAll ? v.riesgo / invAll : NaN)} · NLV ${pct(nlvAll ? v.riesgo / nlvAll : NaN)} · Margen ${pct(marginAll ? v.margen / marginAll : NaN)}`);
    });
    lines.push("");

    const totalRiesgoAll = openPos.filter((p) => p.block !== 0).reduce((s, p) => s + capDesplegado(p), 0);
    const totalPnlAll = openPos.reduce((s, p) => s + effPnl(p), 0);
    lines.push(`TOTAL RIESGO (sin B0): $${money(totalRiesgoAll)} · P&L TOTAL: ${signMoney(totalPnlAll)}`);
    return lines.join("\n");
  };
  const openExport = () => { setExportText(buildExportText()); setExportCopied(false); setExportOpen(true); };
  const copyExport = async () => {
    try { await navigator.clipboard.writeText(exportText); setExportCopied(true); }
    catch (e) { try { const el = document.getElementById("export-ta"); if (el) { el.focus(); el.select(); document.execCommand("copy"); setExportCopied(true); } } catch (e2) {} }
    setTimeout(() => setExportCopied(false), 2500);
  };

  /* ---------- snapshots de rendimiento: siempre sobre la cartera completa, no el filtro actual ---------- */
  const buildSnapshot = (posArg) => {
    /* v1.15: SOLO abiertas — mismo arreglo que buildExportText: las cerradas conservan qty/último
       y contaminaban MKT VL, NLV, riesgo y P&L de los snapshots de Rendimiento. */
    const pos = (posArg || positions).filter((p) => !p.closed);
    const invAll = pos.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
    const posCashAll = pos.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
    const mktvlAll = invAll + posCashAll; /* v5.61: MKT VL total incluye posiciones Cash B0 */
    const manualCashAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).cash), 0);
    const cashAll = manualCashAll + posCashAll;
    const marginAll = brokers.reduce((s, b) => s + n((accounts[b] || {}).margin), 0);
    /* NLV: MKT VL total + solo el cash manual negativo (débito de margen). Mismo número que antes. */
    const nlvAll = mktvlAll + Math.min(manualCashAll, 0);
    const elAll = nlvAll - marginAll;
    const blocks = {};
    BLOCKS.forEach((b) => {
      const bp = pos.filter((p) => p.block === b.id);
      blocks[b.id] = { riesgo: bp.reduce((s, p) => s + capDesplegado(p), 0), plausible: bp.reduce((s, p) => s + plausibleOf(p), 0), pnl: bp.reduce((s, p) => s + effPnl(p), 0) };
    });
    const tickers = {};
    pos.forEach((p) => {
      if (!p.tkr) return;
      if (!tickers[p.tkr]) tickers[p.tkr] = { riesgo: 0, pnl: 0 };
      tickers[p.tkr].riesgo += capDesplegado(p);
      tickers[p.tkr].pnl += effPnl(p);
      /* v1.47: guardamos también el último precio del subyacente para poder calcular el % de
         variación del día en los movers (sin él solo tendríamos el Δ P&L en dólares). */
      const lp = n(p.last);
      if (lp > 0) tickers[p.tkr].last = lp;
    });
    /* v1.46: NLV por bróker — para el cambio del día cuando hay un bróker filtrado. Mismas
       definiciones que el consolidado (MKT VL con el cash de B0 dentro + cash manual negativo),
       aplicadas solo a las posiciones de ese bróker. Las posiciones sin bróker cuentan en todos
       los cálculos globales pero no se atribuyen a ninguno, igual que hace el filtro de la app. */
    const byBroker = {};
    brokers.forEach((b) => {
      const bp = pos.filter((p) => p.broker === b);
      const invB = bp.reduce((s, p) => s + (isCashNat(p) ? 0 : effMkt(p)), 0);
      const cashB = bp.reduce((s, p) => s + (isCashNat(p) ? effMkt(p) : 0), 0);
      const manB = n((accounts[b] || {}).cash);
      const mktB = invB + cashB;
      /* v1.47: P&L y último precio por ticker DENTRO de cada bróker, para que los movers también
         funcionen con un bróker filtrado (un mismo ticker puede vivir en dos brókers). */
      const tkB = {};
      bp.forEach((p) => {
        if (!p.tkr) return;
        if (!tkB[p.tkr]) tkB[p.tkr] = { pnl: 0 };
        tkB[p.tkr].pnl += effPnl(p);
        const lp = n(p.last);
        if (lp > 0) tkB[p.tkr].last = lp;
      });
      byBroker[b] = { mktvl: mktB, nlv: mktB + Math.min(manB, 0), margin: n((accounts[b] || {}).margin), tickers: tkB };
    });
    /* v1.57: P&L por POSICIÓN (id → pnl). El agregado por ticker no vale para medir el movimiento
       del día: si una posición se cierra y se abre otra del mismo subyacente (0DTE de SPX, rolls…),
       la diferencia del agregado mezcla la rotación con el movimiento de mercado y aparecen
       "ganancias" fantasma. Comparando posición a posición, solo cuenta lo que de verdad se ha
       movido en las que siguen abiertas. */
    const posPnl = {};
    pos.forEach((p) => { if (p.id != null) posPnl[p.id] = effPnl(p); });
    return {
      date: new Date().toISOString().slice(0, 10),
      posPnl,
      mktvl: mktvlAll, cash: cashAll, margin: marginAll, nlv: nlvAll, el: elAll, byBroker,
      elNlv: nlvAll ? elAll / nlvAll : NaN, elMrgn: marginAll ? elAll / marginAll : NaN,
      leverage: nlvAll ? invAll / nlvAll : NaN,
      totalRiesgo: pos.filter((p) => p.block !== 0).reduce((s, p) => s + capDesplegado(p), 0),
      totalPlausible: pos.filter((p) => p.block !== 0).reduce((s, p) => s + plausibleOf(p), 0),
      totalPnl: pos.reduce((s, p) => s + effPnl(p), 0),
      blocks, tickers,
    };
  };
  const saveSnapshot = () => {
    const snap = buildSnapshot();
    setSnapshots((ss) => [...ss.filter((s) => s.date !== snap.date), snap]);
  };
  const deleteSnapshot = (date) => setSnapshots((ss) => ss.filter((s) => s.date !== date));

  const addBroker = () => {
    const name = newBrokerName.trim().toUpperCase();
    if (!name || brokers.includes(name)) { setNewBrokerName(""); return; }
    setBrokers((bs) => [...bs, name]);
    setAccounts((a) => ({ ...a, [name]: emptyAcc() }));
    setNewBrokerName("");
  };
  const removeBroker = (name) => {
    if (brokers.length <= 1) return;
    const count = positions.filter((p) => p.broker === name).length;
    const dest = removeTarget[name] || brokers.find((b) => b !== name);
    if (count > 0 && dest) setPositions((ps) => ps.map((p) => (p.broker === name ? { ...p, broker: dest } : p)));
    setBrokers((bs) => bs.filter((b) => b !== name));
    setAccounts((a) => { const next = { ...a }; delete next[name]; return next; });
    setRemoveTarget((rt) => { const next = { ...rt }; delete next[name]; return next; });
    if (broker === name) setBroker("Todos");
  };

  /* bloqueo de scroll de fondo (v5.11): mientras haya CUALQUIER hoja o modal abierto, el contenedor de
     scroll de la app se congela — así solo se mueve el panel abierto y no la pantalla de detrás. El editor
     en línea (editSet) NO cuenta: se expande dentro de la lista y necesita que la lista siga scrolleando. */
  const anyOverlayOpen = wizOpen || !!sheetPosId || !!pendingAction || keyModalOpen || geminiModalOpen || brokerModalOpen || exportOpen || backupOpen || refreshChoiceOpen || !!info;

  return (
    <>
    {/* CONTENEDOR DE SCROLL: la app scrollea DENTRO de este div (height fija = viewport), no en el body.
       Así el rebote de iOS al llegar arriba/abajo ocurre dentro del contenedor y NO arrastra el menú
       inferior, que vive fuera de este scroll (fijo al viewport). Es la única forma fiable en iOS de que
       una barra "position:fixed" no bote junto con la página. */}
    <div ref={rootRef} className="no-scrollbar" style={{ height: "100dvh", overflowY: anyOverlayOpen ? "hidden" : "auto", overscrollBehavior: "contain", background: T.bg, fontFamily: T.sans, color: T.ink, padding: "calc(18px + env(safe-area-inset-top)) 14px calc(108px + env(safe-area-inset-bottom))", overflowX: "hidden" }}>{/* sin -webkit-overflow-scrolling:touch: en iOS crea un stacking context que dejaba el nav por encima de los modales; el scroll con inercia ya es nativo desde iOS 13. overflowY:hidden mientras CUALQUIER hoja/modal está abierto (v5.11) = la pantalla de atrás no se mueve al scrollear el que está abierto */}
      <style>{`
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;}
        input[type=date]::-webkit-date-and-time-value{text-align:left;}
        .no-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
        .no-scrollbar::-webkit-scrollbar{display:none;width:0;height:0;}
        button{-webkit-appearance:none;appearance:none;}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        @keyframes pullSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scanSpin { to { transform: rotate(360deg); } }
        @keyframes scanPulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
        @keyframes scanIn { from { opacity: 0; transform: translateY(10px) scale(.97); } to { opacity: 1; transform: none; } }
      `}</style>
      {/* indicador global de descarga de precios (v5.07): píldora pequeña fija en la esquina superior
         derecha — antes iba centrada y tapaba el título "Portfolio". Ahora vive en el hueco vacío a la
         derecha del título, más pequeña y translúcida. Visible en cualquier pestaña mientras refreshing —
         cubre la descarga automática del arranque, el pull y el botón. */}
      {(refreshing || refreshOk) && (
        <div style={{ position: "fixed", top: "calc(20px + env(safe-area-inset-top))", right: 14, zIndex: 60, pointerEvents: "none" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(28,26,32,0.55)", backdropFilter: "blur(18px) saturate(160%)", WebkitBackdropFilter: "blur(18px) saturate(160%)", borderRadius: 16, padding: "5px 10px", boxShadow: "0 6px 18px rgba(0,0,0,0.22)", border: "0.5px solid rgba(255,255,255,0.08)" }}>
            {refreshing ? (
              <span style={{ fontSize: 11, display: "inline-block", animation: "pullSpin 0.8s linear infinite" }}>🔄</span>
            ) : (
              <span style={{ width: 8, height: 8, borderRadius: 4, background: "#34C759", display: "inline-block", boxShadow: "0 0 6px rgba(52,199,89,0.7)" }} />
            )}
            <span style={{ fontSize: 10.5, fontWeight: 700, color: "#fff" }}>{refreshing ? "Actualizando…" : "Actualizado"}</span>
          </div>
        </div>
      )}
      <ScanOverlay open={!!scan} step={scan ? scan.step : 0} sub={scan ? scan.sub : null} />
      {(view === "bloques" || view === "vencimientos") && pullDist > 0 && !refreshing && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: pullDist, overflow: "hidden", marginBottom: 4 }}>
          <span style={{ fontSize: 20, display: "inline-block", animation: pullDist >= PULL_THRESHOLD ? "pullSpin 0.8s linear infinite" : "none", opacity: Math.min(pullDist / PULL_THRESHOLD, 1) }}>🔄</span>
          <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub, marginLeft: 8 }}>{pullDist >= PULL_THRESHOLD ? "Suelta para actualizar" : "Tira para actualizar precios"}</span>
        </div>
      )}
      <div style={{ maxWidth: 720, margin: "0 auto" }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, gap: 8 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.8 }}>{view === "bloques" ? "Portfolio" : view === "movimientos" ? "Movimientos" : view === "vencimientos" ? "Vencimientos" : view === "ajustes" ? "Ajustes" : "Herramientas"}</div>
            <div style={{ fontSize: 15, color: T.sub, fontWeight: 500 }}>{view === "bloques" ? "Composición de cartera en tiempo real" : view === "movimientos" ? "Primas y resultado realizado (MTM)" : view === "vencimientos" ? "Opciones por fecha y riesgo de asignación" : view === "ajustes" ? "Brokers, backup, claves y apariencia" : "Comparador de puts y análisis de earnings"}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexWrap: "wrap", justifyContent: "flex-end" }}>
          </div>
        </div>

        {updateNotice && (
          <div style={{ background: T.tileGreen, borderRadius: 14, padding: "10px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 12.5, color: T.ink, fontWeight: 700, lineHeight: 1.45 }}>App actualizada a v{updateNotice.to} (antes {updateNotice.from}). Se guardó una copia automática de tus datos por seguridad{updateNotice.count != null ? " (" + updateNotice.count + " posiciones)" : ""}.</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, lineHeight: 1.45, marginTop: 3 }}>Si tras la actualización algo no cuadra o faltan datos, restaura la copia desde Backup → Copias automáticas.</div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={() => { setUpdateNotice(null); openBackup(); }} style={{ background: T.dark, border: "none", borderRadius: 10, padding: "7px 12px", fontSize: 12, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Ver copias</button>
              <button onClick={() => setUpdateNotice(null)} style={{ background: "transparent", border: "none", borderRadius: 10, padding: "7px 10px", fontSize: 12, fontWeight: 700, color: T.sub, cursor: "pointer" }}>Todo OK</button>
            </div>
          </div>
        )}
        {refreshMsg && <div style={{ fontSize: 12, color: T.red, fontWeight: 700, marginBottom: 12, background: T.tileRed, borderRadius: 12, padding: "8px 12px", lineHeight: 1.4 }}>{refreshMsg}</div>}

        {/* SELECTOR BROKER — oculto también en Vencimientos: esa vista no muestra nada del estado de cuenta.
           Chips sueltos al estilo del resto del rediseño (como el selector de Distribución y las pestañas de
           bloques): fondo claro, activo en tinta oscura — fuera la barra negra maciza de antes. */}
        {view !== "movimientos" && view !== "ajustes" && view !== "vencimientos" && (
        <div className="no-scrollbar" style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto" }}>
          {(brokers.length > 1 ? ["Todos", ...brokers] : brokers).map((b) => (
            <button key={b} onClick={() => setBroker(b)} style={{
              flex: "1 0 auto", border: "none", cursor: "pointer", borderRadius: 20, padding: "10px 18px", fontSize: 13.5, fontWeight: 700, whiteSpace: "nowrap",
              background: broker === b ? T.dark : T.card, color: broker === b ? "#fff" : T.ink,
              boxShadow: broker === b ? "0 4px 14px rgba(24,22,26,0.25)" : "0 1px 4px rgba(24,22,26,0.06)",
              transition: "background 0.15s, color 0.15s, box-shadow 0.15s",
            }}>{b}</button>
          ))}
        </div>
        )}

        {/* CUENTA — v1.42: en Portfolio ya NO se muestra aquí; su contenido vive dentro del Resumen
            ejecutivo (expandible). Se mantiene en Herramientas, que también necesita NLV/margen/EL. */}
        {view !== "movimientos" && view !== "ajustes" && view !== "vencimientos" && view !== "bloques" && (
        <div style={{ background: T.card, borderRadius: 24, padding: 16, marginBottom: 16, boxShadow: T.shadow }}>
          <div onClick={() => setAccOpen((o) => !o)} style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, letterSpacing: 0.5, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span>Cuenta · {broker === "Todos" ? "consolidado" : broker}</span>
                {!margin && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 8, padding: "2px 8px", textTransform: "none", letterSpacing: 0 }}>⚠️ Falta margen</span>}
              </div>
              {!accOpen && (
                <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                  <span style={{ display: "inline-flex", alignItems: "baseline", gap: 7 }}>
                    <span style={{ fontSize: 21, fontWeight: 800, color: nlv > 0 ? T.ink : T.red, letterSpacing: -0.5 }}>{(nlv < 0 ? "-$" : "$") + money(Math.abs(nlv))}</span>
                    <span style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>NLV</span>
                  </span>
                  <span style={{ display: "inline-flex", flexDirection: "column", justifyContent: "center", alignItems: "flex-start" }}>
                    <span style={{ fontSize: 11.5, fontWeight: 800, color: HEX[toneNlv(elNlv)], lineHeight: 1.25, padding: "0 2px 2px", borderBottom: `1px solid ${T.line}`, alignSelf: "stretch" }}>EL/NLV {pct(elNlv)}</span>
                    <span style={{ fontSize: 11.5, fontWeight: 800, color: HEX[toneMrgn(elMrgn)], lineHeight: 1.25, padding: "2px 2px 0" }}>EL/MRGN {pct(elMrgn)}</span>
                  </span>
                  <span style={{ fontSize: 12.5, fontWeight: 700, color: T.sub }}>· {isFinite(leverage) ? leverage.toFixed(2) + "×" : "—"}</span>
                </div>
              )}
            </div>
            <span style={{ fontSize: 12, fontWeight: 800, color: T.sub, flexShrink: 0 }}>{accOpen ? "▲" : "▼"}</span>
          </div>
          {accOpen && (<div style={{ marginTop: 12 }}>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 9 }}>
            <Tile label="MKT VL" value={(mktvl < 0 ? "-$" : "$") + money(Math.abs(mktvl))} />
            <Tile label="NLV" value={(nlv < 0 ? "-$" : "$") + money(Math.abs(nlv))} tone={nlv > 0 ? "green" : "red"} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 9 }}>
            {broker === "Todos" ? (
              <>
                <Tile label={"Cash (" + brokers.join(" + ") + ")"} value={(cash < 0 ? "-$" : "$") + money(Math.abs(cash))} />
                <Tile label={"Margin (" + brokers.join(" + ") + ")"} value={"$" + money(margin)} />
              </>
            ) : (
              <>
                <MoneyField label={"Cash negativo · " + broker} value={(accounts[broker] || {}).cash} onChange={setAccField(broker, "cash")} negOnly />
                <MoneyField label={"Margin · " + broker} value={(accounts[broker] || {}).margin} onChange={setAccField(broker, "margin")} />
              </>
            )}
          </div>
          {broker !== "Todos" && <div style={{ fontSize: 11, color: T.sub, fontWeight: 600, marginBottom: 9, background: T.tile, borderRadius: 10, padding: "8px 10px", lineHeight: 1.45, textAlign: "justify" }}>💡 El cash de B0 {posCash > 0 ? "($" + money(posCash) + ") " : ""}se suma solo al Cash y al MKT VL — no lo dupliques aquí. Este campo es solo para <b>cash negativo</b> (débito de margen), que solo debería existir si NO hay cash en B0. El <b>margen</b>, tal como lo muestra tu broker (Maintenance Margin en IBKR).</div>}
          {posCash > 0 && manualCash < 0 && <div style={{ fontSize: 11, fontWeight: 700, color: T.red, background: T.tileRed, borderRadius: 10, padding: "8px 10px", marginBottom: 9, lineHeight: 1.45 }}>⚠️ Tienes cash en B0 (${money(posCash)}) y a la vez cash negativo (−${money(Math.abs(manualCash))}). Eso no debería pasar: el broker consumiría antes la liquidez. Revisa los datos.</div>}
          {broker !== "Todos" && manualCash > 0 && <div style={{ fontSize: 11, fontWeight: 700, color: T.gold, background: T.tileAmber, borderRadius: 10, padding: "8px 10px", marginBottom: 9, lineHeight: 1.45 }}>⚠️ Hay un cash manual positivo antiguo (${money(manualCash)}) guardado. Este campo ahora es solo para cash negativo: si esa liquidez existe, llévala como posición Cash en B0; si no, edita el campo (al reescribirlo quedará en negativo o vacío).</div>}
          {broker === "Todos" && <div style={{ fontSize: 11, color: T.sub, marginBottom: 9, padding: "0 2px" }}>Elige un broker arriba para editar su cash/margin. Toca ⚙ para añadir o quitar brokers.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 9, marginBottom: 14 }}>

              <button onClick={addBroker} disabled={!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())} style={{ WebkitAppearance: "none", appearance: "none", flexShrink: 0, background: (!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())) ? T.tile : T.green, border: "none", borderRadius: 12, padding: "0 18px", fontSize: 14, fontWeight: 800, color: (!newBrokerName.trim() || brokers.includes(newBrokerName.trim().toUpperCase())) ? T.sub : "#fff", cursor: "pointer" }}>Añadir</button>
            </div>
            {newBrokerName.trim() && brokers.includes(newBrokerName.trim().toUpperCase()) && <div style={{ fontSize: 11.5, color: T.red, fontWeight: 700, marginTop: 6 }}>Ese broker ya existe.</div>}

            <div style={{ textAlign: "center", marginTop: 16 }}>
              <button onClick={() => setBrokerModalOpen(false)} style={{ background: T.dark, border: "none", borderRadius: 14, padding: "12px 28px", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Listo</button>
            </div>
          </div>
        </div>
      )}
      {exportOpen && (
        <div onClick={() => setExportOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, overflowY: "auto" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 24, padding: 22, maxWidth: 460, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "calc(100vh - 36px)", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            <div style={{ fontSize: 21, fontWeight: 800, color: T.ink, marginBottom: 8 }}>Exportar cartera</div>
            <div style={{ fontSize: 14, color: T.sub, lineHeight: 1.5, marginBottom: 14 }}>Copia este texto y pégalo en el chat cuando quieras feedback semanal o mensual. Incluye IBKR + DEGIRO completo, sin importar el filtro actual.</div>
            <textarea id="export-ta" value={exportText} readOnly spellCheck={false} style={{ width: "100%", boxSizing: "border-box", height: 260, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 14, padding: 12, fontSize: 12, fontFamily: "ui-monospace,Menlo,Consolas,monospace", color: T.ink, lineHeight: 1.5, resize: "vertical", outline: "none" }} />
            <div style={{ height: 18, margin: "6px 2px 2px" }}>
              {exportCopied && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Copiado ✓ — pégalo en el chat</span>}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <button onClick={() => setExportOpen(false)} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Cerrar</button>
              <button onClick={copyExport} style={{ flex: 1, background: T.green, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer", boxShadow: "0 4px 12px rgba(27,163,76,0.3)" }}>Copiar</button>
            </div>
          </div>
        </div>
      )}
      {backupOpen && (
        <div onClick={() => setBackupOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, overflowY: "auto" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 24, maxWidth: 460, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "calc(100vh - 36px)", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            <div style={{ position: "sticky", top: 0, background: T.card, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, padding: "18px 20px 10px", borderRadius: "24px 24px 0 0", zIndex: 3 }}>
              <div style={{ fontSize: 21, fontWeight: 800, color: T.ink }}>Backup de datos</div>
              <button onClick={() => setBackupOpen(false)} aria-label="Cerrar" style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
            </div>
            <div style={{ padding: "0 20px 20px" }}>
            {/* v1.17: modal limpio — el camino normal son dos botones (archivo); el copiar/pegar JSON
               queda plegado en "Avanzado". Explicación reducida a una línea bajo los botones. */}
            <input id="backup-file-input" type="file" accept="application/json,.json" onChange={importBackupFile} style={{ display: "none" }} />
            <div style={{ display: "grid", gap: 10 }}>
              <button onClick={downloadBackup} style={{ width: "100%", background: T.dark, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer" }}>Descargar archivo</button>
              <button onClick={() => { const el = document.getElementById("backup-file-input"); if (el) el.click(); }} style={{ width: "100%", background: T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 15, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Importar archivo</button>
            </div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, lineHeight: 1.45, margin: "10px 2px 0" }}>Guarda toda la app: posiciones, brokers, cuentas, snapshots y tus keys. Para cambiar de móvil: descarga aquí, importa en el otro.</div>
            <div style={{ minHeight: 18, margin: "8px 2px 0" }}>
              {copied && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Copiado ✓ — guárdalo en Notas o email</span>}
              {restoreMsg === "ok" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Restaurado ✓</span>}
              {restoreMsg === "err" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>Texto no válido — revisa que sea un backup completo</span>}
              {restoreMsg === "pasted" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Pegado ✓ — pulsa Restaurar para aplicarlo</span>}
              {restoreMsg === "pasteEmpty" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>El portapapeles está vacío</span>}
              {restoreMsg === "pasteErr" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>No se pudo leer el portapapeles — pega manualmente en el cuadro</span>}
              {restoreMsg === "downloaded" && <span style={{ fontSize: 12.5, color: T.green, fontWeight: 700 }}>Archivo descargado ✓</span>}
              {restoreMsg === "fileErr" && <span style={{ fontSize: 12.5, color: T.red, fontWeight: 700 }}>No se pudo leer el archivo — usa el modo avanzado (copiar/pegar)</span>}
            </div>
            <button onClick={() => setBackupAdv((v) => !v)} style={{ width: "100%", background: "transparent", border: "none", padding: "8px 0", fontSize: 12, fontWeight: 800, color: T.sub, cursor: "pointer", textAlign: "left" }}>
              {backupAdv ? "▲ Ocultar copiar / pegar JSON" : "▼ Avanzado · copiar / pegar JSON"}
            </button>
            {backupAdv && (
              <>
                <textarea id="backup-ta" value={backupText} onChange={(e) => { setBackupText(e.target.value); setRestoreMsg(""); }} spellCheck={false} style={{ width: "100%", boxSizing: "border-box", height: 170, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 14, padding: 12, fontSize: 12.5, fontFamily: "ui-monospace,Menlo,Consolas,monospace", color: T.ink, lineHeight: 1.5, resize: "vertical", outline: "none" }} />
                <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                  <button onClick={copyBackup} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Copiar</button>
                  <button onClick={pasteBackup} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Pegar</button>
                  <button onClick={restoreBackup} style={{ flex: 1, background: T.green, border: "none", borderRadius: 14, padding: "13px 0", fontSize: 14.5, fontWeight: 700, color: "#fff", cursor: "pointer", boxShadow: "0 4px 12px rgba(27,163,76,0.3)" }}>Restaurar</button>
                </div>
              </>
            )}
            {autoBackups.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Copias automáticas (al detectar una versión nueva)</div>
                <div style={{ display: "grid", gap: 7 }}>
                  {autoBackups.map((bk) => (
                    <div key={bk.ts} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 12, padding: "9px 11px" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>Datos de la v{bk.version}</div>
                        <div style={{ fontSize: 11, color: T.sub, fontWeight: 600 }}>{new Date(bk.ts).toLocaleString("es-ES", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</div>
                      </div>
                      <button onClick={() => restoreAutoBackup(bk)} style={{ flexShrink: 0, background: confirmAutoBk === bk.ts ? T.red : T.card, border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 12, fontWeight: 800, color: confirmAutoBk === bk.ts ? "#fff" : T.ink, cursor: "pointer", boxShadow: T.shadow }}>{confirmAutoBk === bk.ts ? "¿Seguro? Recarga la app" : "Restaurar"}</button>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10.5, color: T.sub, lineHeight: 1.45, marginTop: 7 }}>Restaurar sobrescribe los datos actuales y recarga. Se guardan las 3 últimas.</div>
              </div>
            )}
            {manualBackups.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>Copias que has guardado</div>
                <div style={{ display: "grid", gap: 7 }}>
                  {manualBackups.map((bk) => (
                    <div key={bk.ts} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.tile, borderRadius: 12, padding: "9px 11px" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{new Date(bk.ts).toLocaleString("es-ES", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</div>
                        <div style={{ fontSize: 11, color: T.sub, fontWeight: 600 }}>Copia JSON guardada · v{bk.appVersion}</div>
                      </div>
                      <button onClick={() => restoreManualBackup(bk)} style={{ flexShrink: 0, background: confirmManualBk === bk.ts ? T.red : T.card, border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 12, fontWeight: 800, color: confirmManualBk === bk.ts ? "#fff" : T.ink, cursor: "pointer", boxShadow: T.shadow }}>{confirmManualBk === bk.ts ? "¿Seguro? Restaurar" : "Restaurar"}</button>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10.5, color: T.sub, lineHeight: 1.45, marginTop: 7 }}>Punto de restauración cada vez que copias o descargas. Se conservan las 3 últimas.</div>
              </div>
            )}
            <div style={{ textAlign: "center", marginTop: 12 }}>
              <button onClick={() => setBackupOpen(false)} style={{ background: "transparent", border: "none", fontSize: 14, fontWeight: 600, color: T.sub, cursor: "pointer" }}>Cerrar</button>
            </div>
            </div>
          </div>
        </div>
      )}

      {/* EDITOR DE APERTURAS / ROLLS / CIERRE */}
      {editChainPos && <RollChainEditor p={editChainPos} onSave={savePositionEdit} onClose={() => setEditChainId(null)} />}

      {/* EDITOR DE LOTES DE ACCIONES/ETF */}
      {editLotsPos && <LotsEditor p={editLotsPos} onSave={savePositionEdit} onClose={() => setEditLotsId(null)} />}

      {/* EDITOR DE DIVIDENDOS */}
      {editDivPos && <DividendsEditor p={editDivPos} onSave={savePositionEdit} onClose={() => setEditDivId(null)} />}

      {/* v2.14: TARJETA-RESUMEN al cerrar una posición (ROI/ROI anualizado/DIT), sin ir a Histórico */}
      {summaryPos && <PosSummaryCard p={summaryPos} onClose={() => setSummaryPos(null)} />}

      {/* NAV INFERIOR FLOTANTE */}
      {/* ACTION SHEET DE POSICIÓN */}
      {sheetPos && (() => {
        const p = sheetPos;
        const nat = natOf(p);
        const isOpt = !!(p.strike || p.expiry) && nat !== "ACC" && nat !== "CASH";
        const canRollP = !p.closed && isOpt && nat === "CRED";
        const canCloseP = !p.closed && (nat === "ACC" || nat === "COLLAR" || isOpt);
        const dte = p.expiry ? daysBetween(new Date().toISOString().slice(0, 10), p.expiry) : NaN;
        const contratos = n(p.qty) / 100;
        const blk = BLOCKS.find((b) => b.id === p.block);
        /* v1.25: iconos de línea en cuadrado tintado — misma familia visual que las filas de Ajustes,
           en vez de emojis sueltos. `tint` es el fondo del cuadrado; `color` tiñe icono y título. */
        const ActionBtn = ({ icon, label, sub, color, tint, onClick, danger }) => {
          const c = danger ? T.red : (color || T.ink);
          return (
            <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", background: danger ? T.tileRed : T.tile, border: "none", borderRadius: 14, padding: "13px 14px", cursor: "pointer", textAlign: "left" }}>
              <span style={{ width: 34, height: 34, borderRadius: 10, background: danger ? "rgba(0,0,0,0.06)" : (tint || T.card), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: c }}>
                <ActIcon name={icon} size={18} color={c} />
              </span>
              <span style={{ minWidth: 0 }}>
                <span style={{ display: "block", fontSize: 14.5, fontWeight: 800, color: c }}>{label}</span>
                {sub && <span style={{ display: "block", fontSize: 11, fontWeight: 600, color: T.sub, marginTop: 1 }}>{sub}</span>}
              </span>
            </button>
          );
        };
        return (
          <div onClick={() => setSheetPosId(null)} style={{ position: "fixed", inset: 0, background: "rgba(20,18,14,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: "calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))" }}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "86vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 20, fontWeight: 800, color: T.ink }}>{p.tkr || "Sin ticker"}</span>
                    {p.tipo && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 7, padding: "3px 7px" }}>{tipoChipLabel(p)}</span>}
                    {blk && <span style={{ fontSize: 10.5, fontWeight: 800, color: "#fff", background: blk.badge, borderRadius: 7, padding: "3px 7px" }}>B{p.block}</span>}
                    {p.closed && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 7, padding: "3px 7px" }}>Cerrada</span>}
                    {!p.closed && isPMCC(p) && p.noShort && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 7, padding: "3px 7px" }}>Sin call vendida</span>}
                    {!p.closed && isVertical(p) && p.noShort && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 7, padding: "3px 7px" }}>Sin pata corta</span>}
                    {!p.closed && isVertical(p) && p.noLong && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.gold, background: T.tileAmber, borderRadius: 7, padding: "3px 7px" }}>Sin pata larga</span>}
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.sub, marginTop: 4 }}>
                    {p.broker}{isOpt && p.strike ? ` · ${p.strike}${p.right}` : ""}{isVertical(p) && (p.sK || p.lK) ? ` · ${p.sK || "?"}/${p.lK || "?"}${p.right || ""}` : ""}{p.expiry ? ` · vence ${p.expiry}` : ""}{isFinite(dte) && dte >= 0 && !p.closed ? ` (${dte}d)` : ""}
                  </div>
                </div>
                <button onClick={() => setSheetPosId(null)} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>{isOpt ? "Contratos" : "Cantidad"}</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{isOpt ? (Number.isInteger(contratos) ? contratos : contratos.toFixed(1)) : (p.qty || "—")}</div>
                </div>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>BEP</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{isFinite(effBep(p)) && effBep(p) !== 0 ? effBep(p).toFixed(2) : (p.bep || "—")}</div>
                </div>
                <div style={{ background: T.tile, borderRadius: 12, padding: "10px 10px" }}>
                  <div style={{ fontSize: 9.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>{nat === "CRED" ? "Prima acum." : "Riesgo"}</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: nat === "CRED" ? T.green : T.ink, fontVariantNumeric: "tabular-nums" }}>{nat === "CRED" && n(p.prima) ? "+$" + money2(n(p.prima) * n(p.qty)) : "$" + money2(capDesplegado(p))}</div>
                </div>
              </div>
              <div style={{ display: "grid", gap: 8 }}>
                {!p.closed && nat === "ACC" && <ActionBtn icon="lots" label="Lotes" sub="Ver lotes por fecha · editar · vender · añadir" color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("lotes")} />}
                {p.tipo === "Long Stock" && <ActionBtn icon="dividend" label="Dividendos" sub="Registrar cobros · van a Primas y MTM" color={T.green} tint={T.tileGreen} onClick={() => sheetDo("dividendos")} />}
                {!p.closed && <ActionBtn icon="edit" label="Editar" sub="Modificar cualquier campo de la posición" onClick={() => sheetDo("edit")} />}
                {canRollP && !(isPMCC(p) && p.noShort) && <ActionBtn icon="roll" label="Rolar" sub={"Recompra + nueva venta · " + (p.rollChain || []).length + " roll" + ((p.rollChain || []).length === 1 ? "" : "s") + " hasta ahora"} color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("roll")} />}
                {!p.closed && isPMCC(p) && p.noShort && <ActionBtn icon="roll" label="Vender call" sub="Nueva call corta sobre la long comprada" color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("roll")} />}
                {!p.closed && isPMCC(p) && !p.noShort && !expPmccOpen && <ActionBtn icon="close" label="Expirar corta" sub="La call vendida expira sin valor · la long sigue viva" color={T.gold} tint={T.tileAmber} onClick={() => setExpPmccOpen(true)} />}
                {!p.closed && isPMCC(p) && !p.noShort && expPmccOpen && (
                  <div style={{ background: T.tileAmber, borderRadius: 14, padding: "12px 14px", display: "grid", gap: 8 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 800, color: T.gold }}>La call vendida expira sin valor · $0, sin comisión</div>
                    <WizInput label="Nota (opc.)" value={expPmccNote} onChange={setExpPmccNote} placeholder="Ej. cerró OTM, seguirá con la long" />
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => { setExpPmccOpen(false); setExpPmccNote(""); }} style={{ flex: 1, background: T.tile, border: "none", borderRadius: 12, padding: "11px 0", fontSize: 13.5, fontWeight: 800, color: T.ink, cursor: "pointer" }}>Cancelar</button>
                      <button onClick={() => { expirePmccShort(p.id, expPmccNote); setExpPmccOpen(false); setExpPmccNote(""); setSheetPosId(null); }} style={{ flex: 1, background: T.gold, border: "none", borderRadius: 12, padding: "11px 0", fontSize: 13.5, fontWeight: 800, color: "#fff", cursor: "pointer" }}>Confirmar</button>
                    </div>
                  </div>
                )}
                {!p.closed && isVertical(p) && <ActionBtn icon="roll" label={p.noShort ? "Vender corta nueva" : "Pata corta"} sub={p.noShort ? "Reabrir la pata vendida días después" : "Cerrar o rolar SOLO la corta" + (p.sK ? " · strike " + p.sK : "")} color={T.purple} tint={T.tilePurple} onClick={() => sheetDo("legS")} />}
                {!p.closed && isVertical(p) && <ActionBtn icon="shield" label={p.noLong ? "Comprar larga nueva" : "Pata larga"} sub={p.noLong ? "Reabrir la protección" : "Cerrar o rolar SOLO la larga" + (p.lK ? " · strike " + p.lK : "")} color={T.gold} tint={T.tileAmber} onClick={() => sheetDo("legL")} />}
                {canCloseP && !(isVertical(p) && (p.noShort || p.noLong)) && <ActionBtn icon="close" label="Cerrar posición" sub="Registra el cierre con fecha, precio y comisión" onClick={() => sheetDo("close")} />}
                {p.closed && <ActionBtn icon="reopen" label="Reabrir" sub="Deshace el cierre y vuelve a activa" onClick={() => sheetDo("reopen")} />}
                {p.closed && <ActionBtn icon="edit" label="Editar" sub="Modificar campos de la posición cerrada" onClick={() => sheetDo("edit")} />}
                <ActionBtn icon="🗑" danger label={sheetConfirmDel ? "¿Seguro? Se borra del todo" : "Eliminar"} sub={sheetConfirmDel ? "Esta acción no se puede deshacer" : "Borra la posición y su historial de rolls"} onClick={() => { if (!sheetConfirmDel) { setSheetConfirmDel(true); return; } delPos(p.id); setSheetPosId(null); }} />
              </div>
            </div>
          </div>
        );
      })()}

      {/* FAB nueva posición → movido fuera del contenedor de scroll (ver final del componente) */}

      {/* ASISTENTE NUEVA POSICIÓN */}
      {wizOpen && (

                  <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{wizStep === 1 ? "Paso 1 · ¿En qué bloque va?" : wizStep === 2 ? "Paso 2 · Tipo de posición" : DCDD_STRATS.has(wizStrat) ? "Paso 3 · " + (wizSub === 1 ? "Estructura · 1/3" : wizSub === 2 ? "Primas y strikes · 2/3" : "Volatilidad · 3/3") : "Paso 3 · Detalles"}</div>
                </div>
              </div>
              <button onClick={() => setWizOpen(false)} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer" }}>✕</button>

            <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
              {[1, 2, 3].map((s) => <div key={s} style={{ flex: 1, height: 4, borderRadius: 2, background: s <= wizStep ? T.green : T.tile }} />)}
            </div>

            {wizStep === 1 && (
              <div style={{ display: "grid", gap: 10 }}>
                {BLOCKS.map((b) => (
                  <button key={b.id} onClick={() => { setWizBlock(b.id); setWizNat(null); setWizStrat(""); setWizStep(2); }} style={{ display: "flex", alignItems: "center", gap: 12, background: b.bg, border: wizBlock === b.id ? `2px solid ${b.color}` : "2px solid transparent", borderRadius: 16, padding: "14px 14px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ width: 42, height: 42, borderRadius: 12, background: b.badge, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, flexShrink: 0 }}>B{b.id}</div>
                    <div>
                      <div style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>{b.name} · {b.tag}</div>
                      <div style={{ fontSize: 11.5, fontWeight: 600, color: T.sub }}>{b.desc}</div>
                    </div>

                ))}

            {wizStep === 2 && wizBlock !== null && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>

                    <button key={nt.id} onClick={() => { setWizNat(nt.id); setWizStrat(""); }} style={{ background: wizNat === nt.id ? T.dark : T.tile, border: "none", borderRadius: 14, padding: "14px 0", fontSize: 14, fontWeight: 800, color: wizNat === nt.id ? "#fff" : T.ink, cursor: "pointer" }}>
                      {nt.label}
                    </button>
                  ))}
                </div>
                {wizNat && (
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 8 }}>Estrategia</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {(STRATS[wizBlock] || []).filter((s) => wizNatOfStrat(s) === wizNat || (isSpreadTipo(s) && wizNat === "DEF")).map((s) => (
                        <button key={s} onClick={() => { if (s === "Earnings") { setWizErSub((v) => !v); return; } setWizErSub(false); setWizForm((f) => ({ ...f, er: "" })); setWizStrat(s); setWizSub(1); setWizStep(3); }} style={{ background: s === "Earnings" && wizErSub ? T.dark : T.tile, border: "none", borderRadius: 20, padding: "10px 16px", fontSize: 13, fontWeight: 700, color: s === "Earnings" && wizErSub ? "#fff" : T.ink, cursor: "pointer" }}>{s}</button>
                      ))}
                      {/* v3.64 (Victor): Earnings abre submenu — Iron Condor (el calco de siempre, tipo
                          "Earnings") o Spread (el MISMO flujo del wizard de spreads, tipo "Spread" con la
                          marca er:true para que el histórico lo agrupe y filtre como earnings). */}
                      {wizErSub && (
                        <div style={{ width: "100%", display: "flex", gap: 8, marginTop: 2 }}>

                          <button onClick={() => { setWizErSub(false); setWizForm((f) => ({ ...f, er: "1" })); setWizStrat("Spread"); setWizSub(1); setWizStep(3); }} style={{ flex: 1, background: T.tilePurple, border: "none", borderRadius: 14, padding: "11px 0", fontSize: 12.5, fontWeight: 800, color: T.purple, cursor: "pointer" }}>Spread</button>
                        </div>
                      )}
                      {(STRATS[wizBlock] || []).filter((s) => wizNatOfStrat(s) === wizNat || (isSpreadTipo(s) && wizNat === "DEF")).length === 0 && (
                        <button onClick={() => { setWizStrat(wizNat === "ACC" ? "Long Stock" : wizNat === "CASH" ? "Cash" : ""); if (wizNat === "CASH") setWizForm((f) => ({ ...f, tkr: "CASH" })); setWizStep(3); }} style={{ background: T.tile, border: "none", borderRadius: 20, padding: "10px 16px", fontSize: 13, fontWeight: 700, color: T.ink, cursor: "pointer" }}>Continuar</button>

                </div>
                {(wizNat === "CRED" || wizNat === "DEF") && wizStrat && (
                  <div style={{ display: "grid", gap: 6 }}>
