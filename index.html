            <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 26, padding: "18px 18px 24px", width: "100%", maxWidth: 560, maxHeight: "86vh", overflowY: "auto", boxSizing: "border-box", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 17, fontWeight: 800, color: T.ink }}>✕ Cerrar {p.tkr || "posición"}</div>
                  {/* descripción clara de qué posición se cierra (v5.13): tipo + strikes/spreads/expiry + nº contratos */}
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginTop: 4 }}>
                    {p.tipo && <span style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, background: T.tile, borderRadius: 7, padding: "3px 7px" }}>{tipoChipLabel(p)}</span>}
                    {optionDetail(p) && <span style={{ fontSize: 12, fontWeight: 700, color: T.ink }}>{optionDetail(p)}</span>}
                    <span style={{ fontSize: 11.5, fontWeight: 700, color: T.sub }}>× {Number.isInteger(n(p.qty) / 100) && opt ? n(p.qty) / 100 + " contr." : n(p.qty) + (opt ? " opc" : " acc")}</span>
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: T.sub, marginTop: 3 }}>{pmcc ? "Recompra de la short + venta de la long · por acción" : isCreditSpread(p) ? "Close price (coste de recompra del spread) · por acción" : (opt ? "Precio de recompra" : "Precio de venta") + " · por acción" + (opt ? " · queda archivada con su cadena de rolls" : "")}</div>
                </div>
                <button onClick={() => setClosing(false)} style={{ background: T.tile, border: "none", borderRadius: 12, width: 34, height: 34, fontSize: 15, color: T.sub, cursor: "pointer", flexShrink: 0 }}>✕</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 10 }}>
                <WizInput label="Fecha de cierre" value={closeDateV} onChange={setCloseDateV} type="date" />
                {isStock && (
                  <div style={{ gridColumn: "span 2" }}>
                    <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>¿Cuánto cierras?</span>
                    <Pill options={["Total", "Parcial"]} value={partial ? "Parcial" : "Total"} onChange={(v) => { setCloseMode(v === "Parcial" ? "parcial" : "total"); if (v === "Parcial" && !closeQtyV) setCloseQtyV(String(q)); }} size="sm" />
                  </div>
                )}
                {partial && <WizInput label={"Nº acciones a vender (máx " + q + ")"} value={closeQtyV} onChange={setCloseQtyV} inputMode="numeric" />}
                {isStock && partial && <div style={{ gridColumn: "span 2", fontSize: 10.5, color: T.sub, fontWeight: 600, lineHeight: 1.4, marginTop: -4 }}>Se venden {sellQty > 0 ? sellQty : "—"} acc por FIFO (lotes más antiguos primero). El resto sigue abierto; si vendes todas, la posición se cierra.</div>}
                {canExercise && (
                  <div style={{ gridColumn: "span 2" }}>
                    <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>¿Cómo se cierra?</span>
                    <Pill options={["Recompra", "Ejercida / asignada", "Expira sin valor"]} value={closeExercised ? "Ejercida / asignada" : closeExpira ? "Expira sin valor" : "Recompra"} onChange={(v) => setCloseKind(v === "Ejercida / asignada" ? "exercised" : v === "Expira sin valor" ? "expira" : "recompra")} size="sm" />
                  </div>
                )}
                {!canExercise && !pmcc && opt && shortSide && (
                  <div style={{ gridColumn: "span 2" }}>
                    <span style={{ display: "block", fontSize: 10, color: T.sub, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.4 }}>¿Cómo se cierra?</span>
                    <Pill options={["Recompra", "Expira sin valor"]} value={closeExpira ? "Expira sin valor" : "Recompra"} onChange={(v) => setCloseKind(v === "Expira sin valor" ? "expira" : "recompra")} size="sm" />
                  </div>
                )}
                {canExercise && closeExercised && (
                  <div style={{ gridColumn: "span 2", background: T.tileAmber, borderRadius: 12, padding: "10px 12px" }}>
                    <div style={{ fontSize: 11.5, fontWeight: 800, color: T.gold, marginBottom: 3, display: "flex", alignItems: "center", gap: 6 }}><ActIcon name={p.right === "P" ? "assign" : "called"} size={14} />{p.right === "P" ? "Asignación de put → B1" : "Call asignada"}</div>
                    <div style={{ fontSize: 11.5, color: T.ink, fontWeight: 600, lineHeight: 1.45 }}>
                      {p.right === "P"
                        ? "Se creará una posición de " + n(p.qty) + " acciones de " + (p.tkr || "—") + " en B1 (Long Stock) con coste base = BEP a la fecha $" + money2(effBep(p)) + ". "
                        : "Tus " + n(p.qty) + " acciones se venden al strike $" + strikeStr(p.strike) + ". "}
                      Cuenta como pérdida para el win rate de la estrategia.
                    </div>
                  </div>
                )}
                {opt && closeExpira && (
                  <div style={{ gridColumn: "span 2", background: T.tileAmber, borderRadius: 12, padding: "10px 12px", fontSize: 11.5, fontWeight: 700, color: T.gold }}>Cierre a $0 sin comisión — la opción expira sin valor.</div>
                )}
                {!pmcc && !closeExercised && !closeExpira && <WizInput label={isCreditSpread(p) ? "Close price $/acc" : (opt ? "Precio recompra $/acc" : "Precio venta $/acc")} value={closePriceV} onChange={setClosePriceV} placeholder={opt ? "0 si expira sin valor" : "$"} inputMode="decimal" />}
                {!pmcc && !closeExpira && <WizInput label={closeExercised ? "Comisión asignación" : "Comisión de cierre"} value={closeComisionV} onChange={setCloseComisionV} placeholder="$" inputMode="decimal" />}
                {pmcc && (
                  <>
                    {!p.noShort && (
                      <>
                        <div style={{ gridColumn: "span 2", fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginTop: 2 }}>Short call · recompra</div>
                        <WizInput label="Recompra short $/acc" value={closePriceV} onChange={setClosePriceV} placeholder="0 si expira sin valor" inputMode="decimal" />
                        <WizInput label="Comisión short" value={closeComisionV} onChange={setCloseComisionV} placeholder="$" inputMode="decimal" />
                      </>
                    )}
                    {p.noShort && <div style={{ gridColumn: "span 2", background: T.tileAmber, borderRadius: 12, padding: "8px 12px", fontSize: 11, fontWeight: 700, color: T.gold }}>Sin call vendida — solo se cierra la long comprada.</div>}
                    <div style={{ gridColumn: "span 2", fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginTop: 2 }}>Long call · venta</div>
                    <WizInput label="Venta long $/acc" value={closeLongPriceV} onChange={setCloseLongPriceV} placeholder="0 si expira sin valor" inputMode="decimal" />
                    <WizInput label="Comisión long" value={closeLongComisionV} onChange={setCloseLongComisionV} placeholder="$" inputMode="decimal" />
                  </>
                )}
                <div style={{ minWidth: 0, gridColumn: pmcc ? "span 2" : "auto" }}>
                  <div style={{ fontSize: 10.5, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{pmcc ? "Resultado del cierre est. · short + long (los rolls previos ya están realizados)" : "Resultado est."}</div>
                  <div style={{ boxSizing: "border-box", height: 47, display: "flex", alignItems: "center", padding: "0 12px", borderRadius: 12, background: isFinite(est) ? (est >= 0 ? T.tileGreen : T.tileRed) : T.tile }}>
                    <span style={{ fontSize: 15.5, fontWeight: 800, color: isFinite(est) ? (est >= 0 ? T.green : T.red) : T.sub, whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums" }}>{isFinite(est) ? signMoney(est) : "—"}</span>
                  </div>
                </div>
                <div style={{ gridColumn: "span 2" }}>
                  <WizInput label="Comentario (motivo del cierre)" value={closeNoteV} onChange={setCloseNoteV} />
                </div>
              </div>
              {opt && (rollChain.length > 0 || pmcc) && (
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 10.5, fontWeight: 800, color: T.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Cadena de la posición</div>
                  <RollChainTable p={p} />
                </div>
              )}
              <button onClick={confirmClose} disabled={!ok} style={{ marginTop: 16, width: "100%", background: ok ? T.red : T.tile, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 15, fontWeight: 800, color: ok ? "#fff" : T.sub, cursor: "pointer" }}>Confirmar cierre</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

      {name === "ajustes" && (<g {...P}><circle cx="12" cy="12" r="3.2" /><path d="M12 2.8v2.7M12 18.5v2.7M2.8 12h2.7M18.5 12h2.7M5.5 5.5l1.9 1.9M16.6 16.6l1.9 1.9M18.5 5.5l-1.9 1.9M7.4 16.6l-1.9 1.9" /></g>)}
      {name === "primas" && (<g {...P}><circle cx="12" cy="12" r="8.5" /><path d="M12 7.2v9.6M14.8 8.8c-.6-.9-1.7-1.4-2.8-1.4-1.6 0-2.9 1-2.9 2.3s1.3 2 2.9 2.3c1.6.3 2.9 1 2.9 2.3s-1.3 2.3-2.9 2.3c-1.1 0-2.2-.5-2.8-1.4" /></g>)}

      {name === "estrategias" && (<g {...P}><path d="M12 3.5l8.5 4.4L12 12.3 3.5 7.9 12 3.5z" /><path d="M3.5 12.2l8.5 4.4 8.5-4.4" /><path d="M3.5 16.4l8.5 4.4 8.5-4.4" /></g>)}
      {name === "rendimiento" && (<g {...P}><path d="M3.5 20.5h17" /><path d="M4.5 16l4.3-5 3.4 3 5.3-6.5" /><path d="M20 5.5V9h-3.5" /></g>)}

/* ---------- tarjeta de bloque activo ---------- */
function BlockCard({ blk, positions, nlv, editSet, toggleEdit, closeEdits, setPos, addPos, delPos, rollPos, closePos, reopenPos, legOp, showPnl, togglePnl, brokers, onOpenSheet, pendingAction, clearPending, coveredMap, onEditChain, onEditLots }) {
  const [rollingIds, setRollingIds] = useState(new Set()); // filas con el panel de roll abierto → swipe-eliminar desactivado
  const activePositions = positions.filter((p) => !p.closed);
  const capBlock = activePositions.reduce((s, p) => s + capDesplegado(p), 0);
  const plausibleBlock = activePositions.reduce((s, p) => s + plausibleOf(p), 0);
  const pnl = activePositions.reduce((s, p) => s + effPnl(p), 0);
  const pctNlv = nlv ? capBlock / nlv : NaN;
  const pctNlvPlausible = nlv ? plausibleBlock / nlv : NaN;
  const zones = bandZones(blk);
  const marks = [{ at: blk.tMin, label: pct(blk.tMin, 0) }, { at: blk.tMax, label: pct(blk.tMax, 0) }];

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div onClick={closeEdits} style={{ cursor: editSet.size > 0 ? "pointer" : "default" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
            <div style={{ width: 10, height: 10, borderRadius: 3, background: blk.badge, marginTop: 5, flexShrink: 0 }} />
            <div>
              <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, letterSpacing: -0.3 }}>{blk.name} <span style={{ color: blk.color, fontWeight: 800 }}>· {blk.tag}</span></div>
              <div style={{ fontSize: 12, color: T.sub, fontWeight: 500, marginTop: 1 }}>{blk.desc}</div>
            </div>
          </div>
          <div style={{ background: blk.bg, color: blk.color, borderRadius: 10, padding: "5px 9px", fontSize: 11, fontWeight: 800, whiteSpace: "nowrap", flexShrink: 0 }}>
            Obj {pct(blk.tMin, 0)}–{pct(blk.tMax, 0)}
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
          {/* B0 es liquidez: su suma no es riesgo, es tamaño — se etiqueta "Total" y no muestra plausible */}
          <MiniStat label={blk.id === 0 ? "Total" : "Riesgo total"} value={"$" + money(capBlock)} color={blk.color} />
          <MiniStat label="% NLV (total)" value={pct(pctNlv)} color={blk.color} />
          {blk.id !== 0 && <MiniStat label="Riesgo plausible" value={"$" + money(plausibleBlock)} />}
          {blk.id !== 0 && <MiniStat label="% NLV (plausible)" value={pct(pctNlvPlausible)} />}
        </div>
        <div style={{ marginBottom: 14 }}><MiniStat label="P&L" value={signMoney(pnl)} color={pnl > 0 ? T.green : pnl < 0 ? T.red : T.sub} /></div>

        <ZoneBar value={pctNlv} min={blk.scaleMin} max={blk.scaleMax} zones={zones} />
        <Scale min={blk.scaleMin} max={blk.scaleMax} marks={marks} />
      </div>

      <div style={{ marginTop: 14 }}>
        {positions.length > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
            <span style={{ fontSize: 11, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>Posiciones</span>
            <button onClick={togglePnl} style={{ background: showPnl ? blk.color : T.tile, border: "none", borderRadius: 10, padding: "5px 12px", fontSize: 11.5, fontWeight: 800, color: showPnl ? "#fff" : T.sub, cursor: "pointer" }}>{showPnl ? "P&L visible" : "Ver P&L"}</button>
          </div>
        )}
        {positions.length === 0 && (
          <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>Sin posiciones en este bloque para el broker seleccionado.</div>
        )}
        {positions.map((p) => (
          <SwipeDelete key={p.id} onDelete={() => delPos(p.id)} disabled={editSet.has(p.id) || rollingIds.has(p.id)}>
            <PositionRow p={p} editing={editSet.has(p.id)} onToggle={() => (onOpenSheet ? onOpenSheet(p) : toggleEdit(p.id))} onDone={() => toggleEdit(p.id)}
              pendingAction={pendingAction} clearPending={clearPending}
              onRollingChange={(v) => setRollingIds((s) => { const x = new Set(s); if (v) x.add(p.id); else x.delete(p.id); return x; })}
              coveredLabel={(coveredMap || {})[p.id]}
              onChange={(k) => (v) => setPos(p.id, k, v)} onDelete={() => delPos(p.id)} showPnl={showPnl} brokers={brokers}
              onRoll={(vals) => rollPos(p.id, vals)} onClose={(vals) => closePos(p.id, vals)} onReopen={() => reopenPos(p.id)}
              onLegOp={legOp ? (vals) => legOp(p.id, vals) : null}
              onEditChain={onEditChain} onEditLots={onEditLots}
              pctBloque={capBlock ? capDesplegado(p) / capBlock : NaN} pctCartera={nlv ? capDesplegado(p) / nlv : NaN} />
          </SwipeDelete>
        ))}
      </div>

      {/* alta de posiciones: solo vía el FAB verde "+" (asistente Nueva posición) — el botón por bloque se retiró en v4.45 */}
    </div>
  );
}

/* ---------- MOVIMIENTOS: vista de nivel superior. Las posiciones se crean/editan/rolan/cierran desde su
   bloque; aquí solo se reconstruye su historial en tres sub-vistas:
   · Primas — cash de cada evento (apertura, roll neto, cierre). Cierre de opción corta = recompra →
     negativo; expiración sin valor = cierre a precio 0. Cada línea es fecha·ticker·fee·prima y se expande
     al pulsar mostrando strike y P/C. Totales por mes, por año y acumulado.
   · MTM — resultado REALIZADO de cada roll y cierre: precio de entrada de la pata que se cierra vs precio
     de recompra/venta, con su fee visible en cada línea.
   · Estrategias — TODAS las posiciones (abiertas y cerradas) archivadas por tipo: Acciones, Covered
     Calls, Short Puts, PMCC, DC/DD, Otras. Selector Abiertas/Cerradas. Al pulsar una posición se expande
     con: cadena de rolls, prima acumulada, BEP, ROM (prima/riesgo), DTE, DIT e IVR de apertura. ---------- */
/* ---------- AJUSTES: iconos de línea (v1.16) — mismo trazo que NavIcon (stroke 2, redondeado) ---------- */
function SetIcon({ name, color }) {
  const P = { fill: "none", stroke: color || "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  return (
    <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
      {name === "refresh" && (<g {...P}><path d="M20 11a8 8 0 1 0-2.3 6.3" /><path d="M20 5.5V11h-5.5" /></g>)}
      {/* v1.75: la fila de notificaciones pasaba icon="bolt", que es de ActIcon — en SetIcon no existía y el cuadrado salía vacío */}
      {name === "bell" && (<g {...P}><path d="M6 16.5v-5a6 6 0 0 1 12 0v5l1.6 2H4.4l1.6-2Z" /><path d="M10.2 20.7a2 2 0 0 0 3.6 0" /></g>)}
      {name === "theme" && (<g {...P}><circle cx="12" cy="12" r="4" /><path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.6 5.6l1.7 1.7M16.7 16.7l1.7 1.7M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7" /></g>)}
      {name === "bank" && (<g {...P}><path d="M3.5 9.5L12 4l8.5 5.5" /><path d="M5 10v8M9.7 10v8M14.3 10v8M19 10v8" /><path d="M3.5 20.5h17" /></g>)}
      {name === "export" && (<g {...P}><path d="M12 14.5V3.5" /><path d="M7.5 7.5L12 3l4.5 4.5" /><path d="M4.5 13v5.5A2 2 0 0 0 6.5 20.5h11a2 2 0 0 0 2-2V13" /></g>)}
      {name === "backup" && (<g {...P}><ellipse cx="12" cy="5.5" rx="7.5" ry="2.8" /><path d="M4.5 5.5v6.5c0 1.5 3.4 2.8 7.5 2.8s7.5-1.3 7.5-2.8V5.5" /><path d="M4.5 12v6.5c0 1.5 3.4 2.8 7.5 2.8s7.5-1.3 7.5-2.8V12" /></g>)}
      {name === "key" && (<g {...P}><circle cx="8" cy="14.5" r="4.5" /><path d="M11.5 11L20 2.5" /><path d="M16.5 6l3 3M14 8.5l2 2" /></g>)}
      {name === "camera" && (<g {...P}><rect x="3" y="6.5" width="18" height="13" rx="2.5" /><path d="M8.5 6.5L10 4h4l1.5 2.5" /><circle cx="12" cy="12.8" r="3.4" /></g>)}
      {name === "trash" && (<g {...P}><path d="M4 6.5h16" /><path d="M9 6.5V4.8A1.3 1.3 0 0 1 10.3 3.5h3.4A1.3 1.3 0 0 1 15 4.8v1.7" /><path d="M6 6.5l1 13a1.8 1.8 0 0 0 1.8 1.7h6.4a1.8 1.8 0 0 0 1.8-1.7l1-13" /><path d="M10 10.5v6M14 10.5v6" /></g>)}
      {name === "broom" && (<g {...P}><path d="M14.5 3.5L11 10" /><path d="M11 10l-6.5 6.5c-.9.9-1 2.3-.2 3.2.9.8 2.3.7 3.2-.2L14 13" /><path d="M11 10l3 3" /><path d="M6.5 20.5L10 17" /></g>)}
    </svg>
  );
}

/* ---------- ACCIONES: iconos de línea (v1.25) — editar, rolar, lotes, dividendos, cámara.
   Mismo trazo que NavIcon y SetIcon (stroke 2, redondeado) para que la app no mezcle emojis con SVG. ---------- */
function ActIcon({ name, size, color }) {
  const P = { fill: "none", stroke: color || "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  const s = size || 17;
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" aria-hidden="true" style={{ flexShrink: 0, verticalAlign: "-2px" }}>
      {name === "edit" && (<g {...P}><path d="M4 20.5h4.2L19.3 9.4a2.1 2.1 0 0 0 0-3l-1.7-1.7a2.1 2.1 0 0 0-3 0L3.5 15.8V20z" /><path d="M13.8 6.2l4 4" /></g>)}

function MovimientosView({ positions, nlv, reopenPos, onEditChain, onEditLots, onEditDiv, snapshots, flows, saveSnapshot, deleteSnapshot }) {
  const [sub, setSub] = useState("primas");
  const [blockFilter, setBlockFilter] = useState("all"); /* v3.31: filtro por bloque en Primas/MTM (Todos · Bn) */
  const [stratCat, setStratCat] = useState("Acciones");
  const [erKind, setErKind] = useState("Todo"); /* v3.64: filtro IC / Spreads dentro de Earnings */
  const [stratStatus, setStratStatus] = useState("Abiertas");
  const [stratView, setStratView] = useState("cats"); /* v1.02: "cats" (por estrategia) | "tikr" (Acumulado TIKR) */
  const [stratSort, setStratSort] = useState("fecha"); /* v1.02: orden del listado — fecha | ticker | profit */
  const [tikrStatus, setTikrStatus] = useState("Todas"); /* v1.03: filtro de la vista Por ticker — Todas | Abiertas | Cerradas */
  const [stratWin, setStratWin] = useState("Todas"); /* v1.07: filtro de resultado — Todas | Ganadoras | Perdedoras */
  const [stratFrom, setStratFrom] = useState(""); /* v1.69: intervalo de fechas para CERRADAS (por closeDate) */
  const [stratTo, setStratTo] = useState("");
  const [stratTkr, setStratTkr] = useState("Todos"); /* v1.07: filtro por ticker dentro de la estrategia */
  const [filterOpen, setFilterOpen] = useState(false); /* v1.08: modal de filtros */
  const [exportMsg, setExportMsg] = useState(""); /* v1.14: confirmación del export */
  const [expanded, setExpanded] = useState(new Set());
  const toggleExpand = (id) => setExpanded((s) => { const x = new Set(s); x.has(id) ? x.delete(id) : x.add(id); return x; });
  const [openMonths, setOpenMonths] = useState(new Set());
  const toggleMonth = (key) => setOpenMonths((s) => { const x = new Set(s); x.has(key) ? x.delete(key) : x.add(key); return x; });
  const [openYears, setOpenYears] = useState(new Set());
  const toggleYear = (key) => setOpenYears((s) => { const x = new Set(s); x.has(key) ? x.delete(key) : x.add(key); return x; });

  const openingPrimaPerShare = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? n(chain[0].prevPrima) : n(p.prima);
  };
  const openingStrike = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? chain[0].prevStrike : p.strike;
  };
  const strikeAfterRoll = (p, idx) => {
    const chain = p.rollChain || [];
    return idx + 1 < chain.length ? chain[idx + 1].prevStrike : p.strike;
  };
  const openingExpiry = (p) => {
    const chain = p.rollChain || [];
    return chain.length > 0 ? chain[0].prevExpiry : p.expiry;
  };
  const expiryAfterRoll = (p, idx) => {
    const chain = p.rollChain || [];
    return idx + 1 < chain.length ? chain[idx + 1].prevExpiry : p.expiry;
  };
  const qtyLabelOf = (p) => {
    if (!isOptionNat(p)) return n(p.qty) ? String(n(p.qty)) : "";
    const c = n(p.qty) / 100;
    return Number.isInteger(c) ? String(c) : String(n(p.qty));
  };
  const dirSign = (p) => (natOf(p) === "CRED" || isCreditSpread(p) ? -1 : 1); // corta (o credit spread): cerrar/recomprar es pagar

  const primaEvents = [];
  const mtmEvents = [];

  positions.forEach((p) => {
    const qty = n(p.qty);
    if (isOptionNat(p)) {
      const autoStrat = bepAutoStrat(p);
      const chain = p.rollChain || [];
      if (autoStrat === "CREDIT" && p.entryDate) {
        /* solo las opciones de CRÉDITO registran prima en la apertura. El débito (Long Call, y la pata larga
           del PMCC) no se registra hasta que se cierra, igual que las acciones. Los credit spreads (IC/
           Earnings/Broken Wings) TAMPOCO — decisión de Victor (v1.65): un cóndor es B3, no refleja prima
           hasta el cierre, donde materializa el neto. */
        const fee = n(p.comision);
        const cash = openingPrimaPerShare(p) * qty - fee;
        primaEvents.push({ id: p.id + "-open", posId: p.id, date: p.entryDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Apertura", cash, fee, strike: openingStrike(p), right: p.right, qty: qtyLabelOf(p), expiry: openingExpiry(p), bep: n(openingStrike(p)) - n(openingPrimaPerShare(p)), note: p.entryNote || "", legs: [
          { side: "V", label: strikeStr(openingStrike(p)) + (p.right || "") + (openingExpiry(p) ? " " + ibkrDate(openingExpiry(p)) : ""), perShare: openingPrimaPerShare(p), cash: openingPrimaPerShare(p) * qty },
        ] });
      }
      chain.forEach((r, idx) => {
        const fee = n(r.comision);
        /* v3.46: corta de PMCC expirada sin valor — el evento de Primas sería $0 (nada se cobra ni se paga),
           así que no se pinta; el MTM sí realiza la pata (la prima de esa call queda ganada del todo). */
        if (r.expiredShort) {
          const legBefore0 = idx === 0 ? openingPrimaPerShare(p) : n(chain[idx - 1].newCredit);
          mtmEvents.push({ id: p.id + "-rollmtm" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Expirada short", cash: dirSign(p) * (0 - legBefore0) * qty, fee: 0, strike: r.prevStrike, right: p.right, qty: qtyLabelOf(p), expiry: r.prevExpiry, note: r.note || "", legs: [
            { side: "V", label: strikeStr(r.prevStrike) + (p.right || "") + (r.prevExpiry ? " " + ibkrDate(r.prevExpiry) : ""), perShare: legBefore0, cash: legBefore0 * qty },
            { side: "C", label: "expira sin valor", perShare: 0, cash: 0 },
          ] });
          return;
        }
        /* v3.46: venta de call nueva tras un periodo sin corta — solo pata de venta en Primas; en MTM no
           hay nada que realizar (no se cerró ninguna pata). */
        if (r.soldAfterExpiry) {
          const cashSell = n(r.newCredit) * qty - fee;
          primaEvents.push({ id: p.id + "-roll" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Venta call", cash: cashSell, fee, strike: strikeAfterRoll(p, idx), right: p.right, qty: qtyLabelOf(p), expiry: expiryAfterRoll(p, idx), note: r.note || "", legs: [
            { side: "V", label: strikeStr(strikeAfterRoll(p, idx)) + (p.right || "") + (expiryAfterRoll(p, idx) ? " " + ibkrDate(expiryAfterRoll(p, idx)) : ""), perShare: n(r.newCredit), cash: n(r.newCredit) * qty },
          ] });
          return;
        }
        const cashRoll = (n(r.newCredit) - n(r.buybackCost)) * qty - fee;
        primaEvents.push({ id: p.id + "-roll" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Roll", cash: cashRoll, fee, strike: strikeAfterRoll(p, idx), right: p.right, prevStrike: r.prevStrike, qty: qtyLabelOf(p), expiry: expiryAfterRoll(p, idx), note: r.note || "", legs: [
          { side: "C", label: strikeStr(r.prevStrike) + (p.right || "") + (r.prevExpiry ? " " + ibkrDate(r.prevExpiry) : ""), perShare: -n(r.buybackCost), cash: -n(r.buybackCost) * qty },
          { side: "V", label: strikeStr(strikeAfterRoll(p, idx)) + (p.right || "") + (expiryAfterRoll(p, idx) ? " " + ibkrDate(expiryAfterRoll(p, idx)) : ""), perShare: n(r.newCredit), cash: n(r.newCredit) * qty },
        ] });
        const legBefore = idx === 0 ? openingPrimaPerShare(p) : n(chain[idx - 1].newCredit);
        const realized = dirSign(p) * (n(r.buybackCost) - legBefore) * qty - fee;
        mtmEvents.push({ id: p.id + "-rollmtm" + idx, posId: p.id, date: r.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Roll", cash: realized, fee, strike: r.prevStrike, right: p.right, qty: qtyLabelOf(p), expiry: r.prevExpiry, note: r.note || "", legs: [
          { side: "V", label: strikeStr(r.prevStrike) + (p.right || "") + (r.prevExpiry ? " " + ibkrDate(r.prevExpiry) : ""), perShare: legBefore, cash: legBefore * qty },
          { side: "C", label: strikeStr(r.prevStrike) + (p.right || ""), perShare: -n(r.buybackCost), cash: -n(r.buybackCost) * qty },
        ] });
      });
      /* v3.52: verticales (Credit Spread) — cada cierre/roll de UNA pata se realiza en el momento, no se
         espera al cierre total. p.legOps trae cash!=null solo en las operaciones YA realizadas (cerrar la
         corta/larga, o la parte de cierre de un roll); las de apertura (vender/comprar de nuevo a crédito)
         quedan sin apuntar hasta que ESA pata se cierre a su vez — mismo criterio que la apertura original. */
      if (isVertical(p)) {
        /* v3.59: la comisión de APERTURA del spread (p.comision) tampoco se restaba nunca — cada pata
           solo resta el fee de SU operación. Se imputa una sola vez, en la primera operación realizada.
           Derivado en render: las posiciones antiguas se autocorrigen al desplegar. */
        let vOpenFee = n(p.comision);
        (p.legOps || []).forEach((o, idx) => {
          if (o.cash == null) return;
          const oFee = vOpenFee; vOpenFee = 0;
          const S = o.leg === "S";
          const isExpira = o.act !== "open" && n(o.px) === 0;
          const kind = o.act === "roll" ? (S ? "Roll corta" : "Roll larga") : isExpira ? (S ? "Expirada corta" : "Larga sin valor") : (S ? "Cierre corta" : "Cierre larga");
          const lbl = (S ? "Corta " : "Larga ") + (o.k || "") + (p.right || "") + (o.expiry ? " " + ibkrDate(o.expiry) : "");
          const ev = { id: p.id + "-leg" + idx, posId: p.id, date: o.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind, cash: n(o.cash) - oFee, fee: n(o.fee) + oFee, strike: o.k || (S ? p.sK : p.lK), right: p.right, qty: qtyLabelOf(p), expiry: o.expiry || p.expiry, note: o.note || "", legs: [{ side: S ? "C" : "V", label: lbl, perShare: n(o.cash) / (qty || 1), cash: n(o.cash) }] };
          primaEvents.push(ev);
          mtmEvents.push({ ...ev, id: p.id + "-legmtm" + idx }); /* un vertical no distingue prima acumulada de MTM, igual que en el cierre total */
        });
      }
      if (p.closed && p.closePrice !== "" && p.closePrice != null && !isPMCC(p)) {
        const fee = n(p.closeComision);
        const isExpira = n(p.closePrice) === 0;
        const shortP = dirSign(p) === -1;
        /* credit spreads (v5.00): la etiqueta de las patas en Primas/MTM pasa a ser la abreviatura de la
           estrategia (IC / BW) + vencimiento — la ristra "715/720 · 760/765" no cabía y se truncaba;
           los strikes completos siguen visibles en Estrategias y en la cadena de la posición. */
        const stkLbl = isCreditSpread(p) ? ((isVertical(p) ? (vDisplayPrima(p) >= 0 ? "CS" : "DS") : csAbbr(p.tipo)) + (isSpreadTipo(p.tipo) ? " " + (p.right === "C" ? "Call" : "Put") : "")) : isGenericDebitPos(p) ? (p.tipo || "Débito") : strikeStr(p.strike) + (p.right || "");
        const expLbl = p.expiry ? " " + ibkrDate(p.expiry) : "";
        /* credit spreads (Iron Condor / Broken Wings): la prima cobrada NO se registró al abrir, así que
           el cierre materializa el NETO = (prima cobrada − recompra) × qty − fee, como un MTM. Si solo se
           registrara la recompra (pago), Primas quedaría en negativo sin el crédito que la compensa. */
        /* débito genérico B3 (v5.04): mismo modelo — el débito de apertura no se registró, así que el
           cierre materializa el NETO = (venta − open price) × qty − fee. Expirar sin valor = pérdida
           completa del débito. Primas y MTM cuadran exactamente para estas estrategias. */
        /* v1.28: el Long Call entra en el mismo modelo de neto que los débitos genéricos — su apertura
           no registró el débito (comentario de la apertura: "no se registra hasta que se cierra"), así que
           el cierre debe materializar (venta − coste) × qty − fee, y la expiración la pérdida completa.
           Antes caía en la rama genérica y apuntaba la VENTA BRUTA, inflando Primas con el coste jamás restado. */
        const gd = isGenericDebitPos(p) || isLongCallPos(p);
        /* v3.59 FIX (detectado por Victor en un trade de earnings): las estrategias de "neto al cierre"
           (credit spreads IC/ER/BW, débitos genéricos B3 y Long Call) no registran evento de apertura,
           así que su comisión de apertura (p.comision — en DC/DD el wizard le suma las fees de las 4
           patas) no se restaba NUNCA: cada estructura cerrada inflaba Primas y MTM en esa cantidad.
           El neto del cierre resta ahora también la comisión de apertura, y el `fee` del evento muestra
           el TOTAL restado (apertura + cierre) para que la línea cuadre con su cash. Las opciones de
           crédito simples NO cambian: su fee de apertura ya se resta en el evento de apertura. */
        const openFee = (isCreditSpread(p) || gd) ? n(p.comision) : 0;
        const cashClose = isCreditSpread(p)
          ? (n(p.prima) - n(p.closePrice)) * qty - fee - openFee
          : gd
            ? (n(p.closePrice) - n(p.prima)) * qty - fee - openFee
            : dirSign(p) * n(p.closePrice) * qty - fee;
        const primaLegs = isCreditSpread(p)
          ? [
              { side: "V", label: stkLbl + expLbl, perShare: n(p.prima), cash: n(p.prima) * qty },
              { side: "C", label: stkLbl + expLbl, perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
            ]
          : gd
            ? [
                { side: "C", label: stkLbl + expLbl, perShare: -n(p.prima), cash: -n(p.prima) * qty },
                isExpira
                  ? { side: null, label: stkLbl + expLbl + " · expira", perShare: 0, cash: 0 }
                  : { side: "V", label: stkLbl + expLbl, perShare: n(p.closePrice), cash: n(p.closePrice) * qty },
              ]
            : isExpira
              ? [{ side: null, label: stkLbl + expLbl + " · expira", perShare: 0, cash: 0 }]
              : [{ side: shortP ? "C" : "V", label: stkLbl + expLbl, perShare: dirSign(p) * n(p.closePrice), cash: dirSign(p) * n(p.closePrice) * qty }];
        primaEvents.push({ id: p.id + "-close", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: p.exercised ? "Asignada" : isExpira ? "Expirada" : "Cierre", cash: cashClose, fee: fee + openFee, strike: p.strike, right: p.right, qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: primaLegs });
        const legEntry = chain.length > 0 ? n(chain[chain.length - 1].newCredit) : openingPrimaPerShare(p);
        const realizedClose = dirSign(p) * (n(p.closePrice) - legEntry) * qty - fee - openFee; /* v3.59: openFee = 0 en crédito simple */
        const mtmLegs = (isCreditSpread(p) || gd)
          ? primaLegs
          : shortP
            ? [
                { side: "V", label: stkLbl + expLbl, perShare: legEntry, cash: legEntry * qty },
                { side: "C", label: stkLbl, perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
              ]
            : [
                { side: "C", label: stkLbl + expLbl, perShare: -legEntry, cash: -legEntry * qty },
                { side: "V", label: stkLbl, perShare: n(p.closePrice), cash: n(p.closePrice) * qty },
              ];
        mtmEvents.push({ id: p.id + "-closemtm", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: p.exercised ? "Asignada" : isExpira ? "Expirada" : "Cierre", cash: realizedClose, fee: fee + openFee, strike: p.strike, right: p.right, qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: mtmLegs });
      }
      /* PMCC — CIERRE (modelo acordado):
         · PRIMAS: UN evento combinado = (venta long − coste long − recompra short) × qty − comisiones.
           Total Primas de la estrategia = crédito apertura + rolls + cierre = profit real.
         · MTM: DOS eventos, el realizado POR PATA — short: (prima vigente − recompra) × qty − fee;
           long: (venta − coste) × qty − fee. Suman lo mismo que el combinado de Primas + crédito ya
           registrado, y permiten ver qué aportó cada pata. */
      if (isPMCC(p) && p.closed && p.closePrice !== "" && p.closePrice != null && p.closeLongPrice !== "" && p.closeLongPrice != null) {
        const lg = p.long || {};
        /* v3.60 (confirmado por Victor: cada pata lleva su comisión — apertura, rolls y cierre; solo la
           corta expirada sin valor va sin fee): la comisión de apertura de la LARGA (lg.comision) sigue el
           modelo "neto al cierre" igual que su débito — se resta aquí, no al abrir. La de la corta
           (p.comision) ya se restó en su evento de apertura y las de los rolls en los suyos. */
        const fees = n(p.closeComision) + n(p.closeLongComision) + n(lg.comision);
        const combined = (n(p.closeLongPrice) - n(lg.prima) - n(p.closePrice)) * qty - fees;
        primaEvents.push({ id: p.id + "-close", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre PMCC", cash: combined, fee: fees, strike: p.strike, right: "C", qty: qtyLabelOf(p), expiry: p.expiry, bep: n(effBep(p)), note: p.closeNote || "", legs: [
          { side: "C", label: strikeStr(lg.strike) + "C · long", perShare: -n(lg.prima), cash: -n(lg.prima) * qty },
          { side: "C", label: strikeStr(p.strike) + "C" + (p.expiry ? " " + ibkrDate(p.expiry) : "") + " · short", perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
          { side: "V", label: strikeStr(lg.strike) + "C" + (lg.expiry ? " " + ibkrDate(lg.expiry) : "") + " · long", perShare: n(p.closeLongPrice), cash: n(p.closeLongPrice) * qty },
        ] });
        const shortLegEntry = chain.length > 0 ? n(chain[chain.length - 1].newCredit) : openingPrimaPerShare(p);
        const realizedShort = (shortLegEntry - n(p.closePrice)) * qty - n(p.closeComision);
        mtmEvents.push({ id: p.id + "-closemtm-s", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre short", cash: realizedShort, fee: n(p.closeComision), strike: p.strike, right: "C", qty: qtyLabelOf(p), expiry: p.expiry, note: p.closeNote || "", legs: [
          { side: "V", label: strikeStr(p.strike) + "C" + (p.expiry ? " " + ibkrDate(p.expiry) : ""), perShare: shortLegEntry, cash: shortLegEntry * qty },
          { side: "C", label: strikeStr(p.strike) + "C", perShare: -n(p.closePrice), cash: -n(p.closePrice) * qty },
        ] });
        const realizedLong = (n(p.closeLongPrice) - n(lg.prima)) * qty - n(p.closeLongComision) - n(lg.comision); /* v3.60: fee de apertura de la larga */
        mtmEvents.push({ id: p.id + "-closemtm-l", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Cierre long", cash: realizedLong, fee: n(p.closeLongComision) + n(lg.comision), strike: lg.strike, right: "C", qty: qtyLabelOf(p), expiry: lg.expiry, note: p.closeNote || "", legs: [
          { side: "C", label: strikeStr(lg.strike) + "C" + (lg.expiry ? " " + ibkrDate(lg.expiry) : ""), perShare: -n(lg.prima), cash: -n(lg.prima) * qty },
          { side: "V", label: strikeStr(lg.strike) + "C", perShare: n(p.closeLongPrice), cash: n(p.closeLongPrice) * qty },
        ] });
      }
    } else if ((natOf(p) === "ACC" || natOf(p) === "COLLAR") && p.closed && p.closePrice !== "" && p.closePrice != null) {
      const fee = n(p.closeComision);
      const useFifo = natOf(p) === "ACC" && hasLots(p);
      const net = useFifo ? fifoRealized(p.lots, p.closePrice, fee) : (n(p.closePrice) - n(effBep(p))) * qty - fee;
      mtmEvents.push({ id: p.id + "-closemtm", posId: p.id, date: p.closeDate, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: useFifo ? "Cierre FIFO" : "Cierre", cash: net, fee, strike: "", right: "", qty: qtyLabelOf(p), bep: n(effBep(p)), note: p.closeNote || "" });
    }
    /* ventas por lote (v5.24): cada venta parcial/total de acciones registra su P&L realizado en MTM,
       independientemente de que la posición siga abierta. Realizado = (precio − coste del lote) × qty − fee. */
    if (natOf(p) === "ACC" && Array.isArray(p.soldLots)) {
      p.soldLots.forEach((s, idx) => {
        const sfee = n(s.fee);
        const realized = (n(s.price) - n(s.cost)) * n(s.qty) - sfee;
        mtmEvents.push({ id: p.id + "-sold" + (s.id || idx), posId: p.id, date: s.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Venta lote", cash: realized, fee: sfee, strike: "", right: "", qty: n(s.qty) + " acc", bep: n(s.cost), note: "Venta " + n(s.qty) + " @ $" + money2(n(s.price)) + " (coste $" + money2(n(s.cost)) + ")" });
      });
    }
    /* dividendos (v5.28): ingreso de acciones/ETF. Va tanto a Primas (cobro) como a MTM (cash realizado).
       v3.63: cash neto = importe − retención (impuestos del bróker) − comisión; la retención va en la
       nota, no en fee (es impuesto, no comisión). Son listas distintas (dos pestañas), sin duplicar. */
    if (natOf(p) === "ACC" && Array.isArray(p.dividends)) {
      p.dividends.forEach((d, idx) => {
        const dfee = n(d.fee), dret = n(d.ret);
        const cash = n(d.amount) - dret - dfee;
        const base = { posId: p.id, date: d.date, tkr: p.tkr, block: p.block, tipo: p.tipo, kind: "Dividendo", cash, fee: dfee, strike: "", right: "", qty: "", note: "Dividendo" + (dret ? " · retención $" + money2(dret) : "") + (dfee ? " · comisión $" + money2(dfee) : "") };
        primaEvents.push({ ...base, id: p.id + "-div" + (d.id || idx) });
        mtmEvents.push({ ...base, id: p.id + "-divmtm" + (d.id || idx) });
      });
    }
  });

  const allEvents = sub === "primas" ? primaEvents : mtmEvents;
  allEvents.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
  /* v3.31: filtro por bloque. `blocksPresent` alimenta las chips (solo los bloques que tienen movimientos
     en la sub-pestaña actual); `events` queda filtrado, así que mes, año y acumulado se recalculan solos
     porque todos derivan de él. v3.32: se excluye B0 de las chips (no genera primas/MTM y no hace falta;
     "Todos" sigue incluyendo cualquier movimiento de B0 que hubiera). */
  const blocksPresent = BLOCKS.filter((b) => b.id !== 0 && allEvents.some((e) => e.block === b.id));
  const events = blockFilter === "all" ? allEvents : allEvents.filter((e) => e.block === blockFilter);

  const monthGroups = {};
  const yearTotals = {};
  events.forEach((e) => {
    const mKey = e.date ? e.date.slice(0, 7) : "sin-fecha";
    const yKey = e.date ? e.date.slice(0, 4) : "sin-fecha";
    if (!monthGroups[mKey]) monthGroups[mKey] = { items: [], total: 0, fees: 0 };
    monthGroups[mKey].items.push(e);
    monthGroups[mKey].total += e.cash;
    monthGroups[mKey].fees += e.fee || 0;
    if (!yearTotals[yKey]) yearTotals[yKey] = { total: 0, fees: 0 };
    yearTotals[yKey].total += e.cash;
    yearTotals[yKey].fees += e.fee || 0;
  });
  const monthKeys = Object.keys(monthGroups).sort();
  const yearKeys = Object.keys(yearTotals).sort();
  const monthsOfYear = (y) => monthKeys.filter((k) => (k === "sin-fecha" ? y === "sin-fecha" : k.slice(0, 4) === y));
  const grandTotal = events.reduce((s, e) => s + e.cash, 0);
  const grandFees = events.reduce((s, e) => s + (e.fee || 0), 0);
  const MESES = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
  const monthLabel = (key) => { if (key === "sin-fecha") return "Sin fecha"; const [y, m] = key.split("-"); return MESES[Number(m) - 1] + " " + y; };

  /* ---------- Estrategias: todas las posiciones archivadas por tipo ---------- */
  const STRAT_CATS = ["Acciones", "Covered Calls", "Short Puts", "Long Calls", "PMCC", "Diagonal", "Iron Condor", "Earnings", "Iron Fly", "Iron Man", "Spreads", "Broken Wings", "DC/DD", "Otras"]; /* v3.53: "Credit Spreads" -> "Spreads" */
  const categoryOf = (p) => {
    const t = (p.tipo || "").toLowerCase();
    if (isCashNat(p)) return null; // cash no es una estrategia
    if (natOf(p) === "ACC") return "Acciones";
    if (t === "pmcc") return "PMCC";
    if (t === "diagonal") return "Diagonal";
    if (isLongCallPos(p)) return "Long Calls";
    if (t === "iron condor") return "Iron Condor";
    if (t === "earnings") return "Earnings"; /* v1.06: calco de IC con pestaña propia */
    if (t === "iron fly") return "Iron Fly";
    if (t === "iron man") return "Iron Man";
    if (["dc", "dd", "calendar"].includes(t)) return "DC/DD";
    if (t === "short put") return "Short Puts";
    if (t === "short call") return "Covered Calls";
    /* cualquier opción corta (nat Crédito) de CUALQUIER bloque cae en su estrategia por el right,
       aunque la etiqueta de estrategia esté vacía o sea otra: P → Short Puts, C → Covered Calls */
    if (natOf(p) === "CRED") return p.right === "C" ? "Covered Calls" : "Short Puts";
    /* v1.63: Credit Spread/Spread y Broken Wings COBRAN (o pagan) una prima neta — no son débitos genéricos
       y no pintan nada en "Otras"; v3.53: acepta el nombre nuevo "spread" y el viejo "credit spread" */
    if (t === "credit spread" || t === "spread") return p.er ? "Earnings" : "Spreads"; /* v3.64: spread de earnings → histórico de Earnings */
    if (t.includes("broken wing")) return "Broken Wings";
    return "Otras"; /* solo débitos genéricos */
  };
  const catCount = (c, closed) => positions.filter((p) => categoryOf(p) === c && !!p.closed === closed).length;

  const primaSumOf = (p) => primaEvents.filter((e) => e.posId === p.id).reduce((s, e) => s + e.cash, 0);
  const mtmSumOf = (p) => mtmEvents.filter((e) => e.posId === p.id).reduce((s, e) => s + e.cash, 0);
  /* resultado realizado de una posición CERRADA (v5.13) — mismo criterio que la tarjeta de cada operación:
     opciones cortas normales → prima acumulada; Long Call y credit spreads → realizado MTM (neto contra
     apertura); acciones y débitos → MTM. Se usa para el resumen agregado de la pestaña de estrategia. */
  const closedResultOf = (p) => {
    if (!isOptionNat(p)) return mtmSumOf(p);
    const noOpenBooked = isLongCallPos(p) || isCreditSpread(p);
    return noOpenBooked ? mtmSumOf(p) : primaSumOf(p);
  };
  /* v1.02: resultado "hasta ahora" de una posición ABIERTA — en opciones, la prima ya cobrada (aperturas +
     rolls registrados en Primas); en acciones/otros, el realizado MTM (dividendos, ventas parciales). Los
     credit spreads abiertos no registran nada hasta el cierre (por diseño), así que su abierto es 0. */
  const openResultOf = (p) => (isOptionNat(p) ? primaSumOf(p) : mtmSumOf(p));
  const stratResultOf = (p) => (p.closed ? closedResultOf(p) : openResultOf(p));
  /* v1.02: listado de la estrategia activa con orden seleccionable — fecha (cierre/apertura, reciente
     primero, el comportamiento histórico), ticker (alfabético, empate por fecha) o profit (mayor primero;
     cerradas usan el realizado y abiertas la prima acumulada hasta ahora). */
  const stratDateOf = (p) => p.closeDate || p.entryDate || "";
  /* v1.07: ganadora/perdedora con el mismo criterio del resumen — cerradas: ejercida cuenta como perdedora
     aunque quede prima; abiertas: signo del acumulado hasta ahora. Combinable con el filtro de ticker.
     v3.39 (Victor): la asignación NO es automáticamente una pérdida, depende del tipo —
     · COVERED CALL asignada: te llaman las acciones al strike. Si el strike está POR ENCIMA del BEP de la
       acción vinculada, vendiste por encima de tu coste → es una GANANCIA (lo que se pierde es recorrido,
       no dinero). Solo es pérdida si el strike queda por debajo del BEP.
     · SHORT PUT asignada: el resultado real se muda a la posición de acciones (aún abierta casi siempre),
       así que aquí no es ni ganadora ni perdedora — queda sin clasificar hasta cerrar la cadena.
     El enlace es coveredBy (call → acción); las covered calls antiguas sin enlace caen al heurístico
     broker+ticker, y si no aparece la acción se deja SIN clasificar antes que contarla como pérdida. */
  const stockForCall = (p) => {
    if (p.coveredBy) return positions.find((x) => x.id === p.coveredBy) || null;
    const t = (p.tkr || "").toUpperCase().trim();
    return positions.find((x) => natOf(x) === "ACC" && (x.tkr || "").toUpperCase().trim() === t && x.broker === p.broker) || null;
  };
  /* clasificación de una CERRADA: "W" ganadora, "L" perdedora, null = sin clasificar (no puntúa) */
  const closedGrade = (p) => {
    if (p.exercised) {
      if (natOf(p) === "CRED" && p.right === "C" && !isPMCC(p)) {
        const st = stockForCall(p);
        if (!st) return null;                                  /* sin acción vinculada: no clasificamos */
        const bep = n(effBep(st));
        if (!bep) return null;
        return n(p.strike) >= bep ? "W" : "L";                 /* strike sobre el coste = salida en beneficio */
      }
      if (natOf(p) === "CRED" && p.right === "P" && !isPMCC(p)) return null; /* put asignada: pendiente de la acción */
      return "L";
    }
    const r = closedResultOf(p);
    return r > 0 ? "W" : r < 0 ? "L" : null;
  };
  const isWinner = (p) => (p.closed ? closedGrade(p) === "W" : openResultOf(p) > 0);
  const isLoser = (p) => (p.closed ? closedGrade(p) === "L" : openResultOf(p) < 0);
  const stratBase = positions.filter((p) => categoryOf(p) === stratCat && !!p.closed === (stratStatus === "Cerradas"))
    .filter((p) => stratCat !== "Earnings" || erKind === "Todo" || (erKind === "IC" ? !isSpreadTipo(p.tipo) : isSpreadTipo(p.tipo))); /* v3.64: el histórico de Earnings filtra IC vs Spreads */
  const stratTkrs = Array.from(new Set(stratBase.map((p) => (p.tkr || "").toUpperCase().trim()).filter(Boolean))).sort();
  const stratItems = stratBase
    .filter((p) => stratTkr === "Todos" || (p.tkr || "").toUpperCase().trim() === stratTkr)
    .filter((p) => stratWin === "Todas" || (stratWin === "Ganadoras" ? isWinner(p) : isLoser(p)))
    /* v1.69: en Cerradas, intervalo de fechas sobre closeDate (ISO compara bien como string) */
    .filter((p) => stratStatus !== "Cerradas" || ((!stratFrom || (p.closeDate || "") >= stratFrom) && (!stratTo || (p.closeDate || "") <= stratTo)))
    .sort((a, b) => {
      if (stratSort === "ticker") {
        const t = (a.tkr || "").localeCompare(b.tkr || "");
        return t !== 0 ? t : (stratDateOf(b) < stratDateOf(a) ? -1 : 1);
      }
      if (stratSort === "profit") return stratResultOf(b) - stratResultOf(a);
      return stratDateOf(b) < stratDateOf(a) ? -1 : 1;
    });
  const todayIso = new Date().toISOString().slice(0, 10);
  /* v1.14: exportar las cerradas de la estrategia activa (respetando filtros) como JSON compacto para
     pegar en un chat y que la evalúe una IA — condiciones de entrada, gestión y resultado por operación,
     más el resumen agregado. Copia al portapapeles; si no se puede, abre la hoja de compartir. */
  const exportStrat = () => {
    const ops = stratItems.map((p) => {
      const isOpt = isOptionNat(p);
      const rolls = (p.rollChain || []).length;
      const openStrike = openingStrike(p), openExpiry = openingExpiry(p), openPrima = openingPrimaPerShare(p);
      const o = {
        tkr: p.tkr || null, tipo: p.tipo || categoryOf(p), bloque: "B" + p.block,
        abierta: p.entryDate || null, cerrada: p.closeDate || null,
        dit: isFinite(daysBetween(p.entryDate, p.closeDate)) ? daysBetween(p.entryDate, p.closeDate) : null,
        resultado: Math.round(closedResultOf(p) * 100) / 100,
        ejercida: !!p.exercised,
      };
      if (isOpt) {
        o.contratos = Number.isInteger(n(p.qty) / 100) ? n(p.qty) / 100 : n(p.qty) + " opc";
        o.right = p.right || null;
        o.strikeApertura = openStrike || null; o.expiryApertura = openExpiry || null;
        o.primaAperturaPorAcc = n(openPrima) || null;
        o.dteApertura = isFinite(daysBetween(p.entryDate, openExpiry)) ? daysBetween(p.entryDate, openExpiry) : null;
        o.deltaApertura = p.delta || null; o.ivrApertura = p.ivr || null;
        o.rolls = rolls;
        if (rolls > 0) { o.strikeFinal = p.strike || null; o.expiryFinal = p.expiry || null; }
        if (isCreditSpread(p)) { o.putSpread = p.putSpread || null; o.callSpread = p.callSpread || null; o.riesgoManual = n(p.margen) || null; }
        if (isVertical(p)) { o.strikeCorta = p.sK || null; o.strikeLarga = p.lK || null; o.opsPorPata = (p.legOps || []).length || null; }
        else if (natOf(p) === "CRED" && !isPMCC(p)) o.riesgo = Math.round(Math.abs((n(openStrike) - n(openPrima)) * n(p.qty)));
      } else {
        o.acciones = n(p.qty);
        o.bep = n(effBep(p)) || null; o.precioVenta = n(p.closePrice) || null;
      }
      if (p.closeNote) o.nota = p.closeNote;
      return o;
    });
    const wins = stratItems.filter(isWinner).length;
    const total = stratItems.reduce((s, pp) => s + closedResultOf(pp), 0);
    const payload = {
      app: "Bloques v" + APP_VERSION, exportado: todayIso, estrategia: stratCat,
      filtro: { ticker: stratTkr, resultado: stratWin, desde: stratFrom || null, hasta: stratTo || null },
      resumen: { operaciones: ops.length, ganadoras: wins, perdedoras: stratItems.filter(isLoser).length, winRate: ops.length ? Math.round((wins / ops.length) * 100) + "%" : null, profitTotal: Math.round(total * 100) / 100, mediaPorOp: ops.length ? Math.round((total / ops.length) * 100) / 100 : null },
      operaciones: ops,
    };
    const text = JSON.stringify(payload, null, 1);
    const done = () => { setExportMsg("Copiado para el análisis"); setTimeout(() => setExportMsg(""), 3500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => { if (navigator.share) navigator.share({ text }).catch(() => {}); else done(); });
    } else if (navigator.share) { navigator.share({ text }).catch(() => {}); }
  };
  const shortDate = (iso) => { if (!iso) return ""; const [y, m, d] = iso.split("-"); return `${d}/${m}/${y.slice(-2)}`; };

  return (
    <>
      <div style={{ display: "flex", gap: 6, background: T.card, borderRadius: 18, padding: 6, marginBottom: 14, boxShadow: T.shadow }}>
        {[["primas", "Primas"], ["mtm", "MTM"], ["rendimiento", "Rendimiento"], ["estrategias", "Histórico"]].map(([id, label]) => (
          <button key={id} onClick={() => { setSub(id); setBlockFilter("all"); }} style={{
            flex: 1, border: "none", cursor: "pointer", borderRadius: 13, padding: "8px 0 7px", fontSize: 12, fontWeight: 700,
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            background: sub === id ? T.dark : "transparent", color: sub === id ? "#fff" : T.sub,
          }}>
            <NavIcon name={id} />
            <span>{label}</span>
          </button>
        ))}
      </div>

      {sub === "rendimiento" ? (
        <RendimientoCard snapshots={snapshots} flows={flows} onSave={saveSnapshot} onDelete={deleteSnapshot} />
      ) : sub !== "estrategias" ? (
        <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>{sub === "primas" ? "Primas" : "MTM · resultado realizado"}</div>
            <div style={{ fontSize: 11.5, color: T.sub, fontWeight: 500, marginTop: 1 }}>
              {sub === "primas" ? "Cash de cada apertura, roll (neto) y cierre. Toca una línea para ver strike y detalle." : "Ganancia/pérdida realizada de cada roll y cierre, comparando contra el precio de entrada de esa pata. Fee incluido en el neto y visible por línea."}
            </div>
          </div>

          {/* v3.31: filtro por bloque — solo se ofrecen los bloques con movimientos en esta sub-pestaña.
             Al elegir uno, mes/año/acumulado se recalculan sobre ese bloque; "Todos" restaura el total. */}
          {blocksPresent.length > 1 && (
            <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
              {[{ id: "all", label: "Todos", color: T.dark }].concat(blocksPresent.map((b) => ({ id: b.id, label: b.name.replace("Bloque ", "B"), color: b.color }))).map((opt) => {
                const active = blockFilter === opt.id;
                return (
                  <button key={opt.id} onClick={() => setBlockFilter(opt.id)} style={{
                    border: "none", cursor: "pointer", borderRadius: 10, padding: "7px 13px", fontSize: 12.5, fontWeight: 800,
                    background: active ? opt.color : T.tile, color: active ? "#fff" : T.sub, transition: "background .15s",
                  }}>{opt.label}</button>
                );
              })}
            </div>
          )}

          {events.length === 0 && (
            <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>
              {sub === "primas" ? "Aún no hay primas registradas. Se generan al abrir, rolar o cerrar una posición de opciones con fecha." : "Aún no hay resultado realizado. Se genera al rolar una opción o cerrar una posición."}
            </div>
          )}

          {events.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "64px 1fr 76px 100px", gap: 0, padding: "4px 0 6px 12px", borderBottom: `1px solid ${T.line}` }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Fecha</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4 }}>Ticker</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, textAlign: "right", paddingRight: 8 }}>Fee</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, textTransform: "uppercase", letterSpacing: 0.4, textAlign: "right", paddingLeft: 8, paddingRight: 10 }}>{sub === "primas" ? "Prima" : "P&L"}</span>
            </div>
          )}
          {yearKeys.map((y) => {
            const yCollapsed = !openYears.has(y);

              const g = byTkr[k];
              const r = p.closed ? closedResultOf(p) : openResultOf(p);
              if (p.closed) { g.closed += r; g.nClosed++; } else { g.open += r; g.nOpen++; }
              if (!g.cats[cat]) g.cats[cat] = { n: 0, res: 0, shOpen: 0, shClosed: 0 };

                 ticker sin duplicar. Siguen el estado de su posición (abierta/cerrada) para el filtro. */
              const dv = cat === "Acciones" && Array.isArray(p.dividends) ? p.dividends.reduce((s, d) => s + n(d.amount) - n(d.ret) - n(d.fee), 0) : 0; /* v3.63: neto de retención */
              const nDv = cat === "Acciones" && Array.isArray(p.dividends) ? p.dividends.length : 0;
              g.cats[cat].res += r - dv;
              if (nDv > 0 || dv !== 0) {
                if (!g.cats["Dividendos"]) g.cats["Dividendos"] = { n: 0, res: 0, shOpen: 0, shClosed: 0 };
                g.cats["Dividendos"].n += nDv; g.cats["Dividendos"].res += dv;

              if (cat === "Acciones") { if (p.closed) g.cats[cat].shClosed += n(p.qty); else g.cats[cat].shOpen += n(p.qty); }

            const sumOpen = tkrs.reduce((s, k) => s + byTkr[k].open, 0);

                    {(tikrStatus === "Abiertas" ? [["Primas · abiertas", sumOpen]] : tikrStatus === "Cerradas" ? [["Realizado · cerradas", sumClosed]] : [["Primas · abiertas", sumOpen], ["Realizado · cerradas", sumClosed]]).map(([lbl, val]) => (
                      <div key={lbl} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "9px 6px", textAlign: "center" }}>

                {tkrs.map((k) => {
