function idbOpen() {

  });

   cada llamada y dos guardados seguidos podían COMPLETARSE EN DESORDEN, dejando IndexedDB con el valor viejo
   (más pequeño) — y como al cargar IDB manda, se cargaban datos recortados y la copia automática nacía corta.
   Ahora cada clave guarda su "último valor" y las escrituras se encadenan: el estado final de IDB es siempre
   el último valor escrito, en orden, sin carreras. */

const __idbLatest = Object.create(null);
function idbSet(key, val) {
  __idbLatest[key] = val;
  __idbChain = __idbChain.then(async () => {
    const v = __idbLatest[key];
    if (v === undefined) return;
    try { const db = await idbOpen(); await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).put(v, key); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); } catch (e) {}
  });

}
function idbDel(key) {
  __idbLatest[key] = undefined;

    try { const db = await idbOpen(); await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).delete(key); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); } catch (e) {}
  });
  return __idbChain;
}

  try { const db = await idbOpen(); return await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, "readonly"); const rq = tx.objectStore(IDB_STORE).get(key); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); } catch (e) { return undefined; }

function pickPos(a, b) {
  if (!a) return b; if (!b) return a;
  if (!!a.closed !== !!b.closed) return a.closed ? a : b;
  const score = (p) => (p.rollChain ? p.rollChain.length : 0) + (p.soldLots ? p.soldLots.length : 0) + (p.dividends ? p.dividends.length : 0) + (p.lots ? p.lots.length : 0);

function mergePositionsById(primary, secondary) {
  const a = Array.isArray(primary) ? primary : null;
  const b = Array.isArray(secondary) ? secondary : null;
  if (a && b) {
    const m = new Map();
    b.forEach((x) => { if (x && x.id) m.set(x.id, x); });
    a.forEach((x) => { if (x && x.id) m.set(x.id, m.has(x.id) ? pickPos(x, m.get(x.id)) : x); });

const tickerOf = (tr) => ((tr.tkr || "").trim() || "Sin ticker");
/* strike+P/C y expiry van en una línea, DTE en la suya propia debajo — más fácil de leer de un vistazo */
const strikeRightOf = (tr) => (n(tr.strike) > 0 ? compStrikeStr(tr.strike) + (tr.right === "C" ? "C" : "P") : "");
const expiryOf = (tr) => (tr.expiry ? ibkrDate(tr.expiry) : "");
const dteOf = (tr) => (n(tr.dte) > 0 ? n(tr.dte) + " DTE" : "");
/* DTE y Delta en la misma línea bajo el ticker, ej. "44 DTE / Delta 30" — sin decimales ni signo, solo magnitud */
const dteDeltaOf = (tr) => {
  const dte = dteOf(tr);
  const d = Math.abs(n(tr.delta));
  const deltaStr = d ? "Delta " + Math.round(d) : "";
  return dte && deltaStr ? dte + " / " + deltaStr : (dte || deltaStr);
};
const strikeLineOf = (tr) => [strikeRightOf(tr), expiryOf(tr)].filter(Boolean).join(" · ");

/* ---------- lector de capturas con Gemini (visión) para el Comparador ---------- */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => { const s = String(r.result || ""); resolve(s.slice(s.indexOf(",") + 1)); };
    r.onerror = () => reject(new Error("no pude leer el fichero"));
    r.readAsDataURL(file);
  });
}
/* Redimensiona la captura ANTES de subirla a Gemini: menos bytes que viajan por red y menos "tiles" de
   visión que el modelo tiene que procesar → respuesta más rápida, sobre todo con capturas de escritorio
   (2000-3000px) que van mucho más allá de lo que hace falta para leer texto de una app de bróker.
   Seguimos usando PNG (sin pérdida) para no meter artefactos de compresión que compliquen leer el texto.
   Si algo falla (navegador raro, archivo corrupto…) caemos de vuelta al fichero original sin redimensionar. */
const OCR_MAX_DIM = 1280;
function resizeImageToBase64(file, maxDim) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const { width, height } = img;
        const scale = Math.min(1, maxDim / Math.max(width, height));
        const w = Math.max(1, Math.round(width * scale));
        const h = Math.max(1, Math.round(height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/png");
        URL.revokeObjectURL(url);
        resolve(dataUrl.slice(dataUrl.indexOf(",") + 1));
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("no pude cargar la imagen para redimensionar")); };
    img.src = url;
  });
}

/* Cuenta lo que importa a partir de lo leído: M eventos, X veces que |actual| superó el expected,
   y U veces que cerró en verde (solo tiene sentido en la serie CLOSE, que es la dirección real). */
function tallyEarningsChart(data) {
  const evs = Array.isArray(data && data.eventos) ? data.eventos.filter((e) => isFinite(n(e.expected)) && n(e.expected) > 0 && e.actual != null && isFinite(Number(e.actual))) : [];
  const M = evs.length;
  const X = evs.filter((e) => Math.abs(Number(e.actual)) > n(e.expected)).length;
  const U = evs.filter((e) => Number(e.actual) > 0).length;
  const serie = String((data && data.serie) || "").toUpperCase();
  const key = serie.indexOf("OPEN") >= 0 ? "xOpen" : serie.indexOf("CLOSE") >= 0 ? "xClose" : serie.indexOf("HIGH") >= 0 ? "xHigh" : serie.indexOf("LOW") >= 0 ? "xLow" : null;
  return { key, serie, M, X, U, ticker: String((data && data.ticker) || "").toUpperCase().replace(/[^A-Z.]/g, "").slice(0, 8), avgExpected: n(data && data.avgExpected) || null };
}
function buildTradeFromGemini(data, file) {
  const tkr = (data.ticker || "").toUpperCase().replace(/[^A-Z.]/g, "").slice(0, 8);
  const right = data.right === "P" || data.right === "C" ? data.right : "";
  const strikeN = n(data.strike);
  const strike = strikeN > 0 ? String(strikeN) : "";
  let dte = "", expiry = "";
  if (typeof data.expiry === "string" && /^\d{4}-\d{2}-\d{2}$/.test(data.expiry)) {
    expiry = data.expiry;
    const exp = new Date(data.expiry + "T00:00:00Z");
    const photo = new Date(file && file.lastModified ? file.lastModified : Date.now());
    const photoUTC = Date.UTC(photo.getFullYear(), photo.getMonth(), photo.getDate());
    if (!isNaN(exp.getTime())) dte = String(Math.max(Math.round((exp.getTime() - photoUTC) / 86400000), 0));
  }
  const ask = n(data.ask), bid = n(data.bid);
  const plausible = (v) => isFinite(v) && v > 0 && v < 1000 && (!strikeN || v < strikeN * 1.5);
  const askOk = plausible(ask), bidOk = plausible(bid);
  let credit = "";
  if (askOk && bidOk) credit = String(Math.round(((ask + bid) / 2) * 1000) / 1000);
  else if (askOk) credit = String(ask);
  else if (bidOk) credit = String(bid);
  const marginN = n(data.margin);
  const margin = isFinite(marginN) && marginN > 0 && marginN < 1000000 ? String(marginN) : "";
  const underN = n(data.underlying);
  const underlying = isFinite(underN) && underN > 0 && underN < 100000 ? String(underN) : "";
  const deltaN = n(data.delta);
  const delta = isFinite(deltaN) && deltaN !== 0 && Math.abs(deltaN) < 100000 ? String(deltaN) : "";
  const popN = n(data.pop);
  const pop = isFinite(popN) && popN > 0 && popN <= 100 ? String(Math.round(popN * 10) / 10) : "";
  return { tkr, strike, dte, credit, margin, right, expiry, underlying, delta, pop, ask: askOk ? ask : null, bid: bidOk ? bid : null };
}

/* normaliza una fecha leída (YYYY-MM-DD, "JUL 17 '26", "20 JUL 2026", "07/17/2026"…) a YYYY-MM-DD.
   Los LLM devuelven el vencimiento en formatos variados; aquí lo dejamos siempre en ISO para el input date. */
const MONTHS_NORM = { jan: 1, feb: 2, mar: 3, apr: 4, may: 5, jun: 6, jul: 7, aug: 8, sep: 9, oct: 10, nov: 11, dec: 12, ene: 1, abr: 4, ago: 8, dic: 12 };
function normDate(s) {
  if (!s && s !== 0) return "";
  const str = String(s).trim();
  if (!str) return "";
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return `${m[1]}-${String(+m[2]).padStart(2, "0")}-${String(+m[3]).padStart(2, "0")}`;
  m = str.match(/([A-Za-z]{3,})\.?\s+(\d{1,2})\D+(\d{2,4})/) || str.match(/(\d{1,2})\s+([A-Za-z]{3,})\.?\s+(\d{2,4})/);
  if (m) {
    let mon, day, yr;
    if (/[A-Za-z]/.test(m[1])) { mon = MONTHS_NORM[m[1].slice(0, 3).toLowerCase()]; day = +m[2]; yr = +m[3]; }
    else { day = +m[1]; mon = MONTHS_NORM[m[2].slice(0, 3).toLowerCase()]; yr = +m[3]; }
    if (mon && day) { if (yr < 100) yr += 2000; return `${yr}-${String(mon).padStart(2, "0")}-${String(day).padStart(2, "0")}`; }
  }
  const d = new Date(str);
  if (!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  return "";
}
/* mapea las patas leídas a los campos del asistente según la estrategia elegida.

/* ---------- donut chart interactivo, sin recorte ---------- */
function Donut({ slices, size, thickness, selected, onSelect }) {
  const pad = 6; // margen reservado para el grosor extra al seleccionar
  const total = slices.reduce((s, x) => s + x.value, 0) || 1;
  const r = (size - thickness - pad) / 2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: "visible" }}>
      <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={T.tile} strokeWidth={thickness} />
        {slices.map((s, i) => {
          const frac = s.value / total;
          const dash = frac * c;
          const isSel = selected === s.id;
          const dim = selected && !isSel;
          const el = (
            <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth={isSel ? thickness + pad : thickness}
              strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-offset} strokeLinecap="butt"
              opacity={dim ? 0.32 : 1} style={{ cursor: "pointer", transition: "opacity .15s, stroke-width .15s" }}
              onClick={() => onSelect(isSel ? null : s.id)} />
          );
          offset += dash;
          return el;
        })}
      </g>
    </svg>
  );
}

/* ---------- v1.31: AVISOS ----------
   Dos familias distintas, y confundirlas sería un error:
     · PREVENTIVOS  — algo va a pasar (CC ITM cerca del vencimiento → te van a llamar las acciones).
     · CORRECTIVOS  — algo YA pasó y no está registrado (opción vencida sin cerrar, call ejercida cuya
       acción sigue en cartera, put asignada sin enlazar). Estos ensucian el P&L en silencio.
   Los correctivos van primero: son los que hacen que los números mientan. */
function AvisosCard({ positions, onFixCalledAway, onOpenChain, onAssignFromPut, onDropDuplicate }) {
  const hoy = new Date().toISOString().slice(0, 10);
  const opts = positions.filter((p) => natOf(p) === "CRED" && !isPMCC(p));
  const avisos = [];

  /* v1.33 · CORRECTIVO URGENTE · acción DUPLICADA creada por el botón «Asignar» de v1.32.
     Se detecta por: tiene assignedFrom (la creó la app) Y existe otra acción abierta del mismo ticker
     que NO la creó la app (la real, importada del broker). Duplica cantidad, riesgo y MKT VL. */
  positions.filter((p) => natOf(p) === "ACC" && !p.closed && p.assignedFrom).forEach((dup) => {
    const key = (dup.tkr || "").toUpperCase().trim();
    const real = positions.find((s2) => s2.id !== dup.id && natOf(s2) === "ACC" && !s2.closed
      && (s2.tkr || "").toUpperCase().trim() === key && !s2.assignedFrom);
    if (!real) return;
    avisos.push({
      sev: "red", id: dup.id + "-dup",
      titulo: (dup.tkr || "?") + " · acciones duplicadas",
      detalle: "Se crearon " + n(dup.qty) + " acc además de las " + n(real.qty) + " que ya tenías en cartera. Están inflando cantidad, riesgo y MKT VL. Bórralas: la put se reengancha sola a la posición real.",
      accion: onDropDuplicate ? { label: "Borrar las " + n(dup.qty) + " duplicadas", fn: () => onDropDuplicate(dup.id) } : null,
    });
  });

  /* CORRECTIVO · call ejercida pero las acciones siguen en cartera */
  opts.filter((p) => p.closed && p.exercised && p.right === "C").forEach((cc) => {
    const linked = cc.onStock ? positions.find((s2) => s2.id === cc.onStock) : null;
    const cands = positions.filter((s2) => natOf(s2) === "ACC" && !s2.closed && (s2.tkr || "").toUpperCase().trim() === (cc.tkr || "").toUpperCase().trim());
    const stock = linked && !linked.closed ? linked : (!linked && cands.length === 1 ? cands[0] : null);
    if (!stock && !(cands.length > 1)) return;
    avisos.push({
      sev: "red", id: cc.id + "-ca",
      titulo: (cc.tkr || "?") + " · te llamaron las acciones y siguen en cartera",
      detalle: "La call $" + strikeStr(cc.strike) + " se cerró como ejercida el " + ibkrDate(cc.closeDate) + ", pero " + (stock ? n(stock.qty) + " acc siguen abiertas" : "hay varias posiciones de " + cc.tkr + ", elige cuál") + ". El P&L de esa acción es fantasma.",
      accion: stock ? { label: "Vender " + n(cc.qty) + " acc a $" + strikeStr(cc.strike), fn: () => onFixCalledAway(cc.id) } : null,
    });
  });

  /* CORRECTIVO · opción abierta cuyo vencimiento ya pasó */
  opts.filter((p) => !p.closed && p.expiry && p.expiry < hoy).forEach((p) => {
    const d = daysBetween(p.expiry, hoy);
    avisos.push({
      sev: "red", id: p.id + "-exp",
      titulo: (p.tkr || "?") + " · venció hace " + d + (d === 1 ? " día" : " días") + " y sigue abierta",
      detalle: (p.right === "C" ? "Call" : "Put") + " $" + strikeStr(p.strike) + " venc. " + ibkrDate(p.expiry) + ". Ciérrala (expirada, recomprada o asignada) o seguirá contando riesgo y prima que ya no existen.",
      accion: onOpenChain ? { label: "Abrir la posición", fn: () => onOpenChain(p.id) } : null,
    });
  });

  /* v1.33+ · CORRECTIVO · put asignada SIN COTIZACIÓN del subyacente. Desde v1.33 el ciclo se calcula
     como (precio actual − BEP de la put) × acciones: no hace falta enlazar ninguna acción, solo el precio.
     El antiguo aviso "asignada sin enlazar" ya no tiene sentido y se ha eliminado (se quedaba clavado:
     el enlace pasó a vivir en la put, así que el chequeo por assignedFrom nunca se satisfacía). */
  const spotLocal = (tkr) => {
    const k = (tkr || "").toUpperCase().trim();
    if (!k) return 0;
    const hit = positions.find((q) => (q.tkr || "").toUpperCase().trim() === k && n(q.last));
    return hit ? n(hit.last) : 0;
  };
  opts.filter((p) => p.closed && p.exercised && p.right === "P" && !isPMCC(p)).forEach((p) => {
    if (spotLocal(p.tkr)) return;
    avisos.push({
      sev: "amber", id: p.id + "-px",
      titulo: (p.tkr || "?") + " · asignada sin precio del subyacente",
      detalle: "BEP $" + money2(effBep(p)) + " × " + n(p.qty) + " acc. Sin cotización de " + (p.tkr || "?") + " no se puede medir el ciclo, y la app prefiere no inventarse una cifra. Carga el último precio de " + (p.tkr || "?") + " en su posición.",
      accion: onOpenChain ? { label: "Abrir la posición", fn: () => onOpenChain(p.id) } : null,
    });
  });

  /* PREVENTIVO · covered call ITM — te van a llamar las acciones */
  opts.filter((p) => !p.closed && p.right === "C" && p.expiry && p.expiry >= hoy).forEach((p) => {
    const last = n(p.last), strike = n(p.strike);
    if (!last || !strike || last <= strike) return;
    const dte = daysBetween(hoy, p.expiry);
    avisos.push({
      sev: "amber", id: p.id + "-itm",
      titulo: (p.tkr || "?") + " · call ITM a " + dte + (dte === 1 ? " día" : " días") + " del vencimiento",
      detalle: "Últ. $" + money2(last) + " sobre el strike $" + strikeStr(p.strike) + ". Si sigue así te llaman las acciones a $" + strikeStr(p.strike) + ". Rola, recompra o acepta la venta.",
      accion: null,
    });
  });

  if (!avisos.length) return null;
  const order = { red: 0, amber: 1 };
  avisos.sort((a, b) => order[a.sev] - order[b.sev]);
  const nRed = avisos.filter((a) => a.sev === "red").length;

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 12 }}>

                      return (

                             peligro si el último sube sobre el strike. Verde en el caso contrario, neutro sin precio. */
                          const lastN = n(d.last), strikeN = n(d.strike);
                          const hasLast = d.last !== "" && d.last != null && isFinite(lastN) && lastN !== 0 && strikeN !== 0;
                          const danger = hasLast && (d.right === "C" ? lastN > strikeN : lastN < strikeN);
                          /* semáforo de asignación por sombreado de fila: rojo suave = strike superado (riesgo de

                            {" · x " + d.qtyNum + " "}
                            {d.spreads ? (
                              <span style={{ fontWeight: 800 }}>{(d.tipo === "Iron Condor" ? "IC " : d.tipo ? d.tipo + " " : "") + d.spreads}</span>

                            ) : (
                              <span style={{ fontWeight: 800 }}>{strikeStr(d.strike) + (d.right === "C" ? "C" : "P")}</span>
                            )}
                            {hasLast && <span style={{ fontWeight: 700 }}>{" · Últ $" + money2(lastN)}</span>}
                            {isFinite(d.bep) && n(d.bep) !== 0 ? " · BEP $" + money2(d.bep) : ""}
                          </span>
                          <span style={{ fontSize: 12, color: T.sub, fontWeight: 800, flexShrink: 0 }}>{d.covered && !d.riesgo ? "cubierta" : "$" + money(d.riesgo)}</span>
                        </div>

                        })()
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------- gráfico de métrica con ejes, grid y fechas ---------- */
const kFmt = (v) => { const a = Math.abs(v); if (a >= 1e6) return (v / 1e6).toFixed(1) + "M"; if (a >= 1e3) return Math.round(v / 1e3) + "k"; return String(Math.round(v)); };
const shortDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("es-ES", { day: "numeric", month: "short" });
function MetricChart({ points, color, axisFmt, valueFmt, dateFmt }) {
  const [active, setActive] = useState(null);
  const svgRef = useRef(null);
  if (points.length < 2) return null;
  const W = 320, H = 150, padL = 44, padR = 12, padT = 10, padB = 22;
  const vs = points.map((p) => p.v);
  let min = Math.min(...vs), max = Math.max(...vs);
  if (min === max) { const d = Math.abs(min) * 0.05 || 1; min -= d; max += d; }
  const span = max - min; min -= span * 0.1; max += span * 0.1;
  const x = (i) => padL + (i / (points.length - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const line = points.map((p, i) => `${x(i)},${y(p.v)}`).join(" ");
  const area = `${x(0)},${H - padB} ${line} ${x(points.length - 1)},${H - padB}`;
  const ticks = [0, 1, 2, 3].map((i) => min + ((max - min) * i) / 3);
  const midIdx = points.length >= 3 ? Math.floor((points.length - 1) / 2) : null;
  /* con muchos puntos los círculos se solapan y quedan como una mancha — a partir de cierta densidad
     solo marcamos el último (la línea completa se sigue viendo con todo el detalle). */
  const dense = points.length > 24;
  const fmtV = valueFmt || axisFmt;
  const fmtD = dateFmt || shortDate;
  /* scrubbing: al arrastrar dedo/ratón se resalta el punto más cercano y se muestra su fecha y valor */
  const locate = (clientX) => {
    const svg = svgRef.current; if (!svg) return;
    const r = svg.getBoundingClientRect();
    const sx = ((clientX - r.left) / r.width) * W;
    let idx = Math.round(((sx - padL) / (W - padL - padR)) * (points.length - 1));
    idx = Math.max(0, Math.min(points.length - 1, idx));
    setActive(idx);
  };
  const ap = active != null && active < points.length ? points[active] : null;
  const ax = ap ? x(active) : 0;
  const tipRight = ap && active > points.length / 2;
  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", touchAction: "none" }}
      onMouseMove={(e) => locate(e.clientX)} onMouseLeave={() => setActive(null)}
      onTouchStart={(e) => locate(e.touches[0].clientX)} onTouchMove={(e) => locate(e.touches[0].clientX)} onTouchEnd={() => setActive(null)}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke={T.line} strokeWidth={1} />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{axisFmt(t)}</text>
        </g>
      ))}
      <polygon points={area} fill={color} opacity={0.12} />
      <polyline points={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (!dense || i === points.length - 1) && <circle key={i} cx={x(i)} cy={y(p.v)} r={i === points.length - 1 ? 4 : 2.4} fill={i === points.length - 1 ? color : "#fff"} stroke={color} strokeWidth={1.5} />)}
      <text x={x(0)} y={H - 7} textAnchor="start" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[0].date)}</text>
      {midIdx != null && midIdx !== 0 && midIdx !== points.length - 1 && (
        <text x={x(midIdx)} y={H - 7} textAnchor="middle" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[midIdx].date)}</text>
      )}
      <text x={x(points.length - 1)} y={H - 7} textAnchor="end" fontSize={9} fontWeight={600} fill={T.sub}>{shortDate(points[points.length - 1].date)}</text>
      {ap && (
        <g pointerEvents="none">
          <line x1={ax} x2={ax} y1={padT} y2={H - padB} stroke={color} strokeWidth={1} strokeDasharray="3 3" opacity={0.7} />
          <circle cx={ax} cy={y(ap.v)} r={4.5} fill={color} stroke="#fff" strokeWidth={1.6} />
          <g transform={`translate(${tipRight ? ax - 94 : ax + 6}, ${padT})`}>
            <rect x={0} y={0} width={88} height={30} rx={6} fill={T.ink} opacity={0.92} />
            <text x={7} y={12} fontSize={9} fontWeight={600} fill="#fff" opacity={0.75}>{fmtD(ap.date)}</text>
            <text x={7} y={24} fontSize={11} fontWeight={800} fill="#fff">{fmtV(ap.v)}</text>
          </g>
        </g>
      )}
    </svg>
  );
}

/* ---------- rendimiento: snapshots fechados con variación ---------- */
const METRICS = {
  "NLV": { get: (s) => s.nlv, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.green },
  "MKT VL": { get: (s) => s.mktvl, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.green },
  "P&L": { get: (s) => s.totalPnl, fmt: (v) => signMoney(v), axis: (v) => "$" + kFmt(v), color: T.purple },
  "Riesgo": { get: (s) => s.totalRiesgo, fmt: (v) => "$" + money(v), axis: (v) => "$" + kFmt(v), color: T.orange },
  "Apal.": { get: (s) => s.leverage, fmt: (v) => (isFinite(v) ? v.toFixed(2) + "×" : "—"), axis: (v) => v.toFixed(2), color: T.purple },
  "EL/Margen": { get: (s) => s.elMrgn, fmt: (v) => pct(v), axis: (v) => Math.round(v * 100) + "%", color: T.gold },
  "EL/NLV": { get: (s) => s.elNlv, fmt: (v) => pct(v), axis: (v) => Math.round(v * 100) + "%", color: T.orange },
};
/* ---------- selector de métricas: dos filas fijas — arriba patrimonio/rentabilidad, abajo riesgo/exposición ---------- */
const METRIC_ROW1 = ["NLV", "MKT VL", "P&L", "Rent. real", "Aportado"];
const METRIC_ROW2 = ["Riesgo", "Apal.", "EL/Margen", "EL/NLV"];
/* nombre largo para el encabezado (la pill va abreviada para que quepa en dos líneas) */
const METRIC_TITLE = { "Apal.": "Apalancamiento" };
/* métricas cuyo % de variación no significa nada: el divisor es la propia métrica en el primer snapshot
   (P&L partiendo de casi cero da cifras absurdas tipo +781%; Aportado igual). Solo delta en $. */
const NO_PCT = ["P&L", "Aportado"];
/* ---------- rangos del gráfico de Rendimiento: filtra qué snapshots se muestran, evita saturación con historial largo ---------- */
const RANGE_DAYS = { "7D": 7, "1M": 30, "3M": 90, "1A": 365 };
const RANGE_KEYS = ["7D", "1M", "3M", "YTD", "1A", "Todo", "Fechas"];
function rangeCutoffISO(range) {
  if (range === "YTD") return new Date().getFullYear() + "-01-01";
  if (range === "Todo" || !RANGE_DAYS[range]) return null;
  const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - RANGE_DAYS[range]);
  return d.toISOString().slice(0, 10);
}
function RendimientoCard({ snapshots, flows, onSave, onDelete }) {
  const [expanded, setExpanded] = useState(null);
  const [metric, setMetric] = useState("NLV");
  const [range, setRange] = useState("1M");
  const [showSnaps, setShowSnaps] = useState(false); // lista cruda de snapshots plegada por defecto
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const dateInputStyle = { width: "100%", boxSizing: "border-box", height: 40, background: T.tile, border: `1.5px solid ${T.line}`, borderRadius: 12, padding: "0 12px", fontSize: 13, fontWeight: 600, color: T.ink, outline: "none", WebkitAppearance: "none", appearance: "none" };
  const sorted = [...snapshots].sort((a, b) => (a.date < b.date ? 1 : -1)); // desc
  const first = sorted[sorted.length - 1];
  const asc = [...snapshots].sort((a, b) => (a.date < b.date ? -1 : 1));
  /* aportaciones netas en el intervalo (d0, d1] */
  const flowBetween = (d0, d1) => (flows || []).reduce((s, f) => (f.date > d0 && f.date <= d1 ? s + n(f.amount) : s), 0);
  /* TWR: encadena retornos por tramo, neutralizando aportaciones/retiros (Dietz modificado, flujo a mitad de tramo) */
  const twrSeries = (() => {
    let idx = 100; const out = [];
    asc.forEach((s, i) => {
      if (i === 0) { out.push({ date: s.date, v: 100 }); return; }
      const prev = asc[i - 1];
      const F = flowBetween(prev.date, s.date);
      const denom = prev.nlv + 0.5 * F;
      const r = denom ? (s.nlv - prev.nlv - F) / denom : 0;
      idx *= 1 + r;
      out.push({ date: s.date, v: idx });
    });
    return out;
  })();
  const flowsAsc = [...(flows || [])].sort((a, b) => (a.date < b.date ? -1 : 1));
  const aportSeries = (() => { let acc = 0; return flowsAsc.map((f) => { acc += n(f.amount); return { date: f.date, v: acc }; }); })();
  const SPECIAL = {
    "Rent. real": { series: twrSeries, fmt: (v) => (isFinite(v) ? (v / 100 - 1 >= 0 ? "+" : "") + ((v / 100 - 1) * 100).toFixed(1) + "%" : "—"), axis: (v) => Math.round(v - 100) + "%", color: T.green },
    "Aportado": { series: aportSeries, fmt: (v) => signMoney(v), axis: (v) => "$" + kFmt(v), color: T.purple },
  };
  const sp = SPECIAL[metric];
  const m = sp ? null : METRICS[metric];
  const fullSeries = sp ? sp.series : asc.map((s) => ({ date: s.date, v: m.get(s) })).filter((p) => isFinite(p.v));
  const inRange = (d) => {
    if (range === "Fechas") return (!customFrom || d >= customFrom) && (!customTo || d <= customTo);
    const cut = rangeCutoffISO(range);
    return !cut || d >= cut;
  };
  let series = fullSeries.filter((p) => inRange(p.date));
  /* Rent. real: re-basar el índice TWR al inicio del rango visible, para que tanto la cifra como la curva
     reflejen el periodo seleccionado (antes mostraba siempre el acumulado desde el primer snapshot). */
  if (metric === "Rent. real" && series.length) {
    const base = series[0].v || 100;
    series = series.map((p) => ({ date: p.date, v: (p.v / base) * 100 }));
  }
  const mFmt = sp ? sp.fmt : m.fmt;
  const mAxis = sp ? sp.axis : m.axis;
  const mColor = sp ? sp.color : m.color;
  const curV = metric === "Rent. real"
    ? (series.length ? series[series.length - 1].v : NaN)
    : (fullSeries.length ? fullSeries[fullSeries.length - 1].v : NaN);
  const firstV = series.length ? series[0].v : NaN;
  const dTotal = curV - firstV;
  const dTotalPct = firstV ? dTotal / Math.abs(firstV) : NaN;
  const isMoney = ["NLV", "MKT VL", "P&L", "Riesgo", "Aportado"].includes(metric);
  const showPct = isMoney && !NO_PCT.includes(metric);

  return (
    <div style={{ background: T.card, borderRadius: 24, padding: 16, boxShadow: T.shadow, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: T.ink }}>Rendimiento</div>
        <button onClick={onSave} style={{ background: T.dark, border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 12.5, fontWeight: 700, color: "#fff", cursor: "pointer" }}>+ Snapshot de hoy</button>
      </div>

      {snapshots.length === 0 && (
        <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 500, padding: "8px 0" }}>Sin snapshots todavía. Guarda uno cada semana o mes para trackear la evolución de NLV, riesgo total y P&L por cuenta, bloque y subyacente a lo largo del tiempo.</div>
      )}

      {snapshots.length >= 1 && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ marginBottom: 6 }}>
            <Pill options={METRIC_ROW1} value={metric} onChange={setMetric} size="xs" />
          </div>
          <div style={{ marginBottom: 8 }}>
            <Pill options={METRIC_ROW2} value={metric} onChange={setMetric} size="xs" />
          </div>
          <div style={{ marginBottom: 8 }}>
            <Pill options={RANGE_KEYS} value={range} onChange={setRange} size="sm" />
          </div>
          {range === "Fechas" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
              <input type="date" value={customFrom} onChange={(e) => setCustomFrom(e.target.value)} style={dateInputStyle} />
              <input type="date" value={customTo} onChange={(e) => setCustomTo(e.target.value)} style={dateInputStyle} />
            </div>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10.5, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4 }}>{metric === "Rent. real" ? "Rentabilidad sin aportaciones ni traspasos (TWR)" : metric === "Aportado" ? "Aportaciones netas acumuladas" : (METRIC_TITLE[metric] || metric) + " · último snapshot"}</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.5, marginTop: 1 }}>{isFinite(curV) ? mFmt(curV) : "—"}</div>
            </div>
            {series.length >= 2 && metric !== "Rent. real" && (
              <div style={{ textAlign: "right" }}>
